Key: NPC.Friendly.MalachiteCity.GoldwynExcelsior
Name: Goldwyn Excelsior
Role: QuestGiver
Location: Zone.MalachiteCity.Plaza
RaceKey: Madolt
Gender: Male
Appearance:
  Note: >
    Gem-dusted golden Waste Metal armor (see Attire/GoldWasteplate_*.yaml),
    a helmet that phases in/out of existence rather than being removed by
    hand, and a Spine Sword (Item.Equipment.Goldwyn.SpineSword.yaml) sized
    like it belongs to someone twice his build. Visibly overdressed for his
    own combat ability.
Voice: ""
SpeechPattern:
  Theme: OverconfidentHeir_LandwinDevotee
  Note: >
    LLM authoring aid: brags about his gear first, his own skill never.
    Frequently name-drops his mentor Kaeloth Windpaw and the Landwin
    philosophy unprompted. Comedic overconfidence should read as endearing,
    not obnoxious -- he is always aware, on some level, that the equipment
    is doing the work. Post-Seq2 (Kaeloth's death) his banter should thin
    out considerably; grief displaces the bragging, not just tone-shifts it.
BanterSets:
  Default:
    - "You're looking at gem-dusted Waste Metal, my friend -- forged from the anvils that shattered refining OTHER people's gems. Fitting, don't you think?"
    - "My mentor always said: can't keep a winner down. I intend to prove him right eventually."
  BOSS_NEARBY: []
  POST_SEQ2_GRIEF:
    - "...The armor still fits. Everything else feels wrong."
Equipment:
  Weapon: Item.Equipment.Goldwyn.SpineSword
  Attire:
    - GoldWasteplate_Helm
    - GoldWasteplate_Chest
    - GoldWasteplate_Legs
  Tool: Item.Equipment.Goldwyn.RecallSphere
AssignedSkills: []
SocialLinks:
  - NPC_ID: NPC.Friendly.MalachiteCity.KaelothWindpaw
    Relation: Student_To_Mentor
    Tone: Reverent_Devoted
Tags:
  - Tag.NPC.Friendly
  - Tag.Race.Madolt
  - Tag.Profession.Traveler
  - Tag.Faction.Agents
  - Tag.Quest.Goldwyn.PathOfTravelers
NarrativeIntent: >
  Comedic-relief rich-boy isekai archetype: golden armor, powerful borrowed
  equipment, genuinely weak in a fight. Desires to become a Traveler
  (military-grade Adventurer) but lacks the battle acumen; his arc across
  Quests/Goldwyn.PathOfTravelers_Seq0-5 is losing his mentor, engineering a
  win through preparation and equipment rather than personal strength, and
  founding the Agents (this world's Scions-equivalent) to prevent needless
  death and conflict going forward.
