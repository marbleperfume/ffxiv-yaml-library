Key: NPCGroup.MalachiteCity.BirthdayInvitees
Description: >
  Roster addressed collectively by Seq3 (Gather Invitations). Commonfolk
  members are generic/unnamed -- they deliver the "free food, no real
  commitment" beat and the Tryll stereotype punchline. Craftspeople members
  are the ones who actually show up with gifts.
StereotypeBarrier:
  TriggerTag: Tag.Race.Tryll
  Line: "If it involves a Tryll, there's no thrill."
  Effect: Lowers Commonfolk attendance odds; Craftspeople are unaffected.
Commonfolk:
  Reaction: ThankAndLeave
  GiftGiven: false
  AttendanceDuration: None
  Count: Variable
Craftspeople:
  Reaction: AttendBriefly
  GiftGiven: true
  AttendanceDuration: Short
  Members:
    - NPC.Friendly.MalachiteCity.Blacksmith
    - NPC.Friendly.MalachiteCity.Weaver
  Note: >
    These two additionally recruit further profession NPCs off-screen before
    Seq5 -- represented narratively rather than individually simulated, since
    there's no map/NPC density yet to place a real crowd.
Tags:
  - Tag.Quest.Chef.Crem.Courier
