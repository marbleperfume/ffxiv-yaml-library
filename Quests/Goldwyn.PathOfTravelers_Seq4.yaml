NarrativeIntent: >
  Chapter-closing boss fight against NPC.Boss.Nekrath.yaml. Player handles
  the majority of the fight; scripted beats (see
  Dialogue.Goldwyn.PathOfTravelers.Seq4.NekrathFinale) strip Goldwyn's gear
  piece by piece, down the player, and resolve the encounter through the
  ignite/Recall Sphere/ghost-assist finisher rather than a conventional
  DPS check. The PlayerDowned branch exists so the encounter can't
  accidentally hard-fail the quest -- Nekrath's cockiness is diegetic, not
  a UI safety net, but it still needs to be encoded as one.
