NarrativeIntent: >
  Strategy Rank 2 test. In a normal party, the tank/healer would just handle
  the Vanguard while ranged DPS deals with the casting goblins -- trivial.
  Run SOLO instead, forcing the player to learn the toolkit themselves:
  Smokescreen suppresses the ranged casters' targeting while the player
  closes on the Vanguard; Bombs let any role burst it down directly; Traps
  immobilize it as long as damage stays below a small threshold (control
  without overcommitting -- hit it too hard and the trap breaks). Tanks are
  graded on a smaller tool budget, since their inherent RoleMechanic already
  covers aggro/mitigation the tools would otherwise provide.
