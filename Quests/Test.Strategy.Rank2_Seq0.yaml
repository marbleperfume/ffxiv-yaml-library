TestConfig:
  Layout: "Goblin Vanguard (melee frontline) + 3 ranged AoE-casting goblins, solo -- no party role division to lean on"
  ProvidedTools:
    - Item.Tactical.Smokescreen
    - Item.Tactical.Bombs
    - Item.Tactical.Traps
  RoleToolBudget:
    Tank:
      MaxToolsExpected: 1
      Note: "Inherent Focus/Aggro/mitigation RoleMechanic covers most of what the tools are for; budget shrinks further at Strategy Rank3+"
    NonTank:
      MaxToolsExpected: 3
      Note: "Expected to use the full kit -- Smokescreen to approach safely, Bombs (or sustained damage) to break the Vanguard, Traps to control it without overcommitting"
Reward:
  TitleID: null
