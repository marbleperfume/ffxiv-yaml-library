Key: Item.Tactical.Smokescreen
Name: Smokescreen
Category: Tactical
Rarity: Common
Stackable: true
MaxStacks: 10
Description: >
  Deployable consumable. Creates a concealment cloud that suppresses ranged
  enemy targeting on the user while active -- lets any role safely approach
  and defeat a melee threat (e.g. a Goblin Vanguard) without eating hits
  from ranged casters standing off at range.
Effect:
  Type: TargetingSuppression
  AffectsTargeting: Ranged
  Duration: 8
  Radius: 6
