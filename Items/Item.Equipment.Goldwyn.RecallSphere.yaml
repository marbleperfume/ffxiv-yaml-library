Material: Gem-Dusted Waste Metal (mechanical core)
IconPath: ""
Description: >
  A palm-sized mechanical orb, machined from the same Waste Metal as
  Goldwyn's armor. Three functions: (1) recalls the Spine Sword and any
  detached golden armor pieces back to Goldwyn's body, reassembling broken
  plates; (2) converts stored propulsion charge into a burst jump/dash, used
  for both mobility and (per the Nekrath fight) throwing the whole recall
  payload at a target instead of himself; (3) can be thrown by hand as a
  manual trigger if the auto-magnetize fails.
Function:
  Recall: "Pulls tagged Spine Sword + armor pieces back to a locked target -- normally Goldwyn, but the target lock follows whatever the Spine Sword last magnetized"
  Propulsion: "Short-range burst jump/dash, reusable, cosmetic-comedic normally (Goldwyn oversells the distance) but the only reason he keeps pace with real fights"
  ManualOverride: "Can be thrown by hand if the automatic magnetize misfires -- see the failed throw in Quests/Goldwyn.PathOfTravelers_Seq4.yaml"
NarrativeIntent: >
  The device that both sells Goldwyn's competence (his gear survives fights
  he personally can't) and, in Seq4, becomes the point of failure that
  forces the ghost-assist beat -- its normal reliability is why the audience
  should read the misfire as dramatic, not as the device being badly designed.
