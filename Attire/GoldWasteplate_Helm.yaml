Name: Gold Wasteplate Helm
Slot: Head
IsDyeable: false
RestrictionTags:
  - Tag.Character.Goldwyn.Unique
IconPath: ""
Description: >
  A gem-dusted Waste Metal helm (Waste Metal = the slag left over from spent
  anvils after gem-smashing/refining, re-smelted rather than discarded) that
  phases in and out of existence on command via a small embedded charge --
  it "magically" appears and disappears rather than being physically doffed.
  Purely cosmetic/protective, no combat function of its own; the first piece
  knocked off in the Nekrath fight (Quests/Goldwyn.PathOfTravelers_Seq4.yaml).
