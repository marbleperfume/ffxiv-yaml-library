Key: "Skill.Combat.Landwin.EnergyChannel"
Name: "Energy Channel"
Intent: "Ranged projectile GCD -- channel outside energy inward, condense it, expel it as a bolt"
Tags:
  - "Skill.Type.Spell"
  - "Skill.Element.None"
RaceRestrictions:
  - Unrecorded
BaseState:
  Animation: "Anim_Channel_Condense_Expel"
  VFX: "VFX_Landwin_EnergyBolt"
  IsOGCD: false
  CanCastWhileMoving: false
Tiers:
  Tier2:
    AnimationOverride: "Anim_Channel_Condense_Expel_Heavy"
    VFXOverride: "VFX_Landwin_EnergyBolt_Large"
NarrativeIntent: >
  Kaeloth Windpaw's signature technique -- the Ryu-Hadouken half of his
  Ryu/Udyr-inspired kit: pull in outside energy, condense it, expel it as a
  projectile. RaceRestrictions is set to the "Unrecorded" Landwin subrace as
  a narrative flag (this is Kaeloth's personal technique, not a granted
  racial BonusSkill) rather than an expectation that other Unrecorded
  Landwin will ever exist to use it.
