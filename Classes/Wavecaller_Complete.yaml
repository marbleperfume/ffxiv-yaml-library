# Classes/Wavecaller/Wavecaller_Complete.yaml
# ═══════════════════════════════════════════════════════════════════════════════
# WAVECALLER — Healer / DPS (Dual Delivery System)
# ═══════════════════════════════════════════════════════════════════════════════
#
# "The aggressive healer who wants to fight but SHOULD be healing. The constant
# push/pull between 'I could dive and kill that thing' vs 'my team needs me back
# here' IS the class fantasy. No other healer has this identity."
#
# Sound magic = HEALING. Water portal dive = DAMAGE. These two delivery systems
# pull the player in opposite directions positionally. The skill expression is
# reading WHEN the party can survive reduced healing while you portal-dive for
# burst melee damage, then getting back to safety before the healing debt
# becomes fatal.
#
# NOT Jaguar from ToS — not spam CC that forces standstills.
# NOT rotation-based — dive decisions are contextual, never scripted.
# NOT whale-sized — humanoid, cute (Shylily-esque), teeth are VISUAL only.
#
# Balance Ref: Combat/BalanceTargets.yaml
# Last Updated: 2026-07-14
# ═══════════════════════════════════════════════════════════════════════════════

Key: Classes.Wavecaller

# ─────────────────────────────────────────────────────────────────────────────
# HEADER
# ─────────────────────────────────────────────────────────────────────────────

Header:
  ClassName: Wavecaller
  Race: Jumpers
  Tier: Experienced
  Role: Healer / DPS
  LockType: Biological
  LastUpdated: 2026-07-14
  DesignPhase: qualitative_complete
  Status: awaiting_quantitative_pass

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 1: IDENTITY
# ─────────────────────────────────────────────────────────────────────────────

Identity:
  Name: Wavecaller
  Role: Healer
  SubRole: Burst DPS (opportunistic melee via portal dive)
  DamageType: physical (dive impact) + water elemental (portal effects)
  HealingType: sound (biological vocalization — NOT magic casting)
  ExecutionArchetype: Positional Tension + Opportunity Assessment + Risk Management

  RacialBiology:
    Species: Jumpers
    BodyType: Humanoid, compact, streamlined
    Aesthetic: "Cute aquatic humanoid — Shylily-esque. NOT whale-sized. Proportioned
      like a small athletic humanoid with aquatic features (fin ears, sleek skin,
      subtle gill lines). Teeth are visible as visual identity marker but have
      ZERO mechanical function — they don't bite in combat, they don't factor
      into damage calculations, they are purely aesthetic species flavor."
    KeyOrgans:
      VocalApparatus: >
        Produces frequencies that interface with biological tissue repair at the
        cellular level. This is NOT magic — it is physics. The vocal cords vibrate
        at resonant frequencies that accelerate cell regeneration, reduce inflammation,
        and stabilize metabolic shock in nearby organisms. Other races can sing.
        Jumper vocalization HEALS. The mechanism is acoustic, not arcane.
      PortalGlands: >
        Biological organs (located along the forearms and torso) that secrete a
        hyper-pressurized water compound capable of tearing localized spatial rifts
        when discharged in sufficient volume. The "portal" is a water-pressure
        phenomenon — not a magic teleport. The Jumper's body generates the water
        AND the pressure to punch through space. Their streamlined physiology is
        built for transit through these apertures at high velocity.
      AquaticAdaptation: >
        Webbed digits, pressure-resistant musculature, hydrodynamic body shape.
        The Jumper is built to MOVE through water portals without injury — the
        transit speed that would pulverize other races is survivable because their
        body is designed for aquatic high-velocity impact.

  BiologicalLockJustification: >
    Remove the Jumper body, remove the class entirely. No other race has vocal
    cords that produce tissue-repair frequencies. No other race has portal glands
    that generate spatial rifts through water pressure. No other race has the
    aquatic musculature to survive portal transit velocity. A non-Jumper attempting
    to "learn" Wavecalling would be like a human attempting to echolocate like a
    bat — the organ doesn't exist, the capability is impossible.

  DesignStatement: >
    Wavecaller is a healer whose BODY wants to fight. The sound healing is
    effortless — open your mouth, your voice heals. But the water portals call
    to you. You can SEE the enemy. You can REACH the enemy. The portal is RIGHT
    THERE. The question is never "can I dive?" — it's "SHOULD I dive?" The party
    needs healing. The party ALWAYS needs healing. But that one enemy is low HP
    and if you just— no. Heal. But— HEAL. The tension between biological
    aggression instinct and team responsibility IS the Wavecaller.

  DistinctionFromOtherHealers:
    vs_Elementalist: >
      Elementalist heals reactively from SAFETY. Water element = healing, delivered
      at range, no positional sacrifice. The Elementalist never WANTS to be in melee.
      Wavecaller's healing is also ranged — but the Wavecaller is TEMPTED to abandon
      that safe position for damage. Elementalist has no such temptation.
    vs_Shaman: >
      Shaman heals by DRAINING cursed targets (Hex Drain). Healing is a BYPRODUCT
      of offensive action — the Shaman never stops attacking to heal. Wavecaller
      must CHOOSE: heal OR attack. They cannot do both optimally simultaneously.
      Shaman has no positional tension. Wavecaller lives in positional tension.
    vs_Siren: >
      Siren heals while COMMANDING enemies. The voice does two things at once —
      compel enemies AND resonate healing frequencies for allies. Siren never
      stops being useful in both roles simultaneously. Wavecaller's two roles
      (heal vs. damage) are MUTUALLY EXCLUSIVE positionally. You cannot be at
      range (healing optimally) and in melee (diving for damage) at the same time.
    vs_Spiritcaller: >
      Spiritcaller delegates healing to the Water Slime companion while fighting
      in melee personally. Split-attention but both functions happen simultaneously.
      Wavecaller has no companion — YOU are the healer AND the diver. When you dive,
      healing output drops. Period.

  InputModalityShift:
    Primary: "Party HP bars — constant triage assessment (can they survive 4s without heals?)"
    Secondary: "Enemy positioning — which targets are portal-diveable right now?"
    Tertiary: "Own position — am I at optimal healing range or stranded in melee?"
    Quaternary: "Portal resource gauge — can I generate a portal if I need to dive OR escape?"
    Quinary: "Cooldown awareness — is my return portal available or am I committing one-way?"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 2: CORE MECHANIC — DUAL DELIVERY SYSTEM
# ─────────────────────────────────────────────────────────────────────────────

CoreMechanic:
  Type: dual_delivery_positional_tension
  Name: "Resonance & Rift"
  Description: >
    Two fundamentally opposed delivery systems compete for the Wavecaller's position.
    Sound healing is strongest at RANGE (10-25m from allies). Water portal dive
    damage requires MELEE proximity (0-3m from enemy). The player cannot optimize
    both simultaneously — every moment spent diving is healing NOT delivered, and
    every moment spent healing is a kill opportunity NOT taken.

  DeliverySystem_Sound:
    Name: "Resonance (Sound/Healing)"
    Mechanic: >
      Vocalization-based AoE healing that propagates outward from the Wavecaller.
      Sound travels THROUGH obstacles and AROUND corners — potentially ignoring
      LoS for healing (with distance degradation). Healing strength is highest
      when the Wavecaller is STATIONARY and at RANGE (uninterrupted vocalization
      from a safe position). Moving reduces output. Being in melee range of enemies
      risks interruption (taking hits disrupts vocalization).
    Properties:
      - "AoE propagation — heals multiple allies within acoustic range"
      - "Possible no-LoS — sound propagates through walls (degraded, not full power)"
      - "Strongest when stationary at range (uninterrupted sustained vocalization)"
      - "Degraded when moving (shorter phrases, less resonance buildup)"
      - "Interrupted by taking damage (vocal disruption — biological, not magical silence)"
      - "Fast application — sound reaches allies at speed of sound (near-instant delivery)"
    OptimalPosition: "15-20m behind frontline, stationary, clear acoustic path to allies"

  DeliverySystem_Water:
    Name: "Rift (Water Portal/Damage)"
    Mechanic: >
      Generate a water portal → dive through it at high velocity → emerge at target
      location → physical melee impact damage on arrival → must deal with consequences
      of being in melee. The portal dive IS the damage — the kinetic energy of
      transit converted into impact force on emergence. Post-dive, the Wavecaller
      is IN MELEE with enemies and must either fight, generate a return portal, or
      retreat on foot.
    Properties:
      - "Portal generation requires resource (Pressure Charge — see Resource System)"
      - "Dive deals impact damage on EMERGENCE (not on entry)"
      - "Physical damage type — melee-coded, scales with velocity and mass"
      - "One-way by default — return portal costs ADDITIONAL resource"
      - "Portal lingers briefly (2-3s) — enemy can follow through if near entry point"
      - "Dive is COMMITTED — once entering the portal, trajectory is locked"
      - "Post-dive state: in melee, portal glands depleted, healing output degraded"
    OptimalCondition: "High-value isolated target, party HP stable, return portal available"

  TheTension:
    Description: >
      This is the heart of the class. Diving for damage means:
        1. You are now in MELEE (dangerous for a healer-bodied character)
        2. Your healing output is degraded (taking hits disrupts vocalization)
        3. Your portal glands are partially depleted (escape costs more resource)
        4. Your party is receiving REDUCED healing for the dive duration
      Staying back to heal means:
        1. You are SAFE but dealing zero damage
        2. You can SEE kill opportunities you cannot take
        3. Your burst damage potential is wasted
        4. Enemies that could be dead are still alive and still threatening your party
      The CORRECT answer changes every 5-10 seconds based on party HP, enemy
      positioning, portal resource, and encounter phase. There is no "default mode."
    SkillExpression: >
      Expert Wavecallers read party HP trajectory (not current HP — PROJECTED HP
      3-4 seconds from now), identify safe dive windows where healing debt won't
      become fatal, execute portal dives for burst kills, and return to healing
      position before the party notices reduced throughput. The best Wavecallers
      look like they never stop healing AND never stop diving — because they time
      transitions perfectly.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 3: TRIGGER SYSTEM
# ─────────────────────────────────────────────────────────────────────────────

TriggerSystem:
  Description: >
    Unlike classes with explicit mode-switching (stance locks, transformation states),
    the Wavecaller's "mode" is determined by POSITION. Being at range = heal mode.
    Being in melee = damage mode. The triggers that push the player between these
    positions are encounter-driven and decision-driven — never automatic.

  HealModeTriggers:
    - Trigger: "Party member drops below 60% HP"
      Pressure: "Must vocalize NOW — every GCD spent not healing risks party death"
      Response: "Retreat to safe range, begin sustained vocalization"
    - Trigger: "Multiple allies taking simultaneous damage (AoE phase)"
      Pressure: "AoE healing requires sustained uninterrupted vocalization — cannot be in melee"
      Response: "Find safe position, commit to extended heal sequence"
    - Trigger: "Portal resource depleted (cannot generate return portal)"
      Pressure: "Diving now means being STRANDED in melee with no escape"
      Response: "Stay at range, heal, wait for resource recovery"
    - Trigger: "Boss entering high-damage phase (predictable spike incoming)"
      Pressure: "Party will need maximum healing throughput in 3-5 seconds"
      Response: "Pre-position at optimal range, prepare sustained vocalization"
    - Trigger: "Wavecaller took damage recently (vocal disruption active)"
      Pressure: "Healing output currently degraded — diving again would compound the problem"
      Response: "Stay safe, let vocalization recover, then reassess"

  DamageDiveTriggers:
    - Trigger: "Isolated enemy at low HP (killable in 1-2 dives)"
      Pressure: "That enemy will heal/reposition/call adds if not killed NOW"
      Response: "Check party HP → if stable, generate portal → dive → kill → return"
    - Trigger: "Party HP stable at 80%+ (no immediate healing demand)"
      Pressure: "Healing is wasted at full HP — damage window is open"
      Response: "Identify highest-value dive target → execute → return before HP drops"
    - Trigger: "Enemy caster in backline threatening party from range"
      Pressure: "Sound interrupt may not reach (distance) — dive interrupt is guaranteed"
      Response: "Portal dive TO the caster → interrupt via impact → kill or retreat"
    - Trigger: "Frontliner has target locked down (stunned/grappled enemy)"
      Pressure: "Free damage window — enemy can't threaten you during disable"
      Response: "Dive the disabled target for burst damage → return before disable ends"
    - Trigger: "Boss is vulnerable (break state, exposed core, phase transition)"
      Pressure: "Burst damage window — maximum DPS required from entire party"
      Response: "All-in dive for maximum impact damage contribution"

  EncounterPressureForcing:
    ForcesHealMode:
      - "Sustained party-wide damage (DoT phases, environmental hazards)"
      - "Anti-melee mechanics (boss cleave, PBAoE, melee-punish zones)"
      - "Healer-check phases (damage exceeds single-healer throughput)"
      - "Portal resource depleted (no safe dive possible)"
    ForcesDamageMode:
      - "DPS check phases (boss must die before enrage)"
      - "Priority add spawns (must be killed before they execute dangerous abilities)"
      - "Backline threats that only melee reach can solve"
      - "Breaks/staggers that reward burst contribution from all party members"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 4: ABILITIES
# ─────────────────────────────────────────────────────────────────────────────

Abilities:
  # ═══════════════════════════════════════════════════════════════════════════
  # SOUND / HEALING ABILITIES (7 abilities)
  # ═══════════════════════════════════════════════════════════════════════════

  Sound_Healing:
    - Name: "Tidal Hymn"
      DeliverySystem: Sound
      Type: GCD_Heal
      TriggerCondition: "Ally HP below 80% within acoustic range (25m)"
      Effect: >
        Sustained vocalization (1.5s channel). Heals all allies within 20m radius
        for moderate HP per tick (2 ticks over 1.5s). Sound propagates around
        corners at 70% effectiveness. Stationary cast — moving cancels.
      CCStage: null
      ItemReplaced: "Healing Specter (stationary heal zone — Wavecaller's version moves WITH them and propagates through walls)"
      DecisionCreated: >
        Channeling locks you in place for 1.5s. During that time you cannot reposition,
        cannot dodge, and cannot dive. Is 1.5s of healing worth 1.5s of immobility?
        In safe backline: always yes. In contested space: dangerous commitment.
      Cooldown: "GCD (2.0s base)"
      Notes: "Primary healing GCD. The 'bread and butter' — this is what you SHOULD be pressing."

    - Name: "Keening Pulse"
      DeliverySystem: Sound
      Type: oGCD_Heal
      TriggerCondition: "Instant — no positioning requirement"
      Effect: >
        Sharp burst vocalization (instant). Single-target heal on lowest-HP ally
        within 25m. Moderate potency. Does NOT require facing the target (sound
        is omnidirectional). Can be woven between GCDs.
      CCStage: null
      ItemReplaced: "Rejuvenation Flask (thrown burst heal — Wavecaller's version is instant, targeted, unlimited)"
      DecisionCreated: >
        Burns an oGCD slot. If you're planning to dive next GCD, this is your
        last heal before committing forward. Do you Keening Pulse → Dive, or
        save the oGCD for a damage weave after diving?
      Cooldown: "8s"
      Notes: "Emergency heal between actions. The 'oh shit' button that doesn't interrupt your plan."

    - Name: "Harmonic Wash"
      DeliverySystem: Sound
      Type: GCD_Heal
      TriggerCondition: "3+ allies within 15m of each other (clustered party)"
      Effect: >
        Extended resonant chord (2.0s cast). Powerful AoE heal centered on the
        densest cluster of allies within 25m. Heals all allies in 8m radius of
        cluster center. Full power through LoS (sound bounces off walls, reaches
        enclosed spaces). Cannot be cast while moving.
      CCStage: null
      ItemReplaced: "Rejuvenation Flask AoE (2m radius, 20% HP) — Wavecaller's version is 8m radius, repeatable, and penetrates walls"
      DecisionCreated: >
        2.0s cast is your entire GCD window with no weave space. This is the
        maximum-throughput heal but it costs ALL your action economy for that
        window. If an enemy is diveable RIGHT NOW, casting this means missing
        the window entirely.
      Cooldown: "GCD (2.0s base) — but 2.0s cast time means no weave"
      Notes: "Heavy heal for stacked situations. The choice that says 'I am a healer right now, not a diver.'"

    - Name: "Resonant Shield"
      DeliverySystem: Sound
      Type: oGCD_Utility
      TriggerCondition: "Ally about to take predictable spike damage"
      Effect: >
        Focused harmonic tone (instant). Creates a sound-barrier on one ally that
        absorbs damage equal to 15% of Wavecaller's max HP. Lasts 8s or until
        consumed. Sound-based — cannot be dispelled by silence effects (it's
        already placed). Only one Resonant Shield active at a time.
      CCStage: null
      ItemReplaced: "Hardshell Powder (party defense buff) — Wavecaller's version is stronger on one target, instant, repeatable"
      DecisionCreated: >
        One shield, one target. Do you shield the tank who's about to eat a buster,
        or shield YOURSELF so you can dive without dying to incidental melee damage?
        Selfish shield enables aggression. Selfless shield enables team survival.
      Cooldown: "15s"
      Notes: "Can be used on self to enable safe diving. This is the 'permission to be aggressive' button."

    - Name: "Shattercroon"
      DeliverySystem: Sound
      Type: oGCD_CC
      TriggerCondition: "Enemy mid-cast within 20m (interrupt window)"
      Effect: >
        Piercing screech (instant). Interrupts one enemy's current action within
        20m. Does NOT require LoS (sound propagates). The interrupt is FAST —
        travels at acoustic speed, nearly instant delivery. Interrupted target
        suffers 1.5s lockout on the interrupted ability only.
      CCStage: "Stage 2 (Interrupt — stops specific action, faster than Shaman's Bone Spirit but no persistent installation)"
      ItemReplaced: "Stupor Bell (8m AoE interrupt, one-time) — Wavecaller's version is 20m single-target, repeatable, no LoS needed"
      DecisionCreated: >
        5s cooldown means you can interrupt frequently — but WHICH cast do you
        interrupt? The enemy healer's heal? The caster's nuke? The boss's party-wide
        AoE? You can't interrupt everything. Prioritization is the skill.
      Cooldown: "5s"
      Notes: >
        THIS is the speed-interrupt healer identity. 5s CD vs Shaman's Bone Spirit
        (10s CD installation-based interrupt). Wavecaller interrupts FASTER but leaves
        nothing behind — Bone Spirit interrupts SLOWER but persists as a sentry that
        interrupts repeatedly without Shaman input. Speed vs. persistence tradeoff.

    - Name: "Undertow Lullaby"
      DeliverySystem: Sound
      Type: GCD_CC_Heal
      TriggerCondition: "Enemy and ally both within 15m (dual-purpose opportunity)"
      Effect: >
        Melodic vocalization (1.5s cast). Applies Stage 1 slow (-30% movement speed,
        6s) to all enemies in 10m cone AND heals all allies in the same cone for
        light potency. The same sound wave does both — harms enemies' coordination
        while soothing ally tissue. Cone originates from Wavecaller facing direction.
      CCStage: "Stage 1 (Slow — doesn't stop attacks, favors ranged positioning)"
      ItemReplaced: "Thickglass Flask (-50% move, 20s puddle) — Wavecaller's version is mobile, heals simultaneously, repeatable"
      DecisionCreated: >
        Cone requires FACING enemies — which means turning away from retreating allies.
        Do you cone forward to slow approaching threats, or turn around and heal
        with Tidal Hymn instead? Cone is efficient (heal + CC) but positionally
        restrictive.
      Cooldown: "GCD (2.0s base)"
      Notes: "The hybrid ability that rewards good positioning — when enemies and allies are in the same direction."

    - Name: "Siren's Refrain"
      DeliverySystem: Sound
      Type: GCD_BigHeal
      TriggerCondition: "Critical triage — multiple allies below 40% HP"
      Effect: >
        Sustained harmonic chord (2.5s cast — LONG commitment). Massive AoE heal
        to all allies within 30m regardless of LoS. Full power sound propagation
        through ALL obstacles. Heals for high potency. The 2.5s cast means NO
        weaving, NO movement, NO interruption tolerance — pure commitment to healing.
      CCStage: null
      ItemReplaced: "Mega Elixir (full party heal) — Wavecaller's version is weaker per-cast but repeatable, no consumable cost"
      DecisionCreated: >
        2.5s of total immobility. If an enemy reaches you during this cast, you
        eat the hit AND lose the cast if disrupted. This ability screams "I am
        staying HERE and I am HEALING" — zero ambiguity about role commitment.
        Using this in melee range is suicidal. Using this at safe range is the
        strongest healing in your kit.
      Cooldown: "20s"
      Notes: "Emergency party heal. The ability that DEMANDS you stay at range. Anti-dive by design."

  # ═══════════════════════════════════════════════════════════════════════════
  # WATER / DAMAGE ABILITIES (7 abilities)
  # ═══════════════════════════════════════════════════════════════════════════

  Water_Damage:
    - Name: "Rift Dive"
      DeliverySystem: Water
      Type: GCD_Damage_Mobility
      TriggerCondition: "Valid target within portal range (30m), sufficient Pressure Charge"
      Effect: >
        Generate portal at feet → dive through → emerge at target location dealing
        heavy physical impact damage to all enemies within 3m of emergence point.
        Wavecaller is now IN MELEE at the emergence location. Portal entry lingers
        for 2.5s (enemies near it can follow through; allies CANNOT use it).
        Consumes 1 Pressure Charge.
      CCStage: "Stage 1 (displacement — enemies near emergence point knocked back 2m)"
      ItemReplaced: "Flashstep Cartridge (8m teleport, no damage) — Wavecaller's version is 30m, deals damage on arrival, creates portal"
      DecisionCreated: >
        THE core decision. Diving moves you from safe-heal-position to danger-zone.
        Every Rift Dive is a statement: "My party can survive without me for X seconds."
        If you're wrong, people die. If you're right, the enemy dies. This is where
        the class lives or dies — literally.
      Cooldown: "GCD (2.0s base) — but resource-gated by Pressure Charge"
      PressureCost: 1
      Notes: "Primary gap-close and damage opener. This is the ability that CALLS to you."

    - Name: "Breaching Strike"
      DeliverySystem: Water
      Type: GCD_Damage
      TriggerCondition: "In melee range (0-3m) after portal dive"
      Effect: >
        Water-enhanced physical strike. Hydrodynamic fists/body slam dealing
        moderate-high physical damage to single target. Generates 0.25 Pressure
        Charge on hit (partial refund for staying aggressive). Only available
        while in melee range — cannot be cast at range.
      CCStage: null
      ItemReplaced: "Concussion Charge (ground-placed AoE) — Wavecaller's version is instant melee, no delay, refunds resource"
      DecisionCreated: >
        Every Breaching Strike spent in melee is a GCD NOT spent healing. But it
        refunds Pressure Charge, making future dives (or return portals) cheaper.
        Stay in melee longer = more resource refund = more future dives. But stay
        too long = party dies from healing deficit. How greedy can you be?
      Cooldown: "GCD (2.0s base)"
      PressureRefund: 0.25
      Notes: "Melee filler that rewards extended aggression with resource recovery. The 'one more hit' temptation."

    - Name: "Undertow Slam"
      DeliverySystem: Water
      Type: GCD_Damage_AoE
      TriggerCondition: "3+ enemies within 5m (melee cluster opportunity)"
      Effect: >
        Ground-pound water discharge. Expel pressurized water in 5m radius around
        Wavecaller dealing moderate physical damage to all enemies. Leaves a
        2s water puddle (difficult terrain: -20% enemy movement speed) at the
        impact point. Does NOT refund Pressure Charge.
      CCStage: "Stage 1 (slow via difficult terrain — 2s only, minor)"
      ItemReplaced: "Upheaval Flask (3m AoE eruption) — Wavecaller's version is larger radius, repeatable, leaves terrain effect"
      DecisionCreated: >
        AoE damage that burns through your melee window faster (no refund) but
        hits more targets. Do you Breaching Strike one target for refund, or
        Undertow Slam the cluster for total damage? Resource efficiency vs.
        raw output.
      Cooldown: "GCD (2.0s base)"
      Notes: "AoE melee option. Use when surrounded. Punishes you for being surrounded by not refunding resource."

    - Name: "Return Tide"
      DeliverySystem: Water
      Type: oGCD_Mobility
      TriggerCondition: "Currently in melee range after a dive (want to retreat)"
      Effect: >
        Generate RETURN portal (instant) → dive back to a position within 5m of
        your last portal entry point. Returns you to approximately where you were
        before diving. Costs 1 Pressure Charge. The escape route. The "I'm done
        being aggressive" button.
      CCStage: null
      ItemReplaced: "Retrograde Bead (mark → recall within 20s) — Wavecaller's version is instant oGCD, no pre-placement, same resource as offense"
      DecisionCreated: >
        Return Tide costs the SAME resource as Rift Dive. Every Return Tide is a
        future dive NOT taken. Do you spend the Pressure Charge to escape safely,
        or save it for another offensive dive later (but risk being stranded in
        melee)? SAFETY vs. FUTURE AGGRESSION.
      Cooldown: "4s (cannot spam — if used, you're committed to backline for at least 4s)"
      PressureCost: 1
      Notes: >
        The critical resource tension: dive costs 1, return costs 1. A full
        dive-and-return cycle costs 2 total Pressure Charges. Being aggressive
        is EXPENSIVE. Staying in melee and using Breaching Strike to refund
        Charges is how you extend dive windows without going bankrupt.

    - Name: "Geyser Burst"
      DeliverySystem: Water
      Type: oGCD_Damage
      TriggerCondition: "In melee range, enemy below 30% HP (execute range)"
      Effect: >
        Focused water jet eruption (instant oGCD). Deals high single-target
        physical damage to one enemy within 3m. Bonus damage (+40%) if target
        is below 30% HP. Can be woven between Breaching Strikes for burst.
        Does NOT cost Pressure Charge (it's body-generated water, not portal water).
      CCStage: null
      ItemReplaced: "Charcoal Pine Bundle (ranged poke) — Wavecaller's version is melee execute, stronger at low HP, unlimited"
      DecisionCreated: >
        Only available in melee. The execute bonus makes this the "finish them"
        tool — but you have to BE in melee to use it. Do you dive for the kill
        when the target is at 30%? The temptation is enormous. The risk is real.
      Cooldown: "12s"
      Notes: "Execute tool. The reason you dive 'one more time' when you should be healing."

    - Name: "Pressure Wave"
      DeliverySystem: Water
      Type: oGCD_Damage_Ranged
      TriggerCondition: "Enemy within 15m (mid-range, no dive required)"
      Effect: >
        Ranged water projectile (instant oGCD). Fires a compressed water bolt at
        target within 15m. Low-moderate damage. Does NOT require melee range —
        this is the Wavecaller's ONLY ranged damage tool. Exists so that healing
        mode isn't zero-damage, but potency is deliberately low to maintain the
        tension (real damage requires diving).
      CCStage: null
      ItemReplaced: "Charcoal Pine Bundle (ranged poke for melee characters) — same principle: gives the melee-committed a ranged poke"
      DecisionCreated: >
        Low damage from safety, or high damage from danger? Pressure Wave lets you
        "contribute" damage without diving — but the contribution is so small that
        it highlights the opportunity cost of NOT diving. This ability makes you
        FEEL the tension.
      Cooldown: "8s"
      Notes: "Token ranged damage. Deliberately weak to maintain dive incentive."

    - Name: "Maelstrom Entry"
      DeliverySystem: Water
      Type: GCD_Damage_Ultimate
      TriggerCondition: "3+ Pressure Charges available, high-value target within 30m"
      Effect: >
        Triple-portal chain dive. Generate portal → dive → emerge → IMMEDIATELY
        generate second portal → dive again → emerge → IMMEDIATELY third portal →
        final emergence. Three sequential impacts on the same target (or up to 3
        different targets within 8m of each other). Deals massive cumulative physical
        damage. After final emergence, Wavecaller is IN MELEE with ALL portal
        glands fully depleted (0 Pressure Charges). Cannot generate portals for
        10s after use (gland recovery). The all-in commitment.
      CCStage: "Stage 1 (each impact displaces 2m — three impacts = significant positional disruption)"
      ItemReplaced: "No single item equivalent — closest is Ramcharge Capsule + Flashstep + Concussion Charge used sequentially"
      DecisionCreated: >
        The ultimate expression of "I am choosing damage over healing RIGHT NOW."
        After Maelstrom Entry, you have ZERO portal resource, cannot escape melee
        for 10s, and cannot generate return portals. Your party receives ZERO healing
        for those 10 seconds minimum. If the target doesn't die, you might. If the
        party was already stressed, they might die. This is the "I'm going ALL IN"
        button. The highest damage in your kit, at the highest cost.
      Cooldown: "45s"
      PressureCost: 3
      Notes: "Class ultimate. The commit button. The 'no going back' moment. Use wisely or wipe."

  # ═══════════════════════════════════════════════════════════════════════════
  # HYBRID / TRANSITION ABILITIES (2 abilities)
  # ═══════════════════════════════════════════════════════════════════════════

  Hybrid_Transition:
    - Name: "Echoing Impact"
      DeliverySystem: "Water (dive) + Sound (residual)"
      Type: Passive
      TriggerCondition: "Rift Dive hits at least one enemy"
      Effect: >
        When Rift Dive's emergence impact hits an enemy, the physical shockwave
        carries a residual healing frequency. All allies within 8m of the emergence
        point receive a small heal (approximately 30% of Keening Pulse potency).
        This is NOT a full heal — it's a fragment of acoustic energy embedded in
        the impact wave. Rewards diving NEAR allies who need healing.
      CCStage: null
      ItemReplaced: "No direct equivalent — unique to Wavecaller's dual-system biology"
      DecisionCreated: >
        Dive near wounded allies to splash-heal them? Or dive the highest-value
        enemy target regardless of ally proximity? Sometimes the best dive target
        is NOT near your wounded allies. Sometimes it is. Reading both simultaneously
        is expert play.
      Cooldown: "Passive (triggers on every Rift Dive)"
      Notes: >
        Bridge ability that slightly reduces the heal/damage tradeoff for expert
        players who position dives near wounded allies. Does NOT eliminate the
        tension — just rewards exceptional spatial awareness.

    - Name: "Depths Between"
      DeliverySystem: "Water (portal generation) + Sound (while in transit)"
      Type: oGCD_Utility
      TriggerCondition: "Currently in transit through a portal (during Rift Dive animation)"
      Effect: >
        While inside the portal (brief transit window), the Wavecaller's voice
        resonates through the water creating a 1s pulse of healing that reaches
        all allies within 15m of BOTH the entry AND exit points. Very low potency
        (20% of Keening Pulse) but hits allies at BOTH positions — where you WERE
        and where you're GOING. Automatically activates on every portal transit
        (no input required — passive trigger during dive animation).
      CCStage: null
      ItemReplaced: "No equivalent — unique portal-transit healing"
      DecisionCreated: >
        No decision — this is automatic. Exists to prevent diving from being
        COMPLETELY zero-healing. Provides a tiny baseline so the party isn't
        getting literally nothing during a dive. Does NOT make diving equivalent
        to staying back — just takes the edge off.
      Cooldown: "Passive (every portal transit)"
      Notes: "Quality-of-life passive. Prevents 'diving = zero healing' from being too punishing at entry-level play."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 5: RESOURCE SYSTEM
# ─────────────────────────────────────────────────────────────────────────────

ResourceSystem:
  PrimaryResource:
    Name: "Pressure Charge"
    Description: >
      Biological water pressure stored in the Wavecaller's portal glands. Required
      to generate water portals (both offensive dives AND defensive returns). The
      single resource that gates BOTH aggression and escape. Spending on offense
      reduces escape options. Spending on escape reduces future offense.
    MaxCapacity: 4
    Generation:
      PassiveRate: "1 Charge per 12s (out of combat: 1 per 6s)"
      ActiveGeneration: "Breaching Strike refunds 0.25 per hit (4 hits = 1 Charge)"
      BonusGeneration: "Proximity to water terrain (natural pools, rain, flooded rooms) = +50% passive generation"
    Spending:
      RiftDive: 1
      ReturnTide: 1
      MaelstromEntry: 3
    RecoveryAfterDepletion: >
      At 0 Charges, passive regeneration begins immediately (12s to first Charge).
      After Maelstrom Entry specifically, glands enter 10s "recovery lockout" where
      NO generation occurs (passive or active). This means full depletion from
      Maelstrom = 22s minimum until first Charge is available (10s lockout + 12s regen).

  SecondaryResource:
    Name: "Vocal Resonance"
    Description: >
      Not a tracked gauge — a STATE. The Wavecaller's vocalization effectiveness
      scales with sustained uninterrupted singing. Taking damage disrupts resonance.
      Moving between casts prevents resonance buildup. This functions as a soft
      gate on healing frequency/power rather than a hard resource cap.
    States:
      Cold: >
        No recent vocalization (just dived back, just started fight). Healing
        potency at 70% baseline. Builds to Warm after 2 consecutive heal GCDs
        without interruption.
      Warm: >
        Active vocalization (2+ consecutive heals without damage taken or movement).
        Healing potency at 100% baseline. Standard operating state for a stationary
        healer.
      Resonant: >
        Sustained vocalization (4+ consecutive heals without ANY interruption,
        including oGCDs). Healing potency at 120% baseline. BONUS: Tidal Hymn
        and Harmonic Wash gain +5m radius. Breaks instantly if damaged, if moved,
        or if ANY non-heal ability is used. Extremely fragile but very powerful.
    PostDiveState: >
      After any portal dive, Vocal Resonance resets to Cold. You must rebuild
      through 2 consecutive heals to reach Warm, and 4 to reach Resonant. This
      means diving ALWAYS costs healing efficiency on return — you lose your
      resonance buildup and must rebuild it. This is the hidden cost of aggression.

  AntiSpamDesign:
    PreventInfiniteHealSpam: >
      Vocal Resonance state rewards sustained healing with increasing power (up to
      120% at Resonant state). However, Resonant state breaks on ANY non-heal action.
      The reward for pure heal-spam is efficiency — but the opportunity cost is zero
      damage contribution and zero portal resource spending. In encounters where DPS
      checks exist, a Wavecaller who ONLY heals will fail the check. The game forces
      diving through encounter design, not through resource depletion.
    PreventInfiniteDiveSpam: >
      Pressure Charge cap of 4 with 12s passive regen means maximum dive frequency
      is ~1 dive per 12s if you NEVER return (burning charges purely offensively).
      If you dive AND return (2 charges per cycle), frequency drops to ~1 full cycle
      per 24s. Breaching Strike refund (0.25/hit) rewards staying in melee but only
      generates 1 full charge per 4 hits (8s minimum at GCD cap). The math prevents
      permanent dive uptime — you MUST return to heal eventually because you'll run
      out of portal fuel. The system self-corrects.
    ResourceTensionSummary: >
      Portal fuel is shared between offense (dive in) and defense (dive out). More
      aggression = less safety margin. More safety = less damage output. The player
      is always spending from the same pool for opposite purposes. This IS the
      Wavecaller's moment-to-moment decision density.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 6: CC STAGE BUDGET
# ─────────────────────────────────────────────────────────────────────────────

CCBudget:
  ClassRole: "Healer / DPS"
  PrimaryCC: "Stage 2 — Sound Interrupt (Shattercroon)"
  SecondaryCC: "Stage 1 — Water Displacement (Rift Dive emergence knockback, Undertow Slam slow)"

  Stage2_SoundInterrupt:
    Ability: Shattercroon
    Cooldown: 5s
    Range: 20m
    LoSRequired: false
    Comparison_to_Shaman: >
      Shaman's Bone Spirit provides interrupts at 10s intervals as an INSTALLATION.
      Once placed, the Bone Spirit interrupts autonomously without Shaman input.
      It persists until destroyed. It's SLOWER (10s CD) but PERSISTENT (no ongoing
      attention cost).
      
      Wavecaller's Shattercroon is 5s CD but requires ACTIVE USE every time. It's
      FASTER (5s vs 10s) but NON-PERSISTENT (requires Wavecaller attention each
      interrupt). Additionally, Wavecaller must be within 20m and must spend an oGCD
      slot that could be used for healing/damage.
      
      Summary: Wavecaller = FAST interrupt, ACTIVE attention cost, NO persistence.
               Shaman = SLOW interrupt, ZERO attention cost after placement, PERSISTENT.
    DesignIntent: >
      The speed-interrupt healer. When a cast needs to be stopped NOW, Wavecaller
      is the fastest response. But it costs the Wavecaller attention and oGCD
      economy every single time. Shaman can "set and forget" an interrupt sentry.
      Wavecaller must manually interrupt every single time. Speed vs. convenience.

  Stage1_WaterDisplacement:
    Abilities:
      - "Rift Dive (2m knockback on emergence — unavoidable displacement on dive target's neighbors)"
      - "Undertow Slam (2s 20% slow puddle — minor difficult terrain)"
      - "Undertow Lullaby (30% slow, 6s, cone — requires facing enemies)"
      - "Maelstrom Entry (three sequential 2m displacements — significant total movement)"
    Comparison: >
      Stage 1 CC from Wavecaller is incidental — it comes packaged with damage
      or healing actions rather than being dedicated CC abilities. The Wavecaller
      doesn't specialize in crowd control. Displacement and slows are byproducts
      of doing their job (diving or singing). This keeps the Wavecaller out of
      the "spam CC" trap — the CC exists but it's never the PRIMARY reason to act.

  TotalBudget: >
    Stage 2: One interrupt on 5s CD (active use, no persistence)
    Stage 1: Multiple sources of incidental displacement and slow (passive byproducts)
    Stage 3: NONE — Wavecaller has zero hard CC. Cannot stun, cannot paralyze,
             cannot sleep. If the Wavecaller needs an enemy fully disabled, they
             need a teammate (Grappler, Shaman) or an item (Stasis Pin).

  WhyNoStage3: >
    A healer with instant-access hard CC AND portal mobility AND burst damage would
    be overpowered without extreme tradeoffs. The Wavecaller's power budget is
    allocated to: healing throughput + burst damage + mobility. CC is the SACRIFICE.
    If you need something disabled, you need help. This creates party dependency
    and prevents the Wavecaller from being a self-sufficient solo class.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 7: VULNERABILITY
# ─────────────────────────────────────────────────────────────────────────────

Vulnerability:
  CoreWeakness: "Stranded in melee after dive with portal glands depleted"
  Description: >
    The Wavecaller's vulnerability IS their aggression. Every dive forward creates
    a window where they are: (1) in melee range of enemies, (2) unable to heal at
    full effectiveness (Cold vocal resonance), (3) potentially unable to LEAVE
    (if Pressure Charges are depleted). This isn't a niche edge case — this is what
    happens EVERY TIME the Wavecaller gives in to the dive temptation without
    proper resource management.

  VulnerabilityStates:
    PostDive_Stranded:
      Condition: "Rift Dive used, Return Tide unavailable (0 Pressure Charges or 4s CD)"
      Duration: "4-12s (minimum Return Tide CD or minimum Pressure Charge regen)"
      Exposure: >
        In melee. Cannot escape. Vocal Resonance is Cold (70% healing). Enemies can
        hit you. Every hit disrupts vocalization further. If multiple enemies are
        present, you're taking damage from multiple sources with no escape route.
        This is where Wavecallers die.
      Counterplay_FromEnemies: "Punish with melee attacks, surround to prevent kiting, apply CC to keep Wavecaller in danger zone"
      Counterplay_FromWavecaller: "Resonant Shield self-cast before diving, save 1 Pressure Charge for emergency return, use Breaching Strike to refund resource"

    PostMaelstrom_Critical:
      Condition: "Maelstrom Entry used (all 3 charges spent + 10s lockout + 0 charges)"
      Duration: "22s minimum until first portal available"
      Exposure: >
        TWENTY-TWO SECONDS in melee with zero portal access. If the target didn't
        die from Maelstrom Entry, you are trapped in melee for 22 seconds with Cold
        vocal resonance, enemies all around you, and zero escape tools. This is the
        punishment for going all-in on a target that survives.
      Counterplay_FromEnemies: "Any enemy AI that survives Maelstrom Entry should immediately focus the stranded Wavecaller"
      Counterplay_FromWavecaller: "Only use Maelstrom Entry when kill is GUARANTEED. Party must protect Wavecaller if target survives."

    HealingWhileMelee:
      Condition: "Attempting to heal while in melee range of enemies"
      Exposure: >
        Split attention. Taking hits disrupts vocalization (resets Vocal Resonance
        toward Cold). Cast times are interruptible by damage. Healing output is
        degraded. The Wavecaller trying to heal while surrounded is the worst
        version of the class — neither dealing real damage (no Rift Dive up close)
        nor healing effectively (constant interruption).
      DesignIntent: >
        This state SHOULD feel bad. It is the punishment for poor positioning.
        The correct response is to escape (Return Tide) or commit fully to melee
        (Breaching Strike until Return Tide is available). Trying to do both
        at once is a trap — and new Wavecallers will fall into it constantly.

  VulnerabilityTuning: >
    The class lives on a knife's edge. Expert Wavecallers have near-zero vulnerability
    because they never dive without return resources and never overstay. Bad
    Wavecallers are the most vulnerable healer in the game because they're constantly
    stranded in melee with Cold resonance and no portal. The SKILL GAP between good
    and bad Wavecallers is enormous — wider than any other healer class. This is
    intentional for Experienced tier.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 8: ITEM COMPLEMENTARITY
# ─────────────────────────────────────────────────────────────────────────────

ItemComplementarity:
  ClassReplacesTheseItems:
    - ItemName: "Healing Specter (ToS)"
      Function: "Stationary healing zone"
      HowClassIsBetter: "Wavecaller healing moves WITH them, propagates through walls, scales with Vocal Resonance state, and is unlimited"
    - ItemName: "Rejuvenation Flask"
      Function: "AoE burst heal"
      HowClassIsBetter: "Wavecaller AoE heals are repeatable, larger radius, penetrate LoS, and scale with sustained vocalization"
    - ItemName: "Flashstep Cartridge"
      Function: "8m gap close"
      HowClassIsBetter: "Rift Dive is 30m, deals damage on arrival, and creates a portal. Fundamentally superior mobility"
    - ItemName: "Retrograde Bead"
      Function: "Mark → recall within 20s"
      HowClassIsBetter: "Return Tide is instant oGCD, no pre-placement required, and shares meaningful resource tension with offense"
    - ItemName: "Stupor Bell"
      Function: "One-time AoE interrupt"
      HowClassIsBetter: "Shattercroon is repeatable (5s CD), 20m range, no LoS requirement, and doesn't consume an item slot"
    - ItemName: "Resonance Crystal"
      Function: "Healing amplification zone"
      HowClassIsBetter: "Wavecaller IS the healing source — doesn't need amplification. Vocal Resonance state IS the scaling mechanism"

  ItemsThatComplementTheClass:
    - ItemName: "Smokebreak Ampule"
      Function: "4m untargetable smoke (5s)"
      Synergy: "Provides safety window AFTER a dive when Return Tide is on CD. Covers the 4s gap between dive and return availability."
    - ItemName: "Hardshell Powder"
      Function: "Party defense buff"
      Synergy: "Pre-dive mitigation on party reduces healing demand during dive window. Makes diving SAFER for the team."
    - ItemName: "Harmony Draught"
      Function: "Ally-consumed HoT (3% HP/s, 12s)"
      Synergy: "Apply to lowest-HP ally BEFORE diving. Provides passive healing coverage during the dive absence. Buys time."
    - ItemName: "Ironvine Snare"
      Function: "Root trap"
      Synergy: "Place near dive target before diving. If Wavecaller gets stranded, snare gives them space to recover resource."
    - ItemName: "Berserker's Draught"
      Function: "+30% damage, -20% defense, 15s"
      Synergy: "Pop before Maelstrom Entry for maximum burst. The defense loss is irrelevant if the target dies instantly."

  ItemsThatCounterTheClass:
    - ItemName: "Thickglass Flask"
      Function: "-50% movement speed puddle"
      Threat: "Placed at Wavecaller's position — slows escape back to safety after dive"
    - ItemName: "Stasis Pin"
      Function: "3s total freeze"
      Threat: "Freezes Wavecaller mid-dive-recovery. 3s of no healing, no movement, no portal generation"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 9: HIT/MISS ANALYSIS
# ─────────────────────────────────────────────────────────────────────────────

HitMissAnalysis:
  WhatThisClassNails:
    - Hit: "Positional tension as skill expression"
      Why: >
        No other healer has to choose between POSITION for healing vs POSITION for
        damage on a moment-to-moment basis. Elementalist heals from wherever they
        already are. Shaman heals as a byproduct of DPS. Siren heals while commanding.
        Only Wavecaller's healing and damage are at OPPOSITE ends of the room.

    - Hit: "Biological lock feels necessary"
      Why: >
        The vocal cords that heal + portal glands that punch spatial rifts + aquatic
        body that survives transit — all three must exist simultaneously. No other
        race has this combination. The lock feels like "this body DOES this" rather
        than "this race LEARNED this."

    - Hit: "Dual delivery system creates non-degenerate gameplay"
      Why: >
        Neither pure healing nor pure diving is optimal in any encounter. Encounters
        demand BOTH healing throughput AND DPS contribution. The Wavecaller is the
        only class where BOTH come from the same player but CANNOT happen simultaneously.
        This prevents degenerate "just do X forever" gameplay by design.

    - Hit: "Speed-interrupt healer fills a unique niche"
      Why: >
        Shaman's interrupt is slower but persistent. Wavecaller's is faster but
        requires active attention. Parties with Wavecaller have the fastest reactive
        interrupt in the game — 5s CD, 20m, no LoS — but it costs the healer an
        oGCD every time. Real tradeoff, real value.

    - Hit: "Aggressive healer archetype is underserved in RPGs"
      Why: >
        Healers in most games are either pure backliners (WHM), damage-as-healing
        converts (Sage), or hybrid DPS that happen to heal (Red Mage). A healer
        who is DESIGNED to want melee aggression, where the tension between wanting
        to fight and needing to heal IS the gameplay — this doesn't exist elsewhere.

  WhatCouldMiss:
    - Risk: "Diving might never be correct in hard content"
      Concern: >
        If healing demand in SR3-4 is constantly high, the Wavecaller may NEVER
        have safe dive windows — reducing them to a pure healer with a bunch of
        damage buttons they can't press. The damage half of the kit becomes dead weight.
      Mitigation: >
        Encounter design must include mandatory DPS checks and brief heal-light
        windows specifically to create dive opportunities. Bosses need phases
        where damage output is low enough that diving is viable.

    - Risk: "Return Tide makes diving too safe"
      Concern: >
        If Return Tide is always available (enough Pressure Charges), diving has
        no real commitment — dive → hit → return → heal, repeat. The tension
        evaporates because escape is guaranteed.
      Mitigation: >
        Return Tide shares resource with Rift Dive (same Pressure Charge pool).
        A full dive-and-return costs 2 of 4 max charges. Two full cycles depletes
        you entirely. Resource scarcity IS the commitment gate. The system is
        self-balancing.

    - Risk: "Sound no-LoS healing trivializes positioning for allies"
      Concern: >
        If the healer's healing ignores walls completely, DPS can stand anywhere
        without positioning discipline and get healed. Map geometry stops mattering
        for the heal-receiver.
      Mitigation: >
        Through-wall healing is at 70% effectiveness. Distance still degrades potency.
        Resonant state (120% power) requires stationary sustained casting — which means
        the Wavecaller's POSITION matters even if allies' positions are more forgiving.
        The healing can reach around corners but it's weaker there — allies who position
        in LoS of the Wavecaller still get 100% vs 70% healing.

    - Risk: "Party perception — 'our healer keeps diving and we're dying'"
      Concern: >
        Bad Wavecallers will dive when healing is needed and get their party killed.
        This creates negative social dynamics where teams don't want Wavecaller
        because the class attracts players who want to DPS rather than heal.
      Mitigation: >
        Triage system integration. Wavecaller's Tidal Hymn and Harmonic Wash are
        powerful enough that a Wavecaller who heals competently between dives provides
        adequate throughput. The class teaches restraint through death — dive at the
        wrong time and YOU die (vulnerability system ensures this). Natural selection.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 10: ANTI-PATTERNS
# ─────────────────────────────────────────────────────────────────────────────

AntiPatterns:
  - AntiPattern: "NOT Jaguar from Tree of Savior"
    Description: >
      Jaguar's gameplay was spam CC (roar) that forces enemies into standstills,
      then gap close → burst → gap close → burst in a rhythmic rotation. The
      "CC that freezes enemies while you attack" pattern.
    WhyWavecallerIsNot: >
      Wavecaller has exactly ONE interrupt (5s CD) and zero hard CC. Enemies are
      never frozen/stunned by the Wavecaller. Dive targets are ACTIVE and DANGEROUS.
      The Wavecaller enters melee against enemies that are fighting back at full
      capacity. There is no "CC them first then hit them safely" loop. Risk is real.

  - AntiPattern: "NOT rotation-based"
    Description: >
      No fixed sequence of abilities that repeats. No "use A → B → C → repeat."
      No 2-minute burst windows that align with party buffs.
    WhyWavecallerIsNot: >
      Dive decisions are CONTEXTUAL. Sometimes you dive 3 times in 30 seconds
      (kill window is open, party HP is high). Sometimes you don't dive for 2
      minutes straight (hard healing check, sustained damage phase). There is
      no repeating pattern. The rhythm comes from the ENCOUNTER, not from internal
      cooldowns or resource cycles. Every dive is a fresh decision.

  - AntiPattern: "NOT a selfish DPS who happens to have heals"
    Description: >
      Classes like Sage (FFXIV) or Discipline Priest (WoW) deal damage AS their
      healing — damage IS healing. They never choose between offense and defense
      because both happen simultaneously.
    WhyWavecallerIsNot: >
      Wavecaller's healing and damage are physically SEPARATE. Diving does NOT heal
      (except tiny Echoing Impact/Depths Between splashes). Healing does NOT deal
      damage. They are OPPOSED actions that require DIFFERENT positions. The Wavecaller
      must CHOOSE which to do each GCD. This is not damage-as-healing — this is
      damage VERSUS healing.

  - AntiPattern: "NOT a tank-healer hybrid"
    Description: >
      Some games have paladin-types who heal while being tanky enough to stand in melee.
      They don't need to LEAVE melee because they can SURVIVE melee indefinitely.
    WhyWavecallerIsNot: >
      Wavecaller is FRAGILE in melee. They have no inherent damage reduction, no
      heavy armor, no self-sustaining HP recovery while being hit. Being in melee
      HURTS them. They take damage, their vocalization gets disrupted, and they die
      if they stay too long. The dive is an INCURSION, not a STANCE.

  - AntiPattern: "NOT infinite mobility"
    Description: >
      Some designs make portal classes into hyper-mobile kite machines that never
      commit to any position (Tracer, old Genji, etc.).
    WhyWavecallerIsNot: >
      Portals cost RESOURCE. 4 max charges, 12s regen per charge, shared between
      offense AND defense. A Wavecaller who uses portals purely for mobility burns
      their entire offense AND defense budget on movement. Additionally, Maelstrom
      Entry depletes ALL charges with a 10s lockout. The mobility is real but EXPENSIVE
      and FINITE. You cannot portal forever.

  - AntiPattern: "NOT a support buffer"
    Description: >
      Some healers contribute by buffing allies (AST cards, dancer partner). Their
      value is amplifying allies rather than personal action.
    WhyWavecallerIsNot: >
      Wavecaller has exactly one buff (Resonant Shield — single target absorb shield).
      They do not increase ally damage, do not provide attack speed buffs, do not
      enhance ally abilities. Their value is DIRECT: they heal you personally and
      they kill things personally. No proxy contribution through ally amplification.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 11: OPEN QUESTIONS
# ─────────────────────────────────────────────────────────────────────────────

OpenQuestions:
  Design:
    - Question: "Sound healing no-LoS at 70% through walls — is this still too powerful?"
      Context: >
        Even at 70% potency, ignoring walls means allies can scatter freely without
        positioning discipline. Does this degenerate positioning gameplay for the
        party? Or does it only matter in niche geometry (healing through a wall
        that happens to be between you)?
      PossibleResolution: "Limit through-wall propagation to 1 wall maximum. 2+ walls = no healing reaches."

    - Question: "Portal entry lingering (2.5s) — should enemies be able to follow through?"
      Context: >
        If enemies can follow through the Wavecaller's entry portal, diving creates
        a NEW threat to the backline. The Wavecaller dives forward, and an enemy
        jumps through the portal backward into the undefended healer position.
        Is this too punishing? Or is it the correct counterplay that prevents
        reckless diving?
      PossibleResolution: "SR1-2 enemies never use portals. SR3 enemies sometimes follow. SR4 enemies always follow. Scales with difficulty."

    - Question: "Echoing Impact passive — does splash healing on dive make diving too guilt-free?"
      Context: >
        If every dive heals nearby allies (even a small amount), the player may
        rationalize diving as "but I'm ALSO healing when I dive!" reducing the
        tension. The splash is deliberately small (30% of Keening Pulse) but
        perception may matter more than math.
      PossibleResolution: "Playtest whether players perceive this as 'I can dive freely' or correctly as 'tiny bonus on dives I was already planning.'"

    - Question: "Water terrain bonus (+50% Pressure generation) — how common is water terrain?"
      Context: >
        If water terrain is rare, this is a negligible bonus. If water terrain is
        common, the Wavecaller becomes significantly stronger in those environments.
        How much of the game's map pool includes water features?
      PossibleResolution: "Tie to Jumper racial content — Jumper-heavy areas have water. Generic dungeons may not. Niche advantage, not universal."

    - Question: "Party can't use Wavecaller portals — final decision?"
      Context: >
        Current design: allies CANNOT use Wavecaller portals (only enemies near entry
        can follow through). If allies COULD use them, the Wavecaller becomes a
        mobility-provider for the team (teleporting the tank forward, extracting
        a trapped DPS). This is powerful but changes the class role significantly.
      PossibleResolution: "Confirm: portals are Wavecaller-only for transit. This keeps the identity as personal aggression/escape, not team taxi."

    - Question: "Vocal Resonance state — is 'Cold after every dive' too punishing for casual players?"
      Context: >
        Every dive resets Vocal Resonance to Cold (70% potency). Rebuilding to Warm
        takes 2 GCDs (4s), to Resonant takes 4 GCDs (8s). Casual players who dive
        frequently will have permanently degraded healing, creating frustration
        without understanding WHY their heals feel weak.
      PossibleResolution: "UI must clearly communicate Vocal Resonance state. Tutorial must explain the rebuild cost. The mechanic is correct but visibility is critical."

  Balance:
    - Question: "What is the Wavecaller's expected HPS vs pure healing classes?"
      Context: >
        If Wavecaller heals at 100% throughput when NOT diving, are they equal to
        Siren/Elementalist sustained output? Or are they deliberately lower baseline
        (compensated by burst heal potential when Resonant state is maintained)?
      PossibleResolution: "Target: 85% of pure-healer baseline throughput when focused on healing. Offset by superior emergency response (Siren's Refrain) and interrupt utility."

    - Question: "Dive damage vs dedicated DPS — what percentage?"
      Context: >
        When the Wavecaller dives, how much damage should they deal relative to a
        pure DPS class? If too high, parties want Wavecallers to dive constantly.
        If too low, diving never feels worth the healing sacrifice.
