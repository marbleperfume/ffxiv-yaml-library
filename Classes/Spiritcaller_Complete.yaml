# Classes/Healer/Spiritcaller_Complete.yaml
# ══════════════════════════════════════════════════════════════════════════════
# SPIRITCALLER (Tidebinder) — Dual-Entity Positional Healer
# ══════════════════════════════════════════════════════════════════════════════
#
# Design lineage:
#   Mythology: Drakol spirit-speakers (elemental communion, water worship),
#              Water elemental bonds (animist tradition, NOT summoning),
#              Polynesian wave-riders (ocean as living entity), Shinto kami
#   Pikmin: Directing a secondary entity while managing your own survival
#   Starcraft/RTS: Split-attention micro (controlling two units simultaneously)
#   FFXIV SCH: Fairy companion with autonomous/directed healing
#   WoW BM Hunter: Companion positioning matters (ANTI-REFERENCE — pet has HP,
#     ours does NOT. Spirit cannot die.)
#   GW2 Ranger: Companion modes (conceptual parallel only)
#
# Core identity: "Healer that ISN'T a caster"
#   The Drakol is a MELEE FIGHTER with a trident. The healing comes from
#   directing a Water Elemental spirit (the Slime) to positions around the
#   battlefield. The player character does NOT cast heal spells. The player
#   character FIGHTS, and manages their companion spirit via oGCD commands.
#   This is RTS-in-an-action-game: split attention between your melee combat
#   and your spirit's positioning/mode.
#
# Fantasy: A Drakol warrior bonded to a water elemental spirit.
#   Lower Drakols commune with elemental spirits through ancestral tradition.
#   The Water Slime is a SPIRIT ENTITY — not a creature, not a pet, not an
#   animal. It is an elemental manifestation of water bonded to the Drakol's
#   soul. It cannot be killed because it is not alive in a physical sense.
#   It produces water that maintains the Drakol's biological moisture needs
#   and can be directed to heal allies through water application.
#
# The Core Tension:
#   The Water Slime maintains the Drakol's Moisture Gauge passively when nearby.
#   High Moisture = damage reduction (wet skin deflects/absorbs). Low Moisture =
#   vulnerability (dry skin = fragile). SENDING THE SLIME AWAY TO HEAL ALLIES
#   CAUSES THE DRAKOL'S MOISTURE TO DECAY, LOSING PERSONAL DEFENSE.
#   This is THE decision: keep Slime close (stay safe) vs send Slime far
#   (heal others, lose your own DR). Every moment of healing output costs
#   personal survivability.
#
# References:
#   - Combat/BalanceTargets.yaml (all numeric targets)
#   - Combat/AggroSystem.yaml (positioning interaction with Strategy Rank)
#   - Combat/ClassMechanicModuleDesign.md (mechanic type taxonomy)
#   - Roles/Healer_RoleMechanic.yaml (shared healer systems)
# ══════════════════════════════════════════════════════════════════════════════

Key: Classes.Healer.Spiritcaller

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 1: CLASS IDENTITY
# ─────────────────────────────────────────────────────────────────────────────

Identity:
  Name: Spiritcaller
  AlternateName: Tidebinder
  Role: Healer
  SubRole: Sustain Healer (Positional / Dual-Entity)
  DamageType: physical  # Drakol fights with trident — physical damage dealer
  ExecutionArchetype: Split-Attention Micro (RTS-in-Action-Game)
  ExecutionTier: Experienced
  # Experienced tier justified by:
  # - Managing TWO entities simultaneously (Drakol melee + Slime positioning)
  # - Constant distance-vs-safety tradeoff evaluation (Moisture decay math)
  # - Mode-switching the Slime (Scout/Heal/Damage) based on field state
  # - Melee DPS rotation WHILE issuing companion commands (oGCD command layer)
  # - Terrain awareness (water puddle placement for cross-class synergy)
  # - Moisture resource management (spending defense for offensive water skills)

  Description: >
    A melee-fighting healer who directs a bonded Water Elemental spirit (the
    Water Slime) across the battlefield via oGCD commands. The Drakol fights
    in melee with a trident, dealing physical damage through GCD combos. The
    Water Slime is an invulnerable spirit entity that produces water, heals
    allies in proximity, scouts ahead, or deals water damage to enemies —
    depending on its current mode and position. The Slime passively maintains
    the Drakol's Moisture Gauge when nearby, providing damage reduction through
    wet skin. Sending the Slime far away to heal distant allies causes Moisture
    to decay, creating a constant risk/reward calculation: personal safety vs
    party healing reach.

  CoreFantasy: >
    You are a Drakol warrior with a trident in hand and a water spirit at your
    side. You fight like a frontliner — thrusting, sweeping, impaling. But your
    true power is the elemental bond. Your Water Slime flows where you direct it,
    mending allies with cool water, drowning enemies in torrents, or scouting
    ahead through terrain. When it's close, your skin glistens with moisture and
    blows slide off your scales. When you send it far to save a dying ally, your
    skin dries, your scales crack, and every hit lands harder against you. You
    are the healer who bleeds for every heal delivered. The question is never
    "can I heal them?" — it's "can I AFFORD to heal them right now?"

  InputModality:
    PrimaryFocus: slime_position_relative_to_party_and_self
    SecondaryFocus: moisture_gauge_and_decay_rate
    TertiaryFocus: melee_combo_state_and_enemy_positioning
    QuaternaryFocus: terrain_puddle_coverage_and_cross_class_synergy
    DecisionType: split_attention_positional
    # Unlike Elementalist (reactive triage to HP) or Siren (bond maintenance timers),
    # Spiritcaller watches SPATIAL RELATIONSHIPS — "where is my Slime? Where does
    # it NEED to be? How long can I afford to keep it there before my Moisture
    # hits critical?"

  StatPriority:
    Primary: STR  # Physical melee damage (trident). Drakol IS the damage dealer.
    Secondary: MED  # MED amplifies Slime healing potency when directed to heal.
    Tertiary: VIT  # HP pool matters because Moisture DR is multiplicative with max HP.
    DumpStat: MAG  # Not a caster. Water skills scale from Moisture spent, not MAG.

  DesignStatement: >
    Spiritcaller is the healer for players who HATE casting. You never stand in
    the back channeling heal spells. You're in melee, stabbing things with a
    trident, issuing spirit commands between attacks like an RTS player micro-ing
    two units. Your healing output depends on WHERE you put your spirit, not WHAT
    buttons you press. The rotation is simple (melee combo + oGCD commands). The
    DIFFICULTY is spatial — managing distance, evaluating risk, choosing when to
    sacrifice your own defense for others' survival. At low skill, you keep the
    Slime close and heal whoever's nearby. At high skill, you dance on the edge
    of Moisture death, sending your Slime across the arena for clutch heals and
    yanking it back just before your DR collapses.

  FailureStates:
    MoistureCritical:
      Cause: "Sent Slime too far for too long. Moisture gauge depleted."
      Cost: "DR gone. Drakol takes full damage. Death likely in melee range."
      Recovery: "Recall Slime (immediate). 3-4s for Moisture to rebuild to safe DR."
    SlimeMispositioning:
      Cause: "Slime in wrong mode or wrong location when healing needed."
      Cost: "Ally takes damage without healing. 2-4s travel time to reposition."
      Recovery: "Flash Command (emergency teleport oGCD) if available. Otherwise wait."
    OverspendingMoisture:
      Cause: "Cast too many water skills (Moisture cost) while Slime is distant."
      Cost: "Double drain — Slime absence + skill spending = rapid DR collapse."
      Recovery: "Stop casting water skills. Recall Slime. Wait for regen."
    MeleeDisengagement:
      Cause: "Forced out of melee range (AoE, knockback, arena mechanic)."
      Cost: "DPS drops to near-zero (no ranged GCDs except water skills at Moisture cost)."
      Recovery: "Close gap. Use gap-closer (Tidal Rush). Accept temporary DPS loss."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 1b: RACIAL LOCK — LOWER DRAKOL
# ─────────────────────────────────────────────────────────────────────────────

RacialLock:
  Race: "Lower Drakol"
  ParentCategory: Drakols
  Subtype: Lower  # As opposed to Upper Drakols (different class access)
  Enforcement: hard_lock  # Players MUST be Lower Drakol to play Spiritcaller.
  BiologicalLock: true  # This is a BIOLOGICAL requirement, not cultural.
  LoreJustification: >
    Lower Drakols possess amphibious biology — their skin requires constant
    moisture to maintain structural integrity and defensive properties. This
    is not cultural preference but physiological necessity. Their ancestral
    connection to water elemental spirits evolved alongside this biology:
    the spirit bond maintains the moisture that keeps the Drakol alive.
    Other races lack the amphibious skin that makes the Moisture mechanic
    biologically meaningful. A human bonding a water spirit gains nothing
    from being wet. A Drakol bonding a water spirit gains SURVIVAL.
  NPCException: >
    Non-Drakol Spiritcallers do not exist. The biology is the requirement.
    This is not a learned tradition that could be taught to outsiders — it
    is a symbiotic relationship that only functions with amphibious physiology.
    No narrative exceptions.
  RacialSynergy:
    - "Amphibious skin — Moisture mechanic IS their biology (DR from wetness)"
    - "Elemental communion — Lower Drakols speak to spirits (cultural+spiritual tradition)"
    - "Aquatic affinity — natural swimmers, water terrain is home territory"
    - "Scale structure — wet scales interlock for defense, dry scales separate and crack"
    - "Spiritual sensitivity — can perceive/direct elemental spirits (other races cannot)"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 2: ROLE OBJECTIVE FUNCTION
# ─────────────────────────────────────────────────────────────────────────────

RoleObjective:
  Type: dual_objective
  PrimaryMetric: healing_uptime_through_positioning
  SecondaryMetric: potency_per_second_melee
  Constraints:
    - "party_hp >= survival_threshold AT all_damage_events"
    - "moisture_gauge >= critical_threshold during active combat"
    - "minimize: time_slime_idle (every second Slime isn't working = wasted potential)"
  HealingModel:
    FreeHealingBudget: "Slime passive proximity healing (when Slime near allies in Heal mode)"
    PositionalHealCost: "Personal DR loss (Moisture decay from Slime distance)"
    GCDHealCost: "Zero — Drakol has NO GCD heals. All healing is Slime-delivered."
    OverhealPenalty: false  # Slime proximity healing is HoT — low overheal by design
    HealingPriority: [slime_proximity_passive > slime_direct_command > water_puddle_standing > drakol_moisture_sacrifice]
  TargetDPS:
    WhileHealing: "55% of DPS reference"  # Melee uptime maintained, Slime handles healing
    PureDPSMode: "70% of DPS reference"   # Slime in Damage mode, full melee combo uptime
    # NOTE: Lower than other healers' DPS mode because melee + pet DPS is split
    # across two entities. Total party contribution includes Slime damage output.
  HealingSustain:
    Normal: "50% party HP per minute (Slime in Heal mode, close range)"
    Hard: "80% party HP per minute (Slime actively repositioned, Moisture sacrificed)"
    Extreme: "110% party HP per minute (full Moisture sacrifice, Drakol near-dry)"
  UniqueHealerProperty: >
    Spiritcaller is the ONLY healer whose healing requires NO GCDS from the
    player character. All healing is delegated to the Slime entity. This means
    the Drakol's GCD timeline is 100% damage (melee combo). The "healing cost"
    is paid in MOISTURE (personal defense) and ATTENTION (split focus), not in
    GCD opportunity cost. This makes Spiritcaller the highest-potential-DPS
    healer in raw numbers, but the most personally fragile when healing hard.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 3: CLASS MECHANIC — DUAL-ENTITY MANAGEMENT + MOISTURE GAUGE
# ─────────────────────────────────────────────────────────────────────────────

ClassMechanic:
  Type: dual_entity_positional_with_gauge
  Name: "Spirit Bond (Dual-Entity Moisture System)"
  Description: >
    Two interlocking systems define Spiritcaller's gameplay:
    1. DUAL-ENTITY: The Drakol (player character) fights in melee. The Water
       Slime (spirit companion) is directed via oGCD commands to positions/modes.
       They are two independent actors on the field — the player controls BOTH.
    2. MOISTURE GAUGE: The Drakol's primary defensive resource. High = DR bonus.
       Low = vulnerable. The Slime GENERATES Moisture when close. Distance DECAYS
       Moisture. Water skills SPEND Moisture. This gauge IS the tension.

  SpiritEntity:
    Name: "Water Slime (Water Elemental)"
    Nature: spirit  # NOT a pet. NOT a creature. An elemental spirit.
    Killable: false  # CANNOT be killed. CANNOT be destroyed. It is a spirit.
    HasHP: false  # No HP bar. No health. Immune to all damage.
    AlwaysPresent: true  # Never needs summoning, resummoning, or recovery.
    Targetable: false  # Enemies cannot target, attack, or interact with it.
    PhysicalPresence: "Semi-corporeal. Visible as flowing water in a slime-shape."
    DesignRationale: >
      The Slime is an elemental spirit — a manifestation of water bound to the
      Drakol's soul through ancestral communion. It has no physical body to destroy.
      Fire does not hurt it (spirits are not physical). Swords do not cut it
      (there is nothing to cut). It simply IS, always, as long as the bond exists.
      This removes the "pet death" failure state entirely. The Spiritcaller's
      vulnerability is MOISTURE LOSS from distance, not spirit destruction.
      The companion is ALWAYS available — the cost is always positional, never
      about recovering a destroyed asset.
    # REMOVED: HP pool, fire vulnerability, summon recovery, destruction mechanics.
    # These were in the previous version and are EXPLICITLY DELETED.

    Modes:
      Scout:
        Behavior: "Slime moves to designated position. Reveals fog/stealth in radius."
        HealingOutput: none
        MoistureEffect: "Decays based on distance from Drakol"
        CombatUse: "Pre-pull scouting, flank checking, vision control"
        PassiveEffect: "Reveals hidden enemies/traps within 8y of Slime"
        WaterProduction: "Leaves small water trail (cosmetic only in Scout mode)"
      Heal:
        Behavior: "Slime moves to designated position. Heals all allies within radius."
        HealingOutput: "Proximity-based HoT. Closer to Slime = stronger heal."
        HealingRadius: 8y  # Allies within 8y receive healing
        HealingFalloff: "100% at 0-4y. 60% at 4-6y. 30% at 6-8y. 0% beyond 8y."
        MoistureEffect: "Decays based on distance from Drakol (same as all modes)"
        CombatUse: "Primary healing delivery. Position Slime near wounded allies."
        PassiveEffect: "Creates water puddle at Slime's location (terrain interaction)"
        WaterProduction: "Generates puddle (3y radius) that persists 10s after Slime leaves"
        TickRate: "Every 3s (aligned with server tick)"
      Damage:
        Behavior: "Slime moves to designated position. Attacks nearby enemies."
        HealingOutput: none
        DamageOutput: "Water damage to enemies within 6y. Splash damage."
        MoistureEffect: "Decays based on distance from Drakol (same as all modes)"
        CombatUse: "DPS contribution when healing not needed. AoE situations."
        PassiveEffect: "Applies Soaked debuff to enemies (terrain interaction setup)"
        WaterProduction: "Creates water puddle at Slime's location"
        TickRate: "Every 3s (damage pulses)"

    Positioning:
      MovementSpeed: "150% of Drakol's base movement speed"
      CommandDelay: "0.3s (input to movement start)"
      TravelBehavior: "Flows directly to target position (ignores most terrain)"
      MaxRange: "40y from Drakol (beyond this, bond stretches — Moisture penalty doubles)"
      BreakRange: "None — spirit bond does not break. Slime teleports to Drakol if >60y."
      RepositionFrequency: "Can be redirected every oGCD window (every GCD cycle)"

  MoistureGauge:
    Name: "Moisture"
    MaxValue: 100
    MinValue: 0
    DefaultState: 80  # Starts at 80% at combat start (Slime nearby assumed)
    UIDisplay: "Water-droplet gauge on HUD. Blue = safe. Yellow = warning. Red = critical."

    Generation:
      SlimeProximity:
        Range: "0-10y from Drakol"
        Rate: "+8 Moisture per 3s (within range)"
        Note: "Primary refill. Keep Slime close = stay wet."
      SlimeNearby:
        Range: "10-20y from Drakol"
        Rate: "+3 Moisture per 3s (reduced generation)"
        Note: "Slime still contributes, but not enough to sustain heavy spending."
      WaterPuddleStanding:
        Condition: "Drakol standing in any water puddle (Slime-generated or environmental)"
        Rate: "+4 Moisture per 3s"
        Note: "Alternative refill. Terrain-aware players maintain Moisture without Slime."
      CombatRegen:
        Condition: "Always (passive baseline)"
        Rate: "+1 Moisture per 3s"
        Note: "Trickle. Not enough alone. You NEED the Slime or puddles."

    Decay:
      SlimeDistant:
        Range: "20-40y from Drakol"
        Rate: "-5 Moisture per 3s"
        Note: "Slime too far to maintain skin. Active drain on defense."
      SlimeMaxRange:
        Range: "40y+ from Drakol (bond stretched)"
        Rate: "-10 Moisture per 3s (doubled penalty)"
        Note: "Emergency range. You're sacrificing heavily for reach."
      BaselineEvaporation:
        Condition: "Always (ambient drying)"
        Rate: "-2 Moisture per 3s"
        Note: "Counteracts CombatRegen. Net zero if no Slime and no puddle."
      EnvironmentPenalty:
        Condition: "Hot/dry environments (desert, volcanic, indoor fires)"
        Rate: "Additional -3 per 3s"
        Note: "Environment matters. Spiritcaller is WEAKER in hot zones."

    Spending:
      WaterSkills: "Drakol water abilities cost Moisture (see individual skill costs)"
      SpendingRange: "10-30 Moisture per skill (varies by power)"
      SpendingDesign: >
        Spending Moisture = spending your defense for offense/utility.
        This is the second axis of tension: not only does Slime distance drain
        Moisture, but your OWN offensive water casts drain it too. A Drakol
        fighting aggressively with water skills AND directing Slime far away
        will hit 0 Moisture FAST. The refill loop requires Slime proximity —
        you have to bring it back to reload.

    DREffect:
      Thresholds:
        100: "20% Damage Reduction (maximum wet skin)"
        80: "16% DR (comfortable — default state)"
        60: "12% DR (manageable)"
        40: "8% DR (getting risky)"
        20: "4% DR (nearly dry — danger zone)"
        0: "0% DR + 10% INCREASED damage taken (Desiccated — dry skin CRACKS)"
      LinearScaling: true  # DR scales linearly between thresholds
      DesignNote: >
        At 100 Moisture, the Drakol has 20% DR — significant for a healer in melee.
        At 0 Moisture, the Drakol takes 10% MORE damage than baseline. The swing
        from 20% DR to -10% increased damage is a 30% effective health difference.
        This is MASSIVE. Managing Moisture is not optional — it's survival.
        The Drakol is designed to be in melee (where they take hits), so DR from
        Moisture is their primary survivability tool. Losing it = dying.

    CriticalState:
      Name: "Desiccated"
      Trigger: "Moisture = 0"
      Effect: "0% DR + 10% increased damage taken + visual crack overlay on character"
      Duration: "Persists until Moisture > 20 (recovery threshold)"
      Recovery: "Recall Slime + stand in puddle = ~6s to exit Desiccated state"
      PsychologicalPressure: >
        Desiccated state has LOUD visual/audio feedback. The player KNOWS they
        messed up. Screen edges dry and crack. Character model shows cracked
        scales. Audio plays a low warning tone. This is not subtle — it's
        designed to create urgency and teach the distance management loop.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 4: RESOURCE SYSTEM — MOISTURE INTERACTIONS
# ─────────────────────────────────────────────────────────────────────────────

ResourceSystem:
  PrimaryResource: Moisture  # See MoistureGauge above for full details
  SecondaryResource: none  # No mana, no MP. Moisture IS the resource.
  TertiaryResource: none
  # Spiritcaller has NO MANA. Their "cost" for abilities is:
  # - GCD melee skills: FREE (no resource cost, just GCD commitment)
  # - Water skills: MOISTURE cost (spending defense)
  # - Slime commands: FREE (oGCD, no resource cost — but Moisture DECAYS from distance)
  # This means the Spiritcaller never runs "out of resources" in the mana sense.
  # They run out of SAFETY. Their resource IS their health buffer.

  EconomyLoop:
    Description: >
      The resource loop is spatial, not numerical:
      1. Slime nearby → Moisture regenerates → DR stays high → Drakol safe
      2. Send Slime to heal → Moisture decays → DR drops → Drakol vulnerable
      3. Cast water skills → Moisture spends → DR drops FASTER
      4. Recall Slime → Moisture regenerates → DR recovers → Drakol safe again
      5. Repeat cycle — the rhythm of extend/retract IS the gameplay
    OptimalPlay: >
      Expert players pulse the Slime: send out → heal burst → recall before
      Moisture hits danger zone → regenerate → send out again. This creates
      a rhythmic "breathing" pattern where healing comes in waves, synchronized
      with the Drakol's Moisture tolerance.
    SuboptimalPlay: >
      Leaving Slime far away permanently = constant Moisture drain = eventual
      death. Keeping Slime permanently close = zero healing reach = party dies.
      Both extremes fail. The skill is in the OSCILLATION.

  OffenseVsDefenseTradeoff:
    Description: >
      The Drakol has water-element combat skills (thrust enchantments, water
      blasts, tidal waves). These cost MOISTURE to cast. This means:
      - Using offensive water skills COSTS personal defense
      - A Drakol who spams water attacks dries out and becomes fragile
      - A Drakol who never uses water attacks is safer but deals less damage
      - The Slime refills Moisture when close — so there's a "reload" window
      This creates a spend/refill cycle WITHIN the Drakol's own actions,
      independent of the Slime-positioning tension.
    Interaction: >
      Both tensions compound: if Slime is far (Moisture decaying) AND you're
      casting water skills (Moisture spending), you drain TWICE as fast.
      Expert play involves careful sequencing: cast water skills WHILE Slime
      is close (offset spending with generation), then send Slime away with
      a full gauge (bank Moisture before spending it on distance).

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 5: WEAPON — TRIDENT
# ─────────────────────────────────────────────────────────────────────────────

Weapon:
  Name: Trident
  Type: melee_polearm
  DamageType: physical
  Range: 4y  # Slightly longer than sword (polearm reach) but still melee
  AttackSpeed: "Moderate (2.0s GCD alignment)"
  DesignRationale: >
    The Trident reinforces "healer that ISN'T a caster." The Drakol wields a
    physical weapon and fights in melee. This is NOT a staff. NOT a wand. NOT
    a book. It's a weapon for stabbing, sweeping, and impaling. The aquatic
    theming connects to Drakol identity (tridents = ocean warriors) without
    making the character feel like a mage. When people see a Spiritcaller in
    combat, they should think "fighter with a spirit companion" not "healer
    casting from the back."
  ItemBaseline: >
    The Trident provides: base physical damage, STR scaling, attack speed.
    The CLASS replaces the item's generic effects with the Spiritcaller kit.
    A Trident without the Spiritcaller class is just a polearm with basic
    melee attacks. The class transforms it into the spirit-bonded weapon.
  Aesthetic: >
    Dragonbone haft wrapped in living coral. Tines shimmer with residual
    water. The spirit bond is visible as a faint blue tether between the
    trident's head and the Water Slime. When Moisture is high, the trident
    drips. When Moisture is low, the tines dry and the coral dulls.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 6: BALANCE TARGETS
# ─────────────────────────────────────────────────────────────────────────────

BalanceTargets:
  HealerBaseline: 65%  # Standard healer DPS target (ref BalanceTargets.yaml)
  DPSWhileHealing: 55%  # Melee uptime partially interrupted by Slime management
  PureDPSMode: 70%  # Slime in Damage mode, full melee combo uptime
  # NOTE: Spiritcaller's "DPS while healing" is HIGHER than other healers because
  # healing costs NO GCDs (Slime handles it). But the Moisture vulnerability
  # means death risk is higher, which averages out over encounters.

  GlobalCooldown:
    Base: 2.0s
    HasteCap: 1.4s
  oGCDAnimationLock: 0.6s  # Standard for most oGCDs
  SlimeCommandLock: 0.3s  # Slime commands have SHORTER lock (responsive micro)
  WeaveModel: single_weave_only

  PotencyBands:
    BasicFiller: 100        # Trident Thrust (reference GCD)
    ComboFinisher: 170-200  # Tidal Impale (3-hit combo ender)
    WaterSkill_Small: 150   # Moisture-cost water attacks (spending defense)
    WaterSkill_Large: 250-300  # Heavy Moisture-cost water attacks
    SlimeDamage_PerTick: 50-70  # Slime in Damage mode (per 3s tick)
    SlimeHeal_PerTick: 150-200  # Slime in Heal mode (per 3s tick, proximity scaled)
    ClassUltimate: 600-700  # Tidal Convergence (see skills)

  MoistureEconomy:
    TimeToFull: "~20s from 0 to 100 with Slime at 0-10y range"
    TimeToDepleted: "~30s from 100 to 0 with Slime at 30y+ and no water skills"
    AggressiveDrain: "~15s from 100 to 0 with Slime far + water skill spam"
    SafeWindow: "~12s at 80 Moisture before hitting danger zone (40) with Slime at 30y"
    DesignNote: >
      The 12s safe window at 80 Moisture means expert players can send
      Slime away for roughly 4 GCDs worth of healing before needing to
      evaluate recall. This is intentional — enough time to deliver meaningful
      healing, not enough to forget about your own gauge.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 7: SKILL ROSTER — DRAKOL GCD ACTIONS (Melee Combo)
# ─────────────────────────────────────────────────────────────────────────────

Skills:
  DrakolGCD:
    # Philosophy: >
    # The Drakol's GCD timeline is 100% melee damage. There are NO GCD heals.
    # Healing is the Slime's job. The Drakol FIGHTS. The melee combo is simple
    # by design — the complexity budget is spent on Slime management (oGCDs),
    # not on a complicated rotation. This is "easy hands, hard brain" design.

    BasicCombo:
      - Name: "Trident Thrust"
        ID: trident_thrust
        ActionType: GCD
        CastTime: 0s  # Instant
        Recast: 2.0s
        TargetType: single_enemy
        DamageType: physical
        Potency: 100  # Reference filler
        Position: "Combo Step 1"
        ComboFrom: null  # Starter
        ComboInto: [barbed_sweep, rising_current]
        MoistureCost: 0
        Range: 4y
        Description: >
          Standard trident stab. Combo starter. No resource cost, no conditions.
          The bread-and-butter GCD you press between Slime commands.
        RankRequired: 1

      - Name: "Barbed Sweep"
        ID: barbed_sweep
        ActionType: GCD
        CastTime: 0s
        Recast: 2.0s
        TargetType: enemy_cone
        ConeAngle: 120_degrees
        ConeRange: 4y
        DamageType: physical
        Potency: 120  # AoE option, slightly higher than filler
        Position: "Combo Step 2 (AoE path)"
        ComboFrom: [trident_thrust]
        ComboInto: [tidal_impale, undertow_slam]
        MoistureCost: 0
        Range: 4y
        Description: >
          Wide trident sweep. AoE combo path. Hits all enemies in frontal cone.
          Use when 3+ enemies present. Combos into finishers.
        RankRequired: 1

      - Name: "Rising Current"
        ID: rising_current
        ActionType: GCD
        CastTime: 0s
        Recast: 2.0s
        TargetType: single_enemy
        DamageType: physical
        Potency: 130  # Single-target option, higher base
        Position: "Combo Step 2 (ST path)"
        ComboFrom: [trident_thrust]
        ComboInto: [tidal_impale, skewering_dive]
        MoistureCost: 0
        Range: 4y
        CritCondition: "Positional — Rear: guaranteed critical hit"
        CritNote: >
          Crit is NOT RNG. It's positional. Hit the enemy's rear to crit.
          This gives Spiritcaller a reason to care about enemy facing even
          while managing the Slime — another attention-split layer.
        Description: >
          Upward trident thrust with lifting motion. Single-target combo path.
          Rear positional for guaranteed crit. Combos into finishers.
        RankRequired: 1

    ComboFinishers:
      - Name: "Tidal Impale"
        ID: tidal_impale
        ActionType: GCD
        CastTime: 0s
        Recast: 2.0s
        TargetType: single_enemy
        DamageType: physical
        Potency: 200  # Combo finisher — strong
        Position: "Combo Step 3 (standard finisher)"
        ComboFrom: [barbed_sweep, rising_current]
        ComboInto: null  # Restarts combo
        MoistureCost: 0
        Range: 4y
        BonusEffect: "If enemy > 50% HP: +25% damage (250p effective)"
        BonusNote: >
          >50% HP rule: enemies above half health take +25% bonus damage.
          This is a SYSTEM RULE applied here. It means Spiritcaller front-loads
          damage on healthy targets, consistent with all classes.
        Description: >
          Driving impale through the target. Standard combo finisher. High potency.
          The >50% HP bonus makes it particularly strong as an opener.
        RankRequired: 1

      - Name: "Undertow Slam"
        ID: undertow_slam
        ActionType: GCD
        CastTime: 0s
        Recast: 2.0s
        TargetType: enemy_circle
        CircleRadius: 5y
        DamageType: physical
        Potency: 170  # AoE finisher — slightly lower per target, more total
        Position: "Combo Step 3 (AoE finisher)"
        ComboFrom: [barbed_sweep]
        ComboInto: null
        MoistureCost: 0
        Range: 4y
        BonusEffect: "Creates 3y water puddle at impact point (lasts 15s)"
        TerrainNote: "This is a FREE puddle — no Moisture cost. Reward for AoE path."
        Description: >
          Slam trident into ground, creating a shockwave and water splash.
          AoE combo finisher. Bonus: creates a water puddle (terrain interaction)
          at zero Moisture cost. The AoE combo path generates terrain value.
        RankRequired: 1

      - Name: "Skewering Dive"
        ID: skewering_dive
        ActionType: GCD
        CastTime: 0s
        Recast: 2.0s
        TargetType: single_enemy
        DamageType: physical
        Potency: 180  # Slightly lower than Tidal Impale but has gap-close
        Position: "Combo Step 3 (mobility finisher)"
        ComboFrom: [rising_current]
        ComboInto: null
        MoistureCost: 0
        Range: 15y  # GAP CLOSER — lunges to target
        BonusEffect: "Dash to target (gap closer). If target is Soaked: +40% potency (252p)"
        TerrainSynergy: "Soaked debuff applied by Slime's Damage mode or water puddles"
        Description: >
          Leaping trident dive toward target. Gap closer AND combo finisher.
          Bonus damage against Soaked enemies rewards coordinating with Slime
          positioning — if Slime applied Soaked, this hits MUCH harder.
        RankRequired: 2

    WaterSkills:
      # These are Drakol GCD actions that cost MOISTURE (spending defense for offense/utility).
      # They are OPTIONAL — you can ignore them and just melee. But they add DPS/utility
      # at the cost of personal safety. The tradeoff is explicit.

      - Name: "Torrent Lance"
        ID: torrent_lance
        ActionType: GCD
        CastTime: 0s
        Recast: 2.0s
        TargetType: single_enemy
        DamageType: water  # Water element (magical, but STR-scaled via Moisture conversion)
        Potency: 180
        MoistureCost: 15
        Range: 15y  # RANGED — this is the Drakol's only ranged option
        BonusEffect: "If target is Soaked: applies Waterlogged (3s, -10% enemy damage dealt)"
        Description: >
          Hurl a water spear at target. The Drakol's ONLY ranged GCD. Costs
          Moisture — you're spending your skin's water to form the projectile.
          Use when forced out of melee, or to apply Waterlogged debuff for
          mitigation. Ranged flexibility at defense cost.
        DesignNote: >
          This gives Spiritcaller a ranged option when knocked back or during
          movement phases, but at Moisture cost. It's not free — every ranged
          GCD hastens the Desiccated state if Slime isn't nearby refilling.
        RankRequired: 1

      - Name: "Riptide Slash"
        ID: riptide_slash
        ActionType: GCD
        CastTime: 0s
        Recast: 2.0s
        TargetType: enemy_line
        LineWidth: 4y
        LineLength: 10y
        DamageType: water
        Potency: 150  # Per target hit (AoE line)
        MoistureCost: 20
        Range: melee_origin  # Originates from Drakol's position
        BonusEffect: "Leaves water trail (puddle line, 4y wide, 15s duration)"
        TerrainNote: "Creates linear puddle — terrain control at Moisture cost."
        Description: >
          Sweep trident in horizontal arc, releasing a blade of water forward.
          Line AoE that leaves a puddle trail. Excellent for creating terrain
          coverage, but costs significant Moisture. Best used when Slime is
          close (offsetting the cost with proximity generation).
        RankRequired: 1

      - Name: "Geyser Strike"
        ID: geyser_strike
        ActionType: GCD
        CastTime: 1.0s  # Short cast — commitment for power
        Recast: 2.0s
        TargetType: ground_target
        TargetRadius: 5y
        DamageType: water
        Potency: 250
        MoistureCost: 25
        Range: 20y
        BonusEffect: "Creates geyser puddle (5y, 20s). Enemies in puddle: Soaked applied per tick."
        CritCondition: "If Drakol is standing in ANY puddle while casting: guaranteed crit"
        Description: >
          Call up a geyser at target location. High damage, ground-targeted,
          creates long-lasting terrain. The cast time makes it a commitment —
          you sacrifice your weave window. The crit condition rewards puddle
          awareness (stand in your own terrain for crits).
        RankRequired: 2

      - Name: "Maelstrom"
        ID: maelstrom
        ActionType: GCD
        CastTime: 1.5s  # Long cast — high commitment
        Recast: 2.0s
        TargetType: ground_target
        TargetRadius: 8y
        DamageType: water
        Potency: 300  # HIGH — this is the Drakol's biggest single hit (non-ultimate)
        MoistureCost: 30  # EXPENSIVE — nearly 1/3 of max gauge
        Range: 25y
        Cooldown: 30s  # Additional cooldown (can't spam)
        BonusEffect: "Pulls enemies toward center (gravitational CC). Creates massive puddle (8y, 25s)."
        Description: >
          Summon a whirlpool at target location. Highest-potency water skill.
          Pulls enemies inward (setup for party AoE). Creates massive terrain.
          BUT: 30 Moisture cost is enormous. Using this while Slime is far away
          is EXTREMELY risky (could hit Desiccated from a single cast).
          Best used when Slime is close and Moisture is >80.
        RankRequired: 3

      - Name: "Tidal Rush"
        ID: tidal_rush
        ActionType: GCD
        CastTime: 0s
        Recast: 2.0s
        TargetType: self_dash
        DashDistance: 15y
        DamageType: water
        Potency: 100  # Low damage — utility skill
        MoistureCost: 10
        Range: self
        BonusEffect: "Dash through enemies, applying Soaked. Leaves water trail puddle."
        Description: >
          Dash forward in a burst of water. Gap closer / escape tool. Low damage
          but applies Soaked to everything you pass through and creates terrain.
          Minimal Moisture cost for a mobility tool. Use to reposition into melee
          or escape danger zones.
        RankRequired: 1

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 8: SKILL ROSTER — SLIME oGCD COMMANDS (Spirit Direction)
# ─────────────────────────────────────────────────────────────────────────────

  SlimeCommands:
    # Philosophy: >
    # These are ALL oGCDs. The Slime is commanded between GCDs — you never stop
    # attacking to direct your spirit. This is the "RTS micro" layer: weaving
    # spirit commands between melee swings. The commands are FAST (0.3s lock)
    # to feel responsive. The complexity is in WHEN and WHERE, not in execution.

    MovementCommands:
      - Name: "Direct Spirit"
        ID: direct_spirit
        ActionType: oGCD
        AnimationLock: 0.3s  # Fast — responsive micro
        Recast: 1.0s  # Can redirect frequently
        Effect: "Command Slime to move to target ground position"
        Range: 40y  # Anywhere within bond range
        Description: >
          Point-and-click ground target. Slime flows to that position. This is
          the primary positioning tool — used constantly to adjust Slime location.
          1.0s recast means you can reposition every other GCD cycle if needed.
        RankRequired: 1

      - Name: "Follow Ally"
        ID: follow_ally
        ActionType: oGCD
        AnimationLock: 0.3s
        Recast: 1.0s
        Effect: "Command Slime to follow target party member (maintains 3y distance)"
        Range: 40y
        Description: >
          Attach Slime to a party member. Slime tracks their movement, healing
          them continuously in Heal mode. Set-and-forget for sustained single-target
          healing. Useful on a frontliner who moves unpredictably.
        RankRequired: 1

      - Name: "Recall Spirit"
        ID: recall_spirit
        ActionType: oGCD
        AnimationLock: 0.3s
        Recast: 0.5s  # Very short — emergency recall
        Effect: "Instantly recall Slime to Drakol's position (teleport, not travel)"
        Bonus: "Grants +15 Moisture instantly on recall (emergency recovery)"
        Description: >
          EMERGENCY BUTTON. Teleports Slime directly to you (no travel time).
          Grants immediate Moisture. Use when gauge is critical and you need
          DR NOW. The 0.5s recast means you can't abuse it for teleport-heal-
          teleport — after recall, you need to send it out again with Direct Spirit.
        RankRequired: 1

      - Name: "Flash Command"
        ID: flash_command
        ActionType: oGCD
        AnimationLock: 0.3s
        Recast: 30s  # Cooldown — not spammable
        Effect: "Instantly teleport Slime to target position (no travel time)"
        Range: 40y
        Bonus: "Slime performs an immediate heal/damage pulse on arrival (150p)"
        Description: >
          Emergency reposition. Teleports Slime to a location instantly (normally
          Slime has travel time). The arrival pulse makes it a clutch heal delivery
          tool — Flash Command to dying ally = instant heal on arrival. 30s cooldown
          prevents it from replacing careful pre-positioning.
        RankRequired: 2

    ModeCommands:
      - Name: "Spirit Mode: Scout"
        ID: mode_scout
        ActionType: oGCD
        AnimationLock: 0.3s
        Recast: 2.0s  # Mode switches have slight delay to prevent spam-toggling
        Effect: "Switch Slime to Scout mode (reveals hidden, no healing/damage)"
        Description: >
          Exploration mode. Slime reveals hidden enemies, traps, and provides
          vision in fog. No healing, no damage. Used pre-combat or for scouting
          flanks during positioning phases.
        RankRequired: 1

      - Name: "Spirit Mode: Heal"
        ID: mode_heal
        ActionType: oGCD
        AnimationLock: 0.3s
        Recast: 2.0s
        Effect: "Switch Slime to Heal mode (proximity healing, puddle generation)"
        HealingPerTick: "150-200p (3s tick, proximity scaled)"
        PuddleGeneration: "Creates 3y puddle at Slime location (refreshes every 6s)"
        Description: >
          Primary healing mode. Slime heals all allies within 8y every 3s.
          Also generates water puddles for terrain interaction. This is the
          default combat mode for most encounters.
        RankRequired: 1

      - Name: "Spirit Mode: Damage"
        ID: mode_damage
        ActionType: oGCD
        AnimationLock: 0.3s
        Recast: 2.0s
        Effect: "Switch Slime to Damage mode (attacks enemies, applies Soaked)"
        DamagePerTick: "50-70p water damage (3s tick, 6y radius)"
        DebuffApplication: "Applies Soaked to enemies in radius every tick"
        PuddleGeneration: "Creates 3y puddle at Slime location (refreshes every 6s)"
        Description: >
          Offensive mode. Slime deals water damage and applies Soaked debuff.
          Use in DPS-check phases or when healing isn't needed. Soaked debuff
          enables Drakol's bonus damage on several skills (Skewering Dive,
          Torrent Lance). Good synergy with melee combo.
        RankRequired: 1

    SpecialCommands:
      - Name: "Swell Burst"
        ID: swell_burst
        ActionType: oGCD
        AnimationLock: 0.6s  # Standard lock — this is powerful
        Recast: 20s
        Effect: "Slime pulses a burst heal at current location"
        HealPotency: 350  # Strong single burst
        Radius: 8y
        Description: >
          Emergency burst heal. Slime releases a concentrated water pulse,
          healing all allies within 8y for 350p. The Slime must already be
          positioned near the targets — this rewards PRE-POSITIONING.
          If Slime is next to you (not near allies), you just healed yourself.
          Position FIRST, then burst.
        RankRequired: 1

      - Name: "Torrent Wave"
        ID: torrent_wave
        ActionType: oGCD
        AnimationLock: 0.6s
        Recast: 25s
        Effect: "Slime releases directional water wave from current position"
        DamagePotency: 200
        HealPotency: 150  # Heals allies AND damages enemies in the wave
        WaveLength: 15y
        WaveWidth: 6y
        Direction: "Aimed from Slime toward targeted direction"
        Description: >
          Dual-purpose wave. Damages enemies and heals allies in its path.
          Directional skill aimed FROM the Slime's current position. Positioning
          the Slime between enemies and allies maximizes value (wave hits enemies
          first, then reaches allies). Spatial puzzle.
        RankRequired: 2

      - Name: "Hydro Barrier"
        ID: hydro_barrier
        ActionType: oGCD
        AnimationLock: 0.6s
        Recast: 45s
        Effect: "Slime creates water shield on nearest ally (or Drakol if Slime is close)"
        ShieldPotency: 400  # Absorb shield based on MED
        Duration: 10s
        Description: >
          Slime wraps an ally in a water barrier that absorbs damage.
          Applied to the nearest ally within 8y of Slime. If Slime is next to
          Drakol, shields Drakol (self-preservation option). If Slime is near
          a frontliner, shields them. Position determines target.
        RankRequired: 2

      - Name: "Spirit Surge"
        ID: spirit_surge
        ActionType: oGCD
        AnimationLock: 0.6s
        Recast: 60s
        Effect: "Slime doubles healing/damage output for 12s"
        Duration: 12s
        MoistureBurn: "+3 additional Moisture decay per 3s during Surge"
        Description: >
          Overclock the spirit bond. Slime output doubles for 12s (heal ticks
          become 300-400p, damage ticks become 100-140p). BUT: the overclocked
          bond drains additional Moisture. Using Surge while Slime is far away
          compounds the drain dangerously. Best used with Slime nearby or
          with high Moisture banked.
        RankRequired: 2

      - Name: "Tidal Convergence"
        ID: tidal_convergence
        ActionType: oGCD
        AnimationLock: 0.6s
        Recast: 180s  # 3-minute cooldown — class ultimate
        Effect: "Slime and Drakol merge temporarily. All water production centered on Drakol."
        Duration: 15s
        MergeEffects:
          - "Moisture locked at 100 (cannot decay during merge)"
          - "Slime healing aura centered on Drakol (8y radius from DRAKOL)"
          - "All water skills cost ZERO Moisture during merge"
          - "Drakol gains +15% damage dealt"
          - "Puddle generation doubled (terrain saturation)"
        PostMerge: "Slime reappears at Drakol's position. Moisture resumes normal behavior."
        Description: >
          CLASS ULTIMATE. Spirit and Drakol merge into one entity for 15s.
          During merge: maximum DR (Moisture locked at 100), free water skills,
          healing centered on self, damage amp. This is the "I need to be
          both healer AND fighter simultaneously RIGHT HERE" button. Solves
          the distance dilemma for 15s by removing it entirely. 3-minute CD
          means you get it once per major encounter phase.
        DesignNote: >
          This is USE-CASE driven, not burst-cadence. You don't save it for
          a 3-minute alignment — you use it when the situation demands both
          max healing and max defense simultaneously (transition phases,
          unavoidable damage spikes, solo survival moments).
        RankRequired: 3

      - Name: "Cleansing Waters"
        ID: cleansing_waters
        ActionType: oGCD
        AnimationLock: 0.6s
        Recast: 15s
        Effect: "Slime cleanses 1 debuff from nearest ally within 8y"
        Priority: "Removes most recent debuff first. Cannot cleanse permanent debuffs."
        Description: >
          Debuff removal through water purification. Target is position-based
          (nearest ally to Slime). If multiple allies need cleansing, reposition
          Slime to the priority target before using. Another spatial decision.
        RankRequired: 1

      - Name: "Aqua Veil"
        ID: aqua_veil
        ActionType: oGCD
        AnimationLock: 0.3s
        Recast: 90s
        Effect: "Slime creates a water curtain at current position. Allies passing through: +20 Moisture to Drakol, cleanse 1 debuff, heal 200p"
        Duration: 8s
        CurtainWidth: 10y
        Description: >
          Area denial / party support. Creates a wall of water that allies can
          pass through for benefits. The +20 Moisture to Drakol is unique — allies
          running through YOUR Slime's curtain refill YOUR gauge. Encourages
          party coordination and creative Slime placement (put it between the
          party's path and the safe zone during mechanic resolution).
        RankRequired: 3

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 9: DRAKOL PERSONAL oGCDs (Non-Slime)
# ─────────────────────────────────────────────────────────────────────────────

  DrakolOGCDs:
    # These are the Drakol's own oGCD abilities (not Slime commands).
    # They provide personal utility, mitigation, and combat enhancement.

    - Name: "Scale Hardening"
      ID: scale_hardening
      ActionType: oGCD
      AnimationLock: 0.6s
      Recast: 30s
      Effect: "Drakol hardens scales. +10% DR for 8s (stacks with Moisture DR)."
      Description: >
        Personal mitigation. Stacks with Moisture DR for total up to 30% DR.
        Use when you know a hit is coming and your Moisture is already low.
        The safety net for moments when Slime is far and you can't recall.
      RankRequired: 1

    - Name: "Drakol Roar"
      ID: drakol_roar
      ActionType: oGCD
      AnimationLock: 0.6s
      Recast: 60s
      Effect: "Intimidating roar. Applies Soaked to all enemies within 8y. +10% Moisture instantly."
      Description: >
        AoE Soaked application + minor Moisture recovery. Useful for setting up
        Skewering Dive crits on packs without needing Slime in Damage mode.
        The Moisture gain is small but can prevent Desiccated in emergencies.
      RankRequired: 1

    - Name: "Ancestral Bond"
      ID: ancestral_bond
      ActionType: oGCD
      AnimationLock: 0.6s
      Recast: 120s
      Effect: "Strengthens spirit bond for 20s. Slime movement speed +100%. Moisture generation rate doubled."
      Description: >
        Utility window. Makes Slime much faster and Moisture regeneration much
        stronger. Use during high-mobility phases where you need to reposition
        Slime rapidly AND maintain Moisture. Doesn't increase healing output —
        increases LOGISTICS efficiency.
      RankRequired: 2

    - Name: "Depth Pressure"
      ID: depth_pressure
      ActionType: oGCD
      AnimationLock: 0.6s
      Recast: 8s
      Effect: "Next melee GCD deals +50% potency and applies Soaked (2 stacks) to target."
      Description: >
        Damage buff oGCD. Weave between melee GCDs for burst. Applies double
        Soaked for Skewering Dive / Torrent Lance synergy. Standard damage oGCD
        — use on cooldown in single-target, save for priority targets in multi.
      RankRequired: 1

    - Name: "Brine Armor"
      ID: brine_armor
      ActionType: oGCD
      AnimationLock: 0.6s
      Recast: 90s
      Effect: "For 10s: damage taken converts to Moisture drain instead of HP loss (up to 40 Moisture)."
      MoistureConversion: "Each hit converts damage to Moisture loss instead. 1% HP worth = 2 Moisture."
      Cap: "Maximum 40 Moisture can be drained this way. Excess damage hits HP normally."
      Description: >
        Unique survival tool. For 10s, you take hits to your MOISTURE instead of
        your HP (up to the 40-Moisture cap). This means high Moisture = effective
        HP buffer. Synergizes with having Slime close (Moisture regenerating while
        being consumed by damage). At high Moisture + Slime nearby, you're
        functionally immortal for a few seconds.
      RankRequired: 3

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 10: TERRAIN INTERACTIONS
# ─────────────────────────────────────────────────────────────────────────────

TerrainInteractions:
  WaterPuddles:
    Sources:
      - "Slime presence (Heal mode or Damage mode) — 3y puddle, refreshes every 6s"
      - "Undertow Slam (combo finisher) — 3y puddle, 15s duration"
      - "Riptide Slash (water GCD) — 4y line puddle, 15s duration"
      - "Geyser Strike (water GCD) — 5y puddle, 20s duration"
      - "Maelstrom (water GCD) — 8y puddle, 25s duration"
      - "Tidal Rush (dash) — trail puddle, 15s duration"
      - "Environmental sources (rain, rivers, fountains) — permanent"
    PuddleProperties:
      AllyEffects:
        - "Spiritcaller standing in puddle: +4 Moisture per 3s (alternative Slime)"
        - "All allies standing in puddle: minor regen (25p per 3s)"
        - "Movement speed unaffected (not slippery — it's a thin film)"
      EnemyEffects:
        - "Enemies standing in puddle: Soaked debuff applied (per 3s)"
        - "Soaked enemies: -10% movement speed, vulnerable to follow-up effects"
        - "No direct damage from puddle standing (damage requires skills)"
      PersistenceRules:
        - "Puddles are persistent (duration-based, not tick-based)"
        - "Multiple puddles can overlap (effects don't stack, but coverage compounds)"
        - "Puddles can be evaporated by fire effects (cross-class interaction)"
        - "Puddles can be frozen by ice effects (cross-class interaction)"

  CrossClassSynergy:
    FireInteraction:
      Effect: "Fire skills hitting water puddles = STEAM (vision obscure 5s)"
      SteamProperties:
        - "Blocks line of sight for enemies (defensive)"
        - "Allies unaffected (Spiritcaller water attunement grants vision through steam)"
        - "Duration: 5s per fire application"
      ExampleSynergy: "Elementalist Fireball into Spiritcaller puddle = smoke screen"
    IceInteraction:
      Effect: "Ice skills hitting water puddles = FROZEN GROUND (slip zone 8s)"
      FrozenProperties:
        - "Enemies crossing frozen puddle: 50% chance to fall prone (1.5s stun)"
        - "Movement speed -50% on frozen ground for enemies"
        - "Allies unaffected (Spiritcaller water attunement grants grip)"
        - "Duration: 8s per ice application"
      ExampleSynergy: "Elementalist Ice Shard into puddle = CC trap zone"
    LightningInteraction:
      Effect: "Lightning skills hitting water puddles = CONDUCTION (AoE damage)"
      ConductionProperties:
        - "All enemies standing in puddle take 80p lightning damage instantly"
        - "Soaked enemies take +50% conduction damage (120p)"
        - "Puddle is consumed (destroyed) by lightning"
        - "Spiritcaller is IMMUNE to conduction (water attunement)"
      ExampleSynergy: "Madolt Warrior Electron Shock into puddle = AoE burst + Spiritcaller safe"
    WindInteraction:
      Effect: "Wind skills hitting puddles = MIST CLOUD (HoT zone 10s)"
      MistProperties:
        - "Allies in mist: 50p HoT per 3s for 10s"
        - "Enemies in mist: -15% accuracy (can't see clearly)"
        - "Mist drifts with wind direction (dynamic positioning)"
        - "Duration: 10s per wind application"
    EarthInteraction:
      Effect: "Earth skills hitting puddles = MUD (slow zone 12s)"
      MudProperties:
        - "Enemies in mud: -40% movement speed, cannot sprint/dash"
        - "Allies unaffected (Spiritcaller water attunement)"
        - "Duration: 12s per earth application"
        - "Mud persists longer than most terrain conversions"

  EnvironmentalWater:
    NaturalSources:
      - "Rain: Spiritcaller passive +2 Moisture per 3s (environmental bonus)"
      - "Rivers/Lakes: Standing in natural water = +6 Moisture per 3s (strong)"
      - "Fountains: Proximity grants +3 Moisture per 3s"
      - "Underwater sections: Moisture locked at 100 (Drakol thrives underwater)"
    DesertPenalty: "Dry environments: -3 Moisture per 3s (environmental drain)"
    VolcanicPenalty: "Hot environments: -4 Moisture per 3s + puddles evaporate 50% faster"
    CaveNeutral: "Underground: no bonus, no penalty (ambient humidity neutral)"

  TerrainStrategy:
    CorePrinciple: >
      Spiritcaller is a TERRAIN ENGINEER. Over the course of a fight, they
      saturate the battlefield with water puddles through normal play. This
      terrain benefits the entire party (regen, Soaked on enemies) and enables
      cross-class combos. The Spiritcaller doesn't just heal — they reshape
      the arena's properties. A long fight with a good Spiritcaller means
      the entire floor is covered in water, enabling chain lightning conduction,
      ice slip-traps, steam screens, and guaranteed Drakol crits everywhere.
    PositioningReward: >
      Expert Spiritcallers pre-puddle critical areas (chokepoints, boss positions,
      escape routes) before fights begin. Mid-fight, they route Slime paths to
      maximize puddle coverage in useful locations. This is the LONG-TERM layer
      of the class — not just "where is my Slime NOW" but "where SHOULD the
      water be in 30 seconds?"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 11: SCENARIO FLOWS
# ─────────────────────────────────────────────────────────────────────────────

ScenarioFlows:
  SingleTarget_Boss:
    Description: "1 boss. Drakol melees. Slime heals party."
    Priority:
      1: "Position Slime in Heal mode near party stack point"
      2: "Drakol engages boss in melee (Trident combo)"
      3: "Monitor Moisture — Slime should be ~15-20y away (party usually behind boss)"
      4: "At Moisture < 50: Recall Slime briefly (3-4s), refill, resend"
      5: "Use Depth Pressure on cooldown for damage oGCD"
      6: "Swell Burst for emergency party healing (boss AoE)"
      7: "Tidal Convergence for transition phases (when party stacks and damage spikes)"
    DPSOutput: "55-65% of reference (melee uptime good, water skills limited by Moisture)"
    HealingOutput: "50-60% party HP/min (Slime sustained, periodic recalls reduce uptime)"
    MoistureManagement: >
      In single-target, the party usually stacks 15-20y behind the boss.
      Slime at party = 15-20y from Drakol. Moisture decay is moderate (-5/3s)
      but generation is still positive if Drakol stands in puddles (+4/3s from
      puddle). Net: -1/3s decay. Very manageable — 100 to critical in ~50s.
      Plenty of time before recalls are needed.

  MultiTarget_TrashPull:
    Description: "5-8 enemies. Frontliner gathers. Spiritcaller AoEs + heals."
    Priority:
      1: "Position Slime in Heal mode at party center"
      2: "Open with Tidal Rush through pack (apply Soaked to all)"
      3: "Barbed Sweep → Undertow Slam (AoE combo + free puddle)"
      4: "Riptide Slash for puddle line across the pack"
      5: "Switch Slime to Damage mode if healing not needed (Soaked + DPS)"
      6: "Drakol Roar for mass Soaked if Slime is healing (can't damage-mode)"
    DPSOutput: "60-70% of reference (AoE combo + Slime damage mode)"
    HealingOutput: "40-50% party HP/min (Slime close to everyone = easy healing)"
    MoistureManagement: >
      In AoE, everyone is clustered. Slime near party = Slime near Drakol = 
      Moisture is FINE. AoE is Spiritcaller's comfortable scenario — the distance
      problem barely exists when everyone's stacked.

  SplitParty:
    Description: "Party split into two groups (common raid mechanic). Healing needed on BOTH."
    Priority:
      1: "Assign Slime to the group WITHOUT Drakol (they need spirit healing)"
      2: "Drakol's group relies on puddle regen + Hydro Barrier shields"
      3: "Drakol's Moisture WILL decay heavily (Slime far away)"
      4: "Use Scale Hardening + Brine Armor during split phase"
      5: "Recall Slime the INSTANT groups reunite (Moisture recovery priority)"
    DPSOutput: "40-50% of reference (distracted, defensive)"
    HealingOutput: "70-80% per group (split healing — Slime on one, puddles on other)"
    MoistureManagement: >
      THIS is the hard scenario. Slime at max range (30-40y) = -5 to -10/3s decay.
      With no puddle available (split = different room/position) = no offset.
      Drakol hits Desiccated in ~15-20s. MUST pre-bank Moisture to 100 before split.
      Scale Hardening + Brine Armor covers the vulnerability window.
      Expert play: pre-place puddles in YOUR group's position before the split
      happens, giving you +4/3s offset during the mechanic.

  SoloSurvival:
    Description: "Drakol alone (party dead, or solo content)."
    Priority:
      1: "Keep Slime in Heal mode at YOUR position (0-5y)"
      2: "Moisture stays at 80-100 permanently (Slime close)"
      3: "Full melee combo uptime (you ARE the damage)"
      4: "Use water skills freely (Slime refills faster than you spend)"
      5: "You're a melee fighter with 20% DR and passive self-healing. Durable."
    DPSOutput: "70% of reference (full melee combo + water skills)"
    SurvivabilityNote: >
      Solo Spiritcaller is TANKY. 20% DR from Moisture + passive self-heal from
      Slime proximity + water skill utility. You can't heal others (Slime is on you)
      but you can fight indefinitely against moderate threats. This is the "not a
      squishy caster" payoff — solo Spiritcaller plays like a self-sufficient warrior.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 12: ANTI-PATTERNS AND FORBIDDEN DESIGN ELEMENTS
# ─────────────────────────────────────────────────────────────────────────────

AntiPatterns:
  ForbiddenMechanics:
    - Name: "Freecure / RNG Procs"
      Statement: "ZERO random procs. All effects are deterministic and player-controlled."
      Enforcement: "No skill has a % chance to trigger anything. All conditions are positional/conditional."
    - Name: "Fixed Rotation"
      Statement: "There is no optimal fixed sequence. Slime positioning is REACTIVE to field state."
      Enforcement: "If a player finds a fixed GCD sequence that works always, the encounter design has failed."
    - Name: "2-Minute Burst Cycle"
      Statement: "No skills align to a burst cadence. Tidal Convergence is USE-CASE driven (180s CD)."
      Enforcement: "Convergence is not saved for party buff alignment — it's used when the situation demands it."
    - Name: "Spirit Death / Summon Recovery"
      Statement: "The Water Slime CANNOT die. CANNOT be destroyed. NO summon recovery mechanics."
      Enforcement: "Spirit has no HP. Cannot be targeted. Cannot take damage. Is always present."
    - Name: "Cast-from-Back Healer"
      Statement: "Spiritcaller does NOT stand in the back casting. They are IN MELEE."
      Enforcement: "No ranged filler GCDs (only Torrent Lance at Moisture cost). Must be in melee for DPS."
    - Name: "Pet Has HP"
      Statement: "The Slime is NOT a pet with a health bar. It is an invulnerable spirit."
      Enforcement: "No HP pool. No fire vulnerability. No destruction mechanic. No recovery timer."
    - Name: "Solo Healer Replaces Frontliner"
      Statement: "Spiritcaller is NOT designed to solo-tank. DR helps survival, not threat/control."
      Enforcement: "No aggro tools. No force-targeting. DR is personal survival, not tanking identity."
    - Name: "Mana/MP Resource"
      Statement: "Spiritcaller has NO mana. Moisture IS the resource."
      Enforcement: "No MP bar. No mana management. All costs are Moisture-denominated."
    - Name: "GCD Healing"
      Statement: "The Drakol has ZERO GCD heals. Healing is exclusively Slime-delivered."
      Enforcement: "No GCD in the kit heals allies. If you want to heal, command the Slime."

  AntiPattern_PetDeath: >
    EXPLICITLY REMOVED from previous version. The Water Slime is a spirit entity.
    It does NOT have HP. It CANNOT be killed. There is NO "Slime destroyed = all
    healing offline" vulnerability. There is NO fire damage vulnerability. There is
    NO "summon recovery" downtime. The Slime is ALWAYS present. The cost of healing
    is MOISTURE (positional/gauge), never spirit availability.
    
    Previous version had: "Slime HP pool, fire kills Slime, must resummon."
    Current version: "Slime is invulnerable spirit. Always present. Cost is Moisture."
    This is a FUNDAMENTAL correction to the class design.

  AntiPattern_FixedRotation: >
    Spiritcaller's melee combo IS simple and somewhat fixed (3-hit combo cycling).
    That's intentional — the COMPLEXITY is in Slime management, not button sequences.
    If someone says "the rotation is boring," the answer is: "your rotation is your
    Slime's positioning, not your GCD sequence." The GCD combo is deliberately simple
    to free mental bandwidth for the real decision-making layer (spatial micro).

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 13: ITEM BASELINE COMPARISON
# ─────────────────────────────────────────────────────────────────────────────

ItemBaseline:
  Principle: >
    Items define the BASELINE. Classes REPLACE item functionality permanently.
    A Trident without the Spiritcaller class is just a polearm with basic attacks.
    The Spiritcaller class kit completely replaces the Trident's generic abilities
    with the spirit-bond combat system.

  TridentBaseline:
    WithoutClass:
      - "Basic 3-hit melee combo (100 → 120 → 150p)"
      - "Generic thrust attack (ranged poke, 80p, 8y)"
      - "Sweep attack (cone AoE, 90p)"
      - "No companion. No water skills. No Moisture system."
    WithSpiritcaller:
      - "Full melee combo with positional crits and terrain generation"
      - "Water skill suite (Moisture-cost ranged/AoE options)"
      - "Water Slime companion (entire healing/support system)"
      - "Moisture Gauge (defensive identity and resource management)"
      - "Terrain engineering (puddle ecosystem)"
    Comparison: >
      The class transforms the Trident from a generic stabby-polearm into a
      dual-entity combat system with terrain control, healing delegation, and
      resource management. The weapon is the VEHICLE; the class is the ENGINE.

  ComparedToOtherHealers:
    Elementalist:
      SharedTrait: "Water element healing"
      Differentiation: "Elementalist casts water spells directly. Spiritcaller's SLIME delivers water healing."
      PlayerExperience: "Elementalist = reactive caster. Spiritcaller = proactive positioner."
    Siren:
      SharedTrait: "Non-traditional healing (not direct heal spells)"
      Differentiation: "Siren heals through drain-bonds on enemies. Spiritcaller heals through spirit positioning."
      PlayerExperience: "Siren = plate-spinning timer management. Spiritcaller = spatial micro."
    DesignNiche: >
      Spiritcaller occupies the "physical melee healer" niche. The only healer
      who uses STR as primary stat, wields a melee weapon, and has zero cast bars
      on their healing. Players who want to heal but hate being a caster — this
      is their class. The fantasy is "warrior who happens to have a healing spirit"
      not "mage who happens to have a stick."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 14: CRIT SYSTEM (DETERMINISTIC)
# ─────────────────────────────────────────────────────────────────────────────

CritSystem:
  Principle: "Crit is NOT RNG. All critical hits have deterministic conditions."
  SpiritcallerCritConditions:
    - Skill: "Rising Current"
      Condition: "Rear positional (hit enemy from behind)"
      Result: "Guaranteed critical hit"
    - Skill: "Geyser Strike"
      Condition: "Drakol standing in any water puddle while casting"
      Result: "Guaranteed critical hit"
    - Skill: "Tidal Impale"
      Condition: "Enemy above 50% HP"
      Result: "+25% damage (functions as system-wide bonus, not crit)"
    - Skill: "Skewering Dive"
      Condition: "Target has Soaked debuff"
      Result: "+40% potency bonus"
    - Skill: "Slime Damage ticks"
      Condition: "Target is standing in a water puddle AND has Soaked"
      Result: "+50% tick damage"
  DesignNote: >
    All damage bonuses are CONDITIONAL, not random. The player earns crits through
    positioning (rear), terrain awareness (standing in puddle), debuff setup
    (Soaked application), and target health awareness (>50% rule). Every "big hit"
    moment is earned, never lucky.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 15: RANK PROGRESSION
# ─────────────────────────────────────────────────────────────────────────────

RankProgression:
  Rank1:
    Description: "Core dual-entity loop. Basic combo + Slime modes + Moisture management."
    SkillsAvailable:
      GCD: [trident_thrust, barbed_sweep, rising_current, tidal_impale, undertow_slam, torrent_lance, riptide_slash, tidal_rush]
      SlimeCommands: [direct_spirit, follow_ally, recall_spirit, mode_scout, mode_heal, mode_damage, swell_burst, cleansing_waters]
      DrakolOGCD: [scale_hardening, drakol_roar, depth_pressure]
    Complexity: "Moderate. Learn the Moisture loop. Learn Slime positioning basics."
    CoreLoop: "Melee combo → weave Slime commands → manage Moisture → recall/resend cycle"

  Rank2:
    Description: "Expanded toolkit. Precision commands + water skill expansion."
    SkillsAdded:
      GCD: [skewering_dive, geyser_strike]
      SlimeCommands: [flash_command, torrent_wave, hydro_barrier, spirit_surge]
      DrakolOGCD: [ancestral_bond]
    Complexity: "High. Flash Command timing, Surge windows, Geyser crit optimization."
    NewDecisions:
      - "Flash Command timing (30s CD — when is the emergency?)"
      - "Spirit Surge windows (doubled output vs accelerated Moisture drain)"
      - "Geyser Strike crit condition (puddle positioning for guaranteed crits)"
      - "Skewering Dive synergy (set up Soaked THEN gap-close for bonus damage)"

  Rank3:
    Description: "Mastery. Ultimate ability + advanced defense + terrain mastery."
    SkillsAdded:
      GCD: [maelstrom]
      SlimeCommands: [tidal_convergence, aqua_veil]
      DrakolOGCD: [brine_armor]
    Complexity: "Expert. Full dual-entity micro with Moisture economy mastery."
    MasteryExpression:
      - "Tidal Convergence timing (use-case driven, not cadence)"
      - "Brine Armor synergy with high Moisture (effective HP multiplication)"
      - "Aqua Veil placement (party pathing prediction + Moisture refill)"
      - "Maelstrom cost management (30 Moisture is enormous — when can you afford it?)"
      - "Pre-fight puddle mapping (saturate the arena before engagement)"
      - "Cross-class terrain combo coordination (set up for Madolt/Elementalist)"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 16: UI/UX FEEDBACK REQUIREMENTS
# ─────────────────────────────────────────────────────────────────────────────

UIFeedback:
  MoistureGauge:
    Position: "Prominent — center-bottom HUD (as important as HP)"
    ColorCoding:
      100-60: "Blue (safe range)"
      60-40: "Yellow (caution)"
      40-20: "Orange (danger)"
      20-0: "Red (critical)"
      0_Desiccated: "Cracked red + screen edge effects"
    Animation: "Water droplet fills/drains. At 0: cracks appear on gauge frame."
    Sound: "Subtle water-drip audio at 40 (warning). Harsh cracking at 20 (danger)."

  SlimeIndicator:
    Position: "Mini-map marker + world-space tether line from Drakol to Slime"
    DistanceDisplay: "Numeric distance shown on tether (e.g., '23y')"
    ModeIndicator: "Slime glows: Blue (Heal), Red (Damage), White (Scout)"
    RadiusCircle: "Ground decal showing Slime's effective radius (8y heal, 6y damage)"

  MoistureDecayPreview:
    Mechanic: "When targeting a position for Direct Spirit, UI shows PREDICTED Moisture decay rate"
    Display: "Ghost line on Moisture gauge showing where gauge will be in 10s if Slime goes there"
    Purpose: "Player can see the COST of a positioning decision before committing"

  DesiccatedState:
    Visual: "Character model scales crack. Skin texture shifts from glossy to matte."
    ScreenEffect: "Screen edges dry and crack (subtle overlay, not obscuring gameplay)"
    Audio: "Low persistent warning tone. Crackling sounds on every hit taken."
    Recovery: "When Moisture > 20: wet splash effect, scales re-seal, audio normalizes"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 17: DESIGN PHILOSOPHY SUMMARY
# ─────────────────────────────────────────────────────────────────────────────

DesignSummary:
  OneSentence: >
    Spiritcaller is a melee-fighting healer who directs an invulnerable water
    spirit across the battlefield, paying for healing reach with personal defense.

  ThreeKeyTensions:
    1: "Slime Distance vs Personal Safety (healing reach costs Moisture/DR)"
    2: "Water Skill Offense vs Defense (spending Moisture for damage/utility)"
    3: "Slime Mode vs Situation (Heal vs Damage vs Scout — which mode is correct NOW?)"

  WhatMakesItUnique:
    - "Only healer with ZERO GCD heals (all healing is companion-delivered)"
    - "Only healer that uses STR and fights in melee as primary gameplay"
    - "Only class with an invulnerable companion (can't be killed — cost is positional)"
    - "Only healer whose personal defense IS their healing resource"
    - "Terrain engineering as secondary class identity (puddle ecosystem)"
    - "Cross-class combo enabler (water terrain for fire/ice/lightning/wind/earth reactions)"

  WhoIsThisFor:
    IdealPlayer: >
      Players who love RTS micro. Players who hate standing in the back casting.
      Players who enjoy managing two entities simultaneously. Players who want to
      FEEL like a warrior while FUNCTIONING as a healer. Players who enjoy spatial
      puzzles over rotation optimization. Former FFXIV Scholar mains who wished the
      fairy was more interactive. Former WoW Discipline Priests who wished they
      could be in melee.
    NotFor: >
      Players who want a simple, reactive "see low HP, press heal" loop.
      Players who dislike split-attention gameplay. Players who hate positional
      requirements. Players who expect healers to be squishy casters with big numbers.

  DesignValidation:
    CoreTensionTest: >
      If a player says "I just keep the Slime near me all the time" — they're
      failing as a healer (no one gets healed). If a player says "I just leave
      the Slime far away all the time" — they're dead (Moisture gone). The class
      FORCES oscillation. That oscillation IS the gameplay.
    AntiDeathball: >
      In content where the party is stacked (everyone within 10y), Spiritcaller
      is EASY — Slime near party = near Drakol = no Moisture decay = free healing.
      The class becomes HARD when the party is SPREAD (split mechanics, flanking,
      spread stacks). Difficulty scales with party spread, not enemy damage.
    SkillCeilingValidation: >
      Low skill: Slime follows closest ally. Moisture dips occasionally. Healing is
      adequate but not spectacular. DR drops sometimes.
      High skill: Slime pulses in and out. Moisture oscillates 60-100 constantly.
      Healing is excellent with perfect uptime. DR rarely drops below 60%.
      Puddles cover the entire arena. Cross-class combos fire every 10s.
      The GAP between floor and ceiling is in SPATIAL OPTIMIZATION, not APM.

