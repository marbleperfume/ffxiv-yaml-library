# Classes/DPS/Strix_Complete.yaml
# ═══════════════════════════════════════════════════════════════════════════════
# STRIX (Talon) — Altitude Dive-Bomber DPS
# ═══════════════════════════════════════════════════════════════════════════════
#
# Design lineage:
#   EDF Wing Diver: aerial combat class, sustained flight as engagement mode
#   Yu-Gi-Oh Raidraptors: aggressive energy-driven aerial predator (XYZ overlay → altitude stacks)
#   Monster Hunter Insect Glaive: air-to-ground commitment, vault → plunge cycle
#   Dragoon (FFXIV): jump commitment, fixed trajectory, landing vulnerability
#   Peregrine Falcon: terminal velocity dive → maximum kinetic force at impact
#   Birds of Prey: circling → reading → committing → striking → escaping
#
# Core identity: "Pre-calculation dive bomber"
#   Altitude is the PRIMARY RESOURCE. Time spent airborne is time spent
#   LOADING the next attack — reading positions, selecting targets, calculating
#   AoE paths. The skill is NOT in pressing buttons on the ground. The skill
#   is in the READ: what do I hit, from what angle, at what altitude, with
#   what timing? Once the dive is committed, trajectory is FIXED. You cannot
#   abort. You cannot redirect. The player must be RIGHT before they commit.
#
# Fantasy: The raptor that drops from the sky like a missile.
#   You circle above. You see everything. You choose the perfect moment.
#   You fold your wings and DROP — a fixed-trajectory kinetic strike that
#   resolves massive damage at the point of impact. Then you're on the ground:
#   fragile, fast, dangerous only with your weapon until you can re-ascend.
#   The ground is NOT helplessness — it's a different, weaker mode where your
#   weapon (elemental/poison) does the work that your body cannot.
#
# Flight distinction from Colony (Harvester):
#   Colony flight is UTILITY — scouting, positioning, seed-drops, pollen clouds.
#   Strix flight is PREDATORY — altitude as weapon charge, dive as delivery.
#   Colony flies to SEE and SUPPORT. Strix flies to CALCULATE and KILL.
#   Colony is the hummingbird. Strix is the peregrine falcon.
#
# References:
#   - Combat/BalanceTargets.yaml (all numeric targets)
#   - Combat/AggroSystem.yaml (Strategy Rank interaction with aerial positioning)
#   - Combat/ClassMechanicModuleDesign.md (mechanic type taxonomy)
#   - Classes/Support/Colony_Complete.yaml (flight differentiation)
# ═══════════════════════════════════════════════════════════════════════════════

Key: Classes.DPS.Strix

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 1: CLASS IDENTITY
# ─────────────────────────────────────────────────────────────────────────────

Identity:
  Name: Strix
  AlternateName: Talon
  Role: DPS
  SubRole: Burst DPS (Dive-Commit)
  DamageType: physical_kinetic + elemental_weapon
  ExecutionArchetype: Pre-Calculation Commitment
  ExecutionTier: Experienced
  # Experienced tier justified by:
  # - Altitude management as continuous resource (not a simple gauge fill/spend)
  # - Pre-calculation requires reading battlefield BEFORE committing (mental load)
  # - Fixed trajectory = zero error correction — must be perfect on commit
  # - Ground state requires weapon skill expression (elemental/poison management)
  # - State transitions (aerial → dive → ground → re-ascend) require mode awareness
  # - Party coordination (communicating dive timing, requesting setups)

  Description: >
    A Featherin aerial predator who treats altitude as a weapon charge. From
    sustained flight, the Strix reads the battlefield, selects optimal targets,
    calculates AoE coverage, and commits to a fixed-trajectory dive that
    converts altitude into kinetic force. Dive damage scales with height —
    higher altitude = more devastating impact. Once committed, the trajectory
    CANNOT be altered — the player must be correct BEFORE pressing the button.
    On the ground, the Strix is weaker but NOT helpless: elemental/poison
    weapons provide sustained damage, low hops and wall-jumps maintain the
    altitude THEME, and SPD 15 provides escape velocity back to the sky.
    The class fantasy is the predator who is UNTOUCHABLE when moving (evasion
    frames baked into dashes) and DEVASTATING when diving, but FRAGILE when
    stationary.

  CoreFantasy: >
    You are the raptor circling above the battlefield. Everything below is
    your target selection screen. You see clustered enemies, exposed flanks,
    and perfect AoE angles that ground-level fighters cannot perceive. You
    choose your moment. You commit. You HIT like a kinetic missile — altitude
    converted directly into force. Then you're on the ground: fast, evasive,
    still lethal with your poisoned/elemental blades, but eager to return to
    the sky. The ground is your WEAKER mode, not your helpless mode. You are
    NEVER a sitting duck — you are always either untouchable (airborne/dashing)
    or devastatingly committed (diving). The only time you're vulnerable is
    if you STOP MOVING on the ground.

  InputModality:
    PrimaryFocus: battlefield_geometry_from_altitude
    SecondaryFocus: altitude_gauge_and_dive_trajectory_preview
    TertiaryFocus: ground_weapon_element_status_and_evasion_cooldowns
    DecisionType: pre_calculation_commitment
    # Unlike Siren (adaptive maintenance) or Madolt (reactive parry),
    # Strix's decision window is BEFORE the action: "Is this the right
    # target? Is this the right angle? Is my altitude optimal? Is the
    # ground clear for recovery?" All decisions front-loaded. Execution is
    # one button → committed → resolved.

  StatPriority:
    Primary: DEX  # DEX = evasion + precision. Strix's primary defensive stat AND dive accuracy scaling.
    Secondary: EVA  # EVA = evasion rating. Synergizes with dash i-frames. Makes the "unhittable" fantasy real.
    Tertiary: SPD  # SPD = movement speed + GCD reduction. Escape velocity on ground, haste for weapon combos.
    DumpStat: STR  # STR 6 (racial). Damage comes from MOMENTUM (dive) and WEAPON PROPERTIES (ground), not raw strength.
    # STR 6 Explanation: Featherin hollow bones = light = can fly but CANNOT
    # generate physical force through muscle. Dive damage is KINETIC (mass × velocity²)
    # — the altitude provides the velocity, gravity provides the acceleration.
    # Ground damage comes from WEAPON ENCHANTMENTS (elemental/poison), not swinging hard.

  DesignStatement: >
    Strix is the DPS that rewards THINKING before acting. Unlike Reaver (commit
    to pursuit, damage escalates over time) or Madolt (reactive parry-into-counter),
    Strix front-loads ALL skill expression into the decision phase. The dive
    itself is one button — the mastery is in choosing WHEN, WHERE, and FROM
    WHAT HEIGHT. This creates a DPS class where the best players aren't the
    ones with the fastest APM — they're the ones who READ the battlefield
    best from above. Ground state ensures the Strix isn't a one-trick poncho:
    caves, corridors, and low-ceiling environments force weapon-based play
    that is WEAKER but FUNCTIONAL. The Strix player must master BOTH modes.

  FailureStates:
    BadDive:
      Cause: "Committed to dive on wrong target, bad angle, or into danger zone"
      Cost: "Full dive damage wasted on suboptimal target. Strix is now grounded in a bad position."
      Recovery: "Must survive ground time (8-12s) before re-ascend is available. SPD 15 helps escape."
      Severity: "HIGH — but survivable if dashes are available"
    GroundedTooLong:
      Cause: "Failed to re-ascend (interrupted, out of stamina, in a cave)"
      Cost: "Stuck in weaker ground mode. DPS drops to ~55% of aerial cycle output."
      Recovery: "Find space/time to re-ascend. Use wall-jumps/hops to maintain partial altitude."
      Severity: "MODERATE — ground state is weaker but NOT zero. Weapon still does damage."
    CeilingLocked:
      Cause: "Low ceiling / indoor environment removes high-altitude option"
      Cost: "Cannot build maximum altitude. Limited to shallow dives and ground combos."
      Recovery: "Adapt to low-ceiling mode (ground state + shallow hops). Find open areas."
      Severity: "MODERATE — this is the Strix's environmental weakness. Design intentional."
    PredictedDive:
      Cause: "Rank 3+ enemies read the dive commit and move/shield/counter"
      Cost: "Dive hits empty ground or a shielded target. Full commitment wasted."
      Recovery: "Higher rank enemies require party setup (CC/root before dive) or feint dives."
      Severity: "HIGH against smart enemies — reduces to LOW with party coordination."
    StationaryOnGround:
      Cause: "Strix stops moving on the ground (stunned, rooted, decision paralysis)"
      Cost: "Fragile body + no evasion frames = rapid death. Hollow bones have minimal HP."
      Recovery: "Don't stop. Dash. Wall-jump. Re-ascend. ANYTHING that creates motion."
      Severity: "CRITICAL — a stationary Strix is a dead Strix."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 1b: RACIAL LOCK — FEATHERIN
# ─────────────────────────────────────────────────────────────────────────────

RacialLock:
  Race: Featherin
  ParentCategory: null  # Featherin category TBD by worldbuilding
  Enforcement: hard_lock  # Players MUST be Featherin to play Strix. No exceptions.
  BiologicalLock: wings_and_flight
  LockJustification: >
    The Strix class requires TRUE FLIGHT — not gliding, not levitation, not
    high jumping. Sustained powered flight that allows hovering, altitude
    adjustment, and high-speed diving. This requires Featherin wing anatomy:
    hollow bones (for mass:lift ratio), flight muscles (pectorals that
    generate sustained lift), wing structure (capable of powered flight AND
    controlled dive), and aerial physiology (blood oxygenation for sustained
    altitude). The altitude combat system is impossible without a body that
    can fly. Period. No wings = no Strix.
  NPCException: >
    Non-Featherin "aerial" abilities in NPCs exist as magical flight (hover
    spells, wind magic, levitation). These provide POSITION but not KINETIC
    DIVE capability — magic flight doesn't generate the mass×velocity² that
    makes dive damage lethal. A mage hovering at 20m and diving is a mage
    falling — not a kinetic missile. The biological dive requires wing-folding
    aerodynamics and hollow-bone mass optimization that only Featherin possess.
  RacialSynergy:
    - "TRUE FLIGHT — sustained powered flight (not gliding) allows persistent altitude as resource"
    - "Hollow bones — light enough for flight, fragile enough to justify glass-cannon identity"
    - "SPD 15 — light body = fast ground movement = escape velocity for re-ascend"
    - "STR 6 — cannot generate muscle force, MUST rely on momentum (dive) and weapon properties (ground)"
    - "Wing-fold aerodynamics — controlled dive trajectory at terminal velocity"
    - "Aerial vision — physiological far-sight from altitude (wider FOV, distance acuity)"
    - "Predator instinct — lore justification for pre-calculation UI (dive trajectory preview)"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 2: ROLE OBJECTIVE FUNCTION
# ─────────────────────────────────────────────────────────────────────────────

RoleObjective:
  Type: burst_dps_through_altitude_commitment
  PrimaryMetric: damage_per_dive_cycle
  SecondaryMetric: dive_accuracy_and_aoe_coverage
  TertiaryMetric: ground_state_sustained_dps

  Constraints:
    - "total_DPS >= DPS_reference × 0.95 when aerial cycle is available (open sky)"
    - "total_DPS >= DPS_reference × 0.60 in ground-locked state (caves, indoors)"
    - "dive_commit_accuracy >= 80% at Experienced tier (4 out of 5 dives hit optimal target)"
    - "ground_uptime minimized — re-ascend as fast as possible after each dive"
    - "NO fixed rotation cadence — dive when the READ is right, not on a timer"

  DPSModel:
    OptimalCycle: >
      Ascend (2-4s, building altitude) → Read (variable, choosing target/angle) →
      Commit Dive (instant — trajectory locked) → Dive Travel (0.5-1.5s depending
      on altitude) → Impact (burst damage resolves) → Ground Recovery (6-10s,
      weapon combos + evasion) → Re-Ascend (2s cast, interruptible) → Repeat.
      Full cycle: 12-18s depending on altitude built and ground recovery duration.
    GroundStateDPS: >
      While grounded: weapon-based sustained damage at ~55-60% of full-cycle DPS.
      This is NOT zero — elemental/poison weapons provide real output. But the
      class is DESIGNED to spend as little ground time as possible. Ground DPS is
      the "consolation prize" for being stuck below, not the primary output mode.
    DiveBurstDPS: >
      Dive impact damage is FRONT-LOADED — huge single hit (or cleave) that
      represents the entire altitude investment. Higher altitude = higher damage.
      A maximum-altitude dive should deal 500-700p (ClassUltimate band) to primary
      target with 40-60% splash to secondary targets in AoE radius.

  TargetDPS:
    FullCycle_OpenSky: "100% of DPS reference (this is a DPS class at full effectiveness)"
    PartialCeiling: "80-85% of DPS reference (medium altitude available, shorter dives)"
    GroundLocked: "55-60% of DPS reference (no flight, weapon-only mode)"
    # Ground-locked is the WEAKNESS — intentional. Caves and low ceilings
    # reduce Strix to weapon-specialist DPS. Still functional, but below average.
    # This is the environmental counterplay: you can't always be in open sky.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 3: CLASS MECHANIC — ALTITUDE SYSTEM
# ─────────────────────────────────────────────────────────────────────────────

ClassMechanic:
  Type: continuous_resource_with_state_transitions
  Name: "Altitude Gauge"
  Description: >
    Altitude is a CONTINUOUS resource from 0 (grounded) to 100 (maximum ceiling).
    It represents the Strix's current height above the battlefield. Higher altitude
    = more potential energy = more devastating dives. Altitude builds during ascent,
    holds during hover/glide, and CONVERTS INTO DAMAGE during dives.
    The system creates three distinct states: Aerial (above 0, building/holding),
    Dive (committed, descending, trajectory fixed), and Ground (0 altitude,
    weapon-based combat).

  # ─────────────────────────────────────────────────────────────────────────
  # ALTITUDE GAUGE MECHANICS
  # ─────────────────────────────────────────────────────────────────────────

  AltitudeGauge:
    Maximum: 100
    Minimum: 0
    Unit: "Altitude Units (AU) — abstract, not meters. 100 AU = maximum combat ceiling."
    DisplayType: vertical_bar  # Tall narrow gauge that fills upward (feels like height)
    BuildRate: "10 AU/s during powered ascent (active flight, costs Wing Stamina)"
    PassiveDrain: "0 AU/s while hovering (Wing Stamina drains instead)"
    DiveConversion: "Altitude consumed → Dive Potency (see DiveFormula)"

  AltitudeStates:
    Ground:
      Range: "0 AU"
      Movement: "Full ground movement (SPD 15 base)"
      Actions: "Ground weapon combos, low hops (10 AU micro-jumps), wall-jumps"
      DiveAvailable: false
      Vulnerability: "Standard — must use dashes for evasion frames"
      Description: >
        Grounded state. The Strix fights with elemental/poison weapons, uses
        dashes (with guaranteed evasion frames) for defense, and seeks
        opportunities to re-ascend. Ground is WEAKER but FUNCTIONAL.
        Low hops (10 AU) maintain the altitude THEME — quick pops upward
        for short glides, aerial weapon strikes, and repositioning. These
        are NOT dives — they're mobility tools that keep the Strix feeling
        like an aerial class even when ceiling-locked.

    LowAltitude:
      Range: "1-30 AU"
      Movement: "Aerial movement (horizontal flight at altitude)"
      Actions: "Shallow dives (low potency), aerial weapon throws, glide attacks"
      DiveAvailable: true  # But weak — low altitude = low damage
      Vulnerability: "Reduced — melee cannot reach. Ranged/anti-air CAN reach."
      Description: >
        Low flight. Safe from melee but exposed to ranged. Shallow dives
        available — lower damage but faster cycle time. This is the
        "skirmish altitude" used in corridors with some ceiling room.
        Quick dives deal 200-300p but allow rapid re-ascent.

    MidAltitude:
      Range: "31-70 AU"
      Movement: "Standard aerial combat altitude"
      Actions: "Standard dives (full potency), aerial maneuvers, target selection"
      DiveAvailable: true
      Vulnerability: "Low — only dedicated anti-air or long-range attacks reach."
      Description: >
        Primary combat altitude. Most dives launch from here. Full battlefield
        visibility, standard dive potency (400-500p range), comfortable Wing
        Stamina economy. The "default" state for an active Strix.

    HighAltitude:
      Range: "71-100 AU"
      Movement: "Maximum altitude — slow horizontal movement, maximum vision"
      Actions: "Maximum-power dives, extended reconnaissance, AoE targeting"
      DiveAvailable: true
      Vulnerability: "Minimal — almost nothing reaches. But Wing Stamina drains fast."
      Description: >
        Maximum combat ceiling. Devastating dive potency (500-700p) but
        expensive to maintain (Wing Stamina drain accelerates above 70 AU).
        Used for maximum-impact dives when the READ is perfect. Not sustainable
        for extended hovering — get up, READ, commit, dive. Don't linger.

  # ─────────────────────────────────────────────────────────────────────────
  # WING STAMINA (Flight Fuel)
  # ─────────────────────────────────────────────────────────────────────────

  WingStamina:
    Maximum: 100
    Description: >
      Wing Stamina fuels flight. It drains during ascent and hover, regenerates
      on the ground and during descent. This is NOT a damage resource — it's
      a FLIGHT ECONOMY resource. Running out of Wing Stamina forces landing
      (cannot maintain altitude). The Strix must manage flight time vs. ground
      recovery to maintain the dive cycle.
    DrainRates:
      Ascent: "8 Stamina/s (powered climbing — most expensive)"
      Hover: "3 Stamina/s (maintaining altitude — moderate)"
      HighAltitude_Bonus: "+3 Stamina/s above 70 AU (thin air penalty — high alt is expensive)"
      GlideDown: "0 Stamina/s (descending without power — free)"
      Dive: "0 Stamina/s (committed dive — free, gravity does the work)"
    RegenRates:
      Grounded: "12 Stamina/s (full ground regen)"
      Descent: "6 Stamina/s (regen starts on descent — NOT just grounded)"
      # CRITICAL: Regen starts the MOMENT you commit downward.
      # This means the dive itself is already recovering stamina.
      # The cycle feels smooth: ascend (drain) → hover (drain) → dive (regen starts)
      # → ground (full regen) → re-ascend. No "wait on ground for stamina" dead time
      # if dives are timed well.
      InCombat_Ground: "10 Stamina/s (slightly reduced — still fast)"
    EmptyPenalty: >
      At 0 Wing Stamina: Strix MUST land. Cannot hover, cannot ascend.
      Glide-down is automatic (gentle descent, not a fall). The Strix is
      grounded until Stamina reaches 30+ (re-ascend threshold). This is the
      "overstayed in the air" punishment — plan your flight economy.
    DesignPhilosophy: >
      Wing Stamina prevents infinite airtime. The Strix MUST cycle between
      air and ground. This is a FEATURE, not a limitation — the ground
      weapon gameplay exists because Wing Stamina forces landing. Without
      it, optimal play would be "never land" which removes half the class.

  # ─────────────────────────────────────────────────────────────────────────
  # DIVE SYSTEM (The Commitment)
  # ─────────────────────────────────────────────────────────────────────────

  DiveSystem:
    Name: "Raptor Dive"
    Description: >
      The core class-defining action. From any altitude above 10 AU, the Strix
      commits to a fixed-trajectory dive that converts ALL current altitude
      into kinetic force at the point of impact. Once committed, trajectory
      is LOCKED — cannot be aborted, redirected, or modified. The dive is a
      promise: where you aimed is where you'll hit.
    CommitCondition: "Altitude >= 10 AU AND Wing Stamina > 0 AND valid target selected"
    TrajectoryLock: >
      On commit: dive direction, angle, and landing point are FIXED. The Strix
      follows a straight-line path from current position to impact point.
      No mid-air correction. No abort. No redirect. Smart enemies who MOVE
      after commit can cause a miss (dive hits empty ground). This is the
      core risk: the target must still be there when you arrive.
    TravelTime:
      FromLowAlt: "0.4s (nearly instant — but low damage)"
      FromMidAlt: "0.8s (standard dive speed)"
      FromHighAlt: "1.2s (longest travel — highest damage, most time for target to move)"
      DesignNote: >
        Higher altitude = more damage but more travel time = more time for
        the target to dodge. This is the fundamental tradeoff. Safe dives
        from low altitude deal less damage but are nearly undodgeable.
        Maximum dives from high altitude are devastating but telegraphed.
    ImpactMechanics:
      PrimaryTarget: "Full potency to the target at impact center"
      AoESplash: "60% potency in 4m radius around impact point"
      GroundEffect: "Impact crater persists 6s — slows enemies by 30% in radius (terrain deformation)"
      SelfEffect: "Strix is GROUNDED at impact point. Cannot immediately re-ascend."
      GroundedDuration: "6s minimum before re-ascend becomes available (reduced by Rank)"

  DiveFormula:
    BasePotency: 150  # Minimum dive from 10 AU (barely a pounce)
    AltitudeScaling: "+(Altitude × 5) potency"
    # 10 AU: 150 + 50 = 200p (shallow pounce)
    # 30 AU: 150 + 150 = 300p (low dive)
    # 50 AU: 150 + 250 = 400p (standard dive)
    # 70 AU: 150 + 350 = 500p (heavy dive)
    # 100 AU: 150 + 500 = 650p (maximum impact — ClassUltimate band)
    MomentumNote: >
      This is MOMENTUM damage, not STR damage. STR 6 is irrelevant to dive
      potency. The formula is altitude → gravitational acceleration → kinetic
      energy at impact. The Strix doesn't HIT hard with muscles — the Strix
      FALLS hard with physics. This is why STR is dump stat: dive damage
      comes from HEIGHT, not from arms.
    CritCondition: >
      Dives crit when target is above 50% HP (>50% rule applied as: enemies
      above 50% HP take +25% damage from dives specifically). See Section 14.
    AoECoverage: "4m radius splash. More enemies in radius = more total damage dealt."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 4: GROUND STATE — WEAPON IDENTITY & ELEMENTAL SYSTEM
# ─────────────────────────────────────────────────────────────────────────────

GroundState:
  Philosophy: >
    The Strix on the ground is a DIFFERENT class expression — weaker but
    FUNCTIONAL. NOT helpless. NOT a sitting duck waiting to fly again.
    Ground Strix uses elemental/poison weapons because STR 6 means personal
    physical force cannot generate meaningful damage. The weapon COMPENSATES
    for what the body lacks. Ground state maintains the ALTITUDE THEME through
    low hops, wall-jumps, and short glides — you're always trying to be
    slightly off the ground even when you can't fully fly.

  # ─────────────────────────────────────────────────────────────────────────
  # WEAPON IDENTITY: STORM TALONS (Elemental/Poison Short Blades)
  # ─────────────────────────────────────────────────────────────────────────

  WeaponSystem:
    Name: "Storm Talons"
    Type: dual_short_blades_clawed
    Description: >
      Paired short blades shaped like raptor talons — curved, lightweight,
      designed for slashing passes rather than sustained clashes. The blades
      themselves are weak (STR 6 = negligible physical force behind swings).
      ALL meaningful ground damage comes from WEAPON PROPERTIES: elemental
      infusions (wind/lightning primary, poison secondary) that activate on
      contact regardless of swing force. The Strix doesn't SLASH hard —
      the Strix TOUCHES and the weapon does the rest.
    PhysicalDamage: "Negligible (STR 6 × blade weight = minimal impact force)"
    ElementalDamage: "Primary damage source — infused wind/lightning on every hit"
    PoisonDamage: "Secondary — toxin coatings applied through even light contact"
    DesignNote: >
      Storm Talons solve the STR 6 problem elegantly: the weapon doesn't NEED
      force to deal damage. A feather-light scratch that delivers concentrated
      lightning or neurotoxin is just as lethal as a heavy slash. This is why
      Featherin CAN be a DPS class despite minimal strength — the damage vector
      shifts from muscle force to weapon enchantment delivery.

    ElementalIdentity:
      Primary: wind_lightning
      Secondary: poison_neurotoxin
      Thematic: >
        Wind/lightning = aerial predator theme. Lightning strikes FROM ABOVE.
        Wind cuts without mass. These elements thematically match a creature
        of the sky. Poison/neurotoxin = predator efficiency: the raptor that
        doesn't need to overpower prey because a single talon-scratch delivers
        lethal toxin. Efficiency over brute force.
      MechanicalRole:
        Wind: "Bonus damage to airborne/elevated targets. Extends glide distance. Enhances dash speed."
        Lightning: "Primary ground DPS element. Arcs between nearby targets (miniature AoE). Stuns on crit."
        Poison: "DoT application. Stacks with repeated hits. Allows disengage-and-wait damage (hit → leave → poison ticks while re-ascending)."
        Infusion: >
          Storm Talons cycle between Wind and Lightning infusion states.
          Poison is a COATING applied separately (resource cost). The Strix
          manages which element is active and when to apply poison coating
          for maximum combined damage.

    InfusionCycling:
      Name: "Stormweave"
      Description: >
        Storm Talons alternate between Wind-infused and Lightning-infused states.
        Wind state: faster attacks, longer dash distance, more evasive.
        Lightning state: harder hits, arc damage to nearby targets, stun potential.
        The Strix cycles between states using a simple toggle (oGCD, no cooldown)
        — choosing which element to emphasize based on current needs.
      WindState:
        AttackSpeed: "+15% (lighter element = faster swings)"
        DashBonus: "+2m dash distance, +0.1s evasion frame duration"
        DamageProfile: "Lower per-hit, higher sustained through speed"
        BestFor: "Evasive gameplay, multiple weak enemies, survival priority"
      LightningState:
        AttackSpeed: "Base"
        ArcDamage: "30% of hit damage arcs to 1 nearby enemy within 4m"
        StunOnCrit: "Crits apply 0.5s micro-stun (interrupts, doesn't disable)"
        DamageProfile: "Higher per-hit, chain potential, burst windows"
        BestFor: "Grouped enemies, burst damage, interrupt needs"
      SwitchCost: "oGCD (0.6s animation lock). No cooldown. Switch freely."

    PoisonCoating:
      Name: "Neurotoxin Sheath"
      Description: >
        Applied as a buff (oGCD, 15s cooldown, lasts 20s or 5 hits whichever first).
        While active, each weapon hit applies 1 stack of Neurotoxin. Stacks
        independently of elemental infusion (poison + wind OR poison + lightning).
        Neurotoxin ticks for damage AND provides a utility debuff.
      StackMax: 5
      DamagePerTick: "25p per 3s per stack (at 5 stacks: 125p per 3s = 41.7 PPS)"
      Duration: "12s per application (refreshes on new stack)"
      DebuffEffect: "At 3+ stacks: target attack speed reduced by 10% (neurotoxin slowing motor function)"
      AtMaxStacks: "At 5 stacks: target accuracy reduced by 15% (neurotoxin affecting coordination)"
      DesignNote: >
        Poison is the Strix's ground-state sustained damage. Apply stacks →
        re-ascend → poison ticks while climbing → dive with full altitude →
        poison still running on target. The "hit and run" predator pattern.
        Land → slash-slash-slash (3 hits, 3 stacks) → re-ascend → poison
        ticks for 12s while you rebuild altitude → dive → repeat. Poison
        bridges the gap between ground contact and next dive impact.

  # ─────────────────────────────────────────────────────────────────────────
  # GROUND MOVEMENT — ALTITUDE THEME PRESERVED
  # ─────────────────────────────────────────────────────────────────────────

  GroundMovement:
    Philosophy: >
      Even grounded, the Strix FEELS aerial. Low hops, wall-jumps, short glides
      from elevated surfaces — the altitude THEME is maintained through movement
      options that keep the Strix slightly off the ground. This is NOT full flight.
      It's the Strix refusing to be fully terrestrial. These movement tools provide
      TACTICAL options (avoid ground AoE, reach ledges, create angles) without
      replacing the full altitude system.
    LowHop:
      Name: "Thermal Kick"
      Height: "10 AU (micro-jump — head height above enemies)"
      Duration: "1.2s airtime"
      ActionsDuring: "1 aerial weapon strike OR 1 aerial throw"
      Cooldown: "4s"
      StaminaCost: "5 Wing Stamina"
      UseCases:
        - "Dodge ground AoE (hop over sweeps, explosions)"
        - "Aerial weapon strike (overhead slash with gravity assist — +20% potency)"
        - "Re-position over enemies (hop + glide = short relocation)"
        - "Maintain altitude FEELING while ceiling-locked"
    WallJump:
      Name: "Crag Launch"
      Requirement: "Adjacent to vertical surface (wall, pillar, cliff)"
      Effect: "Launch off wall at 45° angle, reaching 20 AU momentarily"
      Duration: "1.5s airtime"
      ActionsDuring: "1 aerial strike OR begin shallow dive (if 20+ AU)"
      Cooldown: "6s"
      StaminaCost: "8 Wing Stamina"
      UseCases:
        - "Indoor/cave environment substitute for full ascent"
        - "Combo: wall-jump → shallow dive (quick burst in corridors)"
        - "Escape: wall-jump away from melee pursuer"
        - "Reach elevated positions (ledges, platforms)"
    ShortGlide:
      Name: "Windcoast"
      Requirement: "Any altitude above 5 AU (including post-hop/wall-jump)"
      Effect: "Horizontal glide maintaining current altitude. No stamina cost."
      Duration: "Up to 3s (then gentle descent begins)"
      Speed: "120% ground movement speed"
      ActionsDuring: "Thrown weapons only (no melee during glide)"
      UseCases:
        - "Extend hop/wall-jump airtime for repositioning"
        - "Cross gaps, avoid floor hazards"
        - "Thrown weapon harassment during transit"

  # ─────────────────────────────────────────────────────────────────────────
  # GROUND COMBAT IDENTITY (Weaker but Functional)
  # ─────────────────────────────────────────────────────────────────────────

  GroundCombatIdentity:
    PowerLevel: "55-60% of full aerial cycle DPS"
    Fantasy: >
      The raptor on the ground is still a predator — just not at apex efficiency.
      Think a falcon that landed in a clearing: still fast, still armed with
      talons and venom, still dangerous. But not in its element. The Strix on
      the ground fights like a skirmisher: fast dashes, light cuts, poison
      application, and constant movement. The goal is ALWAYS to return to the
      sky — ground time is transition time, not preferred time.
    Strengths:
      - "Evasion dashes with guaranteed i-frames (unhittable during dash)"
      - "Poison DoT application (damage persists after re-ascend)"
      - "Lightning arc damage (mini-AoE without dive commitment)"
      - "SPD 15 base movement (outrun most enemies without dashing)"
      - "Low hops and wall-jumps keep partial altitude access"
    Weaknesses:
      - "No burst damage (dive is unavailable without altitude)"
      - "No large AoE (splash requires dive impact)"
      - "Fragile HP pool (hollow bones — limited hit absorption)"
      - "STR 6 means weapon damage is ONLY from elements/poison (no raw hits)"
      - "Extended ground time means Wing Stamina is recovering, not contributing"
    IndoorAdaptation: >
      In caves, corridors, and low-ceiling environments, the Strix operates
      primarily in ground mode with occasional wall-jumps and low hops for
      shallow dives (200-300p). This is the INTENTIONAL WEAKNESS: environments
      that remove altitude remove the Strix's apex power. The class is still
      functional (55-60% DPS) but is below-average in these conditions.
      Party composition should account for this — don't bring a Strix to a
      dungeon that's 100% narrow tunnels unless you accept reduced output.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 5: EVASION SYSTEM — DASHES & INVULNERABILITY FRAMES
# ─────────────────────────────────────────────────────────────────────────────

EvasionSystem:
  Philosophy: >
    EVA/DEX is the Strix's PRIMARY DEFENSIVE STAT. The class fantasy is
    "fragile but UNTOUCHABLE when moving." This is NOT chance-based dodge
    (no dice roll, no RNG). Dashes provide GUARANTEED evasion frames —
    during a dash, the Strix CANNOT be hit. Period. The player FEELS
    untouchable because they ARE untouchable during movement abilities.
    This is the defensive identity: you don't ABSORB hits (low HP, hollow
    bones). You AVOID them entirely through motion. Getting hit means you
    FAILED — you didn't dash, you were too slow, you got caught standing.

  # ─────────────────────────────────────────────────────────────────────────
  # CORE EVASION PRINCIPLE
  # ─────────────────────────────────────────────────────────────────────────

  CorePrinciple:
    Name: "Kinetic Invulnerability"
    Rule: >
      ALL dash abilities grant guaranteed invulnerability frames (i-frames).
      During a dash, the Strix is IMMUNE to all damage and targeting. Not
      "high evasion chance." Not "damage reduction." IMMUNE. The dash IS the
      defense. If you dash through an attack, it misses. Always. 100%.
    Justification: >
      The Strix has LOW HP (hollow bones), LOW physical defense (light frame),
      and NO shield/parry mechanics. The ONLY defense is "don't be there."
      Guaranteed i-frames make this feel reliable — the player trusts that
      dashing = safety. Compare to Madolt (parry — timing based, BLOCKS damage)
      or Adafold (Force Target — REDIRECTS damage to self with mitigation).
      Strix simply ISN'T where the damage lands.
    StatInteraction:
      DEX: "Higher DEX = longer i-frame duration per dash (base 0.3s → cap 0.5s)"
      EVA: "Higher EVA = shorter dash cooldown (base 4s → cap 2.5s)"
      SPD: "Higher SPD = longer dash distance (base 6m → cap 10m)"
    DesignNote: >
      This creates a FEEL difference between undergeared and geared Strix:
      - Fresh Strix: 0.3s i-frames, 4s between dashes, 6m distance.
        Must be more precise with timing. Tighter windows.
      - BiS Strix: 0.5s i-frames, 2.5s between dashes, 10m distance.
        Generous windows, rapid chaining, covers ground fast.
        FEELS untouchable. THIS is the endgame class fantasy realized.

  # ─────────────────────────────────────────────────────────────────────────
  # DASH ABILITIES
  # ─────────────────────────────────────────────────────────────────────────

  Dashes:
    - Name: "Slipstream"
      ID: slipstream
      Type: oGCD
      AnimationLock: 0.4s
      Cooldown: "4s base (scales with EVA → 2.5s cap)"
      Charges: 2
      Distance: "6m base (scales with SPD → 10m cap)"
      IFrameDuration: "0.3s base (scales with DEX → 0.5s cap)"
      Direction: "Directional (forward/back/left/right based on input)"
      DamageOnDash: "0 (pure defensive — evasion only)"
      DesignNote: >
        Primary defensive dash. Two charges allow back-to-back evasion.
        Pure defensive tool — no damage, no buff, just invulnerability
        and repositioning. This is the "oh shit" button and the movement
        tool simultaneously. Fast enough to weave between GCDs.

    - Name: "Tailwind Rush"
      ID: tailwind_rush
      Type: oGCD
      AnimationLock: 0.5s
      Cooldown: "8s base (scales with EVA → 6s cap)"
      Charges: 1
      Distance: "10m base (scales with SPD → 14m cap)"
      IFrameDuration: "0.5s base (scales with DEX → 0.7s cap)"
      Direction: "Forward only (longer distance, longer i-frames)"
      DamageOnDash: "40p wind damage to all enemies in path"
      BonusEffect: "Grants 'Tailwind' buff for 4s: +20% movement speed"
      DesignNote: >
        Aggressive dash — covers more ground, deals minor damage, leaves
        a speed buff. Used for engaging, re-positioning toward re-ascend
        points, or escaping with style. Longer i-frames reward committing
        to the forward direction.

    - Name: "Feather Fade"
      ID: feather_fade
      Type: oGCD
      AnimationLock: 0.3s  # Shorter lock — faster recovery
      Cooldown: "12s base (scales with EVA → 8s cap)"
      Charges: 1
      Distance: "4m (short — this is a BACKWARDS escape)"
      IFrameDuration: "0.6s (longest — pure defense tool)"
      Direction: "BACKWARD only (away from target)"
      DamageOnDash: "0"
      BonusEffect: "Leaves behind 'Downdraft' at origin point — 2m radius slow (30%) for 4s"
      DesignNote: >
        Escape-only dash. Short distance but LONGEST i-frames and backward
        direction. Used when caught in melee and needing to disengage.
        The slow field left behind prevents chase. This is the "get off me"
        tool that creates space for re-ascend.

  # ─────────────────────────────────────────────────────────────────────────
  # AERIAL EVASION (Different rules while flying)
  # ─────────────────────────────────────────────────────────────────────────

  AerialEvasion:
    PassiveEvasionBonus: "+25% passive evasion chance while above 30 AU (anti-air attacks still possible but less accurate)"
    DashesInAir: "Ground dashes are REPLACED by aerial barrel roll while airborne"
    BarrelRoll:
      Name: "Barrel Roll"
      Type: oGCD
      AnimationLock: 0.3s
      Cooldown: "3s (faster cycle in air — air is the Strix's element)"
      Distance: "8m lateral displacement"
      IFrameDuration: "0.4s"
      Direction: "Lateral (left/right — evade anti-air projectiles)"
      StaminaCost: "3 Wing Stamina"
      DesignNote: >
        Aerial evasion tool. When anti-air attacks come (arrows, spells,
        ranged enemies targeting the Strix), barrel roll provides lateral
        displacement with i-frames. Costs Wing Stamina — can't spam
        indefinitely. Represents the Strix's aerial agility.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 6: BARRIER SYSTEM — FEATHERWARD
# ─────────────────────────────────────────────────────────────────────────────

BarrierSystem:
  Philosophy: >
    The Strix's defensive plan is "don't get hit." Dashes and i-frames are
    the PRIMARY defense. But reality isn't perfect — sometimes you get caught,
    sometimes AoE is undodgeable, sometimes you're mid-animation. The barrier
    is the EMERGENCY BACKUP, not the plan. It exists so that the ONE hit you
    fail to dodge doesn't instantly kill you (hollow bones = low HP). The
    barrier says: "I made a mistake, but I get ONE free pass before I die."

  # ─────────────────────────────────────────────────────────────────────────
  # FEATHERWARD (Barrier + Bonus DR)
  # ─────────────────────────────────────────────────────────────────────────

  Featherward:
    Name: "Featherward"
    Type: barrier_with_dr_bonus
    Description: >
      A wind-element barrier that absorbs damage AND provides bonus damage
      reduction while active. NOT a "tanking" tool — this is a safety net.
      When the barrier is UP, the Strix takes reduced damage from whatever
      hits slip through. When the barrier BREAKS, the DR goes away and the
      Strix is fully exposed. The message: "Your barrier bought you time.
      Now MOVE or die."
    BarrierHP: "20% of Strix maximum HP (refreshes on re-ascend)"
    BonusDR: "25% damage reduction while barrier HP remains > 0"
    Duration: "Until broken (no time limit — persists as long as barrier HP exists)"
    RefreshCondition: "Barrier FULLY refreshes when Strix ascends above 30 AU"
    BreakPenalty: "When barrier breaks: 3s vulnerability window (no barrier, no DR, cannot refresh)"
    CombinedEffect: >
      With barrier active: incoming 100 damage → 75 after DR → absorbed by barrier.
      Effective barrier absorbs ~27% of max HP worth of pre-DR damage.
      This means the Strix can survive 1-2 hits that would otherwise chunk them.
      After those hits: barrier broken → must re-ascend to refresh → cycle continues.
    DesignNote: >
      REMOVED Feathercloak (physical damage absorption) because it conflicted
      with the class fantasy. The Strix does NOT want to tank hits. Absorbing
      physical damage implies "getting hit is okay" — wrong message. Featherward
      says "getting hit is BAD but won't instantly kill you IF you react fast."
      The DR exists so the barrier lasts longer per hit (stretches the safety net).
      The refresh-on-ascend creates a micro-reward for returning to the sky:
      "go up = get your barrier back = become safe again." Reinforces the
      altitude cycle.
    ThematicNote: >
      Wind barrier — fits aerial theme. Feathers condensed into a swirling
      shield of compressed air and plumage. Looks fragile (because it is).
      Breaks dramatically (feathers scatter on break = visual "oh no" moment).
      Refreshes with a "feathers reconverge" animation on ascent.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 7: RECOVERY SYSTEM — DESCENT REGENERATION
# ─────────────────────────────────────────────────────────────────────────────

RecoverySystem:
  Philosophy: >
    Recovery begins the MOMENT the Strix commits downward — during the dive
    descent itself. NOT "land first, then recover." The DESCENT IS recovery.
    This makes the full dive cycle feel smooth and rewarding:
    Ascend (spending resources, building altitude) → Hover (spending stamina,
    reading battlefield) → Commit Dive (regen STARTS here) → Descent (regen
    active, stamina recovering) → Impact (damage resolves, HP recovering) →
    Ground (regen continues briefly) → Re-Ascend (regen tapers, new cycle).
    The dive is not just an attack — it's the transition that HEALS you.

  # ─────────────────────────────────────────────────────────────────────────
  # DESCENT REGENERATION
  # ─────────────────────────────────────────────────────────────────────────

  DescentRegen:
    Name: "Thermal Recovery"
    TriggerCondition: "Strix altitude is DECREASING (any downward movement)"
    Effect: "HP regeneration active during all descent (dive, glide-down, hop landing)"
    RegenRate: "3% max HP per second during descent"
    DiveDescent: >
      During committed dive: regen is active for the full travel time.
      High-altitude dive (1.2s travel) = 3.6% HP recovered during descent.
      Mid-altitude dive (0.8s travel) = 2.4% HP recovered during descent.
      Not massive — but combined with ground continuation, it adds up.
    GroundContinuation: >
      After landing from a dive, Thermal Recovery continues for 4s on the
      ground (tapering: 3% → 2% → 1% → 0% over 4s). This means the dive
      cycle naturally includes recovery time. You don't need to "wait around
      to heal" — the act of diving and the brief ground time afterward IS
      your healing window.
    GlideDescent: >
      Gliding downward (passive descent after hover ends) also triggers
      Thermal Recovery at half rate (1.5% max HP per second). This means
      running out of Wing Stamina (forced glide-down) isn't purely punishing
      — you at least recover HP during the uncontrolled descent.
    AscendCancellation: >
      Regen STOPS immediately on any UPWARD movement. Ascending is a
      resource-spending phase, not a recovery phase. The cycle is:
      Up = spend (stamina, HP not recovering)
      Down = recover (HP regen, stamina regen)
      This creates a satisfying rhythm: sacrifice to climb, reward on descent.
    DesignNote: >
      Descent regen solves the "land and wait" problem. Without it, the Strix
      would need to find safe ground and wait for natural HP recovery between
      dives. With it, THE DIVE ITSELF IS THE RECOVERY PHASE. The highest-skill
      Strix players chain dives rapidly because each dive is ALSO healing them.
      The cycle becomes self-sustaining: dive → damage + heal → ground combo →
      ascend → dive again. No downtime. No standing around. Always cycling.

  # ─────────────────────────────────────────────────────────────────────────
  # HP POOL & SURVIVABILITY CONTEXT
  # ─────────────────────────────────────────────────────────────────────────

  SurvivabilityProfile:
    HPPool: "70% of standard DPS HP (hollow bones = physically fragile)"
    BaseDefense: "Lowest physical defense in the game (light frame, no armor mass)"
    EffectiveHP: >
      Despite low raw HP, EFFECTIVE survivability is competitive because:
      1. Featherward barrier (20% max HP shield + 25% DR) absorbs first mistakes
      2. Guaranteed i-frame dashes avoid damage entirely
      3. Descent regen recovers HP naturally through the dive cycle
      4. Altitude removes Strix from most damage sources (melee can't reach)
      5. SPD 15 = outrun most enemies when forced to ground
      Combined: a skilled Strix takes LESS total damage than a high-HP class
      because most damage never connects. But when it DOES connect, it hurts.
    OneShot_Threshold: "Single hits above 40% Strix max HP = lethal territory"
    DesignNote: >
      This creates a binary survivability profile: either the Strix avoids
      damage (fine) or takes it (probably dead). There's no "tanking through"
      sustained damage. You dodge everything or you die. The barrier gives
      ONE mistake buffer. After that, it's move or die.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 8: GCD SKILL ROSTER — AERIAL STATE
# ─────────────────────────────────────────────────────────────────────────────

Skills:
  AerialState:
    Philosophy: >
      Aerial GCDs are PREPARATION and RECONNAISSANCE tools. While airborne,
      the Strix isn't dealing sustained damage — they're SETTING UP the dive.
      These skills mark targets, calculate AoE paths, apply pre-dive debuffs
      (from altitude), and manage the dive trajectory preview. The "rotation"
      in the air is: ascend → use 1-2 prep GCDs → read → commit dive.
      Air time is SHORT and PURPOSEFUL, not idle hovering.

    - Name: "Raptor Mark"
      ID: raptor_mark
      ActionType: GCD
      CastTime: 0s  # Instant
      Recast: 2.0s
      TargetType: single_enemy_from_altitude
      DamageType: none  # Setup skill, not damage
      Potency: 0
      Effect: >
        Marks target for dive. Marked target has dive trajectory preview shown
        to Strix player (landing point indicator, AoE radius preview, travel
        time estimate). Mark persists 15s or until dive lands. Only 1 mark active.
        BONUS: Marked target takes +10% damage from next dive impact (precision bonus).
      Range: "Line of sight from altitude (effectively unlimited if visible)"
      StaminaCost: 0
      UsagePriority:
        PreDive: high  # Always mark before diving for the +10% bonus
        Scouting: medium  # Mark to track a target's movement pattern
      Description: >
        The targeting phase of pre-calculation. Mark shows you exactly where
        your dive will land, who it will hit, and what the splash radius covers.
        The +10% bonus rewards DELIBERATE targeting over snap-decisions.
      RankRequired: 1

    - Name: "Windshear Bolt"
      ID: windshear_bolt
      ActionType: GCD
      CastTime: 0s  # Instant
      Recast: 2.0s
      TargetType: single_enemy_from_altitude
      DamageType: wind_elemental
      Potency: 80  # Moderate — ranged harassment from altitude
      Effect: "Wind-element bolt fired downward. Applies 'Windshear' debuff: -15% movement speed for 6s."
      Range: "25m (from altitude — drops downward)"
      StaminaCost: 2
      UsagePriority:
        PreDive: high  # Slow target before diving so they can't dodge
        Harassment: medium  # Chip damage while reading
      Description: >
        Aerial poke. Deals moderate damage and slows the target — setting up
        the dive by reducing their ability to escape the impact zone. The
        pre-calculation class uses this to ENSURE the target stays put.
      RankRequired: 1

    - Name: "Screech"
      ID: screech
      ActionType: GCD
      CastTime: 0s  # Instant
      Recast: 2.0s
      TargetType: cone_from_altitude
      ConeAngle: 120_degrees
      ConeRange: 15m  # Downward cone from altitude
      DamageType: wind_sonic
      Potency: 50  # Per target
      Effect: >
        Sonic screech from altitude. Hits all enemies in cone below. Applies
        'Startled' debuff for 3s: enemies cannot use movement abilities
        (no dashes, no charges, no retreats). They can still walk — but
        cannot ESCAPE quickly. Sets up dive on clustered enemies.
      Range: "15m downward cone"
      StaminaCost: 3
      CritCondition: "Crits if 3+ enemies hit (formation disruption bonus)"
      UsagePriority:
        PreDive: high  # Lock down escape routes before committing
        AoESetup: high  # Pin enemies in place for AoE dive
      Description: >
        The "freeze them in place" setup. Screech prevents dashes and charges
        for 3s — enough time to commit a dive onto targets that CANNOT
        dodge the incoming trajectory. The pre-calculation safety net.
      RankRequired: 1

    - Name: "Galefeather Toss"
      ID: galefeather_toss
      ActionType: GCD
      CastTime: 0s  # Instant
      Recast: 2.0s
      TargetType: single_enemy_from_altitude
      DamageType: wind_physical
      Potency: 100
      Effect: >
        Throws a razor-edged feather projectile downward. Wind-element physical
        damage. If target is already affected by Windshear: bonus 40p (total 140p).
        Feather lodges in target for 8s — during this time, Strix can see
        target through walls/obstacles (tracking feather).
      Range: "30m (long-range snipe from high altitude)"
      StaminaCost: 1
      UsagePriority:
        Harassment: high  # Best air-to-ground damage GCD
        Tracking: high  # Feather-tracking prevents losing target
      Description: >
        Primary aerial damage GCD. Deals real damage from altitude (not just
        setup). The tracking feather means marked targets can't break line of
        sight to avoid the dive. Excellent for targets that duck behind cover.
      RankRequired: 1

    - Name: "Thermal Spiral"
      ID: thermal_spiral
      ActionType: GCD
      CastTime: 1.0s  # Commitment cast — gaining altitude DURING cast
      Recast: 2.0s
      TargetType: self
      DamageType: none
      Potency: 0
      Effect: >
        Rapid altitude gain: +20 AU during the 1.0s cast time. Also restores
        5 Wing Stamina. Used to rapidly reach high altitude OR recover stamina
        while climbing. Cannot be used below 10 AU (must already be airborne).
      Range: self
      StaminaCost: "0 (net POSITIVE — restores 5 stamina)"
      UsagePriority:
        AltitudeRush: high  # When you need to reach high-alt fast for maximum dive
        StaminaRecovery: medium  # Efficient stamina recovery while staying airborne
      Description: >
        The "power climb" GCD. Sacrifices a damage GCD to gain altitude rapidly.
        Used when the READ tells you "this target needs a maximum-altitude dive"
        and you need to get UP fast. The stamina restoration means this is also
        the stamina management tool for extended air time.
      RankRequired: 1

  # ─────────────────────────────────────────────────────────────────────────
  # DIVE STATE GCDs (Commit actions — used DURING or AT dive impact)
  # ─────────────────────────────────────────────────────────────────────────

  DiveState:
    Philosophy: >
      Dive state has VERY LIMITED actions. Once committed, the dive trajectory
      is fixed — the Strix cannot redirect. These skills modify the dive's
      IMPACT (what happens when you hit) but cannot change WHERE you hit.
      They are pre-loaded during the brief dive travel time OR triggered at
      the moment of impact. The dive itself IS the GCD — committing to dive
      locks out normal GCD rotation until impact resolves.

    - Name: "Raptor Dive"
      ID: raptor_dive
      ActionType: GCD  # THE GCD — committing dive IS the GCD action
      CastTime: 0s  # Instant commitment
      Recast: "N/A (altitude-gated, not cooldown-gated)"
      TargetType: ground_point_from_altitude
      DamageType: physical_kinetic
      Potency: "150 + (Altitude × 5) [see DiveFormula]"
      Effect: >
        THE core class action. Commits to fixed-trajectory dive. Converts ALL
        current altitude to kinetic impact damage at landing point. AoE splash
        in 4m radius at 60% potency. Trajectory FIXED on commit — cannot abort.
        On impact: Strix is grounded at impact point. Cannot fly for 6s (Rank 1)
        / 5s (Rank 2) / 4s (Rank 3). Ground state begins.
      Range: "N/A (dive TO selected point)"
      MinimumAltitude: 10  # Cannot dive from below 10 AU
      AoERadius: 4m
      SplashPotency: "60% of primary potency to secondary targets"
      GroundedDuration: "6s / 5s / 4s (by Rank)"
      CritCondition: "Auto-crits against targets above 50% HP (>50% rule — see Section 14)"
      StaminaCost: 0  # Dive is free — gravity does the work
      DesignNote: >
        This is NOT on a cooldown. It's gated by ALTITUDE (must have height
        to convert). You can dive as often as you can build altitude. The
        "cooldown" is the time it takes to re-ascend. This means faster
        Wing Stamina management = more dives per minute = more DPS.
        NO fixed cadence. Dive when the READ is right.
      RankRequired: 1

    - Name: "Piercing Plunge"
      ID: piercing_plunge
      ActionType: GCD  # Alternative dive type — single-target focused
      CastTime: 0s
      Recast: "N/A (altitude-gated)"
      TargetType: single_enemy_from_altitude
      DamageType: physical_kinetic + lightning_elemental
      Potency: "200 + (Altitude × 6) — HIGHER single-target, NO splash"
      Effect: >
        Single-target focused dive. Higher potency than Raptor Dive but NO AoE
        splash. The Storm Talon channels lightning during descent — impact
        delivers kinetic + lightning damage simultaneously. Applies 2 stacks
        of Neurotoxin on hit (talons deliver poison on contact).
      Range: "Single target (must be Raptor Marked OR within 10m of Strix's dive path)"
      MinimumAltitude: 20  # Requires more height for precision dive
      AoERadius: "0 (single target only)"
      SplashPotency: "N/A"
      GroundedDuration: "5s / 4s / 3s (by Rank — shorter due to precision landing)"
      PoisonApplication: "2 Neurotoxin stacks on impact (instant)"
      CritCondition: "Auto-crits if target is Raptor Marked AND above 50% HP"
      DesignNote: >
        The boss-killer dive. When AoE doesn't matter and you need MAXIMUM
        single-target burst, Piercing Plunge sacrifices splash for raw potency.
        The +1 per AU (×6 vs ×5) means at 100 AU: 200 + 600 = 800p (ClassUltimate band).
        Lightning infusion and poison application make the ground follow-up
        stronger (target is already poisoned on landing).
      RankRequired: 2

    - Name: "Scatterfall"
      ID: scatterfall
      ActionType: GCD  # Alternative dive type — wide AoE, lower primary
      CastTime: 0s
      Recast: "N/A (altitude-gated)"
      TargetType: ground_point_from_altitude
      DamageType: physical_kinetic + wind_elemental
      Potency: "100 + (Altitude × 3) — LOWER per-target but MASSIVE AoE"
      Effect: >
        Wide-impact dive. Lower potency per target but 8m radius AoE (double
        standard). Wind element disperses on impact creating a shockwave.
        ALL targets in 8m radius take full potency (not reduced splash).
        Applies Windshear to all targets hit (-15% move speed, 6s).
      Range: "Ground point"
      MinimumAltitude: 30  # Needs height for wide dispersal
      AoERadius: "8m (double standard)"
      SplashPotency: "100% to all targets in radius (no falloff)"
      GroundedDuration: "8s / 7s / 6s (by Rank — longer due to wide-impact recovery)"
      CritCondition: "Crits if 4+ enemies hit (saturation bonus)"
      DesignNote: >
        The trash-pull dive. Lower potency per target but hits EVERYTHING in
        an 8m circle at full damage. At 70 AU: 100 + 210 = 310p to ALL targets.
        Against 6 enemies: 1860p total. Against 1 enemy: only 310p (bad).
        Use Raptor Dive for standard situations, Scatterfall for packs.
        Longer grounded duration is the tradeoff for massive AoE.
      RankRequired: 2

  # ─────────────────────────────────────────────────────────────────────────
  # GROUND STATE GCDs (Weapon combos while grounded)
  # ─────────────────────────────────────────────────────────────────────────

  GroundState:
    Philosophy: >
      Ground GCDs are WEAPON-BASED combat using Storm Talons. Damage comes
      from elemental infusion and poison, NOT from physical force. These are
      WEAKER than the aerial dive cycle but provide continuous DPS during
      the mandatory ground time. The rotation is simple: apply poison, cycle
      elements, look for re-ascend window.

    - Name: "Storm Slash"
      ID: storm_slash
      ActionType: GCD
      CastTime: 0s  # Instant
      Recast: 2.0s
      TargetType: single_enemy_melee
      DamageType: "elemental (wind OR lightning — matches current Stormweave state)"
      Potency: 100  # Base filler
      Effect: "Basic Storm Talon strike. Element matches current infusion. Combo starter."
      Range: 3m  # Short melee range (talons are close-range)
      ComboPosition: 1  # Combo starter
      DesignNote: "The simplest ground GCD. Hit them with whatever element is active."
      RankRequired: 1

    - Name: "Rending Talon"
      ID: rending_talon
      ActionType: GCD
      CastTime: 0s
      Recast: 2.0s
      TargetType: single_enemy_melee
      DamageType: "elemental (wind OR lightning — matches Stormweave)"
      Potency: 130  # Combo 2
      Effect: >
        Follow-up slash. If Wind infused: extends i-frame of next dash by 0.1s.
        If Lightning infused: 30% arc damage jumps to 1 nearby enemy.
      Range: 3m
      ComboPosition: 2  # After Storm Slash
      ComboBonus: "Wind = defensive buff. Lightning = mini-AoE."
      RankRequired: 1

    - Name: "Venom Rake"
      ID: venom_rake
      ActionType: GCD
      CastTime: 0s
      Recast: 2.0s
      TargetType: single_enemy_melee
      DamageType: poison_physical
      Potency: 90  # Lower potency but applies poison
      Effect: >
        Dragging slash that applies 1 Neurotoxin stack regardless of coating
        status. This is the FREE poison application GCD — doesn't require
        Neurotoxin Sheath to be active. Lower potency compensated by poison
        DoT value over time.
      Range: 3m
      ComboPosition: "Any (non-combo, usable anytime)"
      PoisonApplication: "1 Neurotoxin stack (guaranteed)"
      UsagePriority:
        PoisonSetup: high  # Use to establish poison stacks before re-ascending
        FillerWhenCoatingDown: high  # When Neurotoxin Sheath is on CD
      RankRequired: 1

    - Name: "Updraft Cutter"
      ID: updraft_cutter
      ActionType: GCD
      CastTime: 0s
      Recast: 2.0s
      TargetType: single_enemy_melee
      DamageType: wind_physical
      Potency: 150  # Combo finisher
      Effect: >
        Upward slash with wind element. Combo finisher (3rd in chain).
        Launches Strix 5 AU upward on hit (micro-ascent — not full flight
        but gets off the ground momentarily). If in Wind Stormweave: launch
        height doubles to 10 AU.
      Range: 3m
      ComboPosition: 3  # After Rending Talon
      ComboBonus: "Self-launch 5 AU (10 AU in Wind state)"
      DesignNote: >
        The combo finisher that FEEDS BACK into the altitude system. Each
        completed ground combo pops you slightly upward — maintaining the
        altitude theme and gradually building toward re-ascend threshold.
        In Wind state, 3 completed combos = 30 AU = low-dive capable.
        This is how ground-locked Strix still accesses shallow dives.
      RankRequired: 1

    - Name: "Voltaic Strike"
      ID: voltaic_strike
      ActionType: GCD
      CastTime: 0s
      Recast: 2.0s
      TargetType: small_aoe_melee
      AoERadius: 4m
      DamageType: lightning_elemental
      Potency: 120  # AoE ground option
      Effect: >
        Lightning-infused spinning strike. Hits all enemies within 4m.
        Requires Lightning Stormweave state. Each target hit generates
        an arc to one OTHER target (chain lightning effect — up to 3 arcs).
        Arc damage: 40p each.
      Range: 4m  # Centered on self
      ComboPosition: "Any (standalone AoE)"
      Requirement: "Lightning Stormweave active"
      MaxArcs: 3
      ArcDamage: 40p
      DesignNote: >
        Ground AoE option. When surrounded (post-dive landing in a pack),
        Voltaic Strike provides meaningful AoE without needing altitude.
        Combined with poison stacks on multiple targets, this is the
        ground-state pack damage tool.
      RankRequired: 1

    - Name: "Lift Off"
      ID: lift_off
      ActionType: GCD
      CastTime: 2.0s  # Full cast time — interruptible, commitment to re-ascend
      Recast: "N/A (not cooldown-gated — usable when Grounded Duration expires)"
      TargetType: self
      DamageType: none
      Potency: 0
      Effect: >
        Re-ascend action. 2.0s cast launches Strix to 30 AU (low-flight entry).
        INTERRUPTIBLE — if hit during cast, re-ascend fails and cast resets.
        Cannot be used during Grounded Duration (forced ground time after dive).
        Uses dashes BEFORE casting to create safe re-ascend window.
      Range: self
      StaminaRequirement: "30 Wing Stamina minimum (re-ascend threshold)"
      AltitudeGained: 30  # Enter at low-flight (can immediately begin climbing)
      DesignNote: >
        The re-ascend is a COMMITMENT and a VULNERABILITY. 2.0s cast time
        means the Strix must find a safe 2s window on the ground. This is
        WHY ground evasion matters — you need to create space with dashes,
        then safely cast Lift Off. Enemies interrupting Lift Off is the
        primary "stay grounded" punishment that keeps ground time meaningful.
      RankRequired: 1

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 9: oGCD SKILL ROSTER
# ─────────────────────────────────────────────────────────────────────────────

oGCDSkills:
  Philosophy: >
    Strix oGCDs are split between AERIAL UTILITY (dive modifiers, flight
    management) and GROUND SURVIVAL (dashes, barrier, escape tools). Each
    oGCD is weaved between GCDs in the standard single-weave model. Aerial
    oGCDs enhance the dive. Ground oGCDs keep you alive until re-ascend.

  # Dashes are defined in Section 5 (Evasion System) — referenced here:
  DashReference: "See Section 5: Slipstream, Tailwind Rush, Feather Fade, Barrel Roll"

  - Name: "Stormweave Toggle"
    ID: stormweave_toggle
    ActionType: oGCD
    AnimationLock: 0.6s
    Cooldown: "0s (no cooldown — free toggle)"
    TargetType: self
    Effect: "Switch Storm Talon infusion between Wind and Lightning state."
    DesignNote: "Free element swap. Choose based on situation. No cost, no lockout."
    RankRequired: 1

  - Name: "Neurotoxin Sheath"
    ID: neurotoxin_sheath
    ActionType: oGCD
    AnimationLock: 0.6s
    Cooldown: 15s
    Duration: "20s or 5 weapon hits (whichever first)"
    TargetType: self
    Effect: "Next 5 weapon hits apply 1 Neurotoxin stack each (in addition to normal damage)."
    DesignNote: >
      Buff applied before ground engagements. Land → Neurotoxin Sheath →
      5 weapon hits → 5 poison stacks → re-ascend → poison ticks while flying.
    RankRequired: 1

  - Name: "Updraft Burst"
    ID: updraft_burst
    ActionType: oGCD
    AnimationLock: 0.6s
    Cooldown: 30s
    TargetType: self_aoe
    AoERadius: 6m
    Effect: >
      Emergency ground escape. Blasts wind downward — launches Strix 15 AU
      upward AND pushes all enemies within 6m back 4m. Deals 60p wind damage
      to pushed enemies. Can be used DURING Grounded Duration (overrides
      ground-lock for emergency escape only — does NOT grant full flight,
      only the 15 AU pop + glide).
    DesignNote: >
      Panic button. When grounded and surrounded, Updraft Burst creates
      space (pushback) and height (15 AU pop). Not full re-ascend — but
      enough to glide away and find a safe spot for Lift Off.
    RankRequired: 1

  - Name: "Dive Accelerant"
    ID: dive_accelerant
    ActionType: oGCD
    AnimationLock: 0.3s  # Fast — can weave right before dive commit
    Cooldown: 45s
    TargetType: self
    Effect: >
      Next dive within 6s has +30% potency AND 50% reduced travel time.
      Used for priority-target burst (stack with maximum altitude for massive hit)
      OR for reducing dodge window against smart enemies (faster arrival).
    Duration: "6s buff (use it or lose it)"
    DesignNote: >
      The "big hit" amplifier. 45s CD means roughly every 3rd dive can be
      Accelerant-boosted. At 100 AU with Accelerant: 650p × 1.3 = 845p.
      This is the Strix's burst ceiling — used on priority targets (boss
      mechanics, must-die adds, etc.). NOT on cooldown — use when READ demands.
    RankRequired: 2

  - Name: "Feint Dive"
    ID: feint_dive
    ActionType: oGCD
    AnimationLock: 0.4s
    Cooldown: 20s
    TargetType: self
    Effect: >
      Fake commit animation — briefly shows dive trajectory to enemies (AI reads
      it as incoming attack) but immediately cancels. Rank 2+ enemies that
      would dodge a dive are baited into moving (dodge reaction). Strix remains
      airborne at current altitude. 3s window after Feint where actual dive
      commit is unpredictable (enemies can't read the real commit for 3s).
    DesignNote: >
      Counterplay to Rank 3+ enemies that dodge dives. Feint → enemy dodges →
      real dive during confusion window → hit confirmed. The "smarter enemies
      require smarter Strix" answer. Also useful for repositioning enemies
      (they dodge AWAY from the feinted trajectory — predictable movement).
    RankRequired: 2

  - Name: "Raptor's Eye"
    ID: raptors_eye
    ActionType: oGCD
    AnimationLock: 0.3s
    Cooldown: 60s
    TargetType: self
    Effect: >
      For 10s: full battlefield visibility regardless of altitude (sees through
      walls, fog, darkness). ALL enemies within 50m are visible with HP bars
      and position indicators. Primarily a scouting/pre-calculation enhancement
      for complex encounters or procgen maps with unknown layouts.
    DesignNote: >
      The "perfect read" tool. In new/unknown environments, pop Raptor's Eye
      to see EVERYTHING before committing to a dive. On 60s CD — roughly
      once per major pull/encounter. Information advantage for the pre-calc class.
    RankRequired: 1

  - Name: "Terminal Velocity"
    ID: terminal_velocity
    ActionType: oGCD
    AnimationLock: 0.3s
    Cooldown: 120s  # Long CD — class ultimate-equivalent
    TargetType: self
    Effect: >
      For 12s: altitude builds at 2× speed, Wing Stamina drain halved, and
      dive potency multiplier increased to ×7 per AU (from ×5). Maximum single
      dive during Terminal Velocity from 100 AU: 150 + 700 = 850p. Combined
      with Dive Accelerant: 850 × 1.3 = 1105p (extreme burst, requires both
      CDs + maximum altitude + marked target).
    DesignNote: >
      The "absolute maximum burst" tool. 120s CD ensures this is roughly
      1-2 uses per boss encounter. NOT a fixed cadence — used when the
      encounter provides a maximum-damage window (phase transition, must-die
      add, vulnerability mechanic). The fact that both altitude AND dive
      modifier are needed means the Strix must PLAN 12s ahead: pop Terminal
      Velocity → rapid ascent → mark target → commit maximum dive.
    RankRequired: 3

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 10: RANK PROGRESSION
# ─────────────────────────────────────────────────────────────────────────────

RankProgression:
  Philosophy: >
    Rank unlocks DIVE VARIANTS and REDUCES GROUND VULNERABILITY TIME.
    A Rank 1 Strix has the core dive cycle with limited options and long
    ground lockout. A Rank 3 Strix has multiple dive types, shorter ground
    time, and ultimate-tier burst tools. The core loop (ascend → read →
    commit → recover) is IDENTICAL — the margins and options improve.

  Rank1:
    Name: "Fledgling Talon"
    UnlockedSkills:
      Aerial: [Raptor Mark, Windshear Bolt, Screech, Galefeather Toss, Thermal Spiral]
      Dive: [Raptor Dive]
      Ground: [Storm Slash, Rending Talon, Venom Rake, Updraft Cutter, Voltaic Strike, Lift Off]
      oGCD: [Slipstream, Tailwind Rush, Feather Fade, Barrel Roll, Stormweave Toggle, Neurotoxin Sheath, Updraft Burst, Raptors Eye]
    GroundedDuration: "6s (long ground time after dive)"
    WingStaminaMax: 100
    AltitudeMax: 100
    DiveTypes: "Raptor Dive only (standard AoE dive)"
    ContentViability: "Normal dungeons, open world, story content"
    DesignIntent: >
      Rank 1 gives the full aerial cycle with ONE dive type. Ground time is
      long (6s) — forces meaningful weapon engagement. Single dive type means
      the decision is "when/where to dive" not "which dive to use." Simple
      but deep: the READ is the entire skill expression at Rank 1.

  Rank2:
    Name: "Proven Talon"
    NewUnlocks:
      DiveTypes: [Piercing Plunge, Scatterfall]
      oGCD: [Dive Accelerant, Feint Dive]
    GroundedDuration: "5s (reduced ground lockout)"
    NewMechanics:
      - "Piercing Plunge (single-target focused dive — boss killer)"
      - "Scatterfall (wide AoE dive — pack killer)"
      - "Dive Accelerant (burst amplifier — +30% next dive)"
      - "Feint Dive (AI manipulation — bait dodge reactions)"
    ContentViability: "Hard dungeons, Trials, entry Raids"
    DesignIntent: >
      Rank 2 adds DIVE CHOICE — the pre-calculation now includes "which dive
      type?" in addition to "when/where?" Piercing Plunge vs. Raptor Dive vs.
      Scatterfall creates a meaningful decision based on target count, enemy
      type, and positioning. Feint Dive enables engagement against smart enemies.
      Reduced ground time (5s) means faster cycling.

  Rank3:
    Name: "Apex Talon"
    NewUnlocks:
      oGCD: [Terminal Velocity]
    GroundedDuration: "4s (minimal ground lockout)"
    NewMechanics:
      - "Terminal Velocity (ultimate burst window — ×7 AU scaling for 12s)"
      - "Predator Instinct passive: while above 50 AU, can see enemy HP% and buff/debuff status without targeting"
      - "Thermal Mastery passive: descent regen increased to 4% max HP/s (from 3%)"
      - "Dive Tempo passive: completing a ground combo within Grounded Duration reduces remaining ground time by 1s"
    ContentViability: "Extreme difficulty, Savage Raids, all content"
    DesignIntent: >
      Rank 3 is mastery. 4s ground time means rapid dive cycling. Terminal
      Velocity provides encounter-defining burst. Passives reward ACTIVE play
      during ground time (combos reduce lockout) and make altitude even more
      rewarding (enhanced vision, enhanced regen). The Rank 3 Strix cycles
      so fast that ground time feels like a brief pause between devastating
      dives, not a prolonged vulnerability window.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 11: ROTATION PHILOSOPHY
# ─────────────────────────────────────────────────────────────────────────────

RotationPhilosophy:
  Statement: >
    The Strix has NO fixed rotation. NO button sequence that repeats on a timer.
    The "rotation" is the DIVE CYCLE — a loop governed by altitude, Wing Stamina,
    and battlefield state. Each cycle is different because the READ is different.
    The decision tree is:
    1. Am I airborne? → Read battlefield, mark target, prep dive.
    2. Is the READ right? → Commit dive (choose type based on situation).
    3. Am I grounded? → Weapon combos, poison application, dash-evade, find re-ascend window.
    4. Can I re-ascend? → Lift Off when safe. Cycle repeats.
    There is NO "press these 8 buttons in this order every 20s." The cycle
    length varies. The dive target varies. The ground engagement varies.

  CycleTiming:
    Optimal: "12-15s full cycle (fast reader, efficient ground time)"
    Standard: "15-18s full cycle (comfortable pace, reliable execution)"
    Slow: "18-22s full cycle (cautious player, extra hover time for safety)"
    DesignNote: >
      Cycle variance is ACCEPTABLE. A cautious Strix who hovers longer deals
      less DPS (fewer dives per minute) but hits more accurately (better READs).
      An aggressive Strix who cycles fast deals more DPS but risks bad dives
      (less reading time). The sweet spot is player-dependent. No timer forces
      either approach.

  DecisionTree:
    AerialPhase:
      Entry: "Re-ascend successful → entering aerial phase at 30 AU"
      Actions:
        - "Climb to desired altitude (Thermal Spiral if rushing, passive ascent if patient)"
        - "Mark target (Raptor Mark for +10% dive bonus)"
        - "Apply pre-dive debuffs (Windshear Bolt to slow, Screech to pin)"
        - "Check: is target still in position? Are enemies clustered? Is altitude sufficient?"
        - "COMMIT or WAIT. If read isn't perfect: another aerial GCD, more altitude, or reposition."
      ExitCondition: "Commit dive → enter Dive State"
      TypicalDuration: "4-8s (2-4 aerial GCDs before committing)"

    DivePhase:
      Entry: "Dive committed → trajectory locked"
      Actions:
        - "NOTHING can be changed. Watch the dive land. Pray the read was right."
        - "If Dive Accelerant was used: faster travel, +30% potency"
        - "Descent regen is ACTIVE during this phase (HP recovering)"
        - "Wing Stamina is regenerating (6/s) during descent"
      ExitCondition: "Impact → enter Ground State"
      TypicalDuration: "0.4-1.2s (altitude-dependent travel time)"

    GroundPhase:
      Entry: "Impact resolved → Grounded Duration begins (6/5/4s by Rank)"
      Actions:
        - "Immediately apply Neurotoxin Sheath if available"
        - "Ground combo: Storm Slash → Rending Talon → Updraft Cutter (finisher + self-launch)"
        - "Venom Rake for additional poison if needed"
        - "Voltaic Strike if surrounded (AoE)"
        - "DASH to evade incoming attacks (i-frames keep you alive)"
        - "Once Grounded Duration expires: find safe window → Lift Off"
      ExitCondition: "Lift Off successful → enter Aerial Phase at 30 AU"
      TypicalDuration: "6-10s (Grounded Duration + Lift Off cast time)"

  NoBurstCadence: >
    There is NO 2-minute burst window. Terminal Velocity (120s CD) exists but
    is used SITUATIONALLY, not on a timer. Dive Accelerant (45s) is used when
    the READ demands maximum single-hit damage, not "every 45 seconds." The
    Strix's damage output is CONSISTENT within each dive cycle — the variance
    is in cycle speed and dive accuracy, not in buff alignment.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 12: BALANCE TARGETS
# ─────────────────────────────────────────────────────────────────────────────

BalanceTargets:
  DPSOutput:
    FullCycle_OpenSky: "100% of DPS reference"
    PartialCeiling_MedAlt: "80-85% of DPS reference"
    GroundLocked_NoCeiling: "55-60% of DPS reference"
    BossScenario_SingleTarget: "95-100% (Piercing Plunge focused)"
    TrashPull_AoE: "105-110% (Scatterfall + Raptor Dive cycling — Strix excels at AoE)"
    DesignNote: >
      Strix is a DPS class at full reference when flying. Slightly above
      reference in AoE situations (dive splash is free damage on clusters).
      Slightly below in pure single-target (dive travel time is non-damage time).
      Ground-locked state is intentionally weak — this is the environmental
      counterplay. Total deviation stays within ±12% balance band.

  SurvivabilityBudget:
    HPPool: "70% of standard DPS HP"
    EffectiveHP_WithBarrier: "~90% of standard (barrier + DR compensates)"
    DashUptime: "Can maintain near-continuous i-frame coverage with proper charge management"
    AerialSafety: "While above 30 AU: immune to most ground-based damage sources"
    GroundRisk: "Highest risk of any DPS class when grounded and out of dashes"

  ResourceEconomy:
    WingStaminaFullCycle: >
      Full 100 AU cycle: 80 stamina spent (ascent to max) + 3-9 stamina (hover time).
      Recovery during dive: 6-12 stamina (descent regen).
      Ground recovery: 60-80 stamina (6-8s at 10/s).
      NET: Full cycle is stamina-positive at standard pace. Aggressive cycling
      (back-to-back rapid dives) can drain stamina faster than recovery.
      Maximum sustainable pace: ~1 dive per 14s without running empty.
    PoisonUptime: >
      Neurotoxin Sheath (15s CD, 20s duration): sustainable near-100% uptime.
      Combined with Venom Rake (free application): poison is ALWAYS available.
      Target should have 3-5 stacks maintained through the full fight.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 13: VULNERABILITY & SKILL EXPRESSION ANALYSIS
# ─────────────────────────────────────────────────────────────────────────────

VulnerabilityAnalysis:
  EnvironmentalWeaknesses:
    LowCeiling: >
      Caves, indoor areas, corridors with low ceilings HARD-LIMIT the Strix.
      Maximum altitude capped by ceiling = reduced dive potency, limited
      aerial safety, and ground-mode reliance. This is INTENTIONAL. The Strix
      is a specialist who excels outdoors/high-ceiling and struggles indoors.
      Party composition should account for this.
    NarrowCorridors: >
      AoE splash from dives requires clustered enemies. Narrow corridors
      with enemies in a LINE (not clustered) reduce AoE value. Corridors
      also limit wall-jump options. Ground mode with Lightning Stormweave
      (arc damage) compensates partially.
    AntiAirEnemies: >
      Enemies with long-range attacks or dedicated anti-air abilities
      threaten the Strix while airborne. Barrel Roll provides evasion but
      costs Wing Stamina. Persistent anti-air pressure forces lower altitude
      or faster commit (less hover time = worse dive decisions).

  SkillExpression:
    ReadQuality: >
      The #1 skill differentiator. A great Strix reads: target positions,
      movement patterns, incoming abilities, party positioning, and enemy AI
      behavior. Bad Strix: dive whenever altitude is full. Good Strix: dive
      when the READ says "this is the perfect moment."
    AltitudeManagement: >
      How efficiently do you spend Wing Stamina? Great Strix players minimize
      hover time (expensive) and maximize useful prep GCDs during ascent.
      Bad Strix hover too long or dive too low.
    GroundExecution: >
      What do you accomplish during ground time? Great Strix: full poison
      application, completed ground combo, safe re-ascend immediately after
      Grounded Duration. Bad Strix: panic, don't combo, fail to re-ascend.
    DiveTypeSelection: >
      At Rank 2+: choosing Raptor Dive vs. Piercing Plunge vs. Scatterfall
      based on target count, priority, and positioning. Wrong dive type =
      wasted potential.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 14: >50% HP RULE INTERACTION (ENEMY APPLICATION)
# ─────────────────────────────────────────────────────────────────────────────

EnemyHP50Rule:
  SystemRule: >
    The >50% HP rule applies to ENEMIES: enemies above 50% HP take +25%
    damage from Strix dive attacks. This is the predator-identifying-weakness
    thematic — the Strix strikes when prey is HEALTHY (full HP = above 50%)
    because the predator initiates, not finishes. The dive is an OPENER,
    not an execute.

  StrixSpecific: >
    ALL dive damage (Raptor Dive, Piercing Plunge, Scatterfall) deals +25%
    potency against enemies above 50% HP. When the enemy drops below 50% HP,
    dive damage returns to base potency. This makes the Strix a FRONT-LOADED
    burst class — the first dive on a fresh enemy is the strongest.

  Implications:
    PullOpener: >
      First dive on fresh enemies (100% HP = above 50%) gets +25% bonus.
      At maximum altitude (650p base): 650 × 1.25 = 812p opener.
      This is the "strike from above on unaware prey" fantasy realized.
    BossPhasing: >
      Boss above 50% = bonus dives. Boss below 50% = standard dives.
      Natural front-loading matches encounter design.
    AddPhases: >
      Fresh adds spawn at 100% HP. EVERY add gets the +25% opener bonus.
      Strix EXCELS during add phases — new targets = bonus damage on each.
    TargetPriority: >
      Optimal play: ALWAYS dive the highest-HP enemy. Bonus damage on
      targets above 50% means target selection naturally prioritizes
      undamaged enemies — spreading damage efficiently.

  MathExample:
    RaptorDive_70AU_AboveHalf: "500p × 1.25 = 625p (amplified)"
    RaptorDive_70AU_BelowHalf: "500p × 1.0 = 500p (standard)"
    PiercingPlunge_100AU_AboveHalf: "800p × 1.25 = 1000p (devastating opener)"
    Scatterfall_70AU_6Targets_AboveHalf: "310p × 1.25 × 6 = 2325p total (pack obliterator)"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 15: CRIT SYSTEM INTERACTION
# ─────────────────────────────────────────────────────────────────────────────

CritInteraction:
  SystemRule: "Crit is NOT RNG. Crit is positional/conditional."
  StrixCritConditions:
    DiveCrit_HP50: >
      Dive attacks AUTO-CRIT against targets above 50% HP. This is the same
      as the >50% rule — the bonus IS the crit. Dives against healthy targets
      deal 1.4× × 1.25 = 1.75× total damage compared to standard dives
      against sub-50% targets. MASSIVE opener advantage.
    GroundCrit_Positional: >
      Ground weapon attacks crit when hitting from BEHIND the target (rear
      positional). The Strix's SPD 15 and dash mobility make rear positioning
      achievable during ground time.
    AerialCrit_Marked: >
      Aerial GCDs (Windshear Bolt, Galefeather Toss, Screech) crit when
      the target has been Raptor Marked. Marking = crit guarantee on all
      subsequent aerial pokes.
    GroundCrit_Poisoned: >
      Ground weapon attacks crit against targets at 5 Neurotoxin stacks
      (max poison). Full poison = guaranteed crits on every weapon hit.
      Rewards building poison stacks before sustained ground damage.

  CritMultiplier: "1.4× (standard system-wide multiplier)"
  CritImplication: >
    Strix crits are highly CONTROLLABLE. A skilled Strix crits ~70% of the time.
    Bad Strix who don't mark, don't position, and don't poison: ~20% crit rate.
    This is a ~20% DPS gap based on understanding the conditional crit system.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 16: AGGRO SYSTEM INTERACTION
# ─────────────────────────────────────────────────────────────────────────────

AggroInteraction:
  AerialPositioning: >
    While airborne, the Strix is NOT the "closest target" to ground enemies.
    Rank 1 enemies (attack closest) ignore the airborne Strix entirely
    unless no ground targets exist. Rank 2+ may attempt ranged attacks.
  GroundThreat: >
    While grounded (post-dive), the Strix IS a valid target. Low HP pool
    makes the Strix attractive to Rank 2+ AI. Ground time is when aggro
    becomes dangerous. Frontliners SHOULD control enemies during Strix
    ground time (Adafold Force Target / Madolt Unfocus).
  PartyDynamic: >
    Optimal: Frontliner holds ground aggro. Strix dives from above (not
    targeted). Strix lands → frontliner ensures enemies don't pivot →
    Strix re-ascends safely.
  SoloPlay: >
    Solo Strix manages aggro through ALTITUDE. Enemies lose track when Strix
    ascends. The "hit and run" pattern: dive → ground → dash away → Lift Off →
    enemies deaggro (target gone).

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 17: PROCGEN MAP INTERACTION
# ─────────────────────────────────────────────────────────────────────────────

ProcgenInteraction:
  PartySplitRole:
    Description: >
      Strix's value depends ENTIRELY on ceiling height. Open areas: full power
      and aerial reconnaissance. Low corridors: ground mode only, 55-60% DPS.
    HighCeilingSuitability: "EXCELLENT — full power, aerial scouting, AoE dives"
    LowCeilingSuitability: "POOR — ground mode only, 55-60% DPS"
    MixedEnvironment: "GOOD — adapt between modes based on room type"
  Reconnaissance: >
    Strix's aerial vision provides MASSIVE reconnaissance value in procgen maps.
    Flying over a new area reveals enemy positions, density, hazards, and exits.
    Raptor's Eye (60s CD) provides full vision through walls.
  CorridorFighting: >
    Narrow procgen corridors are the Strix's weakest environment. Adapts with:
    wall-jumps for shallow dives, Lightning Stormweave for arc damage, and
    poison-and-run tactics. Still functional but below full potential.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 18: HARVESTER FLIGHT DIFFERENTIATION
# ─────────────────────────────────────────────────────────────────────────────

HarvesterFlightDifferentiation:
  Context: >
    Harvesters (Colony class, Flutter phenotype) ALSO fly. Both Featherin (Strix)
    and Harvesters (Colony) have biological flight. The flight systems MUST be
    mechanically and thematically distinct to avoid class identity overlap.

  StrixFlight:
    Purpose: "Combat flight — altitude as weapon, dive as damage delivery"
    Character: "Aggressive, predatory, kinetic"
    AltitudeRole: "Resource (higher = more damage potential)"
    MovementPattern: "Circle → commit → plunge → ground → repeat"
    Ground_Consequence: "Vulnerable but fast, mandatory ground time after dive"
    Analogy: "The peregrine falcon — soars to kill"

  ColonyFlutterFlight:
    Purpose: "Utility flight — scouting, positioning, area denial"
    Character: "Constructive, supportive, mobile"
    AltitudeRole: "Positioning tool (where to deploy effects from)"
    MovementPattern: "Hover → observe → deploy pollen/seeds → reposition"
    Ground_Consequence: "No vulnerability — Flutter can land/take off freely"
    Analogy: "The hummingbird — hovers to support"

  KeyDifferences:
    - "Strix: altitude = damage scaling. Colony: altitude = deployment angle."
    - "Strix: dive is COMMITMENT (grounded after). Colony: land/takeoff is FREE."
    - "Strix: flight is EXPENSIVE (Wing Stamina drains). Colony: flight is CHEAP."
    - "Strix: ground state is WEAKNESS. Colony: ground state is NEUTRAL."
    - "Strix: aerial actions are SETUP for dive. Colony: aerial actions ARE the output."
    - "Strix: predator energy (kill). Colony: worker energy (build/support)."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 19: ANTI-PATTERNS (EXPLICIT)
# ─────────────────────────────────────────────────────────────────────────────

AntiPatterns:
  Explicit:
    - Pattern: "Hovering indefinitely without committing dive"
      Problem: "Extended hover drains Wing Stamina without dealing damage. DPS comes from DIVES, not air pokes."
      Fix: "2-4 aerial GCDs maximum before committing. If the read isn't there in 4 GCDs, descend and reset."
      RootCause: "Fear of bad dives leading to paralysis."

    - Pattern: "Diving without marking"
      Problem: "Unmarked dives lose +10% potency bonus AND trajectory preview."
      Fix: "Raptor Mark costs ONE GCD. Always mark. The 10% bonus over a fight is 10% DPS."
      RootCause: "Rushing the dive instead of committing RIGHT."

    - Pattern: "Staying grounded voluntarily"
      Problem: "Ground state is 55-60% DPS. Every second past Grounded Duration is wasted."
      Fix: "The moment Grounded Duration expires: Lift Off immediately."
      RootCause: "Comfort on the ground. Must internalize: sky is home, ground is transit."

    - Pattern: "Fixed-cadence diving (dive every exactly 15s)"
      Problem: "The dive cycle is READ-DEPENDENT, not timer-dependent."
      Fix: "Dive when the READ says dive. Variable cycle timing is correct play."
      RootCause: "Importing burst-alignment mindset. Strix has no burst cadence."

    - Pattern: "Ignoring ground poison application"
      Problem: "Ground time without poison = dead time. Poison bridges dive cycles."
      Fix: "EVERY ground phase: Neurotoxin Sheath + weapon hits OR Venom Rake."
      RootCause: "Treating ground time as idle instead of productive weapon phase."

    - Pattern: "Using Featherward as a tanking tool"
      Problem: "Barrier is emergency backup, not strategy. Standing in damage = death."
      Fix: "Dodge FIRST. Barrier catches what you FAILED to dodge."
      RootCause: "Misunderstanding defensive model. Strix defense is EVASION, not absorption."

    - Pattern: "2-minute burst alignment"
      Problem: "Terminal Velocity (120s) should be used SITUATIONALLY, not on timer."
      Fix: "Use when a target deserves maximum burst. Hold if no high-value window."
      RootCause: "Importing FFXIV burst-window mentality."

    - Pattern: "Scatterfall on single targets"
      Problem: "Scatterfall potency is LOWER than Raptor Dive per-target (×3 vs ×5 AU)."
      Fix: "Single target = Piercing Plunge or Raptor Dive. Scatterfall = 3+ enemies ONLY."
      RootCause: "Not reading target count before diving."

    - Pattern: "RNG proc expectations"
      Problem: "Strix has ZERO random procs. Every outcome is deterministic."
      Fix: "Everything is conditional (above 50% HP, rear positional, marked, poisoned) — not random."
      RootCause: "Expecting proc-based design. This system has zero RNG in class kits."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 20: BALANCE VALIDATION
# ─────────────────────────────────────────────────────────────────────────────

BalanceValidation:
  DPSCheck:
    Target: "100% of DPS reference (open sky, full cycle)"
    OptimalCycleDPS: >
      Cycle: Raptor Mark (0p) + Windshear Bolt (80p) + Thermal Spiral (0p) +
      Raptor Dive from 70AU (500p) + Ground combo (Storm Slash 100p + Rending Talon
      130p + Updraft Cutter 150p) + Venom Rake (90p) + Poison ticking (125p over 12s).
      Total per 15s cycle: ~1175p (before crits, before >50% bonus).
      PPS: ~78 PPS (within DPS reference band).
    BurstCeiling: >
      Maximum single hit: Terminal Velocity + Dive Accelerant + 100 AU +
      Piercing Plunge on marked >50% HP target:
      (200 + 700) × 1.3 × 1.25 × 1.4 × 1.1 = ~2200p (once per 120s).
      Requires: 120s CD + 45s CD + max altitude + marked + above 50% HP.
    GroundOnlyDPS: >
      Ground-locked (cave): Storm Slash → Rending Talon → Updraft Cutter loop
      + Voltaic Strike AoE + Poison ticking. ~45-50 PPS. 55-60% of reference.
      INTENTIONALLY WEAK. This is the counterplay.

  GCDCount:
    AerialPhase: "2-4 GCDs (prep before dive)"
    GroundPhase: "3-5 GCDs (combos during ground time)"
    TotalPerCycle: "6-9 GCDs per dive cycle"

  ButtonCount:
    GCDs: "5 aerial + 3 dive + 6 ground = 14 GCDs total"
    oGCDs: "4 dashes + 7 utility = 11 oGCDs total"
    Total: "~25 unique actions (within Experienced tier budget)"
    DesignNote: >
      25 buttons spread across THREE states. In any given moment, only 8-12
      are relevant (state-locked). The player never faces all 25 simultaneously.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 21: MATCHUP ANALYSIS & ITEM BASELINE COMPARISON
# ─────────────────────────────────────────────────────────────────────────────

MatchupAnalysis:
  VsFrontliners: >
    Strix COMPLEMENTS frontliners. Frontliner holds ground aggro → Strix
    dives from above without being targeted. Party dynamic: frontliner
    creates safety for Strix ground time.
  VsHealers: >
    Strix's Descent Regen and Featherward reduce healing dependency.
    A Strix that cycles well rarely needs external healing. Healer focus
    goes to frontliner. Strix only needs heals on FAILED dives.
  VsOtherDPS: >
    Strix vs Reaver: Strix front-loads burst (opener), Reaver back-loads
    (pursuit escalation). Strix wins on packs, Reaver wins on extended single-target.
    Strix vs Colony: Both fly for different purposes. Colony supports, Strix damages.
  VsEnvironment: >
    Strix's biggest "opponent" is the MAP. Low ceilings, narrow corridors,
    anti-air hazards determine effectiveness. Open sky: among the best DPS.
    Enclosed: among the worst. Map knowledge is part of Strix mastery.

  ItemBaselineReference: >
    See "Class-Item Baselines.md" for full comparison. Summary:
    - No item provides sustained flight (Strix provides persistent altitude)
    - No item provides pre-calculation (read → calculate → commit)
    - Items provide ONE burst AoE; Strix provides REPEATED burst on cycle
    - Items require ground access; Strix attacks from above
    - The class PERMANENTLY replaces: flight potions, reconnaissance items,
      dive-attack scrolls, clustering/AoE items, elevation consumables.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 22: CONSTRAINTS (AUTO-GENERATED)
# ─────────────────────────────────────────────────────────────────────────────

Constraints:
  RuleChecklist:
    GCD_Base: "2.0s ✓"
    GCD_Cap: "1.4s (with SPD scaling) ✓"
    oGCD_SingleWeave: "All oGCDs are single-weave (0.3-0.6s animation lock) ✓"
    NoBurstCadence: "No 2-minute alignment. Terminal Velocity used situationally. ✓"
    NoRNGProcs: "Zero proc-based mechanics. All crits conditional. All effects deterministic. ✓"
    NoFreecure: "Zero free healing procs. Descent regen is predictable and conditional. ✓"
    CritNotRNG: "All crits positional (rear) or conditional (>50% HP, marked, poisoned). ✓"
    HP50Rule: "Applied to enemies taking +25% dive damage above 50% HP. ✓"
    ItemDefinesBaseline: "Flight, AoE, reconnaissance items exist. Strix REPLACES permanently. ✓"
    PotencyBands: "Filler 100p, combo finisher 150p, dive 200-650p, ultimate 850+p. ✓"
    ClassUltimateBand: "Terminal Velocity + max dive = 850-1100p (within 600-1200p extended band). ✓"
    DeathIsWeakness: "Ground-locked = 55-60% DPS. Environmental counterplay exists. ✓"

  ConsistencyNotes:
    - "STR 6 justified: dive damage is momentum (altitude × gravity), not muscle force"
    - "SPD 15 justified: hollow bones = light = fast ground escape"
    - "DEX primary: precision + evasion (unhittable fantasy + dive accuracy)"
    - "EVA secondary: dash cooldown reduction + passive aerial evasion bonus"
    - "Ground state exists and is functional: caves/indoors are weakness, not death sentence"
    - "Weapon system (Storm Talons) provides elemental/poison damage independent of STR"
    - "Barrier is EMERGENCY, not plan (Featherward replaces Feathercloak concept)"
    - "Regen on descent, not just on ground (Thermal Recovery during dive)"
    - "Colony flight is utility, Strix flight is predatory (explicitly differentiated)"

