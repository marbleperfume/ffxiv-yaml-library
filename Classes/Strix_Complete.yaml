DesignNotes:
  ResolutionDecisions:
    AltitudeModel: "RESOLVED → Continuous (0-100 AU) with 4 named bands (Ground, Low, Mid, High)"
    GroundState: "RESOLVED → Weaker but functional (55-60% DPS). Weapon provides elemental/poison damage."
    DefensiveModel: "RESOLVED → Evasion (dash i-frames) primary. Barrier (Featherward) emergency. No absorption tanking."
    RegenTiming: "RESOLVED → Starts on descent (dive travel time = recovery time). Not land-first."
    WeaponType: "RESOLVED → Storm Talons (dual short blades, elemental infusion cycling + poison coating)"
    FlightVsColony: "RESOLVED → Predatory (Strix) vs Utility (Colony). Altitude-as-damage vs altitude-as-positioning."
    STR6Solution: "RESOLVED → Momentum (dive) + Weapon Properties (elemental/poison). Zero reliance on physical force."
    
  OpenQuestions:
