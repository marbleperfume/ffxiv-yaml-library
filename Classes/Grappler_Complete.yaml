# =============================================================================
# GRAPPLER — Complete Class Specification
# juice-yaml-library | Race-Locked Biological Class
# =============================================================================

class_name: Grappler
race_lock: Iblis Grabbers
tier: Special
role: Frontline
lock_type: Biological
last_updated: 2026-07-14

# =============================================================================
# SECTION 1: IDENTITY
# =============================================================================
identity:
  race: Iblis Grabbers
  lock_justification: |
    Biological lock — the tentacle IS the offhand slot. Not a weapon equipped
    in the offhand, but the offhand ITSELF being a biological appendage. The
    class is literally "fight with your extra limb." No other race possesses
    functional prehensile tentacles capable of the grip force, extension range,
    ink production, and sensory feedback required for stance-based combat.
  physiology: |
    Octopus-humanoid predator. Upper body humanoid frame (bipedal, main-hand
    weapon capable). Lower/lateral body features 2-4 combat tentacles that
    function as a unified "offhand system." Tentacles possess:
    - Chromatophores (color/texture shift for stealth)
    - Ink sacs (biological ink production)
    - Suckers with chemoreceptors (taste/grip/sense through contact)
    - Muscular hydrostat structure (boneless extension/contraction)
    - Proprioceptive nerve density 4x humanoid baseline (precise spatial awareness)
  fantasy: |
    The PREDATOR who prepares. An octopus-humanoid that decides what kind of
    hunt this is BEFORE it begins. Not adaptive in the moment — devastatingly
    effective when preparation matches situation. The skill expression is in
    READING upcoming content and committing to the correct stance. Wrong read
    = suboptimal for the entire instance. Same class, four completely different
    gameplay experiences.
  special_tier_justification: |
    Knowledge gate. The Grappler requires understanding of instance content
    BEFORE entering. Base and Experienced classes can react and adapt mid-run.
    The Grappler cannot. This demands game knowledge that only comes from
    repeated exposure, community information sharing, or deliberate study.
    Special tier = "you must know what you're walking into."

# =============================================================================
# SECTION 2: CORE MECHANIC — STANCE SYSTEM
# =============================================================================
core_mechanic:
  name: Predator Stance Lock
  description: |
    Four stances locked PRE-INSTANCE. The Grappler selects one stance before
    entering any instanced content. Once selected, the stance CANNOT be swapped
    mid-run. The stance determines:
    - Which abilities are available
    - How the tentacle behaves (coiled/extended/engorged/tensed)
    - What triggers activate bonus effects
    - Maximum CC stage accessible
    - Fundamental gameplay loop and positioning requirements

    The same Grappler in different stances plays four DIFFERENT GAMES —
    not different rotations of the same game.

  lock_rules:
    instanced_content: Locked at instance entry. Cannot change until instance completes or is abandoned.
    open_world: Locked per rest point. Changeable at any designated rest/camp location.
    party_visibility: Stance selection is visible to party members during pre-instance lobby.
    declaration: Party can see which stance the Grappler has chosen before confirming the run.

  stances:
    stealth:
      name: Stealth Stance — The Lurker
      tentacle_state: Coiled tight against body, chromatophores active (camouflage)
      gameplay_loop: |
        Ambush predator. Tentacle concealed until first strike. Extended
        invisibility pre-combat. Massive initiation advantage. The hunt is
        over before the prey knows it began. After the opener, transitions
        to conventional fighting with reduced tentacle utility (coiled state
        is spent — re-stealth requires disengagement).
      positioning: Behind or flanking. Must reach target without detection.
      max_cc_stage: 2
      fantasy: The octopus in the crevice. Invisible until the grab.

    long_range:
      name: Long-Range Stance — The Fisher
      tentacle_state: Extended and loose, ready to project outward (8-15m reach)
      gameplay_loop: |
        Displacement predator. Tentacle extends to grab, pull, or throw
        enemies from distance. Gap closer AND gap creator. Initiates fights
        by yanking targets out of position. The hunt begins from a distance
        the prey thought was safe. After extension, vulnerable during
        reel-in (tentacle committed = exposed until retracted).
      positioning: Mid-range (8-15m from target). Needs line of effect for extension.
      max_cc_stage: 2
      fantasy: The octopus arm reaching from a tide pool to snatch a crab.

    ink:
      name: Ink Stance — The Cloudmaker
      tentacle_state: Engorged with ink sacs, visibly darker/swollen
      gameplay_loop: |
        Territorial predator. Tentacle sprays ink to create persistent vision
        denial zones. Area control and debuff delivery. Enemies inside ink
        cannot see clearly; the Grappler's chemoreceptor suckers allow
        navigation within their own ink. The hunt is a trap — the prey
        walks into territory the predator has already claimed.
      positioning: Flexible — creates zones then fights within or around them.
      max_cc_stage: 1
      fantasy: The octopus ink cloud. Vanish the world, then strike in darkness.

    melee_grapple:
      name: Melee Grapple Stance — The Holder
      tentacle_state: Tensed, thick, grip-ready. Maximum muscular density.
      gameplay_loop: |
        Restraint predator. Tentacle seizes, escalates grip, achieves full
        pin. Stage 3 CC — complete disable. Target cannot act. THIS IS WHY
        THE CLASS IS FRONTLINE. The Grappler must be physically adjacent to
        the target to initiate and maintain the pin. While pinning, the
        Grappler's own mobility is severely restricted (both combatants
        locked in place). The hunt is a wrestling match the prey cannot win.
      positioning: Melee range. Must close distance and remain adjacent.
      max_cc_stage: 3
      fantasy: The octopus wrapping a crab. Complete envelopment. No escape.

# =============================================================================
# SECTION 3: TRIGGER SYSTEM PER STANCE
# =============================================================================
trigger_system:
  description: |
    Each stance has different trigger conditions that activate bonus effects
    on abilities. Triggers are NOT cooldown-based — they respond to battlefield
    state, enemy behavior, and positional conditions. This enforces the
    "respond to strategy, not follow a rotation" design principle.

  stealth_triggers:
    - trigger_name: Undetected
      condition: Grappler is not on any enemy's threat/awareness list
      effect: Enables stealth-exclusive abilities. Movement speed +20%.
      design_note: The default state in Stealth stance before combat begins.

    - trigger_name: First Blood
      condition: First offensive action against an unaware target
      effect: |
        +100% damage on the initiating strike. Guaranteed critical hit
        (positional/conditional crit — target is unaware = free backstab).
        Applies Stage 2 Silence for 3s (target cannot call for help).
      design_note: The payoff for successful approach. One devastating opener.

    - trigger_name: Isolation Detected
      condition: Target has no allies within 10m
      effect: |
        Tentacle grab abilities gain +50% grip duration. Isolated prey
        cannot be rescued quickly — the predator exploits this.
      design_note: Rewards target selection. Pick the straggler.

    - trigger_name: Blown Cover
      condition: Grappler detected before initiating attack
      effect: |
        First Blood trigger permanently disabled for this combat.
        Tentacle remains coiled but grants no ambush bonus.
        Stealth stance operates at reduced effectiveness (no re-stealth
        until combat fully ends and 8s out-of-combat timer completes).
      design_note: The vulnerability. Detection = lost advantage for entire fight.

  long_range_triggers:
    - trigger_name: Full Extension
      condition: Tentacle is extended to maximum range (12-15m)
      effect: |
        Pull force increased (can move large enemies). Throw distance
        increased. But tentacle retraction takes 2.0s (one full GCD
        of vulnerability).
      design_note: Max range = max power but max commitment.

    - trigger_name: Successful Displacement
      condition: Enemy moved 4m+ from their original position by tentacle
      effect: |
        Displaced enemy suffers Stage 1 Root for 2s (disorientation from
        forced movement). Main hand attack against rooted target gains
        +30% damage (positional advantage — enemy is where YOU put them).
      design_note: The payoff chain. Pull → root → punish.

    - trigger_name: Overextension
      condition: Tentacle extended AND enemy closes to melee range of Grappler body
      effect: |
        Tentacle cannot retract instantly (1 GCD minimum). Grappler takes
        +15% damage while tentacle is committed elsewhere. Main hand
        attacks suffer -20% speed (split attention).
      design_note: The vulnerability. Extended tentacle = exposed body.

    - trigger_name: Elevation Advantage
      condition: Target is 3m+ below Grappler's position
      effect: |
        Tentacle extension range +5m (gravity assists reach). Pull-up
        ability unlocked (yank enemy to Grappler's elevation).
      design_note: Rewards map reading and high-ground positioning.

  ink_triggers:
    - trigger_name: Ink Territory
      condition: Enemy standing inside a Grappler-created ink zone
      effect: |
        Enemy suffers -60% detection range (Stage 1 vision reduction).
        Enemy attack accuracy -30%. Grappler gains +20% movement speed
        within own ink (home territory advantage).
      design_note: Ink zones are the stance's persistent value.

    - trigger_name: Fresh Spray
      condition: Ink zone created within last 4s
      effect: |
        Enemies entering fresh ink are Slowed 40% for 2s (initial
        surprise/slip). Fresh ink is opaque; aged ink becomes translucent
        (reduced vision penalty over time).
      design_note: Rewards active ink management, not set-and-forget.

    - trigger_name: Ink Saturation
      condition: 3+ ink zones active simultaneously within 15m radius
      effect: |
        Zones merge into Murk Field. All enemies within Murk Field
        suffer -80% detection range (near-blind). Grappler gains
        chemoreceptor omniscience (360° awareness within Murk).
      design_note: The buildup payoff. Multiple zones = territory dominance.

    - trigger_name: Ink Depleted
      condition: Ink sacs empty (resource spent, regenerating)
      effect: |
        No new ink zones for 12s (biological regeneration). Existing
        zones persist but Grappler cannot refresh or create new ones.
        Tentacle operates as basic melee appendage only.
      design_note: Resource gate. Cannot spam infinitely. Plan your ink economy.

  melee_grapple_triggers:
    - trigger_name: Grab Initiated
      condition: Tentacle successfully connects with target at melee range
      effect: |
        Target suffers Stage 1 Slow (tentacle wrapped, movement impaired).
        Grappler movement reduced by 30% (holding something). Escalation
        timer begins — grab can be upgraded to full pin.
      design_note: Stage 1 entry point. The grab is not yet the pin.

    - trigger_name: Escalation Complete
      condition: Grab maintained for 4s without target breaking free
      effect: |
        Grab escalates to Full Pin (Stage 3). Target CANNOT act — complete
        disable. Grappler ALSO cannot move or use main hand (both locked).
        Allies deal +25% damage to pinned target (>50% HP rule still applies
        additively).
      design_note: |
        THE payoff. Stage 3 CC that justifies frontline commitment.
        Both combatants locked = 2-for-1 CC unless allies capitalize.

    - trigger_name: Grapple Broken
      condition: Target breaks free (resistance check success, ally rescue, or CC on Grappler)
      effect: |
        Grappler suffers 3s Fatigue (attack speed -30%, cannot re-grab).
        Target gains 6s Grapple Immunity (cannot be grabbed again immediately).
        Failed pin attempt = significant tempo loss.
      design_note: Prevents perma-lock. Creates counterplay windows.

    - trigger_name: Prey Above 50% HP
      condition: Grabbed target's HP is above 50%
      effect: |
        Target takes +25% damage from ALL sources while grabbed (>50% HP
        rule applied). Escalation timer reduced by 1s (prey is strong =
        predator commits harder). This makes grabbing HEALTHY targets the
        optimal play — pin the strong one, let allies shred it.
      design_note: |
        Integrates with the >50% HP enemy rule. Grappler wants to grab
        the target that's above 50% so allies get maximum damage amp.

# =============================================================================
# SECTION 4: ABILITIES
# =============================================================================
abilities:
  # -------------------------------------------------------------------------
  # SHARED ABILITIES (Available in all stances)
  # -------------------------------------------------------------------------
  - name: Predator's Strike
    stance_availability: [stealth, long_range, ink, melee_grapple]
    type: Main Hand Attack
    gcd: true
    trigger_condition: None (always available)
    effect: |
      Basic main hand weapon attack. Damage scales with weapon type:
      - Flail: 100 potency, AoE cleave (2m arc)
      - Dual Kama: 90 potency × 2 hits, faster animation
      - Sickle+Chain: 110 potency, 4m range (chain extension)
      Generates 5 Grip Gauge per hit (shared resource for tentacle abilities).
    cc_stage: null
    item_baseline_replaced: Basic attack items (weapon coatings, on-hit oils)
    decision_created: |
      Weapon choice determines melee expression across all stances.
      Flail for group fights, kama for single-target speed, sickle+chain
      for reach. The main hand is consistent — the tentacle is the variable.

  - name: Tentacle Lash
    stance_availability: [stealth, long_range, ink, melee_grapple]
    type: Tentacle Attack (Offhand)
    gcd: true
    trigger_condition: 10+ Grip Gauge
    effect: |
      Basic tentacle strike. Behavior changes per stance:
      - Stealth: Low-profile slap, no sound, does not break stealth if target dies
      - Long-range: Whip at 8m range, pulls target 2m toward Grappler
      - Ink: Ink-coated slap, leaves residue (2s -10% vision on target)
      - Melee Grapple: Constricting strike, applies 1s micro-slow per hit (stacking)
      Base potency: 80. Costs 10 Grip Gauge.
    cc_stage: Varies (Stealth=null, Long-range=null, Ink=1, Melee=1)
    item_baseline_replaced: |
      Replaces basic CC consumables used for minor slowdowns (Muddling Tincture
      single-application, Frostweave Net initial contact).
    decision_created: |
      Spend Grip Gauge on basic tentacle use or save for expensive stance-specific
      abilities? The Lash is cheap and consistent vs. bigger abilities that cost more.

  - name: Predator's Read
    stance_availability: [stealth, long_range, ink, melee_grapple]
    type: Passive (Knowledge)
    gcd: false
    trigger_condition: Always active
    effect: |
      Special-tier knowledge passive. The Grappler can see:
      - Enemy resistances to grab/pin (displayed as Grip Difficulty: Easy/Medium/Hard/Immune)
      - Enemy awareness state (Unaware/Alert/Hunting/Locked On)
      - Terrain properties relevant to tentacle use (wet surfaces = ink spreads faster,
        rough surfaces = better grip anchor points, smooth surfaces = harder to pin on)
      Does NOT reveal enemy HP or abilities — only GRIP-RELEVANT information.
    cc_stage: null
    item_baseline_replaced: |
      Replaces Hexcage Lantern (enemy detection) and Aerial Vantage Scope
      (reconnaissance) for grip-specific information only.
    decision_created: |
      Information for stance selection (pre-instance) and target prioritization
      (in-combat). "This enemy is Hard to pin — do I commit 4s of escalation
      or focus on the Easy targets first?"

  - name: Anchor Point
    stance_availability: [stealth, long_range, ink, melee_grapple]
    type: Utility (Positioning)
    gcd: false (off-GCD)
    trigger_condition: Adjacent to a wall, pillar, or terrain feature
    effect: |
      Tentacle grips a terrain anchor. For 6s:
      - Cannot be displaced (knockback immune)
      - Cannot be pulled (anti-displacement)
      - Movement speed reduced to 0 (anchored in place)
      - Main hand attacks gain +15% damage (stable platform)
      12s cooldown after anchor releases.
    cc_stage: null
    item_baseline_replaced: Ironvine Snare (self-root for stability — but Snare is enemy-targeted)
    decision_created: |
      Trade mobility for stability. Against enemies that displace (knockbacks,
      pulls, charges), Anchor Point is defensive gold. Against enemies that
      simply hit hard, standing still is dangerous. Terrain-dependent — only
      works near surfaces.

  # -------------------------------------------------------------------------
  # STEALTH STANCE ABILITIES
  # -------------------------------------------------------------------------
  - name: Silent Approach
    stance_availability: [stealth]
    type: Stance Passive
    gcd: false
    trigger_condition: Out of combat OR 8s since last detected
    effect: |
      Native stealth. Tentacle chromatophores activate — Grappler becomes
      visually invisible and sound-dampened. Movement speed -10% while
      stealthed (careful movement). Detection radius for enemies reduced
      to 2m (vs normal 8-12m based on SR). SR4 enemies detect at 4m.
      Persists indefinitely until:
      - Grappler attacks
      - Grappler enters 2m of aware enemy
      - Grappler takes damage from AoE
      - Grappler uses a non-stealth ability
    cc_stage: null
    item_baseline_replaced: |
      Phantom Echo (3s invisibility) + Numbsense Spike (prevents detection
      of stealth, 15s, 5m, destroyable). Silent Approach is permanent,
      native, and requires no installation.
    decision_created: |
      When to BREAK stealth. Every moment in stealth is information gathered
      and positioning improved. Every moment in stealth is also DPS not dealt.
      The Grappler chooses the perfect moment — or waits too long and the
      party needs them NOW.

  - name: Ambush Crush
    stance_availability: [stealth]
    type: Tentacle Attack (Opener)
    gcd: true
    trigger_condition: First Blood trigger active (target unaware of Grappler)
    effect: |
      Explosive tentacle constriction from stealth. 280 potency.
      Guaranteed critical hit (conditional crit — target unaware).
      Applies Stage 2 Silence for 3s (tentacle covers mouth/vocalization).
      Breaks stealth permanently for this combat.
      If target dies from this hit: stealth is NOT broken (silent kill).
      Costs 30 Grip Gauge.
    cc_stage: 2 (Silence)
    item_baseline_replaced: |
      Phantom Echo (3s invis + ghost image for damage bonus). Ambush Crush
      provides 280 potency + silence vs Phantom Echo's brief window with
      no guaranteed damage bonus. Class version is the "one perfect strike."
    decision_created: |
      Which target to open on. The opener is ONE shot — choose wrong and
      the silence lands on a target that doesn't cast, wasting the CC.
      Choose right and the enemy healer/caster is silenced before the fight
      begins. Target selection IS the skill.

  - name: Drag Under
    stance_availability: [stealth]
    type: Tentacle Grab (Stealth)
    gcd: true
    trigger_condition: Isolation Detected trigger active (target has no allies within 10m)
    effect: |
      Silent tentacle grab from stealth. Target is Seized (Stage 2 Restrain
      for 4s — cannot move, CAN still attack in melee range but cannot use
      movement abilities). Grappler remains in semi-stealth (other enemies
      at 8m+ do not detect this action if target does not vocalize — Silence
      from Ambush Crush prevents vocalization).
      If used AFTER Ambush Crush's silence: grab is undetectable.
      If used WITHOUT silence: target's struggle alerts enemies within 10m.
      120 potency. Costs 25 Grip Gauge.
    cc_stage: 2 (Restrain)
    item_baseline_replaced: |
      Frostweave Net (70% slow / 2 actions to break free). Drag Under is
      a full restrain (no movement at all) with duration that exploits the
      Isolation trigger for extended grip.
    decision_created: |
      Combo order matters. Ambush Crush first (silence) then Drag Under
      (silent grab) = undetected elimination. Drag Under first (no silence)
      = target screams, allies alerted. The combo sequence IS the decision.

  - name: Vanish Retreat
    stance_availability: [stealth]
    type: Utility (Escape)
    gcd: false (off-GCD)
    trigger_condition: Blown Cover trigger active OR HP below 40%
    effect: |
      Emergency chromatophore burst. 2s of invisibility + 4m backwards
      displacement (tentacle pushes off nearest surface). If out of combat
      for 8s after this, Silent Approach re-engages.
      30s cooldown.
      Cannot be used while grabbing a target.
    cc_stage: null
    item_baseline_replaced: |
      Smokebreak Ampule (4m untargetable smoke, 5s). Vanish Retreat provides
      displacement + brief stealth vs Ampule's stationary untargetability.
    decision_created: |
      Escape tool that resets the engagement. Using it means abandoning
      current combat position. If allies need frontline presence, retreating
      to re-stealth is selfish. If the Grappler can reset and re-open,
      it's optimal. Party state determines whether retreat is correct.

  # -------------------------------------------------------------------------
  # LONG-RANGE STANCE ABILITIES
  # -------------------------------------------------------------------------
  - name: Tentacle Extend
    stance_availability: [long_range]
    type: Tentacle Utility (Initiation)
    gcd: true
    trigger_condition: Target within 8-15m, line of effect clear
    effect: |
      Project tentacle to maximum reach (15m). Tentacle attaches to target.
      Once attached, Grappler can choose follow-up action next GCD:
      - Reel-In (pull target toward self)
      - Sling Launch (throw target in chosen direction)
      - Tether Hold (maintain connection, restricting target movement to 15m radius)
      Attachment lasts until follow-up resolves or 6s (3 GCDs) without action.
      Costs 15 Grip Gauge. No damage on attachment alone.
    cc_stage: null (setup — CC comes from follow-up)
    item_baseline_replaced: |
      Ripcord Harpoon (8m pull toward player, single-use). Tentacle Extend
      provides 15m range, multiple follow-up OPTIONS, and unlimited uses.
    decision_created: |
      Attach then CHOOSE. Pull them to you? Throw them off a ledge? Hold
      them in place? The decision happens AFTER attachment — the Grappler
      reads the developing situation before committing to displacement type.

  - name: Reel-In
    stance_availability: [long_range]
    type: Tentacle Attack (Displacement)
    gcd: true
    trigger_condition: Tentacle attached to target (via Tentacle Extend)
    effect: |
      Pull attached target to Grappler's position. 130 potency on arrival
      (impact damage). Target arrives in melee range. Triggers Successful
      Displacement if target moved 4m+. Large enemies (2x+ size) pulled
      half distance only.
      Tentacle retracts on completion (2.0s retraction — Overextension
      window if another enemy is close).
    cc_stage: null (displacement itself, Stage 1 Root from Successful Displacement trigger)
    item_baseline_replaced: |
      Ripcord Harpoon (single-use, 8m, pulls to you, no follow-up).
      Reel-In is repeatable, longer range, and feeds into displacement trigger.
    decision_created: |
      Pull the target INTO your team's kill zone. But pulling creates
      Overextension vulnerability if other enemies are nearby. Safe pull
      (isolated target) vs risky pull (target has friends who will punish
      your retraction window).

  - name: Sling Launch
    stance_availability: [long_range]
    type: Tentacle Attack (Displacement)
    gcd: true
    trigger_condition: Tentacle attached to target (via Tentacle Extend)
    effect: |
      Throw attached target in a chosen direction (up to 10m throw distance).
      150 potency to thrown target. If target collides with wall: +80 bonus
      potency (impact). If target collides with another enemy: 100 potency
      to both (bowling). Triggers Successful Displacement.
      Tentacle retracts on completion (2.0s retraction).
      Large enemies cannot be thrown (attachment breaks, 60 potency only).
    cc_stage: 1 (Root from Successful Displacement trigger)
    item_baseline_replaced: |
      Concussion Charge (directional blast, pushes 4m, 2s delay). Sling Launch
      throws farther (10m), deals more damage, has no delay, and can create
      collision combos items cannot replicate.
    decision_created: |
      WHERE to throw. Into a wall for bonus damage? Into another enemy for
      bowling? Off a ledge for environmental kill? Into an ally's AoE zone?
      Throw direction is the entire decision — the same ability does wildly
      different things based on aim.

  - name: Tether Drag
    stance_availability: [long_range]
    type: Tentacle Utility (Movement)
    gcd: true
    trigger_condition: Tentacle attached to immovable object (wall, pillar, large enemy)
    effect: |
      Instead of pulling target to self — pull SELF to target/anchor point.
      Grappler launches toward attachment point at high speed (gap close).
      If attached to terrain: repositioning tool (swing to ledge, cross gap).
      If attached to immovable enemy: Grappler arrives in melee with 100
      potency kick impact + Stage 1 Slow (2s) on arrival.
      Does NOT trigger Overextension (tentacle retracts naturally during travel).
    cc_stage: 1 (Slow on arrival to enemy only)
    item_baseline_replaced: |
      Flashstep Cartridge (8m teleport, fixed direction). Tether Drag is
      directional to attachment point, crosses gaps, and deals damage on
      arrival to enemies.
    decision_created: |
      Gap close or reposition? Using tentacle to pull YOURSELF means it's
      not available to pull ENEMIES for the retraction duration. Aggressive
      gap close vs staying at range and pulling targets to you.

  # -------------------------------------------------------------------------
  # INK STANCE ABILITIES
  # -------------------------------------------------------------------------
  - name: Ink Spray
    stance_availability: [ink]
    type: Tentacle Zone Creation
    gcd: true
    trigger_condition: Ink resource available (regenerates 1 charge per 8s, max 4 charges)
    effect: |
      Spray ink in a 4m radius zone at target location (up to 10m away).
      Zone persists for 30s or until cleaned (fire burns ink, wind disperses,
      water dilutes). Enemies inside suffer:
      - -60% detection range (Stage 1 vision reduction)
      - -30% attack accuracy
      Grappler sees normally within own ink (chemoreceptor navigation).
      Allies without chemoreceptors also suffer vision reduction in ink
      (friendly fire on vision — allies must be warned).
      Costs 1 Ink Charge.
    cc_stage: 1 (Vision Reduction)
    item_baseline_replaced: |
      Blindveil Powder (60% detection reduction, 12s) + Scatterlung Phial
      (-30% accuracy, 3m, 12s). Ink Spray creates LARGER zones that persist
      30s and combine vision + accuracy reduction in one zone.
    decision_created: |
      Ink affects ALLIES too (vision). Placement must account for party
      positioning. Spray between enemies and allies (screen) vs spray ON
      enemies (debuff) vs spray on self (home territory). Party coordination
      required — allies who enter ink are also blinded unless they have
      alternative sensing.

  - name: Murk Bomb
    stance_availability: [ink]
    type: Tentacle Attack (Targeted)
    gcd: true
    trigger_condition: Target within 8m
    effect: |
      Concentrated ink blast directly at enemy's sensory organs (eyes/ears).
      100 potency + Stage 1 Vision Reduction applied directly to target
      (personal debuff, not zone — target carries -60% detection for 8s
      regardless of position). Does not create a zone.
      If target is ALREADY inside an ink zone: duration extended to 12s
      and detection reduction increases to -80%.
      Costs 1 Ink Charge.
    cc_stage: 1 (Vision Reduction — personal debuff)
    item_baseline_replaced: |
      Blindveil Powder (thrown, 12s, radius). Murk Bomb is single-target
      but FOLLOWS the target (personal debuff vs stationary zone). The
      enemy cannot walk out of their own blinded state.
    decision_created: |
      Zone (Ink Spray, area control) vs personal debuff (Murk Bomb,
      single-target denial that travels). Use Spray to control space,
      use Bomb to shut down a specific threat's vision permanently.

  - name: Ink Slick
    stance_availability: [ink]
    type: Tentacle Zone Creation (Terrain)
    gcd: true
    trigger_condition: Ink resource available, ground-level target area
    effect: |
      Coat the floor in a 3m × 8m lane of slick ink. Enemies crossing
      the slick suffer:
      - 50% movement speed reduction while on the slick
      - Any displacement effect (push/pull/throw) moves target 50% FARTHER
        on slicked ground
      - Enemies that attempt to change direction on slick lose 1s of movement
        (slip animation)
      Persists 20s. Does NOT reduce vision (floor ink, not cloud ink).
      Costs 1 Ink Charge.
    cc_stage: 1 (Slow)
    item_baseline_replaced: |
      Thickglass Flask (-50% movement, 4m puddle, 20s) + Bogcrust Grenade
      (difficult terrain). Ink Slick combines movement denial with
      displacement amplification — a unique combo items cannot achieve.
    decision_created: |
      Floor denial vs air denial. Slick doesn't block vision (allies can
      see through it) but punishes movement. Place in chokepoints to slow
      advances, or between enemy and objective to create time. Synergizes
      with Long-range Grappler allies or any displacement class.

  - name: Ink Eruption
    stance_availability: [ink]
    type: Tentacle Attack (Zone Detonation)
    gcd: true
    trigger_condition: Ink Saturation trigger active (3+ zones within 15m)
    effect: |
      Detonate all active ink zones simultaneously. Each zone explodes for
      120 potency to all enemies inside, then reforms (zones are not consumed).
      Enemies hit by multiple overlapping explosions take 70% damage from
      second+ detonations (diminishing). The explosions refresh all zones
      to "Fresh Spray" state (reactivating the 40% slow for 2s on anyone
      currently inside).
      20s cooldown (cannot spam detonations).
    cc_stage: 1 (Slow from Fresh Spray refresh)
    item_baseline_replaced: |
      No direct item equivalent. Upheaval Flask (AoE eruption) is single-use,
      single-zone. Ink Eruption detonates an ENTIRE prepared battlefield.
      This is the premium class payoff for zone setup.
    decision_created: |
      Timing. Ink Eruption is strongest when enemies are inside multiple
      zones. Using it when enemies are at zone edges wastes damage.
      The Grappler must herd enemies INTO saturated territory before
      detonating — or wait for enemies to wander in naturally.

  # -------------------------------------------------------------------------
  # MELEE GRAPPLE STANCE ABILITIES
  # -------------------------------------------------------------------------
  - name: Seize
    stance_availability: [melee_grapple]
    type: Tentacle Grab (Initiation)
    gcd: true
    trigger_condition: Target within melee range (2m), Grip Gauge 20+
    effect: |
      Tentacle wraps target. Stage 1 Slow (-50% movement speed) applied.
      Target can still attack and use abilities but cannot move freely.
      Grappler's movement reduced by 30% (dragging target).
      Escalation timer begins: 4s until Full Pin available.
      Target can attempt Break Free (contest: target STR vs Grappler
      tentacle grip strength — modified by Grip Difficulty from Predator's Read).
      Costs 20 Grip Gauge.
    cc_stage: 1 (Slow/Restrain)
    item_baseline_replaced: |
      Frostweave Net (70% speed reduction, 6s OR 2 actions to break).
      Seize provides similar restraint but ESCALATES to Stage 3 if
      maintained — nets cannot become stronger over time.
    decision_created: |
      Who to grab. Seize one target = that target is locked down BUT
      the Grappler is now committed. Other enemies can attack the Grappler
      freely while they hold. Target selection must account for "can my
      allies protect me while I hold this?"

  - name: Full Pin
    stance_availability: [melee_grapple]
    type: Tentacle Escalation (Stage 3)
    gcd: true
    trigger_condition: Escalation Complete trigger active (Seize maintained 4s)
    effect: |
      Complete tentacle envelopment. Stage 3 Paralysis — target CANNOT act.
      No movement, no attacks, no abilities, no items.
      Grappler ALSO cannot move, cannot use main hand, cannot use other
      abilities (both combatants locked in place).
      Grappler CAN use Crush (see below) while pinning.
      Allies deal +25% damage to pinned target.
      Pin lasts until:
      - Grappler voluntarily releases
      - Grappler takes cumulative damage > 30% of max HP (grip breaks)
      - Ally uses CC on Grappler (friendly break — Grappler freed but pin lost)
      - 15s maximum duration (biological fatigue forces release)
      After pin ends: Grapple Broken trigger activates (3s Fatigue on Grappler,
      6s Grapple Immunity on target).
    cc_stage: 3 (Paralysis — Full Disable)
    item_baseline_replaced: |
      Stasis Pin (total freeze, 3s, single-use, projectile). Full Pin is
      INDEFINITE (up to 15s), does not require projectile accuracy, and
      provides ally damage bonus. The class version is overwhelmingly
      superior — but costs the Grappler's ENTIRE action economy.
    decision_created: |
      The Grappler becomes a CC tool, not a damage dealer. During Full Pin,
      the Grappler does almost nothing while allies shred the target.
      Worth it against high-value targets (boss adds, dangerous casters,
      enemy healers). Wasteful against trash. "Is this target worth ME
      being offline for up to 15s?"

  - name: Crush
    stance_availability: [melee_grapple]
    type: Tentacle Attack (While Pinning)
    gcd: true
    trigger_condition: Full Pin active (Grappler is pinning a target)
    effect: |
      Constriction pressure. 90 potency per GCD. The ONLY offensive action
      available during Full Pin. Steady damage, not burst. Over 15s of pin
      (maximum duration): 90 × 7 GCDs = 630 total potency from Crush alone
      (at 2.0s GCD). This is LOW personal DPS — the value is allies dealing
      +25% to the helpless target.
      Does not cost Grip Gauge (sustained by pin state).
    cc_stage: null (maintains existing Stage 3, does not add CC)
    item_baseline_replaced: No item equivalent — items cannot deal damage while CCing.
    decision_created: |
      Minimal. Crush is used every GCD during pin. The decision was made
      at Seize (who to grab) and Full Pin (whether to escalate). Once
      pinning, Crush is the only option. The "decision" is whether to
      RELEASE early for a different play vs continuing to Crush.

  - name: Suplex Release
    stance_availability: [melee_grapple]
    type: Tentacle Attack (Pin Termination)
    gcd: true
    trigger_condition: Full Pin active OR Seize active (holding target)
    effect: |
      Forceful release — slam target into ground in a chosen direction (4m throw).
      200 potency (impact). Target gains Grapple Immunity (6s).
      Grappler recovers immediately (NO Fatigue — voluntary controlled release
      rather than broken grip). Grappler can act normally next GCD.
      If target hits a wall: +100 bonus potency (wall splat).
      If target hits another enemy: 80 potency to secondary target + Stage 1
      Slow (2s) on both.
    cc_stage: 1 (Slow on collision only)
    item_baseline_replaced: |
      Concussion Charge (directional blast, push 4m). Suplex Release deals
      more damage, is directional to Grappler's choice, and can bowling-combo.
    decision_created: |
      When to end the pin (if ending before 15s max). End early to reposition?
      End into a wall for bonus damage? End into another enemy for bowling?
      End to grab a DIFFERENT target (swap targets after Immunity expires)?
      Pin duration vs Suplex timing is the sustained decision during grapple.

  - name: Submission Hold
    stance_availability: [melee_grapple]
    type: Tentacle Utility (While Grabbing)
    gcd: true
    trigger_condition: Seize active (Stage 1 grab, before Full Pin)
    effect: |
      Instead of escalating to Full Pin, apply a specific Stage 2 CC:
      - Arm Lock: Stage 2 Silence (target cannot use abilities) for 6s.
        Grab releases after application (Grappler free to act).
      - Leg Lock: Stage 2 Root (target cannot move AT ALL but can attack/cast)
        for 6s. Grab releases after application (Grappler free to act).
      Choose one on use. Does NOT progress toward Full Pin (alternative path).
      Costs 15 Grip Gauge.
    cc_stage: 2 (Silence OR Root — chosen on use)
    item_baseline_replaced: |
      Stupor Bell (AoE interrupt, one-time) for Arm Lock path.
      Ironvine Snare (root, breakable) for Leg Lock path.
      Submission Hold provides TARGETED Stage 2 CC that items deliver
      less precisely.
    decision_created: |
      Escalate to Stage 3 (Full Pin — 4s commitment, both locked) OR
      settle for Stage 2 (Submission Hold — immediate CC, Grappler freed)?
      Full Pin is stronger but costs more. Submission Hold is weaker but
      the Grappler keeps acting. Risk vs efficiency.

# =============================================================================
# SECTION 5: EQUIPMENT SYSTEM
# =============================================================================
equipment:
  main_hand:
    slot: Main Hand Weapon
    description: |
      Conventional melee weapons. The Grappler's main hand operates
      independently of the tentacle system. Weapon choice affects
      Predator's Strike and basic attacks only — tentacle abilities
      are not modified by main hand weapon type.
    weapon_options:
      - type: Flail
        characteristics: |
          Blunt/impact damage. Short range (2m). Cleave arc (hits multiple
          targets in 120° cone). Slower animation (2.2s base, reduced by
          GCD modifiers). Best for: multi-target melee, Melee Grapple stance
          (punish enemies attacking the pinned Grappler... if it could use
          main hand during pin — used BEFORE/AFTER pin sequences).
        stat_scaling: STR primary

      - type: Dual Kama
        characteristics: |
          Slash damage. Short range (1.5m). Two hits per GCD (each at 90%
          individual potency). Faster animation (1.8s base). Best for:
          single-target burst, Stealth stance (two hits = two chances to
          crit from ambush).
        stat_scaling: DEX primary

      - type: Sickle and Chain
        characteristics: |
          Slash + Pierce damage (mixed). Extended range (4m — chain allows
          reach). Single hit per GCD. Moderate animation (2.0s base). Best
          for: Long-range stance (reach supplements tentacle range),
          Ink stance (attack from within ink without closing to target).
        stat_scaling: STR/DEX split

  offhand:
    slot: Tentacle Augment
    description: |
      The tentacle IS the offhand slot. It cannot be unequipped — it is
      the Iblis Grabber's body. However, it CAN be augmented with
      equippable modifications that enhance stance-specific behavior.
      Augments are gear items that attach to/modify the tentacle.
      Augments progress with gear tiers like any equipment slot.
    augment_system: |
      Tentacle augments modify the biological appendage without replacing
      it. Think: grip-enhancing sucker coatings, ink sac capacity
      expansions, chromatophore boosters, muscle-density injections.
      These are biological UPGRADES, not mechanical replacements.
    augment_categories:
      - category: Grip Augments
        effect: Increase grab duration, reduce Break Free chance for targets, faster Escalation timer
        best_for: Melee Grapple stance
        example: "Irongrip Sucker Coating — Escalation timer reduced by 0.5s, Break Free difficulty +1 tier"

      - category: Reach Augments
        effect: Increase extension range (+2-4m), faster retraction speed, reduced Overextension penalty
        best_for: Long-Range stance
        example: "Elastin Fiber Weave — Extension range +3m, retraction time 1.5s (from 2.0s)"

      - category: Ink Augments
        effect: Increase ink charge capacity, faster regeneration, zone duration extension, new ink properties
        best_for: Ink stance
        example: "Enlarged Ink Sac — +2 max Ink Charges, regeneration 6s per charge (from 8s)"

      - category: Chromatophore Augments
        effect: Reduce detection radius while stealthed, faster re-stealth timer, silent kill threshold increase
        best_for: Stealth stance
        example: "Deep-Layer Chromatophore Implant — Detection radius 1.5m (from 2m), re-stealth timer 6s (from 8s)"

    stance_determines_behavior: |
      The augment provides stat bonuses, but the STANCE determines what
      the tentacle fundamentally DOES. A Grip Augment on a Long-Range
      stance Grappler provides marginal pull-strength bonuses but doesn't
      grant Full Pin access. Augments ENHANCE the chosen stance — they
      do not cross stance boundaries.

  grip_gauge:
    description: |
      Shared resource across all stances. Generates through main-hand
      attacks (5 per hit) and passively over time (2 per second in combat).
      Maximum: 100. Spent on tentacle abilities (costs vary 10-30).
      Gauge does NOT carry between combats (resets to 30 at combat start).
    generation:
      per_main_hand_hit: 5
      passive_in_combat: 2 per second
      combat_start: 30 (baseline)
      maximum: 100
    design_note: |
      Grip Gauge ensures the Grappler must USE their main hand to fuel
      tentacle abilities. Pure tentacle spam is impossible without
      conventional fighting. This prevents the Grappler from being
      "just the tentacle" — both systems feed each other.

  ink_charges:
    description: Ink stance-specific resource.
    max_charges: 4 (base, modified by Ink Augments)
    regeneration: 1 charge per 8s (base, modified by Ink Augments)
    design_note: |
      Separate from Grip Gauge. Ink is a BIOLOGICAL resource (sac refill
      rate) while Grip is a PHYSICAL resource (muscle engagement capacity).
      Ink stance manages both — Grip for Tentacle Lash/Murk Bomb, Ink
      Charges for zone creation.

# =============================================================================
# SECTION 6: CC STAGE BUDGET
# =============================================================================
cc_budget:
  description: |
    Each stance has a maximum CC stage it can access. Higher CC stage =
    more enemy disruption but more Grappler commitment. The budgets ensure
    that only Melee Grapple stance justifies true frontline commitment
    (Stage 3 access). Other stances operate at lower CC stages with
    correspondingly lower positional requirements.

  stealth_stance:
    max_stage: 2
    stage_1_access:
      - ability: Tentacle Lash (Stealth variant — no CC, just damage)
      - note: Stealth stance has minimal Stage 1 because its value is in the OPENER, not sustained CC
    stage_2_access:
      - ability: Ambush Crush — Silence (3s)
      - ability: Drag Under — Restrain (4s, with Isolation bonus)
    stage_3_access: NONE
    total_cc_output: |
      One strong opener (Silence + Restrain if combo'd correctly) then
      limited CC thereafter. Stealth stance front-loads its control into
      the initiation window. After opener, CC budget is spent.
    commitment_level: Low (stealth = avoid commitment until perfect moment)

  long_range_stance:
    max_stage: 2
    stage_1_access:
      - ability: Tentacle Lash (Long-range variant — 2m pull, no formal CC stage)
      - ability: Tether Drag — Slow (2s on arrival)
      - ability: Successful Displacement trigger — Root (2s)
    stage_2_access:
      - ability: Displacement itself functions as pseudo-Stage 2 (forced repositioning disrupts enemy plans)
      - note: No formal Stage 2 ability — displacement IS the control
    stage_3_access: NONE
    total_cc_output: |
      Repeated Stage 1 (slow, root, displacement) on a recurring basis.
      High FREQUENCY of minor CC, zero access to hard disables. The
      Long-range Grappler disrupts and repositions constantly but never
      fully locks a target down.
    commitment_level: Medium (must extend tentacle = vulnerable during retractions)

  ink_stance:
    max_stage: 1
    stage_1_access:
      - ability: Ink Spray — Vision Reduction (-60% detection, -30% accuracy in zone)
      - ability: Murk Bomb — Vision Reduction (personal, -60% to -80%)
      - ability: Ink Slick — Slow (50% movement reduction on floor)
      - ability: Fresh Spray trigger — Slow (40% for 2s)
      - ability: Ink Saturation trigger — Near-Blind (-80% detection)
    stage_2_access: NONE
    stage_3_access: NONE
    total_cc_output: |
      Extremely high Stage 1 VOLUME. Multiple simultaneous vision/slow
      effects across a wide area. The Ink Grappler doesn't disable
      anyone — it makes EVERYONE less effective across an entire zone.
      Area denial mastery at the cost of zero single-target lockdown.
    commitment_level: Low-Medium (zone creator, flexible positioning)

  melee_grapple_stance:
    max_stage: 3
    stage_1_access:
      - ability: Seize — Slow (50% movement, grab initiation)
      - ability: Suplex Release collision — Slow (2s)
    stage_2_access:
      - ability: Submission Hold — Silence OR Root (6s, chosen)
      - ability: Seize state itself — Restrain (limited movement, can still attack)
    stage_3_access:
      - ability: Full Pin — Paralysis (complete disable, up to 15s)
    total_cc_output: |
      Full escalation path: Stage 1 (Seize) → Stage 2 (Submission Hold
      OR continue escalating) → Stage 3 (Full Pin). Single-target
      lockdown that progresses through all three stages sequentially.
      Strongest CC in the game on a single target — but Grappler is
      locked down too.
    commitment_level: MAXIMUM (must be melee, must maintain grab, self-CCs during pin)

# =============================================================================
# SECTION 7: VULNERABILITY
# =============================================================================
vulnerability:
  universal_vulnerability:
    name: Stance Lock = Knowledge Gamble
    description: |
      The Grappler's core vulnerability is SYSTEMIC, not per-encounter.
      Wrong stance for content = suboptimal for the ENTIRE RUN. Unlike
      other classes that can adapt mid-fight, the Grappler committed
      before entering. A Stealth Grappler in content with no isolated
      targets and pervasive detection (tremorsense enemies, packed rooms)
      is a mediocre fighter with a useless tentacle configuration.
      A Melee Grappler in content with ranged-dominant enemies that never
      close to melee is chasing targets forever.
    mitigation: |
      Game knowledge. Community resources. Scouting on previous runs.
      This is WHY it's Special tier — you must KNOW what you're walking
      into. First-time blind runs as Grappler are inherently risky.

  per_stance_vulnerabilities:
    stealth:
      primary: |
        Detection = complete advantage loss. If Blown Cover triggers before
        First Blood, the Stealth Grappler loses its defining mechanic for
        the entire combat. Against enemies with wide detection ranges (SR3+
        with enhanced senses, tremorsense, blindsight), Stealth stance
        becomes almost non-functional.
      secondary: |
        Post-opener weakness. After breaking stealth, the Grappler has no
        special tentacle capabilities — it's a conventional melee fighter
        with a coiled tentacle that provides minimal benefit until re-stealth
        (which requires full combat exit).
      counter_content: |
        Dense pack encounters (no isolated targets for Drag Under).
        Detection-heavy enemies (tremorsense, sonar, smell-based tracking).
        Boss fights with no adds (cannot re-stealth against single target).

    long_range:
      primary: |
        Overextension. Tentacle extended = body exposed. The 2.0s retraction
        window is a full GCD where the Grappler takes +15% damage and has
        -20% attack speed. Enemies that close during extension punish hard.
      secondary: |
        Line of effect dependency. Tentacle Extend requires clear path to
        target. Tight corridors with obstacles, corners, and cover break
        the Long-range Grappler's entire initiation system.
      counter_content: |
        Melee-rush enemies that close faster than retraction time.
        Cluttered environments with no clean sight lines.
        Enemies immune to displacement (massive/anchored targets).

    ink:
      primary: |
        Ink affects allies. Vision reduction in ink zones applies to party
        members without chemoreceptors. Poorly placed ink actively HINDERS
        the party. Requires coordination and communication to avoid friendly
        fire on vision.
      secondary: |
        Ink resource depletion. 4 charges with 8s regeneration means
        sustained fights exhaust ink rapidly. 12s of no-ink during Ink
        Depleted trigger leaves the Grappler without their primary tool.
      tertiary: |
        Counterable terrain. Fire burns ink, wind disperses it, water
        dilutes it. Enemies with fire/wind abilities or environmental
        hazards can destroy ink zones, negating the Grappler's entire
        territorial setup.
      counter_content: |
        Fire-heavy environments/enemies (ink burned constantly).
        Open areas with wind (ink disperses, cannot maintain zones).
        Party compositions with no alternative sensing (ink blinds allies too).

    melee_grapple:
      primary: |
        Self-CC during Full Pin. The Grappler CANNOT ACT while pinning.
        If other enemies attack the Grappler during pin, they must absorb
        damage (30% HP breaks the pin) or an ally must peel. Without ally
        protection, the Grappler pins one target and dies to the others.
      secondary: |
        Must close to melee. Against kiting enemies, ranged-dominant packs,
        or flying targets, the Melee Grappler spends entire fights chasing
        without being able to initiate Seize.
      tertiary: |
        Grapple Immunity prevents chain-pinning the same target. After
        releasing (or being broken free), 6s window where that target is
        ungrabable. Against single-boss encounters, this creates cyclical
        downtime: pin → release → 6s Immunity → re-approach → Seize again.
      counter_content: |
        Multi-enemy encounters with no party support (pinning one = dying to others).
        Ranged/flying enemies that never enter melee range.
        High-damage content where Grappler HP doesn't survive pin duration.

# =============================================================================
# SECTION 8: ITEM COMPLEMENTARITY
# =============================================================================
item_complementarity:
  description: |
    What items still matter WITH a Grappler in the party? The Grappler
    replaces specific item categories (nets, grappling hooks, stealth
    items, smoke bombs) but creates demand for OTHER categories based on
    stance-specific weaknesses.

  universal_items_still_needed:
    - item_category: Healing/Recovery
      reason: |
        Grappler has zero self-healing across all stances. Main-hand focused,
        biological appendage focused — no healing modality. Potions and ally
        healing are mandatory, especially in Melee Grapple stance where the
        Grappler absorbs damage during pin sequences.
      example_items: [Harmony Draught, Rejuvenation Flask, Healing Specter]

    - item_category: Elemental Damage
      reason: |
        Grappler deals pure physical damage (tentacle constriction, weapon
        strikes). Against physically-resistant enemies, the Grappler has NO
        elemental option. Weapon coatings and elemental items fill this gap.
      example_items: [Gold Pine Resin, Conductance Gel, Charcoal Pine Bundle]

    - item_category: Anti-Air/Ranged Engagement
      reason: |
        All Grappler stances except Long-Range operate at melee distance.
        Even Long-Range maxes at 15m. Against flying enemies or 20m+ ranged
        attackers, the Grappler needs items to force engagement or close distance.
      example_items: [Ripcord Harpoon (for non-Long-Range stances), Gravwell Orb]

  stance_specific_complementarity:
    stealth:
      - item: Numbsense Spike
        reason: |
          Even WITH native stealth, a Numbsense Spike in the pre-combat area
          creates an even safer approach zone. Redundant with stealth but
          provides margin against SR4 enemies with 4m detection.
      - item: Speed consumables
        reason: |
          If Blown Cover triggers, the Stealth Grappler needs to either
          commit to fighting (weak post-opener) or flee to re-stealth.
          Speed items enable escape when stealth fails.

    long_range:
      - item: Ironvine Snare
        reason: |
          Root an enemy in place for easy Tentacle Extend targeting. Stationary
          targets are trivial to grab. Item setup enables class payoff.
      - item: Smokebreak Ampule
        reason: |
          If Overextension punishes (enemy closes while tentacle is out),
          Smokebreak Ampule provides 5s safety during retraction.

    ink:
      - item: Hexcage Lantern
        reason: |
          Allies blinded by friendly ink zones need alternative detection.
          A Hexcage Lantern placed outside the ink reveals enemy positions
          on the HUD even if allies can't physically see through the ink.
      - item: Fire-source items
        reason: |
          Ink is flammable. A fire item thrown INTO ink creates an instant
          fire zone (chain reaction). Enemies already vision-impaired cannot
          dodge the fire they can't see coming. Ink + Fire = area damage combo.

    melee_grapple:
      - item: Damage reduction consumables
        reason: |
          During Full Pin, the Grappler absorbs all incoming damage. Damage
          reduction items extend pin duration by keeping Grappler above the
          30% HP break threshold. Ironhide Tincture + Pin = longer lockdown.
      - item: Aggro redirection items
        reason: |
          Hollowform Decoy or Pheromone Tag redirects other enemies AWAY from
          the pinning Grappler. If enemies attack the decoy instead of the
          locked-down Grappler, the pin sustains longer.

# =============================================================================
# SECTION 9: HIT/MISS ANALYSIS (Class vs Item Baselines)
# =============================================================================
hit_miss_analysis:
  description: |
    Comparison of Grappler class capabilities against the item baselines
    defined in class_item_baselines.md. Where does the class clearly exceed
    items (HIT)? Where is the advantage marginal or situational (PARTIAL)?
    Where do items potentially perform BETTER than the class option (MISS)?

  hits:
    - comparison: Full Pin vs Stasis Pin (item)
      verdict: MASSIVE HIT
      analysis: |
        Stasis Pin: 3s total freeze, single-use, projectile (can miss).
        Full Pin: Up to 15s complete disable, unlimited uses per run, no
        projectile (melee grab), allies deal +25% damage to target.
        The class version is overwhelmingly superior in duration, reliability,
        and team value. The COST (Grappler self-CC) is the balancing factor
        — but a coordinated team always prefers 15s pin over 3s freeze.

    - comparison: Silent Approach vs Phantom Echo (item)
      verdict: CLEAR HIT
      analysis: |
        Phantom Echo: 3s invisibility AFTER combat starts, single-use.
        Silent Approach: Indefinite stealth BEFORE combat, native, unlimited.
        The temporal advantage is decisive — Stealth stance is invisible from
        the start of the instance, not from the moment a consumable is used
        mid-fight. Pre-combat stealth with no timer is fundamentally different
        from 3s post-combat stealth.

    - comparison: Ink Spray (persistent zones) vs Blindveil Powder (item)
      verdict: CLEAR HIT
      analysis: |
        Blindveil Powder: 12s duration, thrown radius, single-use.
        Ink Spray: 30s duration, up to 4 simultaneous zones, regenerating
        resource. Persistence (30s vs 12s) and repeatability (4 charges
        regenerating vs single-use) dominate. Ink also combines vision
        reduction WITH accuracy debuff in one zone.

    - comparison: Tentacle Extend/Reel-In vs Ripcord Harpoon (item)
      verdict: CLEAR HIT
      analysis: |
        Ripcord Harpoon: 8m range, pulls toward you only, single-use.
        Tentacle Extend: 15m range, multiple follow-up options (pull/throw/
        tether), unlimited uses, triggers bonus damage on displacement.
        Superior in range, versatility, and repeatability.

  partials:
    - comparison: Ink zones vs Webspinner Sac (item, area denial)
      verdict: PARTIAL — context-dependent
      analysis: |
        Webspinner Sac: Progressive slow → root at 6s exposure, 15s duration.
        Ink Spray: Vision + accuracy reduction, 30s duration, BUT no progressive
        root. Ink controls DIFFERENTLY (denies vision, not movement escalation).
        Against enemies that rely on sight, Ink wins. Against enemies that need
        to be rooted, the item does something Ink cannot.
        INK SLICK partially addresses this but is a separate ability/resource.

    - comparison: Stealth Grappler vs Numbsense Spike (item, detection prevention)
      verdict: PARTIAL — item is positional, class is mobile
      analysis: |
        Numbsense Spike: 5m radius zone, 15s, prevents detection OF stealth.
        Silent Approach: Mobile stealth on the Grappler (not a zone).
        The item creates a SAFE ZONE anyone can use. The class provides
        PERSONAL stealth that moves. Different utility — item helps the whole
        party hide in one spot, class helps one character move invisibly.

  misses:
    - comparison: Ink Stance (Stage 1 max) vs Stasis Pin (Stage 3 item)
      verdict: MISS — item provides higher CC stage than this stance
      analysis: |
        An Ink Grappler has NO access to Stage 3 CC. A party with an Ink
        Grappler that needs a hard disable must rely on items (Stasis Pin)
        or other party members. The stance trade is clear: massive area
        denial (Stage 1 volume) at the cost of zero single-target lockdown.
        A Stasis Pin in this party's inventory outperforms the Grappler's
        CC for single-target emergencies.

    - comparison: Stealth Grappler post-opener vs any offensive item loadout
      verdict: MISS — post-opener Stealth Grappler is underwhelming
      analysis: |
        After Ambush Crush + Drag Under resolve, the Stealth Grappler is
        a conventional melee fighter with no special tentacle utility until
        re-stealth (which requires exiting combat for 8s). During sustained
        combat, a non-Grappler with strong item loadout (offensive buffs,
        weapon coatings, etc.) may output more sustained value. The Stealth
        Grappler's value is FRONT-LOADED — if the opener doesn't decisively
        matter, the stance underperforms for the rest of the fight.

    - comparison: Melee Grappler solo vs item-loaded solo player
      verdict: MISS — solo Melee Grappler is actively bad
      analysis: |
        Full Pin locks BOTH combatants. Solo, this means the Grappler pins
        a target while other enemies freely attack. With no allies to
        capitalize on the pin or protect the Grappler, the self-CC is pure
        downside. A solo player with Stasis Pin (3s freeze, no self-lock)
        performs better than a solo Melee Grappler's Full Pin in any multi-
        enemy scenario.

# =============================================================================
# SECTION 10: ANTI-PATTERNS
# =============================================================================
anti_patterns:
  - anti_pattern: No Rotation
    description: |
      The Grappler does NOT have a rotation. There is no fixed sequence of
      abilities that repeats on a cycle. Each stance creates a DIFFERENT GAME
      with different decision trees:
      - Stealth: Read → Approach → One decisive opener → Conventional fighting
      - Long-Range: Attach → Choose displacement → React to consequences → Repeat
      - Ink: Place zones → Herd enemies into zones → Detonate/exploit → Replenish
      - Melee Grapple: Close → Seize → Decide escalation path → Pin or Submit → Release → Repeat
      None of these are "rotations." They are DECISION SEQUENCES where each
      node branches based on battlefield state.

  - anti_pattern: No Burst Cycle
    description: |
      There is no 2-minute window, no burst phase, no fixed damage cadence.
      The Grappler's output is determined by OPPORTUNITY, not by internal
      cooldown alignment:
      - Stealth: Burst exists (First Blood) but is a ONE-TIME opener, not recurring
      - Long-Range: Displacement damage is constant, not cyclical
      - Ink: Zone damage ramps with territory (3+ zones = Eruption access) but
        timing is determined by when enemies enter zones, not by an internal timer
      - Melee Grapple: Pin duration is determined by tactical need, not CD availability
      The Grappler is NEVER "waiting for cooldowns to align." It is always
      responding to what the battlefield presents.

  - anti_pattern: No Fixed Cadence
    description: |
      GCD is 2.0s base / 1.4s cap — this is the ONLY rhythmic element. Beyond
      individual button presses, there is no predictable pattern:
      - How long between engagements? (Depends on content pacing)
      - How long in a pin? (Depends on ally DPS and target HP)
      - How long stealthed? (Depends on enemy patrol patterns and patience)
      - How many ink zones before detonation? (Depends on enemy positioning)
      Each decision COULD happen at any moment. The Grappler plays the SITUATION,
      not the toolkit.

  - anti_pattern: Stances Are Different GAMES, Not Different Rotations
    description: |
      Critical distinction. A "stance-swap" class in other games often means:
      "same abilities, different buff package, swap every 30s." The Grappler's
      stances are PERMANENT IDENTITY CHOICES that determine:
      - Available abilities (completely different kit per stance)
      - Positioning requirements (stealth flank vs long-range vs melee commitment)
      - Party role (opener vs displacement vs area denial vs hard CC)
      - Gameplay pacing (one decisive moment vs sustained control vs territorial buildup vs wrestling match)
      A Stealth Grappler and a Melee Grappler in the same instance are playing
      two DIFFERENT classes that share a main-hand weapon and race.

  - anti_pattern: Crit Is Not RNG
    description: |
      The Grappler's critical hits are CONDITIONAL, not random:
      - First Blood (Stealth): guaranteed crit on unaware target (positional)
      - Successful Displacement (Long-Range): +30% damage after moving enemy 4m+ (conditional on displacement)
      - Prey Above 50% HP (Melee): +25% damage on grabbed target above 50% HP (HP-conditional)
      - Ink territory: No crit mechanic — damage is consistent zone pressure
      Every "bonus damage" moment is EARNED through meeting a condition, not
      rolled on a percentile. The player knows exactly when extra damage is
      available and plays to create those conditions.

# =============================================================================
# SECTION 11: OPEN QUESTIONS
# =============================================================================
open_questions:
  mechanical:
    - question: Does Full Pin immobilize the Grappler completely or allow slow drag movement?
      context: |
        Current design: both combatants locked. Alternative: Grappler can
        slowly drag the pinned target (0.5 m/s) — creates positional play
        during pin (drag target into hazard, away from adds). Increases
        Grappler agency during pin but reduces commitment cost.
      priority: HIGH
      affects: Melee Grapple stance identity, commitment cost calculation

    - question: How does stance-lock interact with open-world exploration content?
      context: |
        Current rule: changeable at rest points. But if a player is 30 minutes
        from a rest point and encounters content their stance cannot handle,
        they're stuck. Alternative: open-world allows stance swap with a 60s
        "reconfiguration" channel (biological tentacle state change takes time).
      priority: HIGH
      affects: Open-world playability, frustration prevention

    - question: What is the Break Free contest mechanic?
      context: |
        Target attempts to break Seize/Pin. Needs a clear contest system:
        - STR vs STR? (Siegebreaker would never be pinned)
        - Flat resistance per size category? (Large = always breaks?)
        - Grip Difficulty tiers (Easy/Medium/Hard/Immune) from Predator's Read?
        - Duration-based (longer grab = more likely to break)?
        Must feel fair to both Grappler and target.
      priority: HIGH
      affects: Melee Grapple viability against different enemy types

    - question: Can tentacle augments cross-pollinate between stances?
      context: |
        Current design: augments ENHANCE chosen stance, don't grant cross-stance
        abilities. But could a Grip Augment on an Ink Grappler provide a minor
        grab (not Full Pin, just brief Seize) for emergency self-peel? This
        would reduce stance vulnerability but blur stance identity.
      priority: MEDIUM
      affects: Augment design space, stance purity vs flexibility

    - question: How does Ink interact with the fire chain reaction system?
      context: |
        Ink is described as flammable. If a Pyrien Ninja/Samurai detonates ink
        zones, does this create a fire chain reaction? If so, Ink Grappler +
        Pyrien DPS is a devastating combo (massive ink territory → fire detonation
        across entire area). This needs explicit chain reaction rules.
      priority: MEDIUM
      affects: Cross-class synergy, party composition incentives, Layer 3 design

    - question: What happens if multiple Grapplers are in the same party?
      context: |
        Two Melee Grapplers pinning two targets simultaneously = massive CC.
        Two Ink Grapplers stacking zones = overwhelming territory control.
        Stealth + Long-Range combo = invisible scout marks targets for displacement.
        Should same-stance stacking be allowed? Limited? Incentivized?
      priority: MEDIUM
      affects: Party composition variety, stacking balance

  balance:
    - question: Is 15s Full Pin too long?
      context: |
        15s at 2.0s GCD = 7 ally GCDs of free damage at +25% bonus.
        Against a boss, this is enormous DPS value. Counterbalance: Grappler
        deals almost nothing (90 potency Crush per GCD), 30% HP breaks pin,
        6s immunity after. Is the ally damage amp during pin correctly offset
        by Grappler's lost personal DPS?
      priority: HIGH
      affects: Melee Grapple balance, party DPS calculations

    - question: Is Stealth stance viable against SR3+ content?
      context: |
        SR3 enemies use terrain, coordinate spawns, and have enhanced senses.
        SR4 enemies are instantly reactive. At what SR does Stealth stance
        become non-functional? If SR3+ = "always detected," Stealth stance
        has no endgame. Need clear SR-based detection rules.
      priority: HIGH
      affects: Stealth stance endgame viability, Special tier justification

    - question: Ink ally-friendly-fire on vision — too punishing?
      context: |
        Current design: allies in ink are also vision-impaired. This creates
        coordination demand but may be too punishing in random party matchmaking.
        Alternative: allies suffer 50% of the vision penalty (reduced but not
        immune). Or: allies can purchase "Chemoreceptor Tonic" item to see in
        Grappler ink for 60s (item complementarity design).
      priority: MEDIUM
      affects: Ink stance usability in non-coordinated parties

    - question: Long-range tentacle retraction — is 2.0s too punishing?
      context: |
        2.0s = one full GCD of vulnerability. At 1.4s GCD cap, retraction is
        LONGER than a GCD (cannot act until tentacle returns). This may feel
        too clunky. Alternative: retraction time scales with GCD (always = 1 GCD
        regardless of haste). Or: retraction can be interrupted by taking hit
        (tentacle whips back faster under pain reflex, 1.0s forced retraction
        on damage taken).
      priority: MEDIUM
      affects: Long-Range stance flow, punishment feel

  narrative:
    - question: What is the Iblis Grabber cultural relationship to stance selection?
      context: |
        Is stance selection a "rite" (cultural ceremony), a "mood" (biological
        state that shifts between hunts), or a "training" (specialized practice
        in one tentacle configuration)? This affects whether the lock feels like
        a CHOICE or a CONSTRAINT in fiction.
      priority: LOW
      affects: Player fantasy, lore coherence

    - question: Do Iblis Grabbers have a "natural" stance?
      context: |
        In fiction, is one stance the "default" (most octopi use stealth
        naturally) with others being trained configurations? Or are all four
        equally "natural" expressions of the species? This affects whether
        certain stances feel "advanced" narratively.
      priority: LOW
      affects: New player onboarding, lore depth

# =============================================================================
# SECTION 12: DESIGN VALIDATION SUMMARY
# =============================================================================
design_validation:
  item_baseline_test:
    can_party_without_class_still_accomplish_goals: true
    reasoning: |
      Ripcord Harpoon (pull), Stasis Pin (hard CC), Blindveil Powder (vision),
      Phantom Echo (stealth), Frostweave Net (restraint) — all exist as items.
      Any party can bring these consumables to cover the same strategic ground.
  
  is_item_solution_meaningfully_worse: true
    reasoning: |
      Items are single-use, shorter duration, weaker magnitude, and cannot
      escalate or persist. Stasis Pin = 3s vs Full Pin = 15s. Phantom Echo =
      3s post-combat stealth vs Silent Approach = indefinite pre-combat stealth.
      Items are the floor. The Grappler is the ceiling.
  
  does_class_provide_exclusive_capability: true
    reasoning: |
      Stance-wide integration (all abilities synergize within a stance),
      escalating CC (Stage 1 → 2 → 3 progression), biological persistence
      (no consumable economy drain), and the pre-commitment knowledge expression
      (choosing the right hunt type IS the skill).
  
  are_strategic_problems_clear: true
    reasoning: |
      Each stance solves a distinct Layer 1 problem:
      - Stealth: "We need a perfect opener before enemies react"
      - Long-Range: "We need to displace entrenched/elevated enemies repeatedly"  
      - Ink: "We need persistent area denial that outlasts encounters"
      - Melee Grapple: "We need a high-value target permanently disabled"

  no_burst_cycle_compliance: true
    reasoning: |
      No ability operates on a 2-minute timer. No stance has a "build up →
      burst" cadence. Stealth's opener is one-time. Long-Range displaces
      continuously. Ink builds territory at biological regeneration pace.
      Melee pins based on opportunity. All responses to strategy, not internal clocks.

  crit_not_rng_compliance: true
    reasoning: |
      First Blood = conditional (target unaware). Displacement bonus = conditional
      (4m+ movement). Prey above 50% = conditional (HP threshold). Zero random
      critical strike chance. Every bonus damage is earned positionally/conditionally.

  over_50_percent_hp_rule_integration: true
    reasoning: |
      Prey Above 50% HP trigger in Melee Grapple stance directly integrates
      the >50% enemy HP rule (+25% damage from all sources to grabbed targets
      above 50%). Grappler is incentivized to grab HEALTHY targets — making
      the systemic rule a core stance mechanic.
