# Classes/Shaman/Shaman_Complete.yaml
# ═══════════════════════════════════════════════════════════════════════════════
# SHAMAN — Offtank DPS (Curse) / Secondary Healer (Triage)
# ═══════════════════════════════════════════════════════════════════════════════
#
# "Offtank DPS with healing options. Overtuned output but difficult to maintain —
# Bone economy management + curse uptime + positioning for Hex Drain + summon
# maintenance. Players who juggle all four axes are rewarded with survivability
# + damage that looks unfair from outside but takes real execution to sustain."
#
# ToS Reference: Sadhu + Bokor + Featherfoot + Warlock (thematic basis)
# FFXIV Shape: Summoner (pet management) × Red Mage (triage utility)
# Identity: DPS who builds survivability THROUGH aggression. Not a tank. Not a
#           healer. A damage dealer who is harder to kill the better they play.
#
# REVISION NOTES:
#   - Summons are now PERSISTENT with real HP pools (not disposable/timed)
#   - Bone Spirit: 25% Shaman max HP, can hold corridors as sentry
#   - Floating Bone: 15% Shaman max HP, persists until destroyed (no timer)
#   - Invocation upgrades increase summon HP temporarily
#   - Strategy Rank 3+ enemies will target installations
#   - Spirit Ascension is USE-CASE driven, not a burst window
#
# Balance Ref: Combat/BalanceTargets.yaml
# ═══════════════════════════════════════════════════════════════════════════════

Key: Classes.Shaman

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 1: CLASS IDENTITY
# ─────────────────────────────────────────────────────────────────────────────

Identity:
  Name: Shaman
  Role: DPS
  SubRole: Offtank / Healer (Triage/Reactive only)
  DamageType: magical
  ExecutionArchetype: Resource Management + Reactive + Summon Maintenance
  # Four simultaneous axes of execution:
  # 1. Bone economy (generation vs spending, re-summoning destroyed assets)
  # 2. Curse uptime (Hex stacks on target via Floating Bone + direct skills)
  # 3. Positioning for Hex Drain (must be in range of hexed target to drain)
  # 4. Summon maintenance (HP monitoring, positioning, protection from AoE)
  InputModalityShift:
    Primary: "Watching enemy HP/cast bars (curse timing, interrupt decisions)"
    Secondary: "Monitoring summon HP (are they about to die? Reposition?)"
    Tertiary: "Managing own overshield (Hex Drain uptime, survivability)"
    Quaternary: "Pre-fight resource farming (Bone economy planning)"
    Quinary: "Party HP for triage threshold detection"
  DesignStatement: >
    Shaman is a curse-and-summon DPS whose survivability scales with aggression.
    Hex Drain converts curse damage into overshield, making the Shaman harder to
    kill the more curses they maintain. Bone allocation between Bone Spirit
    (persistent interrupt sentry) and Floating Bone (persistent curse engine) is
    the core decision. Summons are DEPLOYED ASSETS with real HP — they can hold
    corridors, control zones, and be destroyed by intelligent enemies. The class
    punishes defensive play and rewards calculated aggression with asset deployment.
  ToSLineage:
    - Sadhu: "Spirit Ascension — levitate + damage amp (Prana-inspired)"
    - Bokor: "Bone Spirit summon — persistent focused interrupt sentry"
    - Featherfoot: "Hex system — stack-based curse amplification + drain to overshield"
    - Warlock: "Dark Theurgy, Mastema, Invocation — heavy dark magic + summon upgrade"
  # NOTE: Miko influence is in FUNCTION only (cleanse, channel heal, burst heal).
  # Skill NAMES use bone/spirit/curse theming exclusively.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 1b: RACIAL LOCK — SOUE
# ─────────────────────────────────────────────────────────────────────────────

RacialLock:
  Race: Soue
  ParentCategory: Wanderers
  Enforcement: hard_lock  # Players MUST be Soue to play Shaman. No exceptions.
  LoreJustification: >
    The bone/spirit Shaman tradition developed in total isolation within the
    Soue's magic forest. It was not adapted from other peoples' martial or
    arcane traditions — it grew from the Soue's unique relationship with the
    forest's hazards and their mastery of magic. Their isolation from other
    races is the in-world reason this tradition belongs to them specifically.
  NPCException: >
    Non-Soue Shaman NPCs may exist as narrative edge cases (adopted into a
    Soue community, taught as a diplomatic gesture, etc.) but this path is
    NEVER available to players. An NPC Shaman who isn't Soue is a story beat,
    not a gameplay option.
  RacialSynergy:
    - "Soue are naturally stealthy — synergizes with pre-fight Bone farming (approach undetected)"
    - "Exceptional hearing — lore justification for Shaman's enemy-HP/cast-bar reading priority"
    - "Masters of magic — the bone/spirit tradition IS their magical expression"
    - "Forest isolation — summon-and-hold-ground playstyle mirrors defending forest territory"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 2: BALANCE TARGETS
# ─────────────────────────────────────────────────────────────────────────────

BalanceTargets:
  DPSRole: 100%  # Full DPS reference. This is a DPS class first.
  GlobalCooldown:
    Base: 2.0s
    HasteCap: 1.4s
  oGCDAnimationLock: 0.6s
  WeaveModel: single_weave_only
  # Shaman has several 2.5s cast GCDs — HIGH COMMITMENT skills that sacrifice
  # weave windows for potency. Intentional friction.

  PotencyBands:
    BasicFiller: 100        # Effigy (reference GCD)
    ComboFinisher: 150-180  # Curse Explosion at low stacks
    GaugeSpender_Small: 200-280  # Curse Explosion at 3-4 stacks
    GaugeSpender_Large: 400-500  # Spirit Channel (Bone Spirit consume)
    ClassUltimate: 600-800  # Invocation (total upgraded summon value over 25s)
    HealGCD: 250            # Ancestral Rite per tick (250 × 2 = 500 total)
    HealOGCD: 150-350       # Spirit Cleanse (150) to Bone Salve (350)

  DPSModeOutput: 100%      # Full DPS rotation (including overshield generation)
  TriageModeOutput: ~40%   # When shifted to healing priority
  OvershieldGeneration: >
    Hex Drain converts damage dealt to hexed targets into overshield.
    At full DPS uptime with 5 Hex stacks: generates ~15-20% max HP overshield
    per minute. This is the "offtank" layer — not mitigation, but HP buffer
    earned through aggression.

  ResourceTiming:
    TimeToFirstBoneSpend: "12-16s from combat start (Bone Harvest → deploy)"
    BoneConsumptionRate: "Varies with summon destruction (content dependent)"
    SafeContent_BoneRate: "1 Bone per 90-120s (summons rarely destroyed)"
    HardContent_BoneRate: "1 Bone per 20-30s (enemies destroy installations)"
    FullRaidBossBudget: "6-10 Bones over 8-10 minute encounter (AoE destruction)"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 3: CLASS MECHANIC — BONE SUMMON CYCLE (PERSISTENT ASSETS)
# ─────────────────────────────────────────────────────────────────────────────

ClassMechanic:
  Type: consumable_resource_dual_rite
  Name: "Bone Summon Cycle"
  Description: >
    MonsterBone is a quest item (FFXIV-style key item slot) that fuels two
    distinct summoning rites. The player's core decision is WHICH rite to
    spend Bones on: Bone Spirit (persistent interrupt sentry) or Floating Bone
    (persistent curse engine). Both compete for the same finite resource.
    BOTH SUMMONS ARE PERSISTENT — they have real HP pools and remain active
    until DESTROYED by enemies or dismissed by the Shaman. This makes them
    DEPLOYABLE ASSETS: place them strategically, protect them, and they
    control space indefinitely.

  Resource:
    Name: MonsterBone
    Type: quest_item
    StorageSlot: "Quest Item (separate from inventory)"
    MaxCapacity: 8
    Generation:
      MonsterKill_Elite: "Guaranteed 1 Bone drop"
      MonsterKill_Trash: "30% chance of 1 Bone drop"
      SkillGeneration:
        Name: "Bone Harvest"
        Type: oGCD
        Cooldown: 60s
        BonesGenerated: 2
        Description: >
          Primary bone source in boss fights / instanced content where trash
          farming isn't available. 2 Bones per minute from this alone.

  # ─────────────────────────────────────────────────────────────────────────
  # SUMMON: BONE SPIRIT (Persistent Interrupt Sentry)
  # ─────────────────────────────────────────────────────────────────────────
  BoneSpirit:
    Name: "Bone Spirit"
    SummonCost: 1_MonsterBone
    SummonAction: GCD (2.0s cast, instant summon at location)
    Persistence: "PERMANENT until destroyed or dismissed"
    HP: "25% of Shaman's max HP (scales with Shaman's VIT/gear)"
    Behavior:
      Default: "Follows Shaman (5y behind, auto-attacks Shaman's target)"
      Commanded: "Hold Position (stays at designated location, acts as sentry)"
    AutoAttack:
      Potency: 50
      Rate: "Every 3.0s"
      Range: "8y (melee-adjacent)"
    InterruptMechanic:
      Description: >
        Bone Spirit interrupts ANY enemy that begins casting within 8y of
        its position. Automatic — no Shaman input required. One interrupt
        per 10s (cooldown on the spirit, not the Shaman).
      InterruptRange: 8y
      InterruptCooldown: 10s
      InterruptReliability: "100% on non-boss casts. Boss casts: interrupts if interruptible."
    CorridorSentryRole: >
      In procgen maps with party splits, Shaman deploys Bone Spirit at a
      chokepoint and it interrupts any enemy that tries to cast there.
      Persistent sentry — holds the position indefinitely. The Shaman can
      leave and the spirit STAYS, controlling that corridor. A deployed asset.
    Destruction:
      DestroyedBy: "Enemy attacks (physical/magical). AoE that hits its position."
      OnDeath: "10s re-summon delay before a new Bone Spirit can be called."
      ReSummonCost: "1 MonsterBone"
      DeathPenalty: >
        Losing Bone Spirit is punishing: 10s without interrupt sentry + 1 Bone
        cost. Motivates protecting it (positioning away from AoEs) or accepting
        the economic cost in high-damage content.
    StrategyRankTargeting: >
      Rank 1-2 enemies: Ignore Bone Spirit (don't target installations)
      Rank 3 enemies: 30% chance to target Bone Spirit if in range
      Rank 4 enemies: PRIORITIZE destroying installations (will path to kill)
    DesignNote: >
      Bone Spirit is a STRATEGIC DEPLOYMENT. In easy content it follows you
      forever (free interrupts). In hard content (Rank 3-4), enemies actively
      try to destroy it — forcing positioning decisions. Place it where enemies
      can't easily reach, or accept the Bone cost of replacement.

  # ─────────────────────────────────────────────────────────────────────────
  # SUMMON: FLOATING BONE (Persistent Curse Engine)
  # ─────────────────────────────────────────────────────────────────────────
  FloatingBone:
    Name: "Floating Bone"
    SummonCost: 1_MonsterBone
    SummonAction: GCD (2.0s cast, appears at targeted location within 15y)
    Persistence: "PERMANENT until destroyed or dismissed (NO TIMER)"
    HP: "15% of Shaman's max HP (frailer than Bone Spirit — ranged installation)"
    Behavior:
      Default: "Stationary at placed location. Cannot be moved without re-casting."
      Repositioning: "Bone Pointing GCD can reposition (no extra Bone cost, just a GCD)"
    AuraEffect:
      Description: >
        All enemies within 10y of Floating Bone receive 1 Hex stack every 5s.
        This is the sustained curse engine — passive Hex application without
        Shaman GCD investment. Place it near enemies and it does the work.
      Range: 10y
      HexApplicationRate: "1 stack per 5s per enemy in range"
      MaxHexFromBone: "No cap — stacks indefinitely while in range"
    DamageAura:
      Potency: 30  # per tick, per enemy in range
      TickRate: 3.0s
      DamageType: magical (dark)
      Description: "Passive damage aura. Not strong alone, but sustains Hex Drain."
    CorridorControlRole: >
      Floating Bone placed at a corridor intersection applies Hex stacks to
      everything that passes through. Combined with Shaman's Hex Drain: any
      enemy that walked through the Bone's zone is now a Hex Drain target
      (overshield source). Deployed area denial — enemies entering the zone
      get cursed; Shaman drains them for survivability.
    Destruction:
      DestroyedBy: "Enemy attacks, AoE splash, intentional targeting by Rank 3+ enemies"
      OnDeath: "No re-summon delay. Costs 1 MonsterBone to re-deploy."
      DeathPenalty: >
        Lighter than Bone Spirit: no cooldown, just the Bone cost. But in hard
        content where it dies every 20-30s, the economic drain is significant.
        Placement strategy (out of enemy reach, behind walls, elevated) matters.
    StrategyRankTargeting: >
      Rank 1-2 enemies: Ignore Floating Bone entirely
      Rank 3 enemies: 50% chance to target if within melee range
      Rank 4 enemies: ACTIVELY SEEK AND DESTROY installations. Will path to kill.
    DesignNote: >
      Floating Bone is the sustained curse engine. In easy content: place once,
      never touch again (infinite Hex stacks on anything nearby). In hard content:
      placement is a puzzle (where can enemies NOT reach it?) and economic cost
      of replacement creates resource pressure. The REMOVAL of the 30s timer
      means Bone economy is BETTER in safe content (huge buff) and content-
      dependent in hard content (enemy destruction replaces timer expiry).

  # ─────────────────────────────────────────────────────────────────────────
  # BONE ECONOMY (Updated for Persistent Summons)
  # ─────────────────────────────────────────────────────────────────────────
  BoneEconomy:
    GenerationPerMinute:
      BoneHarvest: "2 per 60s (oGCD)"
      TrashKills: "Variable (0 in boss fights, ~1-3 in dungeon pulls)"
      BossScenario: "2 per minute (Bone Harvest only)"
      DungeonScenario: "3-5 per minute (Harvest + trash drops)"

    ConsumptionScenarios:
      EasyContent_Rank1_2:
        SummonDestructionRate: "Nearly zero (enemies ignore installations)"
        BoneConsumption: "Initial deployment only (2 Bones total for both summons)"
        NetEconomy: "Massively positive. Bones stockpile. Spirit Channel luxury."
        Description: >
          In Rank 1-2 content, summons never die. Deploy once at start,
          never re-summon. All future Bones go to Spirit Channel (burst
          consumption of Bone Spirit for 500p damage). Shaman is bone-rich.

      MediumContent_Rank3:
        SummonDestructionRate: "Floating Bone dies every ~60-90s, Bone Spirit every ~90-120s"
        BoneConsumption: "~1.5 Bones per minute (replacement only)"
        NetEconomy: "Slightly positive. Can still Spirit Channel occasionally."
        Description: >
          Rank 3 enemies sometimes target installations. Floating Bone
          (frailer, stationary) dies more often. Smart placement extends life.
          Economic pressure exists but manageable.

      HardContent_Rank4:
        SummonDestructionRate: "Floating Bone dies every ~20-30s, Bone Spirit every ~45-60s"
        BoneConsumption: "~3-4 Bones per minute (heavy replacement)"
        NetEconomy: "NEGATIVE. Bone Harvest alone can't keep up. Must triage."
        Description: >
          Rank 4 enemies actively hunt installations. Floating Bone is nearly
          disposable at this tier. Shaman must choose: keep replacing (drain
          Bone reserves) or fight without curse engine (massive DPS loss).
          STRATEGIC PLACEMENT is the answer — put Floating Bone where Rank 4
          enemies can't path to it (behind walls, elevated, in party's
          protected zone). This IS the hard-content skill expression.
        TriageDecision: >
          When Bones run low: prioritize Floating Bone (curse engine = DPS +
          overshield) over Bone Spirit (interrupt sentry = utility). Unless
          a specific boss has must-interrupt casts, in which case reverse.

      RaidBoss_8min:
        BoneHarvestTotal: "16 Bones (8 × 2 per Harvest)"
        EstimatedDestructions: "6-10 (AoE phases destroy both summons)"
        SpiritChannelBudget: "2-4 uses (400-500p burst, consumes Bone Spirit)"
        NetBudget: "Tight but manageable. 16 generated - 6-10 replacement - 2-4 Spirit Channel = 2-8 reserve"
        Description: >
          Over a full raid boss: summons die to AoE phases ~3-5 times each.
          Spirit Channel (consuming Bone Spirit for burst) costs both a Bone
          AND a re-summon delay. Budget carefully: don't Spirit Channel if
          you'll need interrupt sentry for the next phase.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 4: HEX SYSTEM (Curse Mechanic)
# ─────────────────────────────────────────────────────────────────────────────

HexSystem:
  Name: "Hex Stacks"
  Type: enemy_debuff_stacking
  MaxStacks: 5
  Duration: "30s per stack (refreshed on new stack application)"
  Application:
    - Source: "Floating Bone aura (1 stack per 5s, passive)"
    - Source: "Effigy GCD (1 stack per cast, active)"
    - Source: "Curse Explosion GCD (consumes stacks, does NOT apply)"
    - Source: "Hex Drain oGCD (drains stacks for overshield, does NOT apply)"
  StackEffects:
    1_Stack: "Target takes 5% increased damage from Shaman"
    2_Stacks: "Target takes 10% increased damage from Shaman"
    3_Stacks: "Target takes 15% increased damage + Hex Drain enabled"
    4_Stacks: "Target takes 20% increased damage + Curse Explosion bonus"
    5_Stacks: "Target takes 25% increased damage + maximum Hex Drain value"
  DesignIntent: >
    Hex stacks are the sustained damage amplifier AND the overshield fuel.
    Floating Bone applies them passively (no GCD cost) while Effigy applies
    them actively (additional to Floating Bone). The decision: let Floating
    Bone build stacks slowly (free) or accelerate with Effigy GCDs (costs
    DPS GCDs that could be other skills). At 3+ stacks, Hex Drain becomes
    available — the overshield engine. At 5 stacks, Curse Explosion deals
    maximum damage. The stack management IS the rotation.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 5: GCD SKILL ROSTER
# ─────────────────────────────────────────────────────────────────────────────

Skills:
  GCD:
    # ─────────────────────────────────────────────────────────────────────────
    # CORE DAMAGE GCDs
    # ─────────────────────────────────────────────────────────────────────────
    CoreDamage:
      - Id: effigy
        Name: Effigy
        ActionType: GCD
        CastTime: instant
        Recast: 2.0s
        Potency: 100
        DamageType: magical (dark)
        TargetType: single (ranged, 20y)
        AdditionalEffect:
          - "Applies 1 Hex stack to target"
        Description: >
          Basic curse bolt. The filler GCD. Applies Hex while dealing damage.
          Used to accelerate Hex stack buildup beyond Floating Bone's passive.
        RankRequired: 1
        DesignNote: "Reference GCD. 100p + 1 Hex stack. Simple, always useful."

      - Id: curse_explosion
        Name: Curse Explosion
        ActionType: GCD
        CastTime: 2.5s  # HIGH COMMITMENT — longer cast, no weave window
        Recast: 2.0s
        Potency: "50 + (Hex Stacks × 50). At 5 stacks: 300p"
        PotencyScaling:
          0_stacks: 50
          1_stack: 100
          2_stacks: 150
          3_stacks: 200
          4_stacks: 250
          5_stacks: 300
        DamageType: magical (dark)
        TargetType: single (ranged, 20y)
        AdditionalEffect:
          - "CONSUMES all Hex stacks on target"
          - "AoE splash: 50% potency to enemies within 5y of target"
        Description: >
          Detonates accumulated curses. Consumes all Hex stacks for burst damage.
          The payoff skill: let stacks build → explode for massive damage →
          Floating Bone re-applies → repeat. 2.5s cast = fully committed.
        RankRequired: 1
        DesignNote: >
          The 2.5s cast is intentional friction: you CANNOT weave an oGCD
          after Curse Explosion. The player chooses between Curse Explosion
          (high potency, no weave) and Effigy spam (lower potency, can weave
          Hex Drain for overshield). The tension IS the decision.

      - Id: dark_theurgy
        Name: Dark Theurgy
        ActionType: GCD
        CastTime: 2.5s
        Recast: 2.0s
        Potency: 250
        DamageType: magical (dark)
        TargetType: circle (ground-targeted, 5y radius)
        AdditionalEffect:
          - "Enemies in area receive 1 Hex stack"
          - "Leaves persistent ground effect for 6s (30p/tick, 2 ticks = 60p additional)"
        TotalPotency: 310  # 250 initial + 60 ground ticks
        Description: >
          Calls dark energy from below. AoE damage + Hex application + lingering
          ground damage. The AoE version of Effigy for multi-target scenarios.
        RankRequired: 2
        Cooldown: 15s
        DesignNote: >
          AoE Hex applicator. Combined with Floating Bone's aura: enemies
          enter Floating Bone's 10y → passive stacking. Dark Theurgy hits
          them for bonus immediate stacks + ground damage. Multi-target
          Hex acceleration.

      - Id: mastema
        Name: Mastema
        ActionType: GCD
        CastTime: 2.5s
        Recast: 2.0s
        Potency: 350
        DamageType: magical (dark)
        TargetType: single (ranged, 20y)
        AdditionalEffect:
          - "If target has 3+ Hex stacks: potency increased to 450"
          - "Does NOT consume Hex stacks"
        Cooldown: 30s
        Description: >
          Heavy curse bolt. Enhanced against hexed targets but does NOT
          consume stacks. The 'safe' big hit — doesn't reset your Hex
          buildup like Curse Explosion does.
        RankRequired: 2
        DesignNote: >
          The non-consuming nuke. Used when you want damage WITHOUT resetting
          Hex stacks. Pair: maintain 5 stacks → Mastema (450p, stacks stay)
          → Hex Drain (overshield from maintained stacks) → Mastema again.
          Vs Curse Explosion: CE does more total damage but resets the cycle.

    # ─────────────────────────────────────────────────────────────────────────
    # SUMMON GCDs
    # ─────────────────────────────────────────────────────────────────────────
    Summons:
      - Id: summon_bone_spirit
        Name: Summon Bone Spirit
        ActionType: GCD
        CastTime: 2.0s
        Recast: 2.0s
        Potency: 0  # Summon, not damage
        TargetType: "Point blank (summoned at Shaman's feet)"
        ResourceCost: {MonsterBone: 1}
        Cooldown: "10s after previous Bone Spirit is destroyed"
        AdditionalEffect:
          - "Summons Bone Spirit (25% Shaman max HP)"
          - "Persistent until destroyed or dismissed"
          - "Auto-attacks Shaman's target (50p/3s)"
          - "Auto-interrupts casts within 8y (10s interrupt CD)"
        Description: >
          Calls forth a Bone Spirit from consumed MonsterBone. The spirit
          persists indefinitely, following the Shaman or holding a commanded
          position. A deployed interrupt sentry with meaningful HP.
        RankRequired: 1
        DesignNote: >
          The 10s cooldown after death prevents instant re-summon. Losing
          your Bone Spirit is a 10s penalty window + 1 Bone cost. Motivates
          PROTECTING the summon (positioning away from AoE, commanding it to
          safe spots during dangerous phases).

      - Id: bone_pointing
        Name: Bone Pointing
        ActionType: GCD
        CastTime: 2.0s
        Recast: 2.0s
        Potency: 0  # Summon/reposition, not damage
        TargetType: "Ground-targeted (place Floating Bone within 15y)"
        ResourceCost: "{MonsterBone: 1} if no Floating Bone exists; FREE if repositioning"
        AdditionalEffect:
          - "If no Floating Bone: Summons new Floating Bone (1 Bone cost)"
          - "If Floating Bone exists: REPOSITIONS it (no Bone cost, just GCD)"
          - "Floating Bone: 15% Shaman max HP, persistent, 10y curse aura"
        Description: >
          Deploys or repositions the Floating Bone installation. First cast
          costs a MonsterBone. Subsequent casts (while Floating Bone lives)
          are free repositions — just costs the GCD.
        RankRequired: 1
        DesignNote: >
          Repositioning is FREE (no Bone cost) but costs a GCD. This means
          moving your curse engine mid-fight is a DPS loss (spending a GCD on
          positioning instead of damage) but NOT an economic loss. In dynamic
          fights: reposition freely. In static fights: place once, forget.

      - Id: spirit_channel
        Name: Spirit Channel
        ActionType: GCD
        CastTime: 2.5s (channeled, interruptible)
        Recast: 2.0s
        Potency: 500
        DamageType: magical (dark)
        TargetType: single (ranged, 15y, travels from Bone Spirit to target)
        ResourceCost: "CONSUMES Bone Spirit (destroys it)"
        Cooldown: 30s
        AdditionalEffect:
          - "DESTROYS your Bone Spirit on cast (it IS the projectile)"
          - "10s re-summon delay applies after (as if Spirit died)"
          - "If target has Hex stacks: +100p per stack (max 500 + 500 = 1000p)"
        PotencyWithHex:
          0_stacks: 500
          3_stacks: 800
          5_stacks: 1000
        Description: >
          Channels all energy through the Bone Spirit, launching it as a
          devastating projectile. DESTROYS the Spirit on use. The ultimate
          single-target damage skill — but the cost is losing your interrupt
          sentry and spending 10s without it + 1 Bone to re-summon.
        RankRequired: 2
        DesignNote: >
          The BIG SACRIFICE decision. 1000p at 5 Hex stacks is enormous
          (ClassUltimate band level), but you lose a persistent asset with 25%
          max HP that was holding a corridor or providing interrupts. Use case:
          "Is this burst more valuable than my sentry right now?" In boss fights
          with must-interrupt phases: DON'T Spirit Channel before that phase.
          In pure DPS checks with no interrupts needed: Channel freely.

    # ─────────────────────────────────────────────────────────────────────────
    # SPIRIT ASCENSION (Personal Combat Steroid)
    # ─────────────────────────────────────────────────────────────────────────
    SpiritAscension:
      - Id: spirit_ascension
        Name: Spirit Ascension
        ActionType: GCD
        CastTime: 1.0s
        Recast: 2.0s
        Potency: 0  # Buff, not damage
        Duration: 15s
        Cooldown: 120s
        AdditionalEffect:
          - "Shaman levitates (immune to ground-targeted AoE, can cross gaps)"
          - "All damage dealt increased by 20% (Prana buff)"
          - "Movement speed +30% while levitating"
          - "Cannot be targeted by melee attacks (elevated above melee range)"
          - "CAN be targeted by ranged/magical attacks"
        Description: >
          Ascends into spiritual form. Levitates above the battlefield —
          immune to ground AoE, melee attacks, and movement restrictions.
          Deals 20% more damage from elevated state. The Sadhu OBE.
        RankRequired: 2
        DesignNote: >
          USE CASE DRIVEN. NOT a burst window. NOT aligned to external timers.
          Spirit Ascension is used when the SITUATION demands it:
          - Boss covers floor in AoE → Ascend (immune to ground damage)
          - Need to cross a gap/chasm in procgen map → Ascend (levitate)
          - Push a corridor full of melee enemies → Ascend (immune to melee)
          - Need maximum DPS for a short duration → Ascend (+20%)
          The 120s CD means 1-2 uses per dungeon wing, 4-5 per raid boss.
          Every use is a DECISION about what the situation demands.

    # ─────────────────────────────────────────────────────────────────────────
    # HEALING GCDs (Triage Only)
    # ─────────────────────────────────────────────────────────────────────────
    Healing:
      - Id: ancestral_rite
        Name: Ancestral Rite
        ActionType: GCD
        CastTime: 2.5s (channeled, 2 ticks)
        Recast: 2.0s
        Potency: 0
        HealingPotency: "250 per tick × 2 ticks = 500 total"
        TargetType: single (ally or self, 20y)
        Description: >
          Channels ancestral energy to heal a target. Two ticks over 2.5s.
          High commitment (long cast, no weave). Every Ancestral Rite cast
          is a GCD NOT spent on damage → NOT generating overshield → 
          making you LESS survivable through reduced aggression.
        RankRequired: 1
        DesignNote: >
          The core triage heal. 500 total healing potency is strong, BUT:
          the DPS loss means less Hex Drain, which means less overshield,
          which means Shaman becomes MORE vulnerable while healing others.
          Healing is a SACRIFICE of personal defense. Use only when ally
          would die without it.

      - Id: bone_salve
        Name: Bone Salve
        ActionType: GCD
        CastTime: instant
        Recast: 2.0s
        HealingPotency: 350
        TargetType: single (ally or self, 20y)
        ResourceCost: {MonsterBone: 1}
        Description: >
          Crushes a MonsterBone into healing dust. Instant, strong, but
          costs a Bone. The emergency heal: instant cast (no commitment)
          but economic cost (1 Bone = 1 potential summon).
        RankRequired: 1
        DesignNote: >
          Instant heal for emergencies. The Bone cost is REAL — that's a
          Floating Bone replacement or Spirit Channel you can't use later.
          Triage decision: "Is this ally's life worth 1 Bone?"

  # ─────────────────────────────────────────────────────────────────────────
  # oGCD ROSTER
  # ─────────────────────────────────────────────────────────────────────────
  oGCD:
    Offensive:
      - Id: hex_drain
        Name: Hex Drain
        ActionType: oGCD
        AnimationLock: 0.6s
        Potency: 0  # Not damage — conversion
        Effect: >
          Drains Hex stacks from target, converting them into OVERSHIELD on
          Shaman. Does NOT remove Hex stacks — reads their value.
          Overshield gained: 3% max HP per Hex stack on target.
          At 5 stacks: 15% max HP overshield per Hex Drain use.
          Overshield stacks up to 30% max HP (2 full drains at 5 stacks).
        OvershieldPerStack: "3% max HP"
        OvershieldCap: "30% max HP (total, from any source)"
        Cooldown: 8s
        Range: 20y
        Condition: "Target must have 3+ Hex stacks"
        Description: >
          Siphons curse energy from the hexed target into a protective shell.
          The harder you curse, the harder you are to kill. This is THE
          overshield engine. Always useful — overshield never wasted.
        RankRequired: 1
        DesignNote: >
          Previously "Blood Sucking" — renamed. Core survivability loop:
          maintain Hex stacks on target → Hex Drain every 8s → overshield
          maintained. If you stop cursing (healing GCDs, utility GCDs),
          stacks decay, Hex Drain weakens, overshield falls. AGGRESSION
          = DEFENSE. This is the class's core thesis.

      - Id: spirit_cleanse
        Name: Spirit Cleanse
        ActionType: oGCD
        AnimationLock: 0.6s
        Effect: >
          Removes 1 debuff from target ally. Also heals for 150 potency.
          If no debuff to remove: just heals 150p.
        HealingPotency: 150
        Cooldown: 30s
        TargetType: single (ally, 20y)
        Description: "Cleanses a debuff from an ally. Minor heal attached."
        RankRequired: 1

      - Id: bone_harvest_ogcd
        Name: Bone Harvest
        ActionType: oGCD
        AnimationLock: 0.6s
        Effect: "Generates 2 MonsterBones immediately."
        ResourceGrant: {MonsterBone: 2}
        Cooldown: 60s
        Description: "Extracts bone essence from the environment. 2 Bones."
        RankRequired: 1

      - Id: summon_command
        Name: Summon Command
        ActionType: oGCD
        AnimationLock: 0.3s  # Very short — just a command
        Effect: >
          Commands Bone Spirit to either FOLLOW (default) or HOLD POSITION.
          Toggle between modes. When holding: Bone Spirit stays at its current
          location and acts as a sentry. When following: returns to Shaman.
        Cooldown: 3s
        Description: "Commands Bone Spirit: follow or hold position."
        RankRequired: 1
        DesignNote: >
          The deployment command. Party hits a corridor split → command Bone
          Spirit to hold at the intersection → it interrupts anything casting
          there while Shaman goes down a different path. Strategic deployment.

    # ─────────────────────────────────────────────────────────────────────────
    # INVOCATION (Summon Upgrade — Rank 3)
    # ─────────────────────────────────────────────────────────────────────────
    Invocation:
      - Id: invocation
        Name: Invocation
        ActionType: oGCD
        AnimationLock: 0.6s
        Cooldown: 120s
        Duration: 25s
        Effect: >
          Upgrades ALL active summons to Greater versions for 25s:
          - Greater Bone Spirit: HP increases to 40% of Shaman max HP.
            Auto-attack potency increased to 80. Interrupt CD reduced to 6s.
          - Greater Floating Bone: HP increases to 25% of Shaman max HP.
            Hex application rate doubled (1 stack per 2.5s). Damage aura
            potency increased to 50/tick.
          After 25s: revert to normal stats. Current HP capped at new max
          if over (no HP loss from downgrade unless damaged during).
        Description: >
          Invokes dark power into active summons. Both become Greater versions
          for 25s — tankier, faster, stronger. The class ultimate window.
        RankRequired: 3
        DesignNote: >
          USE CASE DRIVEN (not a burst cadence):
          - Boss entering AoE-heavy phase → Invocation (summons survive AoE)
          - Need rapid Hex buildup for Spirit Channel → Invocation (doubled rate)
          - Rank 4 enemies trying to destroy installations → Invocation (more HP)
          - Party needs maximum DPS push → Invocation (+damage from summons)
          120s CD means 4-5 uses per raid boss. Each is a DECISION about
          what the current situation demands from the summons.
        BalanceValidation: >
          Total value over 25s: increased auto damage (~200p extra from Spirit)
          + faster Hex buildup (enables faster Curse Explosion/Spirit Channel
          cycles, ~200-400p extra via amplified Hex consumption) + survival
          (summons live through AoE). Total effective potency: 600-800p range
          when including the accelerated Hex economy. ClassUltimate band ✓.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 6: SUMMON POSITIONING SYSTEM
# ─────────────────────────────────────────────────────────────────────────────

SummonPositioning:
  Description: >
    Both summons are DEPLOYABLE ASSETS with positional strategy. Their
    effectiveness depends on WHERE they are placed relative to enemies,
    allies, and map geometry. This section defines positioning behaviors.

  BoneSpiritPositioning:
    DefaultMode: "Follow Shaman (5y behind, attacks Shaman's target)"
    HoldMode: "Stays at commanded location. Acts as sentry."
    HoldBehavior:
      - "Auto-attacks any enemy within 8y"
      - "Interrupts any enemy casting within 8y (10s CD)"
      - "Does NOT move to chase enemies (holds position absolutely)"
      - "Does NOT return to Shaman until commanded"
    BestPositions:
      Corridor: "At intersection/chokepoint — interrupts anything casting in the passage"
      BossFight: "Behind boss (avoids frontal cleaves) or at Shaman's location"
      PartySplit: "Left behind at a junction the party already cleared (rear guard)"
    WorstPositions:
      - "In boss's frontal cleave (dies to incidental damage)"
      - "In the center of an AoE-heavy room (dies to AoE)"
      - "Far from any enemies (wastes interrupt capability)"

  FloatingBonePositioning:
    Mode: "Always stationary. Placed by Bone Pointing GCD."
    Repositioning: "Bone Pointing GCD (free, just costs a GCD to move it)"
    BestPositions:
      CorridorEntrance: "Curses everything that enters. Enemies walk into Hex zone."
      BehindParty: "Safe from melee enemies. Ranged/AoE still threatens."
      ElevatedLedge: "If map geometry allows — unreachable by melee enemies."
      NearBoss: "Maximizes Hex application on boss. Risky (AoE destroys it)."
    WorstPositions:
      - "In melee range of Rank 3+ enemies (actively targeted)"
      - "In predictable boss AoE zones (dies every pattern)"
      - "Far from any enemies (no Hex application)"
    DesignNote: >
      Floating Bone placement is the SPATIAL PUZZLE of Shaman gameplay.
      "Close enough to curse, far enough to survive." In easy content: trivial
      (place next to boss, ignore). In hard content: genuine positional
      decision-making every phase transition.

  StrategyRankAggroTable:
    Rank1: "Ignore all installations. Only attack players."
    Rank2: "Ignore installations unless directly pathing through them."
    Rank3: "30% Bone Spirit targeting / 50% Floating Bone targeting (if in range)"
    Rank4: "PRIORITIZE DESTROYING installations. Will path specifically to kill."
    DesignImplication: >
      Content difficulty directly scales summon management difficulty:
      - Rank 1-2: Set and forget. Deploy once, never think about it again.
      - Rank 3: Occasional repositioning. Summons die sometimes.
      - Rank 4: Constant management. Summon HP matters. Placement is a puzzle.
      This creates a natural skill floor (easy content = low maintenance) and
      skill ceiling (hard content = full positional mastery).

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 7: RANK PROGRESSION
# ─────────────────────────────────────────────────────────────────────────────

RankProgression:
  Rank1:
    Label: "Bone Acolyte"
    Unlocks:
      - "Effigy (filler GCD + Hex application)"
      - "Curse Explosion (Hex consumer, burst damage)"
      - "Summon Bone Spirit (persistent interrupt sentry)"
      - "Bone Pointing / Floating Bone (persistent curse engine)"
      - "Hex Drain (overshield generation)"
      - "Bone Harvest (resource generation)"
      - "Ancestral Rite (triage heal)"
      - "Bone Salve (emergency instant heal)"
      - "Spirit Cleanse (debuff removal)"
      - "Summon Command (deploy/recall)"
    DPSProfile: "85-90% of DPS reference (limited Hex economy)"
    SurvivalProfile: "Moderate (overshield via Hex Drain + Bone Salve)"
    SummonCapability: "Both summons available. Basic HP. Functional sentry."

  Rank2:
    Label: "Bone Shaman"
    Unlocks:
      - "Spirit Channel (consume Bone Spirit for burst)"
      - "Spirit Ascension (levitate + damage steroid)"
      - "Dark Theurgy (AoE Hex applicator)"
      - "Mastema (heavy non-consuming nuke)"
    DPSProfile: "95-105% of DPS reference (overtuned when all axes managed)"
    SurvivalProfile: "High (Spirit Ascension grants immunity to ground/melee)"
    SummonCapability: "Full toolkit. Spirit Channel enables burst sacrifice."
    DesignNote: >
      Rank 2 is where Shaman becomes 'overtuned but difficult.' All four
      axes of execution are now online. Players who juggle all four
      (Bone economy + Hex uptime + Hex Drain + summon maintenance) can
      hit 105% of DPS reference — intentionally above baseline to reward
      execution complexity. Players who drop any axis fall to 85-90%.

  Rank3:
    Label: "Bone Elder"
    Unlocks:
      - "Invocation (upgrade summons to Greater versions)"
    DPSProfile: "100-110% of DPS reference (with Invocation windows)"
    SurvivalProfile: "Very High (tankier summons survive longer, less replacement drain)"
    SummonCapability: "Greater versions available. Summons can survive Rank 4 AoE during Invocation."
    DesignNote: >
      Rank 3 gives quality-of-life more than new complexity: Greater summons
      survive longer in hard content, reducing Bone drain. The skill ceiling
      doesn't change — execution is the same. But the FLOOR rises because
      summons are harder to lose.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 8: ROTATION DESIGN (USE-CASE DRIVEN)
# ─────────────────────────────────────────────────────────────────────────────

RotationDesign:
  Philosophy: >
    There is NO fixed rotation. Shaman's GCD priority is determined by
    SUMMON STATUS + HEX STACKS + BONE RESERVES + PARTY HEALTH. The
    "rotation" is a decision tree that changes every GCD based on:
    "Are summons alive? → Maintain Hex. Summon dead? → Re-summon.
    Hex at 5? → Explode or Mastema. Ally dying? → Triage. Bones low? →
    Conservative play." The skill expression is READING ALL FOUR AXES
    simultaneously and making the correct GCD choice.

  ScenarioFlows:
    SingleTarget_Boss_Stable:
      Description: "Boss fight. Both summons alive. Hex cycling."
      Priority:
        1: "Bone Pointing (place Floating Bone near boss if not placed)"
        2: "Effigy (apply Hex stacks, filler damage)"
        3: "Hex Drain on CD when 3+ stacks (overshield maintenance)"
        4: "Mastema on CD (450p at 3+ stacks, doesn't consume)"
        5: "Curse Explosion at 5 stacks (300p + AoE splash, consumes)"
        6: "Spirit Channel when burst needed + interrupt not required soon"
        7: "Spirit Ascension when boss covers floor in AoE"
      DPSOutput: "100-105% of reference"
      OvershieldUptime: "~80-90% (Hex Drain every 8s)"
      BoneConsumption: "Low (summons persist, Bone Harvest stockpiles)"

    SingleTarget_Boss_HardPhase:
      Description: "Boss AoE phase. Summons taking damage. Hex disrupted."
      Priority:
        1: "Invocation (if available — keep summons alive through AoE)"
        2: "Re-summon destroyed assets (Bone cost)"
        3: "Reposition Floating Bone to safe spot (Bone Pointing, free GCD)"
        4: "Command Bone Spirit to safe location (oGCD)"
        5: "Effigy/Mastema while re-establishing Hex"
        6: "Spirit Ascension if floor is covered (levitate over AoE)"
      DPSOutput: "70-85% (re-summoning GCDs = DPS loss)"
      BoneConsumption: "High (1-2 Bones per phase for replacement)"
      DesignNote: >
        Hard phases COST DPS and COST Bones. This is intentional — hard
        content penalizes Shaman's deployable assets. The skill is MINIMIZING
        the penalty through smart placement and Invocation timing.

    MultiTarget_Corridor:
      Description: "Pack of enemies in a corridor. Floating Bone zone control."
      Priority:
        1: "Bone Pointing at corridor entrance (Hex zone on approach)"
        2: "Command Bone Spirit to hold intersection (interrupt sentry)"
        3: "Dark Theurgy on pack (AoE Hex + ground damage)"
        4: "Effigy on priority target (build stacks for Curse Explosion)"
        5: "Curse Explosion on 5-stack target (300p + splash)"
        6: "Hex Drain between casts (overshield maintenance)"
      DPSOutput: "90-95% (efficient — Floating Bone does passive work)"
      ZoneControl: "Floating Bone curses; Bone Spirit interrupts; Shaman nukes."
      DesignNote: >
        The 'deployment' scenario. Shaman sets up zone control with summons
        and then operates as a ranged DPS from behind the setup. In corridors,
        this creates a kill zone: enemies walk in → get Hexed by Floating Bone
        → get interrupted by Bone Spirit → get exploded by Shaman.

    PartySplit_Solo:
      Description: "Shaman alone in a wing. Summons as force multipliers."
      Priority:
        1: "Bone Spirit on FOLLOW (auto-interrupts what you're fighting)"
        2: "Floating Bone placed in each room as you enter (cursing while you fight)"
        3: "Effigy spam + Hex Drain loop (DPS + self-sustain)"
        4: "Spirit Ascension for dangerous rooms (immunity + speed)"
        5: "Bone Salve for emergency self-heal (costs Bone — worth it to survive)"
      DPSOutput: "95-100% (solo = full commitment to damage)"
      SurvivalMethod: "Hex Drain overshield + Bone Salve + Spirit Ascension immunity"
      DesignNote: >
        Shaman is an excellent solo operator due to overshield generation.
        As long as you're cursing and draining, you have effective HP buffer.
        Spirit Ascension for dangerous rooms, Bone Salve for emergencies.
        Not as indefinite as Adafold, but high DPS means fights end faster.

    TriageMode:
      Description: "Ally dying. Shift to healing priority."
      Priority:
        1: "Bone Salve (instant, strong, costs Bone — emergency)"
        2: "Ancestral Rite (strong but 2.5s channel — commits you)"
        3: "Spirit Cleanse (if debuff is the problem)"
        4: "Resume DPS ASAP (every non-DPS GCD = lost overshield for YOU)"
      DPSOutput: "~40% during triage (massive personal loss)"
      SelfCost: "Overshield decays, Hex stacks may drop, summons unmanaged"
      DesignNote: >
        Triage is EXPENSIVE for Shaman. Every healing GCD costs personal
        defense (no Hex Drain, no overshield, stacks decay). The class
        PUNISHES healing and REWARDS selfishness. This is INTENTIONAL:
        triage is for genuine emergencies, not routine healing duty.
        If you're healing every GCD, you're playing wrong or the healer is dead.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 9: DPS VALIDATION
# ─────────────────────────────────────────────────────────────────────────────

DPSValidation:
  Methodology: >
    All DPS validation is against SINGLE TARGET, FULL UPTIME, both summons
    alive, Hex stacks maintained at 5.

  STRotationMath:
    EffigyPPS: "100p / 2.0s = 50 PPS (filler)"
    CurseExplosionPPS: >
      300p / 2.5s cast = 120 PPS per cast.
      Frequency: every ~25s (5 stacks × 5s per stack from Floating Bone).
      With Effigy acceleration: every ~15-20s.
      Effective PPS contribution: 300p / 17.5s average = 17.1 PPS
    MastemaPPS: "450p / 30s = 15 PPS"
    DarkTheurgyPPS: "310p / 15s = 20.7 PPS"
    FloatingBonePPS: "30p per 3s = 10 PPS (passive)"
    BoneSpiritPPS: "50p per 3s = 16.7 PPS (auto-attacks)"
    SpiritChannelPPS: "1000p (at 5 stacks) / ~60s usage rate = 16.7 PPS"
    TotalST_PPS: "~146 PPS theoretical"
    # DPS reference = ~110 PPS
    # 146 / 110 = 133% — WAY ABOVE
    # Adjust for real-world constraints:
    RealWorldAdjustments:
      - "2.5s casts reduce effective GCD throughput by ~15%"
      - "Re-summoning lost summons costs ~2-3 GCDs per fight (6-9s downtime)"
      - "Hex Drain windows (oGCD) sometimes mis-timed"
      - "Spirit Channel consumes Bone Spirit → 10s re-summon delay → DPS loss"
      - "Floating Bone positioning GCDs (Bone Pointing) = DPS-neutral GCDs"
    PracticalST_PPS: "~110-115 PPS = 100-105% of reference"
    DesignNote: >
      The gap between theoretical (133%) and practical (100-105%) is the
      EXECUTION TAX. Perfect management of all four axes = 105%. Dropping
      any axis (summon dies, Hex falls off, miss Hex Drain timing) immediately
      drops output toward 85-90%. This is INTENTIONAL: "overtuned but difficult."

  ValidationChecklist:
    - "ST DPS (perfect execution): 100-105% of reference ✓ (overtuned, intended)"
    - "ST DPS (average execution): 85-95% ✓ (drops rapidly with mistakes)"
    - "AoE DPS: Higher via Dark Theurgy + Floating Bone + splash ✓"
    - "Time to first Bone spend: 12-16s (Bone Harvest + summon) ✓"
    - "Hex Drain uptime: 80-90% at perfect play ✓"
    - "Overshield maintenance: 15-30% max HP buffer sustained ✓"
    - "Spirit Channel burst: 1000p at 5 stacks (ClassUltimate range) ✓"
    - "Invocation total value: 600-800p range over 25s ✓"
    - "Triage penalty: ~60% DPS loss while healing ✓ (intended punishment)"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 10: PROCGEN MAP INTERACTION
# ─────────────────────────────────────────────────────────────────────────────

ProcgenInteraction:
  DeploymentStrategy:
    Description: >
      In procedurally generated maps, Shaman's summons function as deployed
      installations that control space. The Shaman plays a mini-RTS layer:
      place Floating Bone for zone coverage, command Bone Spirit to sentry
      positions, then fight from behind the deployment.

  CorridorControl:
    Setup: >
      T-intersection: Bone Spirit holds left corridor (interrupt sentry),
      Floating Bone placed at right corridor entrance (curses anything entering),
      Shaman pushes forward knowing flanks are covered.
    Effectiveness: "Excellent — persistent summons control space indefinitely"
    Risk: "Rank 4 enemies will hunt and destroy deployments"

  PartySplitRole:
    Description: >
      When party splits, Shaman is versatile: can solo either path
      (self-sustaining via overshield) or support a sub-group (triage healing).
      Unique value: can leave Bone Spirit behind as rear-guard for the other
      group (interrupts at the split point even after Shaman leaves).
    SoloCapability: "Strong. Overshield + Spirit Ascension + Bone Salve."
    SupportCapability: "Moderate triage healer. DPS loss when healing."
    DeployableRearGuard: "Unique — only class that leaves a FUNCTIONAL ASSET behind"

  StrategyRankScaling:
    Rank1_2: "Trivial management. Summons never die. Focus purely on DPS."
    Rank3: "Moderate management. Occasional repositioning. Plan placement."
    Rank4: "Intense management. Summons actively hunted. Invocation critical. Placement is survival."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 11: DESIGN NOTES & ANTI-PATTERNS
# ─────────────────────────────────────────────────────────────────────────────

DesignNotes:
  WhatShamanIsNOT:
    - "NOT a primary healer (triage only, punishes healing GCDs)"
    - "NOT a burst DPS with party alignment (no cadence, use-case driven)"
    - "NOT a fragile caster (overshield makes them tankier than they look)"
    - "NOT a 'set and forget' pet class (summons require management in hard content)"
    - "NOT reliant on party buffs (no timing alignment, no coordination windows)"
    - "NOT a disposable-summon throwaway class (summons are ASSETS with value)"

  WhatShamanIS:
    - "A deployment DPS who controls space through persistent installations"
    - "An aggression-rewards-defense class (Hex Drain = DPS generates survivability)"
    - "A zone controller using Floating Bone for area cursing"
    - "A strategic thinker managing Bone economy across entire dungeon runs"
    - "A self-sustaining solo operator via overshield generation"
    - "An offtank DPS who can absorb punishment through sheer aggression"

  AntiPatterns:
    - Pattern: "Spirit Channeling on cooldown (consuming Bone Spirit constantly)"
      Problem: "Lose interrupt sentry. Bone economy drains. 10s penalty per use."
      Fix: "Spirit Channel only when burst is needed AND no interrupts coming."
    - Pattern: "Healing every time an ally takes damage"
      Problem: "Cripples own DPS → overshield falls → Shaman dies → team wipes."
      Fix: "Triage ONLY when ally would die. Let the healer do their job."
    - Pattern: "Placing Floating Bone in melee range of Rank 3-4 enemies"
      Problem: "Destroyed immediately. Wasted Bone. No Hex application."
      Fix: "Place behind walls, on ledges, or in party's controlled zone."
    - Pattern: "Never using Summon Command (Spirit always follows)"
      Problem: "Missing the corridor-sentry deployment potential entirely."
      Fix: "Hold position at chokepoints for free interrupts. Recall when moving."
    - Pattern: "Using Spirit Ascension on cooldown as a DPS buff"
      Problem: "Wastes the immunity for a future AoE phase. 120s CD matters."
      Fix: "Save for situations where levitate immunity or speed is needed."
    - Pattern: "Ignoring summon HP in hard content"
      Problem: "Summons die without notice. Interrupt lost. Hex engine stops."
      Fix: "Watch summon HP bars. Reposition before they die. Invocation preemptively."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 12: BALANCE TARGETS CROSS-REFERENCE
# ─────────────────────────────────────────────────────────────────────────────

BalanceTargetsCrossRef:
  Source: "Combat/BalanceTargets.yaml"
  GCD: "2.0s base ✓ (some skills 2.5s cast intentionally)"
  HasteCap: "1.4s ✓ (Shaman benefits: faster Effigy = faster Hex buildup)"
  oGCDLock: "0.6s ✓"
  WeaveModel: "single_weave_only ✓ (2.5s casts deliberately prevent weaving)"
  DPSBaseline: "100% ✓ (Shaman: 100-105% at perfect execution, 85-95% average)"
  GaugeFirstSpend: "12-16s target ✓ (first Bone deploy at ~12s)"
  ClassUltimateBand: "600-800p ✓ (Spirit Channel: 500-1000p; Invocation: 600-800p effective)"
  HP50Rule: >
    Players above 50% HP take +25% incoming damage. Shaman's OVERSHIELD
    counts as HP above the 50% threshold — meaning an aggressive Shaman
    with 30% overshield is at effective 130% HP, taking MAXIMUM +25%
    incoming damage. This is FINE because overshield ABSORBS the extra
    damage, creating a natural equilibrium: more aggression = more
    overshield = more incoming damage = overshield consumed faster = 
    need more aggression to maintain. Self-balancing loop.
  SoftEnrage: >
    +10% boss damage per 30s past target TTK. Shaman's high DPS ceiling
    (105%) makes them good at avoiding soft enrage. But execution drops
    during hard phases can push them below 100%, contributing to enrage
    risk. Summon management quality directly impacts enrage margins.

