# ─────────────────────────────────────────────────────────────────────────────

Constraints:
  GCD: "2.0s base, 1.4s cap — COMPLIANT"
  Crit: "NOT RNG (elevation + overlap + CC state) — COMPLIANT"
  HP50Rule: "Applies to ENEMIES (+25% above 50%) — COMPLIANT"
  ItemBaseline: "Items define baseline, class REPLACES permanently — COMPLIANT"
  NoBurstCycle: "NO 2-minute burst, NO fixed cadence — COMPLIANT"
  NoLongCooldowns: "NO 90s/120s/180s on identity skills — RESOURCE GATED — COMPLIANT (§25)"
  ZeroFreecure: "Zero RNG procs — COMPLIANT"
  WeaveModel: "Single-weave only — COMPLIANT"
  SpecialTier: "Knowledge gate via phenotype depth — CONFIRMED"
  BiologicalLock: "Hard lock to Harvesters (Linfree) — CONFIRMED"
  RacialFlight: "Harvesters fly, leveraged by class — CONFIRMED"
  ResourceGating: "Apex Skills gated by Biomass + Pheromone Charges + field state — COMPLIANT (§25)"
  IntensityScaling: "Harder fights = more resource generation = more power access — COMPLIANT (§25)"
  NeverShutDown: "Missed opportunity = rebuild time, not 3-min lockout — COMPLIANT (§25)"
  IdentityPresent: "Always building toward or using power — zero dead-identity windows — COMPLIANT (§25)"

