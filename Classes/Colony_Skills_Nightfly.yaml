# ▲ CONTINUES FROM: Colony_Design.yaml | PHENOTYPE: Nightfly
# ═══════════════════════════════════════════════════════════════════════════════
# COLONY — NIGHTFLY PHENOTYPE
# Bioluminescent Lures / Darkness Control / Trap Chains / Vision Manipulation
# ═══════════════════════════════════════════════════════════════════════════════
#
# Resource Gating Compliance (§25):
#   - Predator's Maze: APEX SKILL — 100 Biomass + 3 Pheromone Charges + 3 active darkness zones
#   - Paralysis dust on retreat (Stage 3 CC): resource-gated via Pheromone Charge cost
#   - Abyssal Beacon (irresistible lure + stun): Pheromone Charge cost, NOT long CD
#   - NO 90s/120s/180s cooldowns anywhere in this file
#   - Trap deployment as gauge building: traps laid → enemies trigger → charges earned
#   - Setup IS the resource: darkness deployed → traps armed → enemies walk in → power earned
#   - IMMENSELY powerful effects (forced pathing, Stage 3 paralysis) earned through
#     positioning + resource, never trivially available on a timer
# ═══════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# NIGHTFLY SECTION 1: PHENOTYPE IDENTITY
# ─────────────────────────────────────────────────────────────────────────────

NightflyPhenotype:
  Identity:
    Name: "Colony — Nightfly"
    PhenotypeRole: "Vision Manipulator / Lure Predator / Trap Architect"
    GameFeel: >
      Anglerfish meets Evelynn meets Shaco. Controls WHAT ENEMIES CAN SEE.
      Deploys darkness to blind them. Deploys bioluminescent lures to redirect.
      Sets traps along forced paths. Fights by controlling INFORMATION —
      enemies act on false data, walking into prepared kill zones.

    CoreLoop: >
      1. Deploy darkness zones (enemy detection → 2m)
      2. Place bioluminescent lures (attract enemies to specific points)
      3. Set traps along lure-path
      4. Watch enemies stumble through darkness toward light, through traps
      5. Detonate trap chains on trigger — earns Pheromone Charges
      6. Remain invisible within own darkness (Nightfly sees through it)
      7. Deploy Apex kill corridor when darkness density reached
      8. Retreat with paralysis dust if overrun (resource-gated escape)

    MomentToMoment: >
      PREDATORY PATIENCE. Set up kill zone BEFORE enemies arrive. Watch them
      walk into it. Every kill is premeditated. Nothing reactive. Everything
      planned 15 seconds ago. The reward for patience is Apex access — the
      ultimate kill corridor earned through the setup that IS Nightfly's identity.

    PowerBudget:
      DirectDPS: "30% of DPS reference (lowest direct damage)"
      InfrastructureValue: "35% through trap damage + lure-forced positioning"
      TotalContribution: "65% of DPS reference"

    FlightIntegration: >
      SILENT APPROACH + ELEVATED TRAP PLACEMENT. Broad, silent wings (no
      turbulence). 100% flight speed. Flies ABOVE darkness zones looking
      down — sees everything while enemies below see nothing. Elevated
      traps harder to detect (enemies don't look up).

    ResourceGatingIdentity: >
      Nightfly's Apex gate is DARKNESS CONTROL DENSITY. The more darkness zones
      active and the more enemies triggering traps within them, the faster charges
      build. A Nightfly who has established 3+ darkness zones with enemies stumbling
      through them has EARNED their Predator's Maze through the exact actions that
      define Nightfly identity. The predator's patience IS the resource cost.

# ─────────────────────────────────────────────────────────────────────────────
# NIGHTFLY SECTION 2: PHENOTYPE MECHANICS
# ─────────────────────────────────────────────────────────────────────────────

  Mechanics:
    DarknessSystem:
      DarknessZone:
        Radius: "5m base"
        Duration: 20s
        EnemyEffect: "Detection range → 2m (functionally blind)"
        AllyEffect: "Normal vision if Pheromone-marked. Otherwise also blinded."
        NightflyEffect: "Full vision always (dark-adapted compound eyes)"
        MaxZones: 4
      StrategyRankInteraction:
        SR1: "Completely fooled. Random pathing. Attack only within 2m."
        SR2: "Attempt to leave darkness (path toward light). Blinded while inside."
        SR3: "Target darkness zones for destruction."
        SR4: "May use non-visual detection. Darkness partially effective."

    LureSystem:
      AttractRange: "8m (enemies in darkness path toward nearest light)"
      Duration: 15s
      BiomassCost: 20
      MaxLures: 3
      SREffectiveness:
        SR1_2: "Forced pathing (irresistible)"
        SR3: "4s attraction before recognition"
        SR4: "2s attraction"
      PheromoneEnhanced: "Irresistible to SR3 for 4s, SR4 for 2s (costs 1 Pheromone Charge)"
      Placement: >
        Lure placement IS Nightfly's primary skill expression. Lure at end
        of corridor = enemies path down corridor. Lure behind trap = enemies
        walk THROUGH trap. Lure on ledge = enemies cluster below.

    TrapSystem:
      SetupTime: "1 GCD (2.0s)"
      Duration: 45s
      MaxTraps: 5
      TriggerRadius: "1m (2m if chain-triggered)"
      Rearm: "Single-use. Must redeploy."
      Visibility: "Invisible in darkness. Lit areas: 50% detect (SR2), 80% (SR3), 100% (SR4)."
      Chaining: >
        Traps within 3m of triggered trap gain expanded 2m radius for 3s.
        Place 2.5m apart in line → guaranteed sequential chain detonation.
        5-trap chain in corridor = DEVASTATING.
      TrapTypes:
        Snare: "Root 3s + 80p. Containment."
        Burst: "200p AoE (3m) + 6s acid puddle (40p/s). Total potential: 440p. Damage."
        Flash: "Blind 4s (Stage 3 — worse than darkness, 0m detection). Disable."
        Alarm: "Reveals 10m for 8s + Pheromone Mark triggering enemy + 1 Pheromone Charge. Intel."

    TrapInteractionCharging: >
      Every trap trigger generates Pheromone Charge progress:
      - Snare Web trigger: +0.5 charge progress
      - Blight Pod trigger: +0.5 charge progress
      - Flashbang Cocoon trigger: +0.75 charge progress (Stage 3 CC = high value)
      - Alarm Thread trigger: +1.0 full charge (instant, built into the trap's design)
      - Chain detonation bonus: +0.25 per additional trap in chain
      A 5-trap chain corridor detonation = ~3.5 charge progress in seconds.
      Nightfly earns charges EXPLOSIVELY when traps trigger — but must wait for
      enemies to walk in. The patience IS the skill. The payoff IS rapid charge gen.

    DarknessAsChargeEngine: >
      Enemies wandering in darkness (unable to find exit) count as sustained
      interaction: +0.1 charge progress per enemy per 5s inside darkness.
      Darkness + lure + traps = triple charge generation from a single enemy
      walking the full kill path. Dense setups earn Apex FAST.

# ─────────────────────────────────────────────────────────────────────────────
# NIGHTFLY SECTION 3: SKILL ROSTER
# ─────────────────────────────────────────────────────────────────────────────

  Skills:
    Darkness:
      - Name: "Devour Light"
        ID: nightfly_devour_light
        ActionType: GCD
        CastTime: 1.5s
        Range: 20y
        BiomassCost: 30
        Effect: "5m darkness zone, 20s. Enemies: 2m detection. Traps inside: invisible at any SR."
        ElevationBonus: "From altitude: 6m radius"
        ChargeGeneration: "+0.1 charge progress per enemy per 5s inside"
        RankRequired: 1

      - Name: "Eclipse"
        ID: nightfly_eclipse
        ActionType: GCD
        CastTime: 2.0s
        Cooldown: 15s  # Short tactical CD — prevents triple-stacking instantly
        Range: 20y
        BiomassCost: 50
        Effect: "10m darkness, 25s. Enemies inside: +5% damage taken (disoriented). Counts as 2 zones."
        ChargeGeneration: "+0.15 charge progress per enemy per 5s (enhanced darkness = more confusion)"
        RankRequired: 2

      - Name: "Creeping Dark"
        ID: nightfly_creeping_dark
        ActionType: GCD
        CastTime: 0s
        Cooldown: 12s  # Short tactical CD
        BiomassCost: 20
        Effect: "Darkness expands from point, 1m/s for 8s (final: 8m radius). No visual warning. 15s after full size."
        ChargeGeneration: "Enemies caught by expanding dark: +0.5 progress (surprised entry bonus)"
        RankRequired: 2

    Lures:
      - Name: "Anglerlight"
        ID: nightfly_anglerlight
        ActionType: GCD
        CastTime: 1.0s
        Range: 20y
        BiomassCost: 20
        Effect: "Lure at location, 8m attract range, 15s. SR1-2: forced pathing. SR3: 4s. SR4: 2s."
        ElevationBonus: "On elevated surface: enemies cluster below, unable to reach"
        RankRequired: 1

      - Name: "Dancing Lights"
        ID: nightfly_dancing_lights
        ActionType: GCD
        CastTime: 0s
        Cooldown: 12s  # Short tactical CD
        Range: 20y
        BiomassCost: 35
        Effect: "3 lures in LINE (5m apart). Enemies follow breadcrumb trail. 10m guided path over ~8s."
        ChargeGeneration: "Each lure an enemy follows: +0.25 progress (guided path = controlled interaction)"
        RankRequired: 2

      - Name: "Abyssal Beacon"
        ID: nightfly_abyssal_beacon
        ActionType: GCD
        CastTime: 1.5s
        Cooldown: null  # NO long CD — resource-gated
        Range: 25y
        BiomassCost: 40
        PheromoneChargeCost: 1  # Resource gate for powerful effect
        Effect: >
          Supreme lure. IRRESISTIBLE to SR1-3 for 6s, SR4 for 3s. 12m attract.
          Enemies reaching beacon: 2s stun (Stage 3). Flash on expire: 150p in 3m.
          IMMENSELY powerful forced-pathing tool. Earned through active engagement,
          available whenever you have a charge. In intense fights: every 8-12s.
          In light fights: every 20-25s. Never locked behind 40s/90s timer.
        CritCondition: "Flash crits against enemies that were in darkness (light shock)"
        ResourceGatingNote: >
          OLD: 40s cooldown gated access to supreme lure.
          NEW: 1 Pheromone Charge cost. In intense fights with traps triggering,
          Nightfly generates charges fast enough to use Abyssal Beacon frequently.
          Power scales with engagement intensity per §25.
        RankRequired: 3

    Traps:
      - Name: "Snare Web"
        ID: nightfly_snare_web
        ActionType: GCD
        CastTime: 1.5s
        Range: 15y
        BiomassCost: 15
        Potency: 80
        Effect: "Root 3s on trigger. Invisible in darkness. 45s persist."
        CritCondition: "Crits if enemy was running"
        ChargeGeneration: "+0.5 charge progress on trigger"
        RankRequired: 1

      - Name: "Blight Pod"
        ID: nightfly_blight_pod
        ActionType: GCD
        CastTime: 1.5s
        Range: 15y
        BiomassCost: 20
        Potency: 200
        Effect: "200p burst (3m AoE) + 6s acid puddle (40p/s). Total: 440p per enemy in puddle."
        CritCondition: "Burst crits if enemy is in darkness"
        ChargeGeneration: "+0.5 charge progress on trigger"
        RankRequired: 1

      - Name: "Flashbang Cocoon"
        ID: nightfly_flashbang_cocoon
        ActionType: GCD
        CastTime: 1.5s
        Cooldown: 10s  # Short tactical CD — Stage 3 CC trap needs minimal frequency limit
        Range: 15y
        BiomassCost: 25
        Potency: 60
        Effect: "4s blind (Stage 3, 0m detection, worse than darkness) in 4m radius."
        CritCondition: "Crits against enemies already in darkness"
        ChargeGeneration: "+0.75 charge progress on trigger (Stage 3 = high value interaction)"
        RankRequired: 2

      - Name: "Alarm Thread"
        ID: nightfly_alarm_thread
        ActionType: GCD
        CastTime: 1.0s
        Range: 20y
        BiomassCost: 10
        Effect: "Intel trap. Trigger: reveals 10m for 8s + Pheromone Marks triggerer + generates 1 FULL Pheromone Charge."
        ChargeGeneration: "+1.0 full charge on trigger (built into trap design — intel = power)"
        RankRequired: 1

    DirectCombat:
      - Name: "Luminous Strike"
        ID: nightfly_luminous_strike
        ActionType: GCD
        CastTime: 1.2s
        Range: 15y
        Potency: 140
        BiomassCost: 10
        Effect: "Bioluminescent bolt. In darkness: 196p (+40%). Pheromone Marked: +20%. Both: 235p."
        CritCondition: "From 4y+ OR in darkness + marked"
        RankRequired: 1

      - Name: "Bioflash"
        ID: nightfly_bioflash
        ActionType: GCD
        CastTime: 0s
        Cooldown: 8s  # Short tactical CD
        Range: "5m PBAoE"
        Potency: 100
        BiomassCost: 15
        Effect: "Flash: 100p + 2s vision impair (-50%). In darkness: 2s full blind instead."
        CritCondition: "Guaranteed crit against enemies in darkness"
        RankRequired: 1

      - Name: "Paralysis Dust"
        ID: nightfly_paralysis_dust
        ActionType: oGCD
        Recast: 5s  # Minimal recast to prevent instant spam
        Range: "3m rear cone (drops dust on retreat)"
        PheromoneChargeCost: 1  # RESOURCE GATED — earned through trap/darkness engagement
        Effect: >
          Stage 3 paralysis dust cloud dropped BEHIND Nightfly on retreat. 3m cone,
          2s full paralysis + 15s immunity. Enemies pursuing into dust = paralyzed.
          IMMENSELY powerful defensive CC. Lets party turn and punish.
          Available whenever you have a charge. In intense fights with traps
          triggering: every 8-12s. The retreating predator leaves PARALYZING DUST
          behind — enemies that overcommit to chasing get frozen in place.
        ResourceGatingNote: >
          This is Colony's most powerful defensive tool. Stage 3 CC on retreat
          earned through the exact infrastructure play that defines Nightfly.
          Traps trigger → charges earned → pursuit becomes suicidal for enemies.
          Power scales with engagement: more traps triggered = more paralysis
          available. Never on a long timer — always earned through identity play.
        RankRequired: 2

    ApexSkill:
      - Name: "Predator's Maze"
        ID: nightfly_predators_maze
        ActionType: GCD
        CastTime: 3.0s
        Cooldown: null  # NO COOLDOWN — resource-gated only
        Range: 25y
        BiomassCost: 100
        PheromoneChargeCost: 3
        FieldStateRequirement: "3+ active darkness zones on field"
        Effect: >
          12m darkness + 5 Blight Pods (auto-placed optimally) + 3 Anglerlight lures
          (zone edges, draw inward) + 2 Snare Webs (midpoints). Complete
          kill corridor. Total potential per enemy (full path): ~800p.
          25s duration. Doesn't count toward individual caps.
        ResourceGatingNote: >
          Available every 25-35s in intense fights (traps triggering rapidly =
          explosive charge generation). Available every 50-70s in moderate fights.
          Nightfly who has been patiently establishing kill zones earns this through
          the SAME ACTIONS that define Nightfly identity. The predator's patience
          and preparation IS the cost. When traps chain-trigger (5 traps in
          corridor = ~3.5 charges in seconds), Apex recharges almost immediately.
          Nightfly rewards SETUP with RAPID POWER RECOVERY.
        ApexFrequency:
          IntenseFight_ChainTrigger: "~25s between casts (5-trap chain = near-instant recharge)"
          IntenseFight_Scattered: "~35s between casts (individual triggers over time)"
          ModerateFight: "~50s between casts"
          LightFight: "~70s between casts"
        AntiPattern_Eliminated: >
          OLD: 180s cooldown. Nightfly sets traps for 3 min, presses Predator's Maze,
          waits 3 min. Kill corridor exists 25s per 3 min = 14% uptime.
          NEW: Resource-gated. Nightfly deploys darkness → sets traps → enemies trigger
          → charges flood in → Predator's Maze deployed → reset and repeat.
          In fights with many enemies, Nightfly has near-permanent Apex uptime
          because trap triggers generate charges EXPLOSIVELY. The predator's maze
          is ALWAYS being built or DEPLOYED. Zero dead-identity windows.
        RankRequired: 3

# ─────────────────────────────────────────────────────────────────────────────
# NIGHTFLY SECTION 4: ROTATION PHILOSOPHY
# ─────────────────────────────────────────────────────────────────────────────

  RotationPhilosophy:
    Overview: >
      SETUP SEQUENCE then MAINTENANCE: Darkness → Lures in darkness → Traps
      along lure paths → Observe → Luminous Strike survivors → Refresh expiring →
      Predator's Maze when earned → Paralysis Dust on retreat if threatened.

    NO_Fixed_Cadence: >
      Traps trigger on ENEMY TIMING, not player timing. Nightfly sets up,
      enemy decides when. No "press this at 30s" — "I set traps 30s ago
      and they just triggered." Charge generation is BURSTY — nothing for
      10s then 3 charges in 2s when a chain detonates. Apex timing is
      unpredictable and reactive. That IS Nightfly's design.

    CoreDecisions:
      DarknessFirst_vs_TrapsFirst: "Enemies watching? → Blind first. Enemies not here yet? → Trap first."
      LurePlacement: "End of trap chain (gauntlet) vs. cluster point (AoE detonation). Corridors = end. Open areas = cluster."
      TrapEconomy: "Full field (75-125 Biomass, huge burst) vs. mixed deployment (darkness + lure priority for sustained control)."
      ChargeSpending: "Abyssal Beacon (forced pathing) vs. Paralysis Dust (escape) vs. save for Predator's Maze (Apex)"

    ResourceDecisionSpace: >
      Nightfly has THREE meaningful charge expenditures:
      - 1 charge: Abyssal Beacon (irresistible lure + Stage 3 stun)
      - 1 charge: Paralysis Dust (retreat paralysis, defensive)
      - 3 charges: Predator's Maze (complete kill corridor, offensive)
      This creates rich tactical decisions. Use Beacon aggressively to funnel enemies
      into existing traps (generating MORE charges from triggers)? Hold for defensive
      Paralysis Dust? Save for Apex? The answer changes every 10 seconds based on
      battlefield state. Nightfly players read the situation CONSTANTLY.

# ─────────────────────────────────────────────────────────────────────────────
# NIGHTFLY SECTION 5: FAILURE STATES
# ─────────────────────────────────────────────────────────────────────────────

  FailureStates:
    TrapsMissed:
      Cause: "Traps where enemies don't path / lure not drawing through traps"
      Cost: "15-25 Biomass per missed trap. 45s wasted. Zero charge generation."
      Severity: "HIGH — Nightfly damage AND charge gen IS traps."
    DarknessOnAllies:
      Cause: "Darkness without Pheromone Marking allies"
      Cost: "PARTY BLINDED. DPS drops. Communication breaks."
      Severity: "EXTREME — actively harms party more than enemies."
    SR4Counterplay:
      Cause: "SR4 enemies detect traps, resist lures, destroy darkness"
      Cost: "Entire toolkit at 50%+ reduced effectiveness. Charge generation slowed."
      Severity: "MODERATE — still contributes via Pheromone Marks and detection utility."
    ChargeStarvation:
      Cause: "No trap triggers (enemies avoided kill zone or SR3+ destroyed darkness)"
      Cost: "No Apex access, no Abyssal Beacon, no Paralysis Dust. Nightfly reduced to basic combat."
      Severity: "HIGH — but recoverable by repositioning and re-establishing darkness."
    OverAggressiveBeaconSpend:
      Cause: "Spending all charges on Abyssal Beacon, never reaching Apex"
      Cost: "Loses Predator's Maze value (complete kill corridor worth more than individual lures)"
      Severity: "MODERATE — Beacon still generates value, but Apex is the payoff."

# ─────────────────────────────────────────────────────────────────────────────
# NIGHTFLY SECTION 6: RANK PROGRESSION
# ─────────────────────────────────────────────────────────────────────────────

  RankProgression:
    Rank1:
      Name: "Worker"
      BiomassMax: 100
      DarknessCap: 2
      TrapCap: 3
      LureCap: 2
      Unlocks: ["Devour Light", "Anglerlight", "Snare Web", "Blight Pod", "Alarm Thread", "Luminous Strike", "Bioflash"]
      PheromoneChargeMax: 3
      Note: "Core predator loop. Darkness + lures + traps. Learns patience and kill zone construction."

    Rank2:
      Name: "Specialist"
      BiomassMax: 120
      DarknessCap: 3
      TrapCap: 5
      LureCap: 3
      Unlocks: ["Eclipse", "Creeping Dark", "Dancing Lights", "Flashbang Cocoon", "Paralysis Dust"]
      BonusPassive: "Deployment cast times -0.3s. Trap trigger radius +0.5m."
      PheromoneChargeMax: 4
      Note: >
        Full trap arsenal + Stage 3 CC tools (Flashbang Cocoon, Paralysis Dust).
        Both resource-gated. Nightfly becomes a CC-denial predator with earned power.

    Rank3:
      Name: "Abyssweaver"
      BiomassMax: 150
      DarknessCap: 4
      TrapCap: 7
      LureCap: 4
      Unlocks: ["Abyssal Beacon", "Predator's Maze"]
      BonusPassive: "Pheromone Charge generation +50%. Trap triggers generate double charge progress."
      PheromoneChargeMax: 5
      Note: >
        Full Nightfly mastery. With +50% charge gen and double trap trigger progress,
        a 5-trap chain detonation generates ~5 charges (enough for immediate Apex + Beacon).
        Nightfly becomes a charge MACHINE in intense content. Kill corridor up nearly
        constantly. The predator's maze is always being built or deployed.

# ─────────────────────────────────────────────────────────────────────────────
# NIGHTFLY SECTION 7: BALANCE VALIDATION
# ─────────────────────────────────────────────────────────────────────────────

  BalanceValidation:
    - "First darkness within 2 GCDs (30 Biomass, starts at 100): PASS"
    - "Full kill zone setup in 20s (darkness + lures + traps): PASS (240 Biomass available)"
    - "Apex available within 25-35s via trap chain trigger: PASS"
    - "Apex NEVER locked behind 180s timer: PASS (§25 compliant)"
    - "Field state requirement prevents Apex without active darkness: PASS"
    - "Paralysis Dust gated by charge (earned through traps) not timer: PASS (§25)"
    - "Abyssal Beacon gated by charge not timer: PASS (§25)"
    - "Trap chain = explosive charge generation (reward for good setup): PASS"
    - "Charge tension (Beacon vs Dust vs Maze) creates meaningful decisions: PASS"
    - "No 2-min burst alignment: PASS (resource-driven, trigger-reactive)"
    - "Zero RNG: PASS (deterministic triggers, deterministic charges, spatial crit)"
    - "Single-weave model: PASS (GCDs + oGCD Paralysis Dust weave)"
    - "Nightfly in corridor content (ideal geometry): Apex every 25s achievable: PASS (reward for map reading)"
    - "Nightfly in open arena (worst case): Apex every 70s: PASS (still faster than old 180s)"
