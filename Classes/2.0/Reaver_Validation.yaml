# TUNING LEVERS & OPEN QUESTIONS
# ═══════════════════════════════════════════════════════════════════════════════

tuning_levers:
  if_too_strong:
    - "Reduce Frenzy multipliers (S3: 70%→55%, S4: 100%→80%)"
    - "Increase awareness reduction (more non-target vuln)"
    - "Extend Recovery (3s→4s)"
    - "Reduce lifesteal (S×3%→S×2%)"
    - "Increase HP costs"
  if_too_weak:
    - "Increase Frenzy multipliers"
    - "Reduce Stage timings (20s→16s for S4)"
    - "Increase Calm DPS (60%→70%) — CAREFUL: INV-07"
    - "Add micro-lunge to Rend (0.5m)"
    - "Raise Deathroll threshold (25%→30%)"

open_questions_layer_1:
  - "Absolute potency → damage conversion at benchmark ATK"
  - "GCD interaction with Frenzy speed (attack speed increase?)"
  - "HP pools at level benchmarks (% cost real impact)"
  - "Healer HPS vs Reaver DPS crossover point (which Stage?)"
  - "Movement speed in absolute units (chase math)"
  - "Water tile dimensions (Crimson Wake coverage)"
  - "Non-target damage at each SR (awareness lethality)"

integration_tests:
  - "Reaver+Shaman: slow-stacking cap check"
  - "Reaver+Wavecaller: water gen frequency vs pursuit timing"
  - "Reaver+Grappler: pin duration ≥3 GCDs for meaningful Rend"
  - "Reaver vs SR4 bait: distinguishability check"
  - "Reaver in boss: phase telegraph ≥ decision time"
  - "2×Reaver party: avg DPS ≥70% ref per Reaver"

