# ═══════════════════════════════════════════════════════════════════════════════
# BALANCE TARGETS
# ═══════════════════════════════════════════════════════════════════════════════

balance_targets:
  reference: "Generic Experienced-tier DPS (no commitment mechanic) = 100%"

  dps_by_state:
    # State            | % of Ref  | Duration   | Intent
    calm:               [55, 65]    # —          | Below peer. Forces commitment.
    stage_1_scenting:   [85, 95]    # 0-5s       | Approaching parity.
    stage_2_closing:    [110, 125]  # 5-12s      | Risk premium begins.
    stage_3_frenzied:   [145, 170]  # 12-20s     | Dominant single-target.
    stage_4_apex:       [190, 220]  # 20s+       | Uncapped. "Unfair" by design.

  encounter_averaged:
    perfect_play: [105, 115]  # 3 kills, fast commits, zero Crash
    average_play: [90, 100]   # 2 kills, 1 Recovery, moderate Calm
    poor_play:    [65, 75]    # 1 bad commit, Crash, extended Calm

  ttk_from_lock_jaw:  # Target = SR2 elite at 70% HP
    ideal_water_r5:  [8, 10]   # 2× Frenzy, Deathroll finish
    standard_land_r3: [12, 16]  # Base Frenzy, Deathroll at 25%
    contested_healed: [18, 25]  # Single healer on target
    kited_gap_issues: [20, 30]  # Frequent melee breaks

  hp_sustainability:
    lifesteal_by_stage: {s1: "3%", s2: "6%", s3: "9%", s4: "12%+"}
    gross_hp_cost_per_pursuit: "~12% max HP"
    net_after_lifesteal: "3-6% max HP"
    vs_target_alone: "Unkillable at Stage 3+ (DR + lifesteal)"
    vs_target_plus_1: "Sustainable if add <40% target's damage"
    vs_target_plus_2: "Needs team support or dies"
    refuse_to_die_proc_rate: "~15-20% of pursuits at average play"

# ═══════════════════════════════════════════════════════════════════════════════
# SYSTEM INTERACTIONS
# ═══════════════════════════════════════════════════════════════════════════════

system_interactions:

  strategy_rank:
    # SR | Flee        | Bait Freq    | Difficulty    | TTK Mod
    sr1:  ["None",      "Never",       "Trivial",     "×0.7"]
    sr2:  ["<30% HP",   "Never",       "Low",         "×1.0"]
    sr3:  ["<50% to allies", "1/encounter", "Medium", "×1.2-1.4"]
    sr4:  ["Coordinated traps", "Regular", "High",    "×1.5-2.0"]

  above_70_threshold:
    gate: "Cannot commit to targets >70% HP"
    party_dependency: "Team must soften. Reaver Calm DPS (~60%) until crossing."
    exception: "Test Bite can push 72%→69% (aggressive self-trigger)."
    balance_position: "70% intentionally high. Pursuit IS the class."

  crit_conditions:
    rhythmic: "NONE — no rotation = zero rhythm-based crits"
    execution_positional: "Backstab during Pursuit (target facing away)"
    execution_state: "Circling Patience full 12s → first hit guaranteed crit (R5)"
    health_target: "Deathroll on target <15% → guaranteed crit"
    health_self: "Refuse to Die 3s window → all crits"
    environmental: "Lock Jaw from Submerged (Wade In R5) → crit + 2s stun"
    note: "Frenzy multipliers are FLAT SCALING, not crit. Crit layers independently."

  procgen_maps:
    water_frequency:
      depth_dead: "40-60% tiles"
      other_regions: "10-25% tiles"
      minimum: "≥1 water feature per dungeon floor"
    advantage_delta:
      land: "Base Frenzy. Standard speed."
      water: "2× Frenzy. +20% speed. Stage 4 in ~10s. ~1.5-1.8× effective DPS."
    map_seed: "High-water = Reaver-favored. Dry = neutral (not crippled)."

  aquatic_terrain_table:
    # Parameter              | Land     | Water
    movement_penalty:         ["0%",     "0% Reaver / -30-50% others"]
    reaver_speed_bonus:       ["0%",     "+20%"]
    frenzy_rate:              ["1×",     "2×"]
    time_to_stage_4:          ["~20s",   "~10s"]
    rend_hemorrhage_dur:      ["4s",     "6s"]
    thrash_knockback:         ["2m",     "4m"]
    hamstring_slow:           ["-40%",   "-50%"]
    deathroll_channel:        ["1.5s",   "1.2s"]
    deathroll_potency:        ["450",    "500"]
    apex_pursuit_range:       ["6m",     "10m"]
    lock_jaw_gap_speed:       ["+30%",   "+80%"]
    lock_jaw_potency:         ["base",   "+20%"]

# ═══════════════════════════════════════════════════════════════════════════════
# MATCHUP ANALYSIS
# ═══════════════════════════════════════════════════════════════════════════════

matchup_analysis:

  vs_strix:
    type: "Execution timing clash"
    same_target: "Strix kills 1-3s burst. Reaver ramps 12-16s. Strix may steal before Stage 3."
    resolution: "Reaver targets what Strix CANNOT one-shot (HP too high for dive)."
    strix_targets_reaver:
      calm: "Dead. No DR, no lifesteal."
      pursuit: "Tunnel Instinct does NOT apply (Strix ≠ marked target). Vulnerable."
    draft: "Complementary. Strix=burst-killable. Reaver=HP-heavy."

  vs_shaman:
    type: "Primary synergy"
    shaman_slows: "Reaver catches instantly. +1-2 extra Rend stacks per pursuit."
    shaman_paralysis: "Free ramp window. Target cannot flee."
    combined_speed: "~30% faster kills vs unassisted."
    when_opposing: "Shaman squishy, lacks burst escape. Easy commit once <70%."
    draft: "Ideal pairing. Shaman=CC. Reaver=kill pressure."

  vs_frontliners:
    handoff_pattern: "Frontliner softens → target crosses 70% → Reaver evaluates → commits → finishes"
    vs_madolt: "Non-conflicting zones. Madolt tanks group, Reaver peels wounded target."
    vs_siegebreaker: "Siegebreaker charges through (softens). Reaver finishes survivors."
    vs_grappler: "BEST pairing. Pin = free Rend stacks on immobile target. A+ composition."
    risk: "Both Reaver + Siegebreaker committed = party loses 2 non-recallable members."

  vs_healers:
    pre_commit: "No healing needed. Standard durability."
    isolated_pursuit: "Self-sustains via Feeding Frenzy. No healer needed."
    adrenal_crash: "NEEDS healing. -40% speed, +25% taken, HP drain."
    enemy_healer_on_target:
      stage_1_2: "May stall. Cannot out-DPS dedicated healing."
      stage_3: "+70% bonus likely overcomes single healer."
      stage_4: "Guaranteed out-DPS. No single healer sustains vs 200%+."
    wavecaller_synergy: "Heals through walls. Extends pursuit survivability +5-8s."

  vs_kiters:
    threat_level: "HIGH — primary counter-archetype"
    kiter_wins_if: "Maintains range indefinitely. Repeatable dash CD <6s."
    reaver_wins_if: "Closes via Apex+Hamstring. Reaches Stage 3+ speed."
    tools: "Hamstring(-40% 3s), Apex(6m/6s), Blood Rush(20m, Stage 2+), Frenzy speed"
    chase_resolution:
      stage_1: "Closing only if Hamstring lands"
      stage_2: "Slowly closing"
      stage_3: "Catching most kiters"
      stage_4: "Outpacing all non-dash"
    worst_case: "6s teleport + ranged DPS. 20s+ chip, minimal Reaver output."

  matchup_summary:
    # Opponent           | Favored | Key Factor
    stationary_dps:       ["Reaver",  "Cannot flee. Free Rend stacks."]
    burst_dps_strix:      ["Strix",   "Kills before Frenzy ramps."]
    control_dps:          ["Neutral", "Depends on CC timing."]
    tanks:                ["Reaver",  "Eventually out-damages any DR."]
    healers_solo:         ["Reaver",  "Stage 3+ exceeds heal throughput."]
    kiters:               ["Kiter",   "Until Stage 3. Then Reaver."]
    sr3_bait:             ["Enemy",   "Knowledge check. Reaver must read."]
    grouped_enemies:      ["Enemy",   "Non-target chip overwhelms."]
    isolated_target:      ["Reaver",  "Strongest 1v1 in game at Stage 3+."]

