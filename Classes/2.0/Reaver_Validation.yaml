validation_checks:

  identity:
    VAL-ID-01: {check: "Commitment irreversible", status: "PASS"}
    VAL-ID-02: {check: "Calm state meaningful (active decisions)", status: "PASS"}
    VAL-ID-03: {check: "Zero magic (MAGICCAP 8)", status: "PASS"}
    VAL-ID-04: {check: "Tracking ignores stealth/LoS during Pursuit", status: "PASS"}
    VAL-ID-05: {check: "Cute/predator visual dissonance", status: "PASS (qualitative)"}

  mechanical:
    VAL-MC-01: {check: "§25 CD compliance (max 15s)", status: "PASS", note: "All long CDs converted to state gates."}
    VAL-MC-02: {check: "Anti-rotation (reactive not sequential)", status: "PASS"}
    VAL-MC-03: {check: "No burst window / build-spend", status: "PASS"}
    VAL-MC-04: {check: "Feedback-based gating (no gauge)", status: "PASS", note: "14 state, 5 frenzy, 2 behavior, 1 hit-count, 1 HP, 2 positional, 4 short-CD."}
    VAL-MC-05: {check: "Crit system (all conditional)", status: "PASS"}
    VAL-MC-06: {check: "Auto-attack reduced in Pursuit (50%)", status: "PASS"}

  balance:
    VAL-BL-01: {check: "Calm < Ref < Pursuit", status: "PASS (qual)", note: "60% < 100% < 160-200%"}
    VAL-BL-02: {check: "Encounter-avg near reference", status: "PASS (qual)", note: "90-115% depending on play quality"}
    VAL-BL-03: {check: "Stage 2+ exceeds ref by ≥10%", status: "PASS"}
    VAL-BL-04: {check: "Stage 4 out-DPSes single healer", status: "PASS"}
    VAL-BL-05: {check: "Non-target damage threatening", status: "PASS", note: "+15-100% taken from non-target"}
    VAL-BL-06: {check: "Adrenal Crash punishing", status: "PASS", note: "-40%spd/-30%dmg/+25%taken/2%drain/8s"}

  party_role:
    VAL-PR-01: {check: "Clear role (execute wounded)", status: "PASS"}
    VAL-PR-02: {check: "Not redundant with other DPS", status: "PASS"}
    VAL-PR-03: {check: "Party survives Reaver absence", status: "CONDITIONAL", note: "Depends on target value vs encounter pressure."}
    VAL-PR-04: {check: "Benefits from coordination", status: "PASS", note: "Coordinated commit ~30% faster."}

  content_design:
    VAL-CD-01: {check: "Boss phases telegraphed 5-8s", status: "REQUIREMENT (pending)"}
    VAL-CD-02: {check: "Aquatic abilities = bonus not required", status: "PASS"}
    VAL-CD-03: {check: "SR3+ bait ≤1/encounter", status: "REQUIREMENT (pending)"}
    VAL-CD-04: {check: "≥1 water feature per floor", status: "REQUIREMENT (pending)"}

  summary:
    total: 20
    pass: 16
    pass_qualitative: 3
    conditional: 1
    requirements_pending: 3
    fail: 0

# ═══════════════════════════════════════════════════════════════════════════════
# VISUALIZATION HOOKS
# ═══════════════════════════════════════════════════════════════════════════════

visualization_hooks:
  real_time:
    - {hook: "frenzy_stage_indicator", type: "Stage 0-4 + time-in-stage"}
    - {hook: "bloodscent_radius", type: "Radial pulse on threshold targets"}
    - {hook: "target_hp_overlay", type: "Enhanced HP with threshold proximity"}
    - {hook: "pursuit_tether", type: "Color-shifting line Reaver↔target"}
    - {hook: "awareness_vignette", type: "Edge darkening Stage 3-4 (cosmetic only)"}

  combat_log_metrics:
    - "pursuit_duration_seconds"
    - "frenzy_stage_reached"
    - "rend_stacks_achieved"
    - "feeding_frenzy_healed"
    - "non_target_damage_taken"
    - "deathroll_kill_rate"
    - "refuse_to_die_proc_count / success_rate"
    - "adrenal_crash_count"
    - "calm_time_percentage"
    - "water_pursuit_percentage"

  post_encounter:
    commitment_accuracy: {formula: "kills / commits × 100", target: "≥80%"}
    avg_pursuit_duration: {formula: "Σpursuit_s / count", target: "12-16s"}
    frenzy_efficiency: {formula: "pursuit_dmg / (pursuit_s × ref_dps)", target: "≥1.3"}
    team_burden: {formula: "ally_deaths_during_pursuit / encounters", target: "<0.3"}
    calm_utilization: {formula: "calm_abilities / calm_gcds", target: "≥0.6"}

  state_graph:
    nodes: ["Calm", "S1", "S2", "S3", "S4", "Recovery", "Crash", "Dead"]
    edges:
      - ["Calm→S1", "Lock Jaw (<70%)"]
      - ["Calm→S2", "Blood Rush (<50%)"]
      - ["S1→S2", "5s"]
      - ["S2→S3", "12s"]
      - ["S3→S4", "20s"]
      - ["S1-4→Recovery", "Target killed"]
      - ["S1-4→Crash", "Target phases"]
      - ["S1-4→Dead", "HP=0 (no RtD)"]
      - ["S3-4→Dead|Survive", "Refuse to Die 3s"]
      - ["Recovery→Calm", "3s"]
      - ["Crash→Calm", "8s"]
      - ["S2-4→S(N-1)", "Adrenal Dump"]

# ═══════════════════════════════════════════════════════════════════════════════
# CONSTRAINTS & INVARIANTS
# ═══════════════════════════════════════════════════════════════════════════════

constraints:

  hard_invariants:
    INV-01: "No voluntary Pursuit exit. No ability/item/ally breaks it."
    INV-02: "No magic. MAGICCAP 8. All biological/physical."
    INV-03: "Frenzy has no ceiling. Damage/speed scales indefinitely past S4."
    INV-04: "Single-target identity. AoE = utility only (Thrash at 40%)."
    INV-05: "Healing target does NOT break Pursuit."
    INV-06: "No UI blindness during Frenzy. Awareness = dmg taken increase only."
    INV-07: "Calm DPS < reference DPS. Always."
    INV-08: "No self-harm mechanic. HP costs minimal (3-5%), not fuel."

  soft_constraints:
    # ID   | Parameter              | Current | Flex Range   | Rationale
    CON-01: ["70% HP threshold",     "70%",    "65-75%",     "High = fast decisions, Pursuit dominates"]
    CON-02: ["Stage 4 timing",       "20s/10s","17-23s/8-12s","Meaningful investment before 'unfair' power"]
    CON-03: ["Adrenal Recovery",     "3s",     "2-4s",       "Brief vulnerability. Not useless, not free."]
    CON-04: ["Adrenal Crash",        "8s",     "6-10s",      "Severe. Must be felt, not encounter-ending."]
    CON-05: ["Rend stack bonus",     "+8%",    "+6-10%",     "Snowball without instant-death at high stacks"]
    CON-06: ["Feeding Frenzy %",     "S×3%",   "S×2-4%",    "Self-sustain 1v1. NOT vs multi-threat."]
    CON-07: ["Tunnel Instinct DR",   "15/25/35%","±5%/stage","Target can't kill S4. Non-target still can."]
    CON-08: ["Deathroll potency",    "450-560","400-600",    "Must FEEL like a finisher."]

  boundary_conditions:
    - {condition: "Reaver vs solo target, no allies/heals", outcome: "Reaver ALWAYS wins after S3."}
    - {condition: "Reaver vs target + 1 healer", outcome: "Wins at S3-4. Stalls at S1-2."}
    - {condition: "Reaver vs 3 enemies simultaneously", outcome: "Reaver dies."}
    - {condition: "Bad commit (target phases at 50% after 10s)", outcome: "Crash. Party protects 8s."}
    - {condition: "Perfect Patience → Lock Jaw from water", outcome: "~2.5× first hit."}
    - {condition: "Refuse to Die + ally kills target in 3s", outcome: "Reaver survives 15-25% HP."}

