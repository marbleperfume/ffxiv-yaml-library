# ITEM BASELINE COMPARISON
# ═══════════════════════════════════════════════════════════════════════════════

item_baseline:
  # Item               | Item Gives                    | Reaver Bio             | Δ
  bloodhound_capsule:   ["20s track +15% spd, consumed", "Permanent, +15%+10%dmg, scales", "∞ duration"]
  berserker_draught:    ["+30% 15s, -20%DR, consumed",   "+20-100%+ no limit, DR from target", "×3-7 peak"]
  flashstep_cartridge:  ["8m any dir, one-use",          "6m/6s repeat + 20m Blood Rush",      "Repeatable"]
  rupture_oil:          ["3-stack 8s, consumed",         "Infinite stacks, no expiry, +8%/ea", "∞ stacks"]
  elixir_bloodlust:     ["Lifesteal on KILL only",       "Lifesteal on HIT, 3-12%",            "Continuous"]
  might_potion:         ["+ATK 3min, flat",              "Stage 4: +100%+",                    "×3+ peak"]

  sr_breakpoint: "Items adequate SR1-2. Fail SR3+: durations expire before kill."
  still_wants: ["Survival (Calm)", "CC items (lockdown)", "Terrain manipulation", "Economy disruption"]
  anti_synergy: ["Taunt Cracker (redirects target)", "Retrograde Bead (recall useless)", "Pheromone Tag (stops flee)"]

