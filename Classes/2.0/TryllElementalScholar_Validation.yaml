# §7 — HEALER COMPARISON
# ══════════════════════════════════════════════════════════════════════════════════

healer_comparison:
  #                    | Scholar                    | Siren                       | Spiritcaller
  healing_model:       ["Proactive barriers→reactive zones→emergency burst", "Passive drain bonds (continuous siphon)", "Companion delivery (summon carries heals)"]
  primary_stat:        ["MAG 13 / MED 13 split",   "MED-dominant",               "MAG-dominant"]
  skill_expression:    ["Element selection + mana budget", "Bond targeting + Charm layering", "Summon positioning + routing"]
  failure_mode:        ["Mana crash → 10-15s zero output", "Bond target dies → throughput loss", "Companion killed → no delivery"]
  dps_while_healing:   ["65%", "65%", "65%"]
  self_sustain:        ["NONE (Water heals allies only)", "HIGH (drain heals self)", "MODERATE (companion can heal caster)"]
  proactive_reactive:  ["70/30", "20/80", "50/50"]
  aoe_healing:         ["STRONG (zone heals + ambient regen)", "MODERATE (bonds = ST)", "WEAK (companion = ST delivery)"]
  unique_contribution: ["Terrain control + 5-element adaptability", "Charm CC + drain economy", "Remote healing + split-party"]

  niche_differentiation: >
    Scholar = most FLEXIBLE (5 elements, terrain mastery, Swiss army knife).
    Siren = most SUSTAINABLE (drain = healing, self-sustaining, no mana crash).
    Spiritcaller = most RANGE (companion reaches isolated allies, split-push).
    Zero overlap in primary identity.

