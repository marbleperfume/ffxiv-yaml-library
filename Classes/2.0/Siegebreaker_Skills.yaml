# ▲ CONTINUES FROM: Siegebreaker_Design.yaml | THIS FILE COVERS: Ability roster, potencies, rank progression
# ═══════════════════════════════════════════════════════════════════════════════
# SIEGEBREAKER (Wyrpincers) — Momentum Frontliner [SKILLS]
# ═══════════════════════════════════════════════════════════════════════════════
#
# 8 abilities. Simplest kit in the game.
# §25 APPLIED: Exoskeletal Flare and Brace converted from long CDs to
# resource gating. No cooldowns >15s on identity skills.
#
# References:
#   - Siegebreaker_Design.yaml (identity, resource system, state machine)
#   - Combat/BalanceTargets.yaml (potency targets)
#   - DESIGN_OVERRIDE_SYSTEMS.md §25 (resource gating rule)
# ═══════════════════════════════════════════════════════════════════════════════

Key: Classes.Frontliner.Siegebreaker.Skills

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 1: KIT OVERVIEW
# ═══════════════════════════════════════════════════════════════════════════════

KitOverview:
  TotalAbilities: 8
  GCDCount: 5
  oGCDCount: 3
  ExecutionTier: Base
  GCD: "2.0s fixed (SPD 5 — no haste reduction)"

  ResourceInteraction:
    Momentum: "Generated by GCDs while advancing. Spent by Flare."
    Endurance: "Spent by all abilities. Recovered by Entrench and passively."
    Relationship: "Momentum = 'keep going?' / Endurance = 'can you afford to?'"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 2: GCD ABILITIES (5)
# ═══════════════════════════════════════════════════════════════════════════════

GCDAbilities:

  # ─────────────────────────────────────────────────────────────────────────
  # GCD 1: CARAPACE SLAM
  # ─────────────────────────────────────────────────────────────────────────

  CarapaceSlam:
    Name: "Carapace Slam"
    Type: GCD
    Category: single_target_strike
    RankRequired: 1
    Potency: 120
    EnduranceCost: 8
    MomentumGenerated: 10
    Range: "Melee — 3y frontal"
    Targets: 1
    CritCondition: "Rear positional (enemy facing away) — 1.4× crit"

    Description: >
      Bring the exoskeleton plate down on whatever's in front. Default button.
      Cheapest Endurance cost, reliable Momentum generation. Used when
      conserving resources or hitting a single priority target.

    RankProgression:
      Rank1: "120p, 8 END, +10 Mom"
      Rank2: "No change (already efficient)"
      Rank3: "Applies [Rending Plates] — +10% phys vuln on target, 6s, refreshes"

  # ─────────────────────────────────────────────────────────────────────────
  # GCD 2: GRINDING ADVANCE
  # ─────────────────────────────────────────────────────────────────────────

  GrindingAdvance:
    Name: "Grinding Advance"
    Type: GCD
    Category: advance_damage
    RankRequired: 1
    Potency: 100
    EnduranceCost: 12
    MomentumGenerated: 15
    Range: "Self — 3y forward advance, damages all in contact"
    Targets: "All in advance path"
    AdvanceDistance: 3y
    CCComponent:
      Type: physical_displacement
      Stage: 1
      Condition: "Momentum Tier 3+ (61+)"
      Effect: "Enemies pushed 2y perpendicular to advance line"
      MassGate: "Heavy enemies unmoved"

    Description: >
      Lurch forward 3y, damaging everything in contact. Primary gap closer
      AND Momentum builder. Higher END cost than Slam but generates more
      Momentum and moves you forward. At Tier 3+, shoves enemies aside.

    RankProgression:
      Rank1: "100p, 12 END, +15 Mom, 3y advance"
      Rank2: "+20 Mom (up from 15), 4y advance (up from 3y)"
      Rank3: "Additionally applies [Rending Plates] to all contacted"

  # ─────────────────────────────────────────────────────────────────────────
  # GCD 3: THORAX CRUSH
  # ─────────────────────────────────────────────────────────────────────────

  ThoraxCrush:
    Name: "Thorax Crush"
    Type: GCD
    Category: high_damage_commit
    RankRequired: 1
    Potency: 200
    BonusPotency: "+50 at Momentum Tier 3+ (total 250)"
    EnduranceCost: 15
    MomentumGenerated: 5
    Range: "Melee — frontal 120° arc"
    Targets: "All in 120° arc (1-3 effective)"
    CritCondition: "Target >50% HP — 1.4× crit"

    Description: >
      Full-body slam. Highest single-hit damage in the kit. Momentum bonus
      rewards committing fully BEFORE using this. The >50% HP crit means
      this is strongest when you ARRIVE at a fresh target — natural timing
      alignment with the class flow.

    RankProgression:
      Rank1: "200p (+50 at Tier 3+), crits >50% HP"
      Rank2: "Bonus threshold lowered to Tier 2+ (31+ Momentum)"
      Rank3: "Additionally applies [Rending Plates]"

  # ─────────────────────────────────────────────────────────────────────────
  # GCD 4: STEAMROLL
  # ─────────────────────────────────────────────────────────────────────────

  Steamroll:
    Name: "Steamroll"
    Type: GCD
    Category: aoe_advance
    RankRequired: 1
    Potency: "80 per target"
    EnduranceCost: 14
    MomentumGenerated: "+5 per target hit (max +25 at 5 targets)"
    Range: "Self — 4y × 3y rectangle"
    Targets: "All in advance path (no cap)"
    AdvanceDistance: 4y
    CCComponent:
      Type: physical_displacement
      Stage: 1
      Condition: "Always (Mass-gated — light enemies only)"
      Effect: "Light enemies scattered 1-2y outward"

    Description: >
      Wide-body advance through packs. Lower per-target than Slam but hits
      EVERYTHING. Per-target Momentum gen means packs FEED your gauge.
      5 targets = +25 Momentum in one GCD. Two Steamrolls into a pack
      can push you from Tier 1 to Tier 3+ in 4 seconds.

    RankProgression:
      Rank1: "80p/target, 14 END, +5 Mom/target"
      Rank2: "No change (already efficient in AoE)"
      Rank3: "[Carapace Resonance] now active at Tier 3+ (30 PPS passive AoE)"

  # ─────────────────────────────────────────────────────────────────────────
  # GCD 5: ENTRENCH
  # ─────────────────────────────────────────────────────────────────────────

  Entrench:
    Name: "Entrench"
    Type: GCD
    Category: defensive_hold
    RankRequired: 1
    Potency: 0
    EnduranceCost: 0
    EnduranceRecovered: 20
    MomentumEffect: "Pauses decay 4s (held, not lost)"
    Range: Self
    BuffDuration: 4s
    DefensiveBonus: "+10% DR for 4s"

    Description: >
      Dig in. Recover Endurance, freeze Momentum, gain brief DR. The PACING
      tool — one GCD of no damage prevents catastrophic Endurance-0 crash.
      The floor/ceiling separator: good players Entrench proactively at ~30
      END. Bad players never Entrench. Difference is only ~10% DPS.

    RankProgression:
      Rank1: "+20 END recovery, +10% DR 4s"
      Rank2: "+30 END recovery (up from 20), +15% DR (up from 10%)"
      Rank3: "No additional change"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 3: oGCD ABILITIES (3)
# ═══════════════════════════════════════════════════════════════════════════════

oGCDAbilities:

  # ─────────────────────────────────────────────────────────────────────────
  # oGCD 1: COMMIT
  # ─────────────────────────────────────────────────────────────────────────

  Commit:
    Name: "Commit"
    Type: oGCD
    Category: directional_lock
    RankRequired: 1
    Potency: 0
    EnduranceCost: 5
    Cooldown: "3s"
    Range: Self

    MomentumInteraction:
      FirstCommit: "Starts Momentum from 0"
      ReCommit_NewDirection: "RESETS Momentum to 0 (full penalty)"
      ReCommit_SameTarget: "No penalty — refreshes lock, keeps Momentum"

    Description: >
      Declare commitment direction. THE decision point. Everything flows
      from this choice. Nearly free (5 END, 3s CD) — the cost is INDIRECT:
      changing direction erases all Momentum. Skill expression = commit
      correctly the first time. Wrong commitment = 6-8s of lost building.

    RankProgression:
      Rank1: "5 END, 3s CD"
      Rank2: "No change"
      Rank3: "No change"

  # ─────────────────────────────────────────────────────────────────────────
  # oGCD 2: EXOSKELETAL FLARE — §25 FIXED (Momentum-gated, no CD)
  # ─────────────────────────────────────────────────────────────────────────

  ExoskeletalFlare:
    Name: "Exoskeletal Flare"
    Type: oGCD
    Category: momentum_spender_burst
    RankRequired: 1

    Section25Fix:
      Original: "20s CD (Rank 1), 15s CD (Rank 2)"
      Problem: "CD time-gates identity skill. Momentum IS already a resource gate."
      Resolution: >
        CD removed. Gate = Momentum Tier 2+ (31+ required to activate).
        Player earns access through advancing and hitting. Consuming ALL
        Momentum resets to 0, requiring full re-earn through play.
      Validation: >
        Building 31+ Momentum = 3-4 GCDs (~6-8s). Building 91+ = 6-8 GCDs
        (~12-16s). Stricter than 20s timer AND tied to correct play.

    Potency: "50 + (3 × Momentum consumed)"
    PotencyRange: "143 min (at 31) → 350 max (at 100)"
    EnduranceCost: 10
    Cooldown: "None (§25 — resource-gated)"
    MomentumGate: "31+ Momentum required to activate"
    MomentumCost: "Consumes ALL current Momentum"
    Range: "8y radius AoE (self-centered)"
    Targets: "All in radius"
    CCComponent:
      Type: physical_displacement
      Stage: 1
      Condition: "60+ Momentum consumed"
      Effect: "All targets knocked back 3y"
      MassGate: "Boss-class immune to knockback (damage still applies)"

    Description: >
      Discharge all stored kinetic energy outward. Potency scales with
      Momentum consumed. The decision is never "is it off CD?" but "have
      I built enough to make spending worthwhile?" Identity present at ALL
      times — always building toward Flare or deciding when to cash out.

    RankProgression:
      Rank1: "50 + 3×Mom (max 260 at cap 70). Gate: 31+ Momentum."
      Rank2: "50 + 4×Mom (max 450 at cap 100). Scaling increased."
      Rank3: "Knockback at 91+ consumed ignores Mass (all enemies displaced)."

  # ─────────────────────────────────────────────────────────────────────────
  # oGCD 3: BRACE — §25 FIXED (Endurance-gated, no CD)
  # ─────────────────────────────────────────────────────────────────────────

  Brace:
    Name: "Brace"
    Type: oGCD
    Category: active_damage_reduction
    RankRequired: 1

    Section25Fix:
      Original: "30s CD"
      Problem: "30s on only active mitigation creates dead-defense windows."
      Resolution: >
        CD removed. Gate = 30 Endurance cost. At +5/s passive recovery,
        30 END = ~6s implicit soft CD. CAN use twice rapidly at cost of
        approaching Endurance-0 (Super Armor crash risk).
      Validation: >
        Creates meaningful decision: Brace (survive big hit but risk low
        END) vs take the hit (keep END for sustained advance). Ties into
        core resource tension — more interesting than a timer.

    Potency: 0
    EnduranceCost: 30
    Cooldown: "None (§25 — resource-gated)"
    Range: Self
    Duration: 6s
    Effect: "+20% DR for 6s"

    ResourceTension: >
      At 100 END: Brace freely (70 remains — comfortable).
      At 60 END: Brace → 30 remaining (caution zone).
      At 40 END: Brace → 10 remaining (DANGER — Super Armor at risk).
      Below 35: DON'T BRACE. Entrench first.

    Description: >
      Lock plates into reinforced configuration. The question is now "can I
      AFFORD to Brace?" not "is Brace off cooldown?" Bracing at low Endurance
      risks Super Armor crash. Bracing at high Endurance is free value.

    RankProgression:
      Rank1: "30 END cost, +20% DR, 6s"
      Rank2: "25 END cost (reduced). Entrench(30) now fully covers one Brace."
      Rank3: "+25% DR (up from 20%). Savage tankbusters require more mitigation."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 4: RANK PROGRESSION SUMMARY
# ═══════════════════════════════════════════════════════════════════════════════

RankProgression:

  Philosophy: >
    No new abilities at any rank. Same 8 buttons, better outputs. Rank 3
    Siegebreaker presses identical inputs to Rank 1 — outputs are higher
    because passive traits amplify correct play without new decisions.

  Rank1:
    MomentumCap: 70
    TierAccess: "1-3 (no Tier 4 Unstoppable)"
    Content: "Normal dungeons, open world, story"
    Summary:
      GCDs:
        CarapaceSlam: "120p | 8 END | +10 Mom"
        GrindingAdvance: "100p | 12 END | +15 Mom | 3y adv"
        ThoraxCrush: "200p (+50 @ T3+) | 15 END | +5 Mom"
        Steamroll: "80p/tgt | 14 END | +5 Mom/tgt"
        Entrench: "0p | +20 END | freeze Mom | +10% DR 4s"
      oGCDs:
        Commit: "5 END | 3s CD"
        Flare: "50+3×Mom | 10 END | gate 31+ Mom"
        Brace: "30 END | +20% DR 6s"

  Rank2:
    MomentumCap: 100
    TierAccess: "1-4 (Unstoppable accessible)"
    Content: "Hard dungeons, trials, group content"
    Upgrades:
      GrindingAdvance: "Mom gen 15 → 20. Distance 3y → 4y."
      ThoraxCrush: "Bonus threshold Tier 3+ → Tier 2+ (31+ Mom)."
      Entrench: "Recovery 20 → 30 END. DR 10% → 15%."
      ExoskeletalFlare: "Multiplier 3× → 4×. Max potency 260 → 450."
      Brace: "Cost 30 → 25 END."
    PPS_Gain: "+8-12% over Rank 1"

  Rank3:
    MomentumCap: 100
    TierAccess: "1-4"
    Content: "Savage, raid progression"
    Traits:
      UnstoppableAdvance:
        Condition: "Momentum 91+ (Tier 4)"
        Effect: "Destroys terrain. Displaces ALL enemies regardless of Mass."
      CarapaceResonance:
        Condition: "Momentum 60+ (Tier 3-4)"
        Effect: "30 PPS passive AoE, 2y radius. No button press."
        Tension: "Hold Momentum for sustained 30 PPS or Flare for burst? Context-dependent."
      RendingPlates:
        Condition: "Applied by Carapace Slam + Thorax Crush"
        Effect: "+10% physical vulnerability, 6s, refreshes on hit."
        PartyValue: "All physical DPS benefit. Siegebreaker's raid contribution."
    AdditionalUpgrades:
      Brace: "DR 20% → 25%"
      Flare: "Knockback at 91+ ignores Mass"
    PPS_Gain: "+12-18% over Rank 2 (Resonance + Rending party amp)"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 5: POTENCY VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════

PotencyValidation:

  SingleTarget:
    Rank1:
      Loop: "GA → Slam → Slam → Crush → Slam → Slam → Crush → Entrench"
      GCD_Total: "100+120+120+250+120+120+250+0 = 1080p / 8 GCDs"
      PerGCD: "135p avg"
      PPS_GCD: "67.5 (at 2.0s GCD)"
      Flare_Contribution: "~200p avg per 16s cycle = +12.5 PPS"
      Total_PPS: "~80 PPS → 83-85% of DPS reference ✓"
    Rank2: "~87 PPS (+8-10%)"
    Rank3: "~98 PPS personal + party amp (~12-15%)"

  AoE_5Targets:
    Rank1: "~325 PPS total (~65/target)"
    Rank3: "~425 PPS total (Resonance + Rending)"

  EnduranceBudget:
    Rank1_10sCycle:
      Spending: "Slam(8)+Slam(8)+GA(12)+Crush(15)+Commit(5)+Flare(10) = 58 END"
      Recovery: "50 passive + 20 Entrench = 70"
      Surplus: "+12 (sustainable)"
    BraceImpact:
      Rank1: "Adding Brace(30): surplus → -18. Requires extra Entrench."
      Rank2: "Brace(25) + improved Entrench(30): manageable."
    Note: "Brace SHOULD stress the budget. Using it is meaningful. Not using it is viable."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 6: DECISION TREE (ROTATION REPLACEMENT)
# ═══════════════════════════════════════════════════════════════════════════════

DecisionTree:
  Statement: "No rotation. No fixed sequence. Each GCD = independent decision."

  Priority:
    1_Commit: "Valid target? → Commit (oGCD)"
    2_Range: "Not in melee? → Grinding Advance"
    3_Count: "Pack (3+)? → Steamroll. Single? → Carapace Slam"
    4_BigHit: "Tier 2+ Mom AND target >50% HP? → Thorax Crush"
    5_CashOut: "Tier 3+ Mom AND repositioning soon? → Flare (oGCD)"
    6_Breathe: "Endurance <30? → Entrench"
    7_Brace: "Big hit telegraphed AND Endurance >50? → Brace (oGCD)"

  NoSequence: >
    No opener. No burst phase. No raid buff alignment. Good vs bad =
    WHICH target you Commit toward, WHEN you Entrench vs press damage.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 7: §25 COMPLIANCE AUDIT
# ═══════════════════════════════════════════════════════════════════════════════

Section25Audit:

  CooldownInventory:
    Commit: {cd: "3s", status: "COMPLIANT (short tactical)"}
    ExoskeletalFlare: {cd: "None", gate: "31+ Momentum", status: "§25 FIXED"}
    Brace: {cd: "None", gate: "30 END cost", status: "§25 FIXED"}
    AllGCDs: {cd: "2.0s GCD only", status: "COMPLIANT (universal)"}

  Validation: >
    No cooldown in the kit exceeds 15s. Flare gating (31+ Momentum =
    6-8s of committed advance) is stricter than old 20s CD. Brace gating
    (30 END = ~6s of passive recovery) replaces old 30s CD with meaningful
    resource tension. Class identity present in EVERY engagement — always
    building toward burst or managing defensive resources. Zero dead-identity
    windows. §25 fully satisfied.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 8: ABILITY INTERACTION MATRIX
# ═══════════════════════════════════════════════════════════════════════════════

AbilityInteractions:

  CommitToFlare_Cycle: >
    Commit → build via GCDs → threshold → Flare → reset → reassess → re-Commit.
    Macro loop: 10-20s per cycle depending on target health and distance.

  EntrenchToBrace_Synergy: >
    Entrench recovers 20-30 END. Brace costs 25-30 END. One Entrench
    "pays for" one Brace. Natural rhythm: advance → Entrench → Brace.

  SteamrollToFlare_AoEBurst: >
    5 targets × +5 Mom/target = +25 per Steamroll. Two Steamrolls = 50 Mom
    in 4s (Tier 3). Immediately Flare for ~200p AoE burst. Packs = fastest
    Flare access. Siegebreaker LOVES packs.

  ResonanceVsFlare_Rank3: >
    Hold 60+ Mom = 30 PPS passive AoE. Flare at 80 Mom = 370p burst.
    Break-even: ~12s of holding ≈ one Flare. Context-dependent — no
    solved answer. Sustained AoE favors holding; burst windows favor Flare.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 9: QUICK-REFERENCE TABLE
# ═══════════════════════════════════════════════════════════════════════════════

QuickReference:
  GCDs:
    #           | Potency | END | Mom Gen  | Range    | Special
    CarSlam:    "  120    |  8  | +10      | 3y melee | Crit: rear positional"
    GrindAdv:   "  100    | 12  | +15      | 3y self  | CC @ T3+. Gap closer."
    ThorCrush:  "  200+   | 15  | +5       | 120° arc | Crit >50%HP. +50p @ T2+"
    Steamroll:  "  80/tgt | 14  | +5/tgt   | 4y×3y    | AoE. Scatter light."
    Entrench:   "    0    |  0  | freeze4s | Self     | +20 END. +10% DR."

  oGCDs:
    #           | Potency     | END | Gate          | Special
    Commit:     "    0        |  5  | 3s CD         | Dir lock. Mom reset on change."
    Flare:      " 50+3×Mom   | 10  | 31+ Momentum  | AoE burst. Eats all Mom."
    Brace:      "    0        | 30  | (cost = gate) | +20% DR 6s."

