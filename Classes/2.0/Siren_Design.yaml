# SECTION 10: DESIGN NOTES & OPEN QUESTIONS
# ─────────────────────────────────────────────────────────────────────────────

DesignNotes:
  CharmUI:
    Recommendation: >
      Bond tethers (visible lines, color-coded by stage) + peripheral timer
      arcs (curved bars at screen edge showing decay). Spatial awareness +
      numerical tracking combined.

  AllyCharmVisibility:
    Recommendation: >
      Partial. Allies see "Siren's Grace" buff with potency indicator
      (faint/strong). Exact stack count is Siren-UI-only information.
      Thematically: you don't KNOW how charmed you are.

  PvPBalance:
    Recommendation: >
      Stage 1: reduced targeting clarity. Stage 2-3: DISABLED in PvP (forced
      movement/behavioral override on players = unacceptable). PvP Siren
      operates on Stage 1 deprioritization + drain damage only.

  MerryinWorldbuilding:
    Recommendation: >
      Symbiotic predators. Genuine emotional bonds that serve biological function
      (life-energy exchange). Isolation genuinely hurts them. Charm isn't malicious —
      it's how they connect. The predatory element: connection ALSO feeds them.
      Mutualistic parasite, not pure predator.

  TuningKnobs:
    CharmDecayRate: "4/6/8s per rank. Range 3-10s."
    StageThresholds: "3/6/10. Could reduce to 2/5/8 for faster staging."
    MaxDevotionTargets: "1. Could allow 2 at Rank 3 (massive risk increase)."
    ResonanceGenRate: "5/bond/3s. Range 3-8."
    CharmRange: "20y enemy, 15y ally."
    JiltedFury: "8s +30% after break. Range 5-12s."

  FutureDesignSpace:
    - "Rank 4: AoE Charm maintenance (refresh all in range, 1 GCD, weaker per-target)"
    - "Duet mechanic: bond with another healer for combined Charm economy"
    - "Environmental Charm: charm non-combat fauna for utility"
    - "Charm specialization traits: Stage 1 breadth vs Stage 3 depth"
    - "Cross-class: Shaman hex + Siren Charm = amplified drain"

  WhatSirenIsNOT:
    - "NOT a traditional healer (no ally-targeted heal buttons)"
    - "NOT a frontliner (Stage 3 ≠ tanking)"
    - "NOT viable in isolation"
    - "NOT a burst healer"
    - "NOT a fixed-rotation class"
    - "NOT alignment-dependent (no 2-min cycle)"

  WhatSirenIS:
    - "A drain-bond sustain healer (healing = byproduct of enemy manipulation)"
    - "A plate-spinning adaptive executor (never settles into fixed sequence)"
    - "A proximity-dependent social predator (thrives in crowded chaos)"
    - "A class with VERY low floor (broken bonds = 0) and VERY high ceiling"
    - "The 'boyfriend/girlfriend healer' — enemies love you to death (literally)"

  # ─────────────────────────────────────────────────────────────────────────
  # §25 AUDIT: COOLDOWN → RESOURCE GATING CONVERSION
  # ─────────────────────────────────────────────────────────────────────────

  Section25_Audit:
    Description: >
      §25 mandates identity skills use resource gating (Resonance) instead of
      long cooldowns. The following identity skills have BOTH a long CD AND a
      Resonance cost — the CD is redundant. Skills task should convert to
      Resonance-only gating.

    NeedsResourceGatingConversion:
      - Skill: "Resonance Cascade"
        CurrentGating: "90s CD + 40 Resonance"
        Issue: "Identity skill (Charm economy recovery). CD makes it an 'emergency button' rather than resource-gated tool."
        Recommendation: "Remove CD. 40 Resonance cost alone. At 3 bonds = available every ~8s. At 1 bond = every ~24s."

      - Skill: "Irresistible Cadence"
        CurrentGating: "60s CD + 25 Resonance"
        Issue: "Identity skill (ramp accelerator). CD prevents reactive use when field state demands it."
        Recommendation: "Remove CD. 25 Resonance cost alone. Frequent with healthy economy, scarce when broken."

      - Skill: "Veil of Adoration"
        CurrentGating: "120s CD + 30 Resonance"
        Issue: "Identity skill (maintenance pause). 120s CD forces pre-planning — contradicts adaptive philosophy."
        Recommendation: "Remove CD. 30 Resonance cost alone. Frequent at 3+ bonds, rare at 1."

    Excluded_AcceptableCDs:
      - "Siren's Crescendo (180s): Ultimate — CDs permitted on ultimates."
      - "Desperate Aria (45s): Emergency fallback, not identity skill."
      - "Lullaby (40s): Standard CC utility."

    Note: >
      Skills task implements these conversions. Removing CDs makes power
      abilities feel like natural extensions of healthy Charm economy —
      reinforcing adaptive maintenance identity over cooldown tracking.
      Attempted as CD-gated in original spec, superseded by §25 resource
      philosophy.

