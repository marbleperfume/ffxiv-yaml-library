  Requirement: "Ground play FUNCTIONAL — weaker but NOT useless. Active gameplay."

  DPS_Contribution:
    Target: "55-60% of full-cycle DPS"
    Evidence: "Storm combo (380p/6s) + Poison + Lightning arcs"
    Verdict: PASS

  Active_Decisions:
    - "Stormweave Toggle: Wind vs Lightning per situation"
    - "Neurotoxin timing: apply before re-ascend for DoT bridge"
    - "Rear positional crits: SPD 15 enables flanking"
    - "5 poison stacks → guaranteed crit: stack management"
    - "Dive Tempo (R3): combo completion → -1s Grounded Duration"
    - "Updraft Cutter choice: Wind (+10 AU) vs standard (+5 AU)"
    Verdict: PASS

  Altitude_Feedback:
    - "Updraft Cutter: +5 AU (Wind: +10 AU) per finisher"
    - "3 Wind combos = 30 AU → shallow dive without Lift Off"
    - "Wall-jumps: 20 AU indoor alternative"
    Verdict: PASS

  Self_Sufficiency:
    - "i-frame dashes (guaranteed immunity)"
    - "SPD 15 (outrun most enemies)"
    - "Featherward barrier"
    - "Updraft Burst emergency escape"
    - "Descent regen continues 4s post-landing"
    Verdict: PASS

  Not_Dead_Time:
    - "Poison bridges damage between dives"
    - "Dive Tempo: active ground play shortens ground time"
    - "Multiple meaningful decisions per phase"
    - "Active play → faster cycle. Passive → slower. Skill expression."
    Verdict: PASS

  Overall: PASS
  Session5_Statement: >
    Ground Strix = raptor on ground: fast, venomous, dangerous, not in its element.
    WEAKER (55-60%) but NEVER helpless. Active decisions. Feeds altitude system.
    Self-sufficient survival. Not dead time between dives.

