  STR6_Note: "Damage from MOMENTUM (altitude×mass×velocity), not raw strength. Elemental weapons on ground."
  GCD: { Base: 2.0s, HasteCap: 1.4s, Weave: single_only, AnimLock: "0.6s std / 0.3s short" }

  PotencyBands:
    Filler: "Storm Slash 100p ✓"
    ComboFinisher: "Updraft Cutter 150p ✓"
    SpenderSmall: "Raptor Dive 30AU = 300p ✓"
    SpenderLarge: "Raptor Dive 70AU = 500p ✓"
    ClassUltimate: "TV + Piercing Plunge 100AU = 850p ✓"
    Verdict: PASS

  DPSTargets:
    OpenSky: "100%"
    PartialCeiling: "80-85%"
    GroundLocked: "55-60%"
    Boss_ST: "95-100%"
    Trash_AoE: "105-110%"

  PPSValidation:
    Cycle15s: "Mark(0) + Bolt(80) + Spiral(0) + Dive70AU(500) + Ground combo(380) + Poison(125) ≈ 1175p"
