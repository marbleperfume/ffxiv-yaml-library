# ─────────────────────────────────────────────────────────────────────────────
# SECTION 4: §25 COMPLIANCE
# ─────────────────────────────────────────────────────────────────────────────

Section25_Compliance:
  Rule: "No CDs >15s on identity-defining skills. Resource-gated preferred."
  DesignFileFlags: 5
  AllResolved: true

  Conversions:
    terminal_velocity:
      Before: "120s CD"
      After: "3 Dive Momentum (earned via successful marked dives), NO CD"
      Gate: "Performance-based escalation resource"
      Identity: "Always building toward TV or using TV. Zero dead windows."
      Verdict: PASS

    dive_accelerant:
      Before: "45s CD"
      After: "30 AU altitude cost, NO CD"
      Gate: "Primary class gauge (altitude)"
      Identity: "Available every cycle at sufficient altitude."
      Verdict: PASS

    raptors_eye:
      Before: "60s CD"
      After: "50+ AU gate + 15 Wing Stamina cost, NO CD"
      Gate: "Position + resource"
      Identity: "READ tool available when positioned correctly."
      Verdict: PASS

    updraft_burst:
      Before: "30s CD"
      After: "25 Wing Stamina cost, NO CD"
      Gate: "Flight fuel resource"
      Identity: "Escape available whenever stamina exists."
      Verdict: PASS

    feint_dive:
      Before: "20s CD"
      After: "12s CD (within 5-15s tactical range)"
      Gate: "Tactical CD (acceptable for non-identity ≤15s)"
      Identity: "~1× per dive cycle."
      Verdict: PASS

  RemainingCDs: "Neurotoxin Sheath 15s (tactical, non-identity). All others: 0s or resource-gated."
  Section25_Overall: PASS
  Summary: "Zero identity skills gated >15s. All converted to resource/performance gates."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 5: ALTITUDE STATE COVERAGE
# ─────────────────────────────────────────────────────────────────────────────

AltitudeStateCoverage:
  Requirement: "All 5 altitude states mechanically distinct with clear use cases"

  Ground_0AU:
    Identity: "Weapon-based elemental/poison melee"
    Unique: "Only state with melee combo. Fastest stamina regen. Cannot dive."
    UseCase: "Mandatory recovery + active DPS via Storm Talons"

  LowHop_1to10AU:
    Identity: "Micro-jump dodge/transition"
    Unique: "Thermal Kick, Updraft Cutter launch. 1 aerial action mid-combo."
    UseCase: "Ground AoE dodge, indoor altitude accumulation, aerial GCD access"

  LowAltitude_1to30AU:
    Identity: "Entry flight — quick-cycle dives"
    Unique: "Lift Off entry point. Melee-safe, ranged-exposed. Standard stamina drain."
    UseCase: "Cave play, stamina-conservative cycles, entry after ground"

  MidAltitude_31to70AU:
    Identity: "Primary combat altitude — bread and butter"
    Unique: "Raptor's Eye threshold (50+). Only anti-air reaches. +25% passive evasion."
    UseCase: "Most dives launch here. Best risk/reward ratio. Stamina-positive cycles."

  HighAltitude_71to100AU:
    Identity: "Apex burst — expensive, devastating"
    Unique: "Thin-air penalty (+3/s drain). Slow horizontal. Max vision. Near-immunity."
    UseCase: "Terminal Velocity apex dives. Opener reads. Cannot sustain."

  Verdict: PASS
  Summary: "Each state has unique mechanics, risk, stamina cost, and strategic value. Zero redundancy."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 6: WEAKNESS BUDGET
# ─────────────────────────────────────────────────────────────────────────────

WeaknessBudget:

  Indoor_Cave:
    Severity: MAJOR
    Impact: "55-70% DPS (altitude denial)"
    Counterplay: "Wall-jumps, Updraft Cutter stacking, poison DoT, Lightning arcs"
    DesignRole: "PRIMARY balance lever. Map controls Strix power."

  AntiAir_Enemies:
    Severity: MAJOR
    Impact: "85-90% DPS (forced mid-alt, stamina pressure from Barrel Rolls)"
    Counterplay: "Feint Dive, fast commit, party draws AA attention, mid-alt play"
    DesignRole: "Prevents infinite high-altitude degenerate play"

  MultiTarget_Ground_Pressure:
    Severity: MODERATE
    Impact: "Reduced ground combo completion (forced defensive)"
    Counterplay: "i-frame dashes, Updraft Burst escape, SPD 15 kiting, frontliner cover"
    DesignRole: "Ground time = dangerous. Motivates re-ascend."

  Hollow_Bones:
    Severity: MODERATE
    Impact: "70% standard HP, lowest physical defense"
    Counterplay: "Featherward (20% shield + 25% DR), dashes, altitude, descent regen"
    DesignRole: "Binary survival: dodge everything OR take it (probably die)"

  Dive_Commit_Fixed:
    Severity: MODERATE
    Impact: "0p from missed dive + wasted ground time"
    Counterplay: "Better reads, Windshear slow, Screech lock, Feint Dive, party CC"
    DesignRole: "Core risk/reward. Pre-calculation mastery = not missing."

  Stamina_Exhaustion:
    Severity: LOW
    Impact: "Forced grounding (55-60% DPS for 2.5s recovery)"
    Counterplay: "Stamina discipline, Thermal Spiral, mid-alt conservative play"
    DesignRole: "Flight economy management is skill axis"

  Summary: "2 Major + 3 Moderate + 1 Low = appropriate for DPS"
  AllHaveCounterplay: true
  EncounterDesignLever: "Ceiling height + anti-air placement"
  Verdict: PASS

