# ─────────────────────────────────────────────────────────────────────────────
# SECTION 2: MATCHUP SCENARIOS
# ─────────────────────────────────────────────────────────────────────────────

MatchupScenarios:

  SR1_OpenRoom:
    Environment: "Open sky, 6-8 clustered trash, SR1 (no tactics, no anti-air)"
    AltitudeAccess: "Full 100 AU"
    DiveChoice: Scatterfall
    CycleTime: "12-14s"
    ExpectedDPS: "105-110%"
    DiveAccuracy: "95%+ (enemies don't dodge)"
    KeyMath: "Scatterfall 70AU × 6 targets × 1.25 (>50%HP) = 2325p opener"
    Risk: LOW
    Verdict: PASS
    Note: "Best-case scenario. Strix AoE dominance."

  SR2_Mixed:
    Environment: "70AU ceiling, 4-5 enemies (2 melee, 2 ranged, 1 elite), SR2"
    AltitudeAccess: "70 AU max"
    AntiAir: "Ranged enemies CAN shoot hovering Strix (not dedicated AA)"
    DiveChoice: "Mix — Raptor Dive groups, Piercing Plunge elite"
    CycleTime: "15-18s (Barrel Rolls cost stamina)"
    ExpectedDPS: "90-95%"
    DiveAccuracy: "85-90%"
    Counterplay:
      - "Windshear Bolt slows targets before commit"
      - "Feint Dive (12s) baits SR2 dodge"
      - "Barrel Roll i-frame costs 3 stamina per dodge"
      - "Featherward absorbs 1 ranged hit while hovering"
    Risk: MODERATE
    Verdict: PASS

  SR3_Intelligent:
    Environment: "High ceiling BUT dedicated anti-air enemy, SR3 (flank, coordinate, retreat)"
    AltitudeAccess: "Physical clearance exists; anti-air PUNISHES >50 AU loitering"
    AntiAir: "DEDICATED — targets highest-altitude player, fast projectiles"
    DiveChoice: "Mid-alt Raptor Dives (safer), Piercing Plunge (calculated risks)"
    CycleTime: "16-20s (forced lower, cautious reads)"
    ExpectedDPS: "85-90%"
    DiveAccuracy: "80-85% (SR3 enemies dodge on commit)"
    ForcedAdaptation: "Cannot sustain >70AU hover. Ascend fast → read fast → commit fast."
    Counterplay:
      - "Feint Dive essential for baiting SR3 dodge"
      - "Party CC/root before commit"
      - "Quick ascend-scan-descend for Raptor's Eye"
      - "Terminal Velocity earned slower (fewer marked hits)"
    Risk: HIGH
    Verdict: PASS_WITH_SKILL
    Note: "Designed challenge content. 80% skill expression shows here."

  Corridor_Cave:
    Environment: "20-30 AU ceiling, 4-6 enemies in corridor line, SR2"
    AltitudeAccess: "SEVERELY LIMITED — Low Altitude only"
    DiveChoice: "Shallow Raptor Dive (20-30AU = 250-300p)"
    GroundEmphasis: "70-80% time grounded"
    ExpectedDPS: "60-70%"
    Compensation:
      - "Wall-jumps (Crag Launch 20 AU) enable mini-dives"
      - "Updraft Cutter stacking: 3 combos Wind = 30 AU"
      - "Lightning arcs (Voltaic Strike) for linear enemies"
      - "Neurotoxin DoT bridges reduced dive output"
    Risk: MODERATE
    Verdict: PASS_AT_REDUCED_OUTPUT
    Note: "INTENTIONAL weakness. Map = primary balance lever for Strix."

