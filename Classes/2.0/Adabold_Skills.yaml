# ▲ CONTINUES FROM: Adabold_Design.yaml | THIS FILE COVERS: Ability roster, potencies, rank progression
# ═══════════════════════════════════════════════════════════════════════════════
# ADABOLD (Rawrotin) — Bodyguard / Interception Frontliner [SKILLS]
# ═══════════════════════════════════════════════════════════════════════════════
#
# 11 abilities. Reactive interception kit — moderate APM, high decision density.
# §25 APPLIED: ALL identity skills gauge-gated. No cooldowns beyond GCD recast.
#
# CHANGES FROM PRIOR VERSION:
#   REMOVED: Iron Body, Tether Dash, Tether Pull, Consecrate
#   ADDED: Shield Projection, MBAS, Redirection, Shield Bomb
#   REWORKED: Shield Lob (no tether, now interrupt + KB), Sentinel Instinct (proxy NTU)
#
# References:
#   - Adabold_Design.yaml (identity, frontliner contract, MBAS, Shield Projection)
#   - Combat/BalanceTargets.yaml (potency targets, GCD timing)
#   - DESIGN_OVERRIDE.md §9, §12, §25
# ═══════════════════════════════════════════════════════════════════════════════

Key: Classes.Frontliner.Adabold.Skills

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 1: KIT OVERVIEW
# ═══════════════════════════════════════════════════════════════════════════════

KitOverview:
  TotalAbilities: 11
  GCDCount: 7  # Basic x3 (combo), Shield Lob, Shield Bash, Shooting Star, Shield Bomb, Redirection
  oGCDCount: 2  # Shield Projection (toggle), MBAS
  PassiveCount: 1  # Sentinel Instinct
  ExecutionTier: Experienced
  GCD: "2.0s base -> ~1.85s (SPD 14) -> cap 1.2s"
  WeaveModel: single_weave_only
  AnimationLock: "0.6s standard / 0.3s for Projection toggle"
  ResourceInteraction:
    ShieldGauge: "Generated by attacks/blocking/intercepts. Spent by all identity skills."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 2: GCD ABILITIES — BASIC COMBO (free, generates gauge)
# ═══════════════════════════════════════════════════════════════════════════════

BasicCombo:

  PackStrike:
    Name: "Pack Strike"
    ID: ADA_GCD_01
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: 100
    Range: "3y melee"
    Targets: 1
    GaugeCost: 0
    GaugeGenerated: 6
    ComboPosition: 1
    ExploitCondition: "None (filler)"
    SRInteraction: "SR1 primary action -> SR3+ rare (constant repositioning)"
    RankProgression:
      Rank1: "100p, +6 gauge"
      Rank3: "Applies [Rawrotin Mark] on hit"

  FangFollow:
    Name: "Fang Follow"
    ID: ADA_GCD_02
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: 120 (60 uncombo)
    Range: "3y melee"
    Targets: 1
    GaugeCost: 0
    GaugeGenerated: 6
    ComboPosition: 2
    ComboFrom: PackStrike
    ComboWindow: 8s
    ExploitCondition: "None"
    RankProgression:
      Rank1: "120p, +6 gauge"
      Rank3: "Refreshes [Rawrotin Mark]"

  PackFang:
    Name: "Pack Fang"
    ID: ADA_GCD_03
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: 160 (80 uncombo)
    Range: "3y melee"
    Targets: 1
    GaugeCost: 0
    GaugeGenerated: "+8 (16 on Marked target)"
    ComboPosition: 3
    ComboFrom: FangFollow
    SelfHeal: "3% max HP on Marked target (4% R2, 5% R3)"
    ExploitCondition: "Crits on Marked target (racial synergy — 1.4x)"
    SRInteraction: "SR1 always completes -> SR4 rare completion = massive reward"
    RankProgression:
      Rank1: "160p, +16 on mark, heal 3%, crit on mark"
      Rank2: "Heal -> 4%"
      Rank3: "Heal -> 5%. Mark consume grants [Pack Vigor]: +5% dmg 6s."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 3: GCD ABILITIES — IDENTITY SKILLS (gauge-gated)
# ═══════════════════════════════════════════════════════════════════════════════

IdentityGCDs:

  ShieldLob:
    Name: "Shield Lob"
    ID: ADA_GCD_04
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: 120
    Range: "15y (R1) / 20y (R2+)"
    Targets: 1
    GaugeCost: 15
    Effect:
      - "Hard interrupt (cancels enemy current action)"
      - "3y knockback (away from Adabold)"
      - "Shield absent 1.2s (no Projection during gap)"
    ExploitCondition: "Crits on targets actively casting (interrupt bonus — 1.4x)"
    SRInteraction: "SR1 opener -> SR3+ reactive interrupt on casters threatening backline"
    DesignNote: >
      Fast, weak, disruptive. No tether, no setup. Throw and disrupt.
      Weaker than MetaKnight ranged discharge (120p vs 280p) but INTERRUPTS.
      Different tool: MK does damage at range, Adabold does disruption at range.
    RankProgression:
      Rank1: "120p, 15y, interrupt, 3y KB"
      Rank2: "Range -> 20y. Shield return -> 0.8s."
      Rank3: "Interrupted targets: +10% damage taken from all sources, 4s [Disrupted]."

  ShieldBash:
    Name: "Shield Bash"
    ID: ADA_GCD_05
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: "150 (200 on Pin)"
    Range: "3y melee"
    Targets: 1
    GaugeCost: 15
    CCComponent:
      Normal: "3y knockback toward nearest wall"
      Pin: "1.5s immobilize (wall within 4y behind target)"
      MassGate: "Boss immune to displacement, damage applies"
    ExploitCondition: "Always crits on Pin (positional wall-splat — 1.4x on 200p)"
    SRInteraction: "SR1 free Pins -> SR3+ enemies avoid walls, requires Star setup"
    ComboReceivesFrom: "Shooting Star, Redirection (face toward wall)"
    RankProgression:
      Rank1: "150/200p, Pin 1.5s"
      Rank2: "No change"
      Rank3: "Pin -> 2.0s. Pin grants +10 bonus gauge."

  ShootingStar:
    Name: "Shooting Star"
    ID: ADA_GCD_06
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: 180
    Range: "3y melee"
    Targets: 1
    GaugeCost: 25
    KnockbackDistance: "6y in PLAYER-CHOSEN direction"
    CCComponent:
      Effect: "6y directional knockback (player aims)"
      MassGate: "Boss: reduced to 2y"
    ExploitCondition: "Crits if target within 4y of protected ally (proximity — 1.4x)"
    DualPurpose:
      Emergency: "Punt enemy away from ally (crits)"
      Setup: "Punt into wall -> Shield Bash Pin"
    BreadAndButter: "Star (180/252 crit) -> Bash Pin (280 crit) = 460-532p in 2 GCDs"
    SRInteraction: "SR1 overkill -> SR2 primary tool -> SR4 split-second punt vs setup decision"
    RankProgression:
      Rank1: "180p, 6y KB"
      Rank2: "No change"
      Rank3: "On crit: [Rush] — next GCD has 0 gauge cost."

  ShieldBomb:
    Name: "Shield Bomb"
    ID: ADA_GCD_07
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: "100 (primary) + 80 per ricochet target"
    Range: "12y (initial throw)"
    RicochetRange: "6y between targets (8y at R2)"
    MaxBounces: "Up to 4 additional targets (1 bounce each, NO repeated hits)"
    Targets: "Up to 5 (primary + 4 ricochets)"
    GaugeCost: 20
    Effect:
      - "Shield launched at primary target"
      - "Ricochets to nearest unhit enemy within 6y, one bounce each"
      - "Each hit: 1.5y minor knockback + 0.3s flinch"
      - "Shield returns to Adabold after final bounce"
      - "Shield absent ~1.5-2s depending on bounce count"
    ExploitCondition: "Crits on primary if 3+ targets hit by ricochet chain"
    VsShieldLob: >
      Lob: single target, hard interrupt, 3y KB. Precision disruption.
      Bomb: multi-target, flinch (soft interrupt), 1.5y KB. Area disruption.
    SRInteraction: "SR1 mob clear -> SR2 pack control -> SR4 prioritize primary target in group"
    RankProgression:
      Rank1: "5 targets max, 100/80p, 1.5y KB, 0.3s flinch each"
      Rank2: "Ricochet range -> 8y (catches wider groups)"
      Rank3: "Primary target takes full interrupt (same as Lob). Ricochets remain flinch."

  Redirection:
    Name: "Redirection"
    ID: ADA_GCD_08
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: 100
    Range: "3y melee"
    Targets: 1
    GaugeCost: 10
    Effect:
      - "Rotates enemy FACING to player-chosen direction (360 degree aim wheel)"
      - "Facing forced for 1s (cannot rotate back)"
      - "NO displacement — enemy stays in place"
      - "Mid-action enemies have their action REDIRECTED to new facing"
    ExploitCondition: "None (utility, not damage)"
    TacticalUse:
      - "Redirect charge attacks into walls (enemy charges wrong direction)"
      - "Turn cone attacks away from allies"
      - "Create back-turned state for ally positional Exploits"
      - "Chain: Redirect (face wall) -> Star (KB into wall) -> Bash (Pin)"
    VsInterrupt: >
      Shield Lob: hard interrupt (stops action). Redirection: soft interrupt
      (action CONTINUES but aimed wrong). Lob when you need it stopped,
      Redirect when you want it to fire harmlessly or into a wall.
    BossInteraction: "Boss enemies: facing forced 0.5s (reduced, not immune)"
    SRInteraction: "SR1 unnecessary -> SR2 redirect flankers -> SR3+ redirect boss cone attacks"
    RankProgression:
      Rank1: "1s forced facing, 100p"
      Rank2: "Forced facing -> 1.5s"
      Rank3: "Redirected actions that hit walls: target takes 80p self-damage (own force against them)"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 4: oGCD ABILITIES
# ═══════════════════════════════════════════════════════════════════════════════

oGCDAbilities:

  ShieldProjection:
    Name: "Shield Projection"
    ID: ADA_OGCD_01
    ActionType: oGCD (stance toggle)
    CastTime: Instant
    AnimationLock: "0.3s (fast toggle)"
    Recast: "None (toggle)"
    Potency: 0
    Range: Self
    GaugeCost: "4/s sustained"
    Effect:
      - "Projects expanded shield barrier in facing direction"
      - "120 degree frontal arc, 6y total width (3y each side of Adabold)"
      - "Blocks projectiles and melee attacks passing through the plane"
      - "Shield HP = Adabold max HP x 0.4 (breakable)"
      - "Movement speed 40% while active"
      - "Cannot use MBAS while Projection active (positional commitment)"
    BreakMechanic:
      Threshold: "Shield HP depleted = barrier breaks"
      Downtime: "4s before reform (3s R2)"
      R3Bonus: "Broken barrier detonates: 150p AoE + 2s slow to enemies within 4y"
    TradeOff: >
      Area defense vs personal bodyguarding. Projecting = committed to position.
      Cannot MBAS (locked). Cannot reposition quickly (40% speed). Choose:
      cover a corridor OR save individuals. Cannot do both simultaneously.
    DrainMath: "100 gauge / 4/s = 25s max. Typical 4-8s bursts during threat windows."
    SRInteraction: "SR1 corridor trivializes -> SR2 boss cones -> SR4 must predict which angle"
    RankProgression:
      Rank1: "6y width, 40% HP, 40% move speed"
      Rank2: "Shield HP -> 50%. Reform time -> 3s."
      Rank3: "Broken detonation: 150p AoE + 2s slow (4y radius)."

  MBAS:
    Name: "MBAS (My Body As A Shield)"
    ID: ADA_OGCD_02
    ActionType: oGCD
    CastTime: Instant
    AnimationLock: "0.4s"
    Recast: "None (§25 gauge-gated)"
    Potency: 0
    Range: "15y (dash to ally) / 18y R2"
    Targets: "Self (relocates to ally position)"
    GaugeCost: 20
    Requirement: "Ally targeted (not enemy). Cannot use during Shield Projection."
    Effect:
      - "Instant dash to targeted ally"
      - "Arrives between ally and threat source (auto-facing)"
      - "For 2s: attacks targeting that ally hit Adabold instead"
      - "30% DR on intercepted hits (35% R2)"
      - "+8 gauge per hit intercepted"
    FeedFromSentinel: >
      Sentinel warns 1.5-2.5s before threat arrives. MBAS dash ~0.3s.
      Net reaction window: 1.2-2.2s. Generous but requires watching feed.
    ExploitCondition: "N/A (no damage dealt)"
    SRInteraction: "SR1 unused (enemies attack closest) -> SR2 core -> SR4 constant triage"
    RankProgression:
      Rank1: "15y range, 30% DR on intercept, 2s window, +8 gauge/intercept"
      Rank2: "Range -> 18y. DR -> 35%."
      Rank3: "Intercepting a lethal hit: +50 gauge instantly [Pack Fury]."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 5: PASSIVE — SENTINEL INSTINCT
# ═══════════════════════════════════════════════════════════════════════════════

Passive:

  SentinelInstinct:
    Name: "Sentinel Instinct"
    ID: ADA_PASSIVE_01
    ActionType: Passive (always on, no cost)
    Potency: 0
    Range: "Unlimited"
    GaugeCost: 0
    Source: "Rawrotin pack-bond awareness (racial, unteachable)"
    Effect:
      - "Warning 1.5s before enemy attack reaches ally (2.0s R2, 2.5s R3)"
      - "Shows: WHICH ally, FROM which direction, WHAT attack type, SEVERITY"
      - "Reads threats allies would need NTU 8+ to detect themselves"
      - "Multiple concurrent threats shown — player must PRIORITIZE"
    NTU_Proxy: >
      Adabold reads threats FOR his team. Allies do not need high personal
      NTU because Adabold's Sentinel Instinct covers their blind spots.
      He is their NTU.
    Limitation: "Warning ONLY. No auto-intercept. Player must physically respond."
    SRInteraction:
      SR1: "Rarely triggers (enemies attack closest)"
      SR2: "Primary value — warns when flankers find open paths"
      SR3: "Frequent, simultaneous warnings = prioritize"
      SR4: "[AMBUSH] notation for coordinated multi-angle"
    RankProgression:
      Rank1: "1.5s warning, direction + target + type"
      Rank2: "2.0s warning. Adds severity estimate."
      Rank3: "2.5s warning. Coordinated threats (3+) get [AMBUSH] tag + 0.5s extra."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 6: SHIELD GAUGE ECONOMY
# ═══════════════════════════════════════════════════════════════════════════════

ShieldGauge:
  Type: "0-100 gauge"
  Cap: "80 (R1) / 100 (R2+)"

  Generation:
    Passive: "+2/s in combat"
    BasicGCD: "+6/hit"
    PackFang_Marked: "+16 total"
    HitReceived: "+4/hit taken"
    MBAS_Intercept: "+8/hit intercepted for ally"
    Pin_Rank3: "+10 on Pin"
    PackFury_R3: "+50 on lethal intercept"

  Costs:
    ShieldLob: 15
    ShieldBash: 15
    ShootingStar: 25
    ShieldBomb: 20
    Redirection: 10
    ShieldProjection: "4/s sustained"
    MBAS: 20

  Timing:
    FirstSpend: "8-10s (Lob or Redirection at 10-15 gauge)"
    FullGauge: "30-35s"
    RecoveryFromEmpty: "4-6s to Lob/Redirect threshold"

  SustainRate: >
    Generation ~10-14/s while actively fighting + taking hits.
    Key: BEING HIT generates gauge (+4). INTERCEPTING generates more (+8).
    Bodyguard loop: intercept -> take hit -> gauge -> protect again.

  BodyguardLoop: >
    Sentinel warns -> MBAS to ally (20 cost) -> intercept hit (+8 gen, +4 from hit taken)
    -> net cost 8 gauge per save. Sustainable if also combo-ing between saves.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 7: COMBO & CHAIN RELATIONSHIPS
# ═══════════════════════════════════════════════════════════════════════════════

ComboRelationships:

  BasicChain: {Seq: "Strike->Follow->Fang", Potency: "380p (444 w/crit)", Purpose: "Gauge gen + heal"}
  WallSplat: {Seq: "Shooting Star -> Shield Bash Pin", Cost: "40 gauge", Potency: "460-532p / 2 GCDs"}
  RedirectSplat: {Seq: "Redirection (face wall) -> Star (KB into wall) -> Bash Pin", Cost: "50 gauge", Potency: "560-632p / 3 GCDs"}
  Intercept: {Seq: "[Sentinel] -> MBAS -> Shooting Star (punt threat)", Cost: "45 gauge", Potency: "180-252p + ally saved"}
  PackDisrupt: {Seq: "Shield Bomb (flinch group) -> MBAS if one gets through -> Star closest", Cost: "65 gauge", Potency: "Multi-target disruption"}
  RangedInterrupt: {Seq: "Shield Lob (interrupt caster) -> Bomb (flinch pack) if group", Cost: "35 gauge", Effect: "Ranged disruption without closing"}

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 8: RANK PROGRESSION SUMMARY
# ═══════════════════════════════════════════════════════════════════════════════

RankProgression:

  Philosophy: "Full kit from Rank 1. Higher ranks = wider scope, stronger payoffs, no new buttons."

  Rank1:
    GaugeCap: 80
    LobRange: 15y
    MBASRange: 15y
    ProjectionHP: "40% max HP"
    PinDuration: 1.5s
    RedirectDuration: 1.0s
    Content: "Normal dungeons, open world"

  Rank2:
    GaugeCap: 100
    LobRange: 20y
    MBASRange: 18y
    ProjectionHP: "50% max HP"
    BombRicochet: "8y (from 6y)"
    RedirectDuration: 1.5s
    MBAS_DR: "35% (from 30%)"
    Upgrades: "Gauge cap, ranges, projection HP, DR, ricochet, redirect duration, heal +1%, sentinel +0.5s"

  Rank3:
    Traits:
      PackVigor: "+5% dmg if Pack Fang on mark consumed"
      Disrupted: "Lob interrupt -> +10% damage taken 4s"
      Rush: "Star crit -> next GCD free"
      ExtendedPin: "Pin -> 2.0s + 10 bonus gauge"
      BombInterrupt: "Primary target gets full interrupt (not just flinch)"
      WallForce: "Redirected actions hitting walls deal 80p self-damage to target"
      BrokenShield: "Projection break -> 150p AoE + 2s slow (4y)"
      PackFury: "MBAS intercepts lethal hit -> +50 gauge"
      LongerSentinel: "2.5s warning. 3+ coordinated = [AMBUSH] + 0.5s extra"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 9: DECISION TREE
# ═══════════════════════════════════════════════════════════════════════════════

DecisionTree:
  Priority:
    1: "Sentinel warning active? -> MBAS to threatened ally (if range + gauge)"
    2: "Enemy casting on backline? -> Shield Lob (interrupt from range)"
    3: "Multiple enemies advancing? -> Shield Bomb (flinch pack, buy time)"
    4: "Enemy charging in specific direction? -> Redirection (rotate facing)"
    5: "Need corridor blocked? -> Shield Projection (commit to barrier)"
    6: "Enemy near wall? -> Shooting Star toward wall -> Bash Pin"
    7: "Low gauge, no threat? -> Basic combo (rebuild + heal)"
    8: "Enemy punted, need follow-up? -> Redirect (face away) or Bash (pin if wall)"
  NoSequence: "Decision quality is the ceiling, not execution speed."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 10: EXPLOIT SYSTEM
# ═══════════════════════════════════════════════════════════════════════════════

ExploitSystem:
  ZeroRNG: true
  Multiplier: 1.4x

  Conditions:
    PackFang: "Target has Rawrotin Mark (racial)"
    ShieldLob: "Target actively casting (interrupt bonus)"
    ShieldBash_Pin: "Wall-splat achieved (positional)"
    ShootingStar: "Target within 4y of ally (proximity — bodyguard reward)"
    ShieldBomb: "3+ targets hit by ricochet chain (multi-hit)"

  Note: "Crits reward bodyguarding. Punting near allies = crit. Interrupting = crit. Pinning = crit."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 11: FRONTLINE SURVIVAL TOOLS
# ═══════════════════════════════════════════════════════════════════════════════

SurvivalTools:
  Philosophy: "Survive by interception DR (MBAS) + Shield Projection + gear-based DR. High STA racial."

  Mitigation:
    MBAS_Intercept: "30-35% DR on hits intercepted for allies"
    ShieldProjection: "Blocks attacks passing through barrier plane (team-wide)"
    GearDR: "Standard gear/shield stats — no armor restrictions (unlike MK/Skyreign)"
    Combined: "Gear passive DR + active MBAS DR when intercepting. Numbers test."

  SelfHealing:
    PackFang_OnMark: "3-5% HP every 3 GCDs (~1-1.7% HP/s)"

  SoloViability:
    SR1: "Exceeds incoming. Effectively unkillable."
    SR2: "High sustain handles incoming. Solo-viable."
    SR3: "Healer supplements. Self-sustain buys 8-12s independence."
    SR4: "Healer required. MBAS intercepts reduce total party damage taken."

  EmptyGauge: "Basic combo still heals + generates. Weakened 4-6s, not helpless."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 12: §25 COMPLIANCE AUDIT
# ═══════════════════════════════════════════════════════════════════════════════

Section25Audit:
  Rule: "No CDs >=90s on identity skills. Gate via Shield Gauge."

  CooldownInventory:
    PackStrike: {cd: "GCD (2.0s)", status: "COMPLIANT"}
    FangFollow: {cd: "GCD", status: "COMPLIANT"}
    PackFang: {cd: "GCD", status: "COMPLIANT"}
    ShieldLob: {cd: "GCD", gate: "15 gauge", status: "§25 COMPLIANT"}
    ShieldBash: {cd: "GCD", gate: "15 gauge", status: "§25 COMPLIANT"}
    ShootingStar: {cd: "GCD", gate: "25 gauge", status: "§25 COMPLIANT"}
    ShieldBomb: {cd: "GCD", gate: "20 gauge", status: "§25 COMPLIANT"}
    Redirection: {cd: "GCD", gate: "10 gauge", status: "§25 COMPLIANT"}
    ShieldProjection: {cd: "None", gate: "4/s gauge", status: "§25 COMPLIANT"}
    MBAS: {cd: "None", gate: "20 gauge", status: "§25 COMPLIANT"}
    SentinelInstinct: {cd: "N/A", gate: "None (passive)", status: "COMPLIANT"}

  LongestCD: "GCD recast (2.0s). No ability exceeds."
  DeadWindows: "4-6s at empty gauge. Weakened but functional (combo still works)."
  DesignedCompliant: "Built §25-native. No fix needed."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 13: QUICK-REFERENCE TABLE
# ═══════════════════════════════════════════════════════════════════════════════

QuickReference:
  GCDs:
    #               | Pot       | Gauge | Range    | Exploit Condition
    PackStrike:     " 100      | +6    | 3y       | None"
    FangFollow:     " 120      | +6    | 3y       | None (combo 2)"
    PackFang:       " 160      | +16*  | 3y       | Marked target"
    ShieldLob:      " 120      | -15   | 15-20y   | Target casting"
    ShieldBash:     " 150/200  | -15   | 3y       | Pin (wall-splat)"
    ShootingStar:   " 180      | -25   | 3y       | Near ally (<4y)"
    ShieldBomb:     " 100+80ea | -20   | 12y      | 3+ ricochets"
    Redirection:    " 100      | -10   | 3y       | None (utility)"

  oGCDs:
    #               | Pot     | Gauge  | Gate          | Special
    ShieldProjection: "  0   | -4/s   | toggle        | 6y barrier. Blocks attacks."
    MBAS:            "  0    | -20    | ally targeted | 15-18y dash. Intercept 2s."

  Passive:
    SentinelInstinct: "1.5-2.5s threat warning to allies. Directional. No cost."

