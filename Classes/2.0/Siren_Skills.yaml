# SECTION 8: CONSTRAINTS (AUTO-GENERATED)
# ─────────────────────────────────────────────────────────────────────────────

Constraints:
  CharmManagement:
    - "IF enemy_charm_stacks < 3 THEN Stage 1 NOT active"
    - "IF enemy_charm_stacks < 6 THEN Stage 2 NOT active"
    - "IF enemy_charm_stacks < 10 THEN Stage 3 NOT active"
    - "IF enemy leaves 20y range THEN decay rate doubles (2 stacks per 3s)"
    - "IF all enemy charm bonds = 0 THEN zero healing output"
    - "IF enemy charm drops from Stage 2+ to 0 THEN +30% damage for 8s (jilted)"
    - "MAX 1 enemy at Stage 3 Devotion simultaneously"
    - "IF Devotion target dies THEN 4s lockout before new Devotion possible"

  AllyBonds:
    - "IF ally leaves 15y range THEN ally Charm decays (1 stack per 4s)"
    - "IF ally Charm = 0 THEN ally receives no drain healing"
    - "Ally Charm stacks build passively (no action cost) while in range"
    - "Drain healing distribution weighted by ally Charm stacks"

  ResourceConstraints:
    - "IF mana < skill.ManaCost THEN skill unavailable"
    - "IF Resonance < skill.ResonanceCost THEN skill unavailable"
    - "Resonance generates passively per active enemy bond (5 per 3s per bond)"
    - "Resonance resets to 0 after 15s out of combat"
    - "IntensityScaling: +40% gen vs Rank 3+, +80% vs Rank 4"

  GatingConstraints_Section25:
    # §25 compliant: No long cooldowns on identity skills. Resource + lockout gating.
    - "Desperate Aria: 20 Resonance + 8s lockout"
    - "Resonance Cascade: 50 Resonance + 10s lockout"
    - "Entrancing Movement: 12s CD, 2 charges (short tactical — compliant)"
    - "Veil of Adoration: 45 Resonance + 12s lockout (Rank 2)"
    - "Shattering Note: 30s CD (tactical — compliant)"
    - "Irresistible Cadence: 30 Resonance + 15s lockout"
    - "Lullaby: 15 Resonance + 10s lockout"
    - "Chorus of Mending: 30s CD (tactical — compliant)"
    - "Glamour Shield: 30s CD (tactical — compliant)"
    - "Harmonic Ward: 35 Resonance + 15s lockout (Rank 2)"
    - "Siren's Crescendo: 80 Resonance + 3-bond field gate + 20s lockout (Rank 3)"

  RankGating:
    - "Rank 1: Max Stage 2 Charm. 4s decay. No Devotion access."
    - "Rank 2: Stage 3 unlocked. 6s decay. Veil + Vampiric Crescendo + Harmonic Ward."
    - "Rank 3: Siren's Crescendo. 8s decay. Resonant Echo + Bond Intuition passives."

  CCBudget:
    - "Stage 1 (Fascination): deprioritization. Low cost, high uptime."
    - "Stage 2 (Infatuation): forced movement. Moderate cost, moderate uptime."
    - "Stage 3 (Devotion): full override. HIGH cost (10 stacks), SHORT uptime vs Rank 3+."
    - "Lullaby: 6s sleep, breaks on damage. 15 Resonance + 10s lockout."

