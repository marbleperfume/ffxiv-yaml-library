    Context: "4 enemies, 2 flanking caster. Gauge 55. Stance ON."
    Flow: "Pull drifts flankers→Arc→Conduktor→[tell]→Parry→Counter→Shield Discharge(crit 252×4)→Terminal(heal)→hold above 50→combo×3→EC Weapon"
    GaugeFlow: "55→+15→+14→-35→+21→-25 = 45 (dips below 50 briefly)"
    PPS: "~82"
    Note: "Suppression dipped -1 for ~4s. Enemies briefly smarter. Intended tension."

