# MADOLT METAKNIGHT (Madolt) — Electrical Discharge / AI Suppression [SKILLS]
# ═══════════════════════════════════════════════════════════════════════════════
# 11 abilities. Field management + reaction kit. §25 APPLIED: all identity gauge-gated.
# Refs: MadoltMetaknight_Design.yaml, BalanceTargets.yaml, DESIGN_OVERRIDE.md §9/§12/§25
# ═══════════════════════════════════════════════════════════════════════════════

Key: Classes.Frontliner.MadoltMetaknight.Skills

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 1: KIT OVERVIEW
# ═══════════════════════════════════════════════════════════════════════════════

KitOverview:
  TotalAbilities: 11
  GCDCount: 7  # Basic ×3, EC Weapon Discharge, EC Shield Discharge, Voltaic Counter, Field Overload
  oGCDCount: 3  # Electron Guard Stance (toggle), Voltaic Parry, Mag-Dash
  PassiveCount: 1  # Capacitor Pull (while stance active)
  ExecutionTier: Experienced
  GCD: "2.0s base → cap 1.4s"
  WeaveModel: single_weave_only
  AnimationLock: "0.6s standard / 0.3s for Parry and Stance toggle"
  Resource: "Charge Gauge (0-100). Generated by attacks/parries. Spent on discharges + stance."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 2: BASIC COMBO (free, generates gauge)
# ═══════════════════════════════════════════════════════════════════════════════

BasicCombo:

  ArcStrike:
    Name: "Arc Strike"
    ID: MK_GCD_01
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: 100
    Range: "3y melee"
    Targets: 1
    GaugeCost: 0
    GaugeGenerated: 7
    ComboPosition: 1
    CritCondition: "None (filler)"
    RankProgression:
      Rank1: "100p, +7 gauge"
      Rank3: "Applies [Ionized] 3s (6s if enemy in EG field)"

  ConduktorSlash:
    Name: "Conduktor Slash"
    ID: MK_GCD_02
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: "120 (60 uncombo)"
    Range: "3y melee"
    Targets: 1
    GaugeCost: 0
    GaugeGenerated: 7
    ComboPosition: 2
    ComboFrom: ArcStrike
    ComboWindow: 8s
    CritCondition: "None"
    RankProgression:
      Rank1: "120p, +7 gauge"
      Rank3: "Refreshes [Ionized]"

  TerminalEdge:
    Name: "Terminal Edge"
    ID: MK_GCD_03
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: "150 (75 uncombo)"
    Range: "3y melee"
    Targets: 1
    GaugeCost: 0
    GaugeGenerated: 7
    ComboPosition: 3
    ComboFrom: ConduktorSlash
    ComboWindow: 8s
    SelfHeal: "3% max HP on [Ionized] target (4% R2, 5% R3)"
    CritCondition: "Crits on enemies below 50% HP (execute — §9 inverted)"
    RankProgression:
      Rank1: "150p, +7, heal 3% on Ionized, crit <50%"
      Rank2: "Heal → 4%"
      Rank3: "Heal → 5%. On crit: [Overcharge Spark] next discharge +15% potency."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 3: IDENTITY GCDs (gauge-gated)
# ═══════════════════════════════════════════════════════════════════════════════

IdentityGCDs:

  ECWeaponDischarge:
    Name: "EC Weapon Discharge"
    ID: MK_GCD_04
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: 280
    Range: "3y melee"
    Targets: 1
    GaugeCost: 25
    CritCondition: "Crits on >50% HP targets (§9 — 1.4×)"
    Effect: "Channel stored charge through blade. Breaks combo."
    RankProgression:
      Rank1: "280p, 25 gauge, crit >50%"
      Rank3: "On crit: [Conductance] target +8% electrical vuln 6s"

  ECShieldDischarge:
    Name: "EC Shield Discharge"
    ID: MK_GCD_05
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: "180 per target"
    Range: "Self (6y PBAoE)"
    Targets: "All in 6y"
    GaugeCost: 35
    CritCondition: "Crits if 3+ enemies hit (cluster payoff — 1.4×)"
    Effect: "Pulse from Guard. Damages all in 6y. Breaks combo."
    DesignNote: "PAYOFF for Capacitor Pull — cluster then pulse."
    RankProgression:
      Rank1: "180p/tgt, 35 gauge, crit 3+"
      Rank3: "On crit: [Static Cascade] 60p chain lightning after 3s"

  VoltaicCounter:
    Name: "Voltaic Counter"
    ID: MK_GCD_06
    ActionType: GCD (CONDITIONAL — requires successful Voltaic Parry)
    CastTime: Instant
    Recast: "2.0s base"
    Potency: 220
    Range: "3y melee"
    Targets: 1
    GaugeCost: 0  # FREE
    Window: "3.0s after successful Voltaic Parry"
    CritCondition: "Always crits (parry success = conditional, §12 — 1.4×)"
    Effect: "Riposte. Free GCD. Does NOT break combo (resume chain after)."
    RankProgression:
      Rank1: "220p free, always crits = 308p effective"
      Rank3: "[Riposte Surge] stance drain paused 2s on use"

  FieldOverload:
    Name: "Field Overload"
    ID: MK_GCD_07
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: "350 per target"
    Range: "Self (8y PBAoE)"
    Targets: "All in 8y"
    GaugeCost: 50
    CritCondition: "Crits if EG Stance active 5+ continuous seconds (1.4×)"
    Effect: "Massive pulse. All in 8y take dmg + 40% slow 2s. Breaks combo. -3 SR spike 2s."
    RankProgression:
      Rank1: "350p/tgt, 50 gauge, 2s 40% slow, crit on 5s stance"
      Rank2: "Slow → 2.5s"
      Rank3: "[Overload Cascade] 4+ hit → refund 15 gauge"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 4: oGCD ABILITIES
# ═══════════════════════════════════════════════════════════════════════════════

oGCDAbilities:

  ElectronGuardStance:
    Name: "Electron Guard Stance"
    ID: MK_OGCD_01
    ActionType: oGCD (stance toggle)
    AnimationLock: "0.3s"
    Recast: "None (toggle)"
    Potency: 0
    Range: "Self (8y field)"
    GaugeCost: "4/s sustained"
    Effect:
      - "8y electromagnetic field centered on Metaknight"
      - "PASSIVE Capacitor Pull: enemies pulled 1.5y/s (boss 0.5y/s)"
      - "PASSIVE Unfocus: enemies -1 SR (base) / -2 SR (gauge ≥50)"
      - "Enemies cannot sprint in field"
    DrainMath: "100 ÷ 4/s = 25s max. Typical 8-12s bursts."
    RankProgression:
      Rank1: "1.5y/s pull, 8y, -1/-2 SR, 4/s"
      Rank2: "Boss drift → 0.75y/s"
      Rank3: "[Resonant Field] first enemy entering per 10s → +5 gauge"

  VoltaicParry:
    Name: "Voltaic Parry"
    ID: MK_OGCD_02
    ActionType: oGCD (reactive)
    AnimationLock: "0.3s"
    Recast: "None (free, risk-gated)"
    Potency: 0
    Range: Self
    GaugeCost: 0
    Window: "0.75s"
    OnSuccess:
      DamageNegated: "100%"
      HPRestored: "5% (6% R2)"
      GaugeGenerated: 15
      EnablesVoltaicCounter: "3.0s"
      UnfocusBoost: "+1 SR suppression 4s (briefly -3)"
    OnFailure:
      RecoveryLock: "0.6s"
      DamageTaken: "Normal"
      GaugeGenerated: 0
    RankProgression:
      Rank1: "0.75s, 100% negate, 5% HP, +15, enables Counter"
      Rank2: "HP → 6%"
      Rank3: "[Perfect Deflection] 2+ enemies in 0.5s → +25 gauge"

  MagDash:
    Name: "Mag-Dash"
    ID: MK_OGCD_03
    ActionType: oGCD
    AnimationLock: "0.6s"
    Recast: "None (§25 gauge-gated)"
    Potency: 80
    Range: "12y (toward enemy)"
    Targets: 1
    GaugeCost: 15
    CritCondition: "Crits if target inside EG field on arrival (1.4×)"
    Effect: "EM dash to target. 80p arrival. 2y micro-pull on impact."
    RankProgression:
      Rank1: "80p, 12y, 15 gauge, 2y pull"
      Rank3: "[Magnetic Anchor] field re-centers on arrival"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 5: PASSIVE — CAPACITOR PULL + UNFOCUS
# ═══════════════════════════════════════════════════════════════════════════════

Passive:
  CapacitorPull:
    Name: "Capacitor Pull"
    ID: MK_PASSIVE_01
    ActionType: Passive (while Electron Guard Stance ON)
    Effect:
      - "1.5y/s pull toward Metaknight within 8y (boss 0.5/0.75y/s)"
      - "No sprint in field"
      - "Unfocus: -1 SR base / -2 SR at gauge ≥50"
      - "Ceases when stance off. Not a debuff — zone property."
    Limitation: "8y only. Outside = full intelligence. Leave = instant recovery."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 6: CHARGE GAUGE ECONOMY
# ═══════════════════════════════════════════════════════════════════════════════

ChargeGauge:
  Type: "0-100"
  Cap: 100

  Generation:
    Passive: "+2/s in combat"
    BasicGCD: "+7/hit"
    HitReceived: "+5/hit"
    VoltaicParry_Success: "+15"
    EnemyEntersField: "+3 (first per engagement)"
    R3_ResonantField: "+5 (first entry per 10s)"
    R3_PerfectDeflection: "+25 (multi-parry replaces +15)"

  Costs: {Stance: "4/s", ECWeapon: 25, ECShield: 35, Counter: 0, Overload: 50, Parry: 0, MagDash: 15, Combo: 0}

  Timing:
    FirstSpend: "12-14s"
    FullGauge: "32-38s"
    RecoveryFromEmpty: "5-7s to 25"

  NetFlow:
    StanceOn_Parrying: "+1.7/s (sustainable indefinitely)"
    StanceOn_NoParry: "+0.5/s (marginal — forces conservative play)"
    StanceOff_Rebuilding: "+7/s (rapid recovery)"

  SuppressionThreshold:
    Below50: "-1 SR only"
    Above50: "-2 SR"
    Tension: "Spending below 50 weakens suppression. HOLD vs SPEND is core decision."

  Overcap: "At 100 generation wasted. Visual warning at 80+. 8s out of combat → reset."

