  ParryCounter: {Seq: "Parry→Counter", Cost: "0 (generates +15)", Potency: "308p (always crits)"}
  VortexPulse: {Seq: "Stance ON→cluster→Shield Discharge", Cost: "35+stance", Potency: "180×targets"}
  BurstWindow: {Seq: "Overload→Weapon Discharge", Cost: 75, Potency: "350/tgt + 280 ST"}
  GapEngage: {Seq: "Mag-Dash→Stance ON→combo", Cost: "15+4/s", Potency: "80 + ongoing"}
  FullVortex: {Seq: "Stance→Dash→combo→Shield→Parry→Counter→Overload", Cost: "~108", Time: "~14s", Potency: "~1800-2200p"}

