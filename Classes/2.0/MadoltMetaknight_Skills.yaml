    Flow: "Arc→[tell]→Parry→Counter→Conduktor→Terminal→Shield Discharge(540)→combo→Parry→Counter"
    GaugeFlow: "60→+15→+21→-35→+15→+21→-25 = 72"
    PPS: "~95 (trash melts, many crits)"

