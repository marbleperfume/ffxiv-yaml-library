# ═══════════════════════════════════════════════════════════════════════════════

RankProgression:
  Philosophy: "Full kit Rank 1. Higher ranks = tighter economy, stronger payoffs, no new buttons."

  Rank1: {GaugeCap: 100, Field: "8y", ParryWindow: "0.75s", Pull: "1.5y/s (boss 0.5)"}
  Rank2:
    PPS_Gain: "+5-8%"
    Upgrades: "Boss drift 0.75y/s, parry heal 6%, Terminal heal 4%, Overload slow 2.5s"
  Rank3:
    PPS_Gain: "+10-15% over R2"
    Traits:
      IonizedExtension: "[Ionized] 6s in field"
      OverchargeSpark: "Terminal crit → next discharge +15%"
      Conductance: "EC Weapon crit → +8% elec vuln 6s"
      StaticCascade: "EC Shield crit → 60p chain 3s later"
      OverloadCascade: "Overload 4+ → refund 15 gauge"
      RiposteSurge: "Counter → stance drain paused 2s"
      PerfectDeflection: "Multi-parry → +25 gauge"
      ResonantField: "First field entry per 10s → +5 gauge"
      MagneticAnchor: "Dash arrival → field re-centers"

