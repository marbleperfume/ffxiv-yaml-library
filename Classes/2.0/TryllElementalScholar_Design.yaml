# Classes/Healer/TryllElementalScholar/TryllElementalScholar_Design.yaml
# ══════════════════════════════════════════════════════════════════════════════════
# TRYLL ELEMENTAL SCHOLAR — Healer/DPS Hybrid (Elemental Saturation)
# ══════════════════════════════════════════════════════════════════════════════════
#
# Design lineage:
#   ToS: Pyromancer (Fire AoE), Cryomancer (control+slow), Terramancer (stun/root)
#   FFXIV WHM: Holy (Light AoE + stun), barrier healer proactive model
#   GW2 Elementalist: attunement system (ANTI-REFERENCE — Saturation eliminates
#     "stay in Fire forever" through maintenance cost + encounter demand pressure)
#
# Core identity: "Which element do I MAINTAIN now?" — not "what's next in my rotation?"
#   Barriers proactively → forced reactive when barriers break → CC for survival
#   → Triage Over → mana crash. Mediocre on purpose. Ramp = situation deteriorating.
#
# SUPERSEDES: Elementalist_Complete.yaml AND Elementalist_Design.yaml (both deprecated)
# REWORK SOURCE: elementalist_shaman_rework.md (Elemental Saturation section)
#
# References:
#   - Combat/BalanceTargets.yaml §12-13 (MAG/MED healer architecture)
#   - DESIGN_OVERRIDE_SYSTEMS.md §15-15c (Healer Identity Triad)
#   - DESIGN_OVERRIDE.md (wins all conflicts)
# ══════════════════════════════════════════════════════════════════════════════════

Key: Classes.Healer.TryllElementalScholar

# ─────────────────────────────────────────────────────────────────────────────────
# SECTION 1: CLASS IDENTITY
# ─────────────────────────────────────────────────────────────────────────────────

Identity:
  Name: "Tryll Elemental Scholar"
  CategoryTag: Elementalist  # "Elementalist" is the category. This file is the Tryll implementation.
  Role: Healer
  SubRole: DPS Hybrid
  ExecutionArchetype: Strategic-Reactive
  Weapon: "Wand/Staff only (no weapon-kit juggling, anti-GW2)"
  Description: >
    A five-element caster who SATURATES the local magical field with a chosen
    element, producing persistent passive environmental effects. Switching
    elements incurs a 4-6s transition cost (vulnerability window). The class
    replaces 6-8 elemental consumables a party would otherwise carry, providing
    adaptive, scaling, unlimited-use solutions on demand.
    
    The Elemental Scholar does NOT follow a rotation. Every element has a TRIGGER —
    an external encounter condition that makes switching correct. No element is
    "default." The player's moment-to-moment decision: "Which element does the
    encounter DEMAND right now, and can I afford the transition cost?"
    
    This is the Tryll implementation of the Elementalist category. Other racial
    variants exist with fewer elements but more concentrated power.

  AcademicTradition: >
    Tryll Elementalists access all 5 elements through STUDY. Other races with
    Elementalist variants (Landwin, etc.) access fewer elements — less flexibility
    but more concentrated power budget per element. The Tryll version trades
    peak potency for unmatched adaptability.

  InputModality:
    PrimaryFocus: encounter_state_reading
    SecondaryFocus: mana_maintenance_cost_tracking
    TertiaryFocus: party_HP_frames
    DecisionType: strategic_maintenance
    # The Elementalist watches the ENCOUNTER DEMAND (enemy behavior, geometry,
    # party state) and maintains the element that addresses the current problem.
    # Stack management is GONE. Mana-burn rate is the pressure gauge.

  FailureStates:
    ManaExhaustion:
      Cause: "Maintained expensive elements (Fire/Water) too long without transition to cheap ones"
      Cost: "Forced into Neutral State — zero output, zero passive effects for 10-15s"
      Recovery: "3× mana regen in Neutral. Not permanent brick, but total vulnerability window."
    ElementMismatch:
      Cause: "Maintaining wrong element when encounter demands shift (e.g., Fire when party HP drops)"
      Cost: "4-6s transition dead zone while switching — party takes unmitigated damage"
      Recovery: "Transition completes → new element's effects begin. Strategic cost, not permanent."
    CascadingVulnerability:
      Cause: "Using Water for healing means can't freeze next charging enemy. Using Earth for CC means party loses persistent shield."
      Cost: "Every response to one problem creates vulnerability to the NEXT problem"
      Recovery: "Good Elementalists solve problems in an order that minimizes cascade risk"
    HealingLapse:
      Cause: "Stayed in Fire too long, party HP dropped past triage threshold"
      Cost: "Party death — the healer's true failure state"
      Recovery: "Emergency pivot to Water (expensive transition + high maintenance cost stacks)"

# ─────────────────────────────────────────────────────────────────────────────────
# SECTION 2: RACE LOCK
# ─────────────────────────────────────────────────────────────────────────────────

RaceLock:
  PrimaryRace: Tryll
  AlternateRaces: [Landwin]
  CulturalLock: academic_tradition
  LockJustification: >
    The Tryll academic tradition teaches all 5 elements through institutional study.
    Landwin are exceptional through effort and cultural investment, not innate biology.
    Any high-MAGICCAP race COULD theoretically learn, but the knowledge system is
    Tryll-institutional.
  # NOTE: "Elementalist" is now a category tag. Other races get their own racial
  # Elementalist variants designed body-first (e.g., Pyrien = fire biology,
  # Noms = gem-craft casting, HBD = draconic breath). This file is ONLY the Tryll
  # version — the one that trades peak potency for 5-element adaptability through
  # pure study.
  StatLine:
    MAG: 13   # Barriers + damage scaling (split healer)
    MED: 13   # Direct healing + drain/sustain (split healer)
    MAGICCAP: 12  # Maximum mana pool / magic potency ceiling
    STR: 6    # Physically fragile — cannot self-sustain in melee
    STAM: 6   # Low HP pool — relies on positioning and party protection
    SPD: 9    # Decent reaction time for dodge/repositioning
    NTU: 8    # Moderate intuition — reads encounters adequately

  PotencyAdjustment: >
    STR 6 / STAM 6 means Tryll Elementalist has +15% magic potency racial
    bonus to compensate for zero physical options. All potency values in the
    Skills file are PRE-racial-bonus (multiply by 1.15 for actual output).
    This keeps the class competitive with STR-based damage dealers in raw
    DPS while maintaining physical fragility as the vulnerability axis.

  RacialDivergence:
    Tryll:
      Elements: [Fire, Water, Earth, Wind, Light]  # All 5 through academic study
      Identity: "Maximum flexibility, minimum per-element power"
      Vulnerability: "STR 6 / STAM 6 — dies instantly in melee"
    Landwin:
      Elements: [Fire, Earth, Light]  # 3 elements — scholarly but narrower tradition
      Identity: "Fewer elements, stronger per-element effects, higher STR baseline"
      Vulnerability: "Cannot adapt to Water/Wind-demanding encounters"

  DesignNote: >
    The MAG 13 / MED 13 split makes Elementalist genuinely mediocre at BOTH
    barriers AND direct healing until forced to specialize by encounter pressure.
    This is intentional — the class is a jack-of-all-trades healer that degrades
    under sustained pressure because neither stat is dominant enough to carry
    through extended triage phases.

# ─────────────────────────────────────────────────────────────────────────────────
# SECTION 3: ROLE OBJECTIVE FUNCTION
# ─────────────────────────────────────────────────────────────────────────────────

RoleObjective:
  Type: barrier_first_healer_that_degrades_under_pressure
  PrimaryMetric: encounter_problem_coverage
  SecondaryMetric: potency_per_second
  TertiaryMetric: healing_sufficiency

  Constraints:
    - "party_hp >= survival_threshold AT all_damage_events"
    - "element_coverage: encounter demands met without forced Neutral State"
    - "mana_positive: can sustain current element choice for encounter duration"

  HealingModel:
    ProactiveLayer: "Earth Saturation persistent shield (thin, regenerating every 8s)"
    ReactiveLayer: "Water Saturation ambient regen + Tidal Basin zone heal"
    EmergencyLayer: "Cleansing Rain oGCD (2 charges) + Convergence Burst (mana-expensive AoE)"
    SelfHealingBan: >
      Water heals ALLIES in the saturation field. The Elementalist is the SOURCE,
      not the recipient. Cannot efficiently self-heal. Self-defense = CC + shielding
      from Earth/Light, NOT healing. Long-cast stuns = massive DPS loss trade.

  HealerBehaviorCascade:
    Phase1_Proactive: "Earth saturation → thin persistent shields absorb chip damage"
    Phase2_Reactive: "Barriers break → forced pivot to Water (expensive, 4-6s transition)"
    Phase3_CC: "Party still dropping → CC enemies via Petrify/terrain to buy time"
    Phase4_TriageOver: "Multiple allies critical → Convergence Burst (50% mana dump)"
    Phase5_ManaCrash: "Mana depleted → forced Neutral State → total vulnerability"
    DesignPhilosophy: >
      "Mediocre on purpose. Ramp = situation deteriorating."
      The Elementalist is NOT designed to recover gracefully from Phase 3+.
      Reaching Phase 4-5 means the encounter is FAILING. The class rewards
      proactive play (staying in Phase 1-2) and punishes reactive scrambling.

  TargetDPS:
    WhileHealing: "65% of DPS reference (BalanceTargets §3)"
    PureDPSUptime: "80% of DPS reference (Rank 1 content, no healing needed)"
  HealingSustain:
    Normal: "40% party HP per minute"
    Hard: "70% party HP per minute"
    Extreme: "100% party HP per minute (barely, with mana crash risk)"

  CannotReplaceFrontline: >
    Elementalist dies in sustained melee combat because:
    - STR 6 / STAM 6 = extremely low HP pool and zero physical mitigation
    - Water heals ALLIES not self
    - Mana crashes under sustained reactive healing demand
    - No parry, no block, no dodge-roll (SPD 9 gives only basic movement)
    The class is explicitly designed to NEED a frontliner between it and enemies.

# ─────────────────────────────────────────────────────────────────────────────────
# SECTION 4: CLASS MECHANIC — ELEMENTAL SATURATION
# ─────────────────────────────────────────────────────────────────────────────────

ClassMechanic:
  Type: persistent_field_maintenance
  Name: "Elemental Saturation"
  ReplacesOldSystem: "Elemental Convergence (build→consume stacks — DEPRECATED)"

  CoreConcept: >
    The Elementalist doesn't "build stacks to spend." Instead, casting an element
    SATURATES the local magical field with that element. Saturation creates PASSIVE
    ENVIRONMENTAL EFFECTS that persist as long as the Elementalist maintains that
    element's presence. Switching elements causes the previous saturation to FADE
    (over 4-6s), during which the old element's passive weakens and the new one
    strengthens.

  WhyThisEliminatesRotation:
    - "There is no 'spend' moment. There is no 'burst' from consumption."
    - "The decision is: WHICH element do I maintain NOW? What passive effect does the encounter need?"
    - "Switching has a transition cost (4-6s of weakened output) — this IS the vulnerability window."
    - "No internal timer drives switching. ENCOUNTER DEMANDS drive switching."
    - "No fixed element order. No 'Fire → Water → Earth → Wind → Light → repeat.'"

  SaturationFieldProperties:
    Radius: 15y  # From Elementalist position
    Persistence: "Passive while element is actively maintained"
    Mobility: "Field moves WITH the Elementalist"
    VisualFeedback: "Ambient particle effects (embers, mist, dust, currents, glow) visible to all players"
    EnemyAwareness: "SR3+ enemies recognize and react to saturation fields"

  # ─── SATURATION EFFECTS (Passive, Persistent While Maintained) ───────────────

  SaturationEffects:
    Fire:
      Name: "Ignition Field"
      PassiveEffect: >
        Enemies within 15y take ambient burn damage (low potency DoT, ~60p/3s tick).
        Terrain inside 15y becomes "heated" — enemies move 10% slower through it.
      MaintenanceCost: "80 mana/s"
      CostRationale: "Pure offense drains fastest — forces eventual switching or depletion"
      FadePenalty: "Burn damage stops immediately. Heated terrain cools over 6s."
      EncounterTrigger: "Boss above 50% HP (+25% damage bonus window), clustered enemies, zone denial needed"
      MaxSustainAtFullMana: "~125s before forced Neutral (10000 mana ÷ 80/s = 125s, minus cast costs)"

    Water:
      Name: "Restoration Field"
      PassiveEffect: >
        Allies within 15y regenerate HP (low sustained regen, ~2% max HP/3s tick).
        Terrain becomes "moist" — enables ice combo interactions (instant-root from
        ice abilities instead of slow).
      MaintenanceCost: "100 mana/s"
      CostRationale: "Healing is expensive. Cannot sustain Water forever. Forces triage decisions."
      FadePenalty: "Regen ticks stop. Moist terrain dries over 4s."
      EncounterTrigger: "Party HP dropping (Triage Minor), sustained AoE damage phase, debuff-heavy encounters"
      MaxSustainAtFullMana: "~100s (expensive — Water-only play OOMs in under 2 minutes)"

    Earth:
      Name: "Fortification Field"
      PassiveEffect: >
        Allies within 15y gain a damage absorption buffer (thin persistent shield,
        ~100p barrier that regenerates every 8s if broken). Ground becomes "dense" —
        enemies are Heavy (move speed -20%).
      MaintenanceCost: "60 mana/s"
      CostRationale: "Defensive posture is more sustainable — intended safe harbor between expensive elements"
      FadePenalty: "Shield stops regenerating. Dense terrain softens over 6s."
      EncounterTrigger: "Sustained auto-attack pressure, kiting needed, barrier-first proactive healing"
      MaxSustainAtFullMana: "~167s (most sustainable combat element)"

    Wind:
      Name: "Acceleration Field"
      PassiveEffect: >
        All allies within 15y gain +15% movement speed. Projectiles aimed at allies
        have 20% deflection chance (wind deflection — positional, NOT RNG accuracy).
      MaintenanceCost: "50 mana/s"
      CostRationale: "Utility/mobility is cheapest — the transition element, used as breathing room"
      FadePenalty: "Speed bonus fades. Deflection drops over 4s."
      EncounterTrigger: "Party repositioning, ranged enemy phases, kiting, map traversal"
      MaxSustainAtFullMana: "~200s (cheapest — can maintain indefinitely with minimal casting)"

    Light:
      Name: "Clarity Field"
      PassiveEffect: >
        All allies within 15y gain conditional crit: next action after dodging an
        attack is guaranteed crit (positional/conditional, NOT RNG). Vision radius
        +5y for the party (reveals hidden enemies, traps).
      MaintenanceCost: "40 mana/s"
      CostRationale: "Recovery posture. Weakest direct output, most sustainable. Used when mana-starved."
      FadePenalty: "Crit condition removed. Vision bonus fades."
      EncounterTrigger: "Mana recovery needed (low but not empty), darkness/stealth enemies, crit-setup for burst"
      MaxSustainAtFullMana: "~250s (near-indefinite at low activity)"
      CritDesignNote: >
        The crit is NOT random. It triggers only AFTER an ally successfully dodges.
        This means: (1) it rewards good positioning, (2) it's predictable and
        plannable, (3) it's useless if allies never dodge (standing still = no crits).
        This complies with "Crit is NOT RNG — positional/conditional."

  # ─── ELEMENT SWITCHING MECHANICS ────────────────────────────────────────────

  ElementSwitching:
    TransitionDuration: "4-6s (element-dependent)"
    TransitionCost: >
      During transition: old element's passive effect weakens linearly to zero
      over the fade period. New element's passive effect strengthens linearly from
      zero to full over the same period. Net result: 4-6s of REDUCED effectiveness
      where neither element is at full power.
    VulnerabilityWindow: >
      If two problems arise simultaneously (enemies charge AND party HP drops),
      the Elementalist cannot address both instantly — must TRIAGE which element
      to switch to. The transition gap is where the class is weakest.
    TransitionDurations:
      FireToWater: 6s    # Maximum transition — opposite elements (offense → defense)
      FireToEarth: 5s    # Moderate — both grounded but different purpose
      FireToWind: 5s     # Moderate — different energy types
      FireToLight: 4s    # Short — both energy-based
      WaterToEarth: 4s   # Short — both defensive
      WaterToWind: 5s    # Moderate
      WaterToLight: 5s   # Moderate
      EarthToWind: 4s    # Short — both utility-adjacent
      EarthToLight: 5s   # Moderate
      WindToLight: 4s    # Short — both low-commitment
    DesignNote: >
      Opposite-purpose transitions (Fire↔Water, offense↔defense) have the LONGEST
      transition time. Similar-purpose transitions (Earth↔Wind, both utility) are
      shorter. This means panic-switching from damage to healing is MORE costly
      than proactively transitioning through intermediate elements.

  # ─── ELEMENTAL RECYCLING (Transition Bonus) ─────────────────────────────────

  ElementalRecycling:
    Description: >
      During the 4-6s fade transition, the DEPARTING element provides one final
      "pulse" effect at reduced power. This rewards PLANNED transitions over
      panic switches — if you know you're about to leave Fire, you can time the
      departure pulse for maximum value.
    Pulses:
      Fire_Departure: "One final AoE burn tick at 150% normal potency (farewell explosion)"
      Water_Departure: "One final heal tick to all allies at 150% normal potency"
      Earth_Departure: "Shield on all allies refreshes at 150% strength (one last barrier)"
      Wind_Departure: "+30% movespeed burst for 3s (sprint away from old position)"
      Light_Departure: "Guaranteed crit stored for 6s (use it on the first cast in new element)"

  # ─── NEUTRAL STATE (No Element Active) ──────────────────────────────────────

  NeutralState:
    Name: "Meditation"
    Effect: >
      Drop ALL saturation. Mana regenerates at 3× base rate (201 mana/s instead
      of 67 mana/s). The Elementalist provides NOTHING to the party — no passive
      effects, no ambient damage, no regen aura. Basic attacks only.
    Trigger: "Voluntary (mana below comfortable threshold) or Forced (mana depleted to 0)"
    Duration: "Player-controlled exit. Costs 1 GCD to re-enter any element from Neutral."
    Vulnerability: >
      If an emergency happens while in Neutral State, the Elementalist must:
      1. Spend 1 GCD to activate an element
      2. Wait 4-6s for full saturation effect to engage
      Total response time from Neutral: 6-8s of near-zero contribution.
      This timing IS the skill expression — knowing WHEN to meditate without
      getting caught empty-handed.
    SkillExpression: >
      Good Elementalists meditate during encounter downtime (boss phase transitions,
      travel between packs, safe moments). Bad Elementalists meditate at random and
      get caught in Neutral when damage spikes hit.

# ─────────────────────────────────────────────────────────────────────────────────
# SECTION 5: MANA ECONOMY (Encounter-Driven, Not Cyclical)
# ─────────────────────────────────────────────────────────────────────────────────

ManaEconomy:
  MaxMana: 10000  # Reference value at endgame (MAGICCAP 12)
  BaseRegenRate: "200 mana/tick (3s ticks) = 67 mana/s passive"
  NeutralRegenRate: "600 mana/tick (3s ticks) = 201 mana/s (3× base)"
  OutOfCombatRecovery: "Full in 20s (per BalanceTargets)"

  # ─── MAINTENANCE COST MODEL ─────────────────────────────────────────────────

  MaintenanceCostModel:
    Description: >
      Each element has a CONTINUOUS mana drain while its saturation field is active.
      This drain occurs REGARDLESS of casting — simply maintaining the field costs mana.
      Casting skills of the active element costs ADDITIONAL mana on top of maintenance.
      Casting skills of a DIFFERENT element triggers element switching (transition cost).
    
    CostTable:
      Fire: 80    # mana/s — highest DPS element has highest upkeep
      Water: 100  # mana/s — healing is the most expensive sustained activity
      Earth: 60   # mana/s — defensive safe harbor
      Wind: 50    # mana/s — cheapest combat element (transition/breathing room)
      Light: 40   # mana/s — recovery posture, barely above Neutral cost-wise
      Neutral: 0  # No maintenance, 3× regen, zero output

  # ─── SUSTAIN VALIDATION ─────────────────────────────────────────────────────

  SustainValidation:
    FireSustain:
      Description: "Pure Fire maintenance (no casting, just field upkeep)"
      ManaDrain: "80 mana/s"
      ManaRegen: "67 mana/s passive"
      NetPerSecond: "-13 mana/s"
      TimeToOOM: "~770s (12+ minutes) — but in practice, CASTING Fire skills accelerates drain"
      WithCasting: >
        Fire field (80/s) + 1 Fireball/2s (200 mana per 2s = 100/s) = 180 mana/s total drain.
        Regen: 67/s. Net: -113/s. OOM in ~88s of aggressive Fire play.
        This is WHY Fire can't be sustained indefinitely — the maintenance + cast costs
        force transition within 60-90s of active Fire usage.

    WaterSustain:
      Description: "Water maintenance + active healing casts"
      ManaDrain: "100/s + casting (avg 400 mana per heal / 2s GCD = 200/s) = 300/s total"
      ManaRegen: "67/s"
      NetPerSecond: "-233 mana/s"
      TimeToOOM: "~43s of pure triage healing before forced Neutral"
      DesignIntent: >
        43s of maximum Water output → forced meditation. This is the healer's
        clock — you CANNOT sustain reactive healing indefinitely. This forces:
        1. Proactive play (Earth barriers prevent needing Water)
        2. Triage efficiency (heal only what's needed, not spam)
        3. Element cycling (use cheap elements between expensive ones)

    EarthSustain:
      Description: "Earth maintenance + occasional casts"
      ManaDrain: "60/s + casting (avg 1 cast/3s = 100/s) = 160/s"
      ManaRegen: "67/s"
      NetPerSecond: "-93 mana/s"
      TimeToOOM: "~107s — comfortable but not indefinite"

    OptimalCycling:
      Description: "Fire(30s) → Wind(15s breathing room) → Water(20s triage) → Earth(30s) → Wind(10s)"
      TotalCycleTime: "105s"
      AverageDrain: "~70 mana/s weighted average"
      ManaRegen: "67/s"
      NetPerCycle: "-315 mana (3 mana/s deficit) — nearly sustainable"
      WithOneNeutralBreak: "10s Neutral mid-cycle → +2010 mana recovered → cycle becomes mana-positive"
      DesignVerdict: "PASS — optimal cycling with ONE short meditation break per 2 minutes is infinite"

  # ─── ENCOUNTER PRESSURE MODEL ───────────────────────────────────────────────

  EncounterPressureModel:
    LowPressure_Rank1:
      ElementUsage: "Fire 60%, Wind 20%, Earth 15%, Water 5% (barely healing needed)"
      ManaSustainability: "Easily sustainable — cheap overall cost, frequent Wind breathing room"
      NeutralBreaks: "Optional (mana stays positive with Wind pauses)"
    
    MediumPressure_Rank2:
      ElementUsage: "Fire 35%, Water 25%, Earth 25%, Wind 10%, Light 5%"
      ManaSustainability: "Tight — one mandatory Neutral break per 90-120s"
      NeutralBreaks: "1 per fight phase (between major mechanics)"
    
    HighPressure_Rank3_4:
      ElementUsage: "Water 35%, Earth 30%, Fire 15%, Wind 15%, Light 5%"
      ManaSustainability: "Strained — 2-3 Neutral breaks per 3-minute phase"
      NeutralBreaks: "Must be timed to encounter lulls. Mistiming = party death."

# ─────────────────────────────────────────────────────────────────────────────────
# SECTION 6: TRIGGER SYSTEM (Replaces Rotation)
# ─────────────────────────────────────────────────────────────────────────────────

TriggerSystem:
  Philosophy: >
    Instead of "what's next in my rotation?", the Elementalist asks
    "what is the encounter DEMANDING right now?" Every element has a TRIGGER —
    an external condition that makes switching correct. No element is "default."
    Encounter demands drive element switching, NOT an internal timer.

  Triggers:
    - Condition: "Enemy charging / closing distance on backline"
      ElementResponse: Earth  # Dense terrain slows approach, shield absorbs initial hit
      ItemReplaced: "Frostweave Net (single-use, positional) → Earth terrain persists"
      Decision: "Do I abandon current element for Earth (losing current passive) or trust frontliner to handle?"

    - Condition: "Enemy casting (interrupt needed)"
      ElementResponse: Earth  # Petrify available as oGCD interrupt
      ItemReplaced: "Stupor Bell (single-use) → Petrify is repeatable, heavy mana cost"
      Decision: "Out-of-element Petrify costs DOUBLE mana. Switch to Earth first or eat the cost?"

    - Condition: "Party HP dropping (Triage Minor: ally ≤50%)"
      ElementResponse: Water  # Ambient regen + Tidal Basin zone heal
      ItemReplaced: "Rejuvenation Flask (20% HP once) → Water heals adaptively, terrain lingers"
      Decision: "Switch to Water NOW (losing current effects for 6s) or trust oGCD charges?"

    - Condition: "Multiple enemies clustered"
      ElementResponse: Fire  # Ambient burn DoT + heated terrain zone denial
      ItemReplaced: "Firebomb (single-use) + Concussion Charge (2s delay) → Fire is persistent"
      Decision: "Fire is expensive. Can I afford the mana to maintain it through this pull?"

    - Condition: "Party needs to reposition quickly"
      ElementResponse: Wind  # +15% movespeed + projectile deflection during transit
      ItemReplaced: "Flashstep Cartridge (gap close) → Wind corridor moves entire party"
      Decision: "Wind is cheap but provides zero healing/damage. Safe to switch during combat?"

    - Condition: "Boss above 50% HP (+25% damage taken rule)"
      ElementResponse: Fire  # Capitalize on vulnerability window with maximum damage
      ItemReplaced: "Gold Pine Resin (pre-committed) → Elementalist reads HP and adapts"
      Decision: "How long until boss crosses 50%? Is the Fire mana investment worth it?"

    - Condition: "Boss below 50% HP (damage resistance phase)"
      ElementResponse: "Shift to utility/CC/healing — damage is less efficient now"
      ItemReplaced: "Items don't adapt to phase shifts. Elementalist reads and adjusts."
      Decision: "Which utility element? Earth for CC, Water for healing, Wind for mobility?"

    - Condition: "Mana depletion (below 30%)"
      ElementResponse: Light  # Cheapest sustained output, barrier-focused recovery posture
      ItemReplaced: "No item equivalent — this is the class's internal pressure state"
      Decision: "Can I afford to drop to Neutral for full regen, or do I need Light's minimal support?"

    - Condition: "Terrain hazard (poison field, lava, ice patch) blocking party"
      ElementResponse: Earth  # Terrain Transmute converts enemy terrain to allied
      ItemReplaced: "Voidpatch Emitter removes terrain. Elementalist CONVERTS it."
      Decision: "Transmute is Earth-only. If not in Earth, transition cost + cast time = 6-8s delay."

    - Condition: "Ally under focused fire"
      ElementResponse: "Earth barrier → then Water healing → layer defenses by severity"
      ItemReplaced: "Shield Generator (one-use) → Elementalist provides layered varying-cost defenses"
      Decision: "Start with cheap (Earth shield) or expensive (Water burst heal) based on severity?"

# ─────────────────────────────────────────────────────────────────────────────────
# SECTION 7: HEALER BEHAVIOR (MAG/MED Split Per BalanceTargets §13)
# ─────────────────────────────────────────────────────────────────────────────────

HealerBehavior:
  StatSplit:
    MAG: 13  # Barriers, damage output, saturation field strength
    MED: 13  # Direct healing, Water regen potency, Cleansing Rain strength
    SplitImplication: >
      Neither stat is dominant. Barriers (MAG-scaled) are thin but persistent.
      Direct heals (MED-scaled) are adequate but never overwhelming.
      The Elementalist is a GENERALIST healer — acceptable at everything,
      exceptional at nothing. This is the MAG 13 / MED 13 design contract.

  HealingDelivery:
    PrimaryMethod: "Terrain-based (Water saturation zone, allies stand in it)"
    SecondaryMethod: "Persistent shield (Earth saturation, auto-regenerating barrier)"
    EmergencyMethod: "Cleansing Rain oGCD (2 charges, 25s per charge)"
    PositionalRequirement: >
      Water healing is POSITIONAL. Allies must be within 15y of the Elementalist.
      If the fight scatters the party, healing effectiveness drops sharply.
      Immobile allies (stunned, rooted) who drift outside 15y receive nothing.

  HealingVsOtherHealers:
    VsSiren: >
      Siren heals through Charm drain (needs enemies nearby, scales with battlefield presence).
      Elementalist heals through terrain (needs allies nearby, scales with positioning control).
      Different SPATIAL requirements: Siren needs enemies, Elementalist needs allies.
    VsShaman: >
      Shaman heals by SACRIFICING enemy debuffs (Hex Drain). Active, requires prior offensive investment.
      Elementalist heals PASSIVELY through Water saturation. Less burst, more sustained.
      Shaman can't heal without cursed enemies. Elementalist can heal any time (at mana cost).
    Coexistence: >
      In the same party: Elementalist covers sustained AoE maintenance (Water saturation)
      and proactive prevention (Earth barriers). Shaman covers spike damage recovery
      (5-stack Drain). Different timing profiles: Elementalist = always-on moderate;
      Shaman = expensive powerful intermittent.

  TriageProtocol:
    Green: "All party > 70% HP → Fire saturation (DPS freely)"
    Yellow: "Any ally 40-70% HP → consider Earth (barriers) or Wind (if repositioning helps)"
    Red: "Any ally < 40% HP → Water saturation (triage mode, expensive)"
    Critical: "Any ally < 20% HP → Cleansing Rain oGCD immediately + pivot to Water"

  OverFiftyHPRule_Integration: >
    The >50% HP rule means healers should NOT top players to full.
    Earth's thin persistent shield (100p every 8s) is tuned to absorb chip
    damage and keep allies NEAR 50% — not rocket them to full. Water regen
    (~2% HP/3s) brings allies to 50-60% range, then stops being efficient
    (allies above 50% take +25% next hit, making overheal counterproductive).
    The Elementalist's healing toolkit naturally respects the >50% rule because
    sustained regen + thin shields = maintenance at safe threshold, not topping.

# ─────────────────────────────────────────────────────────────────────────────────
# SECTION 8: ANTI-PATTERNS (What This Class Does NOT Do)
# ─────────────────────────────────────────────────────────────────────────────────

AntiPatterns:
  - Pattern: "Convergence Stacks (build→spend)"
    Status: ELIMINATED
    Reason: >
      Old system (5 independent counters, build→consume cross-element) produced
      a solvable optimization loop. Players derived mathematically optimal
      consumption patterns and executed them on repeat. That's a rotation.
      Saturation has NO accumulation, NO consumption, NO spend moment.

  - Pattern: "2-element degeneration (stay in Fire forever)"
    Status: MITIGATED
    Reason: >
      Fire maintenance costs 80 mana/s. With casting, OOM in ~88s of pure Fire.
      Additionally, sustained same-element damage builds RESISTANCE in targets
      (after 20s of Fire, target gains +20% Fire resist — forces switching).
      Additionally, encounter geometry forces non-Fire solutions.

  - Pattern: "2-minute burst cycle"
    Status: ELIMINATED
    Reason: >
      No fixed-cadence cooldown drives play. Convergence Burst is an emergency
      tool (drains 50% mana), not a timed payoff. No "build to X then spend
      at 2:00." Element choice responds to encounter state, not timers.

  - Pattern: "Prominence-style combo sequences (cast X then Y then Z in order)"
    Status: ELIMINATED
    Reason: >
      No ability requires a specific prior sequence. No "previous 2 GCDs must
      be Fire" conditions. Every ability is independently usable (with mana
      and element restrictions). Combos are REMOVED from Elementalist.

  - Pattern: "Freecure / RNG procs"
    Status: BANNED
    Reason: >
      Zero RNG procs that reward casting wrong elements. Healing is deliberate
      and costly. No "15% chance your next Water spell is free." All decisions
      are deterministic — player skill, not luck.

  - Pattern: "Party-buff-alignment dependency"
    Status: ELIMINATED
    Reason: >
      Saturation effects are LOCAL and PASSIVE. They don't "align" with other
      players' burst windows. No "use Convergence Burst during Dragoon's
      Life of the Dragon." The Elementalist operates on its own timeline
      driven by encounter demand, not party coordination timers.

  - Pattern: "GW2 weapon-kit juggling"
    Status: BANNED
    Reason: >
      Wand/Staff ONLY. No swapping between weapon sets for different element
      access. All 5 elements available at all times through the same weapon.
      Element choice is strategic, not gear-dependent.

  - Pattern: "Fire dominance on flat maps"
    Status: MITIGATED
    Reason: >
      Old problem: On flat featureless maps, Fire dominates (highest raw DPS).
      New mitigations:
      1. Fire costs 80 mana/s (cannot sustain >60-90s without switching)
      2. Resistance escalation (20s same-element = +20% target resist)
      3. >50% HP rule makes Fire efficient only above 50% enemy HP
      4. Encounter design forces geometry challenges requiring other elements
      Combined: Fire-only play is mathematically suboptimal even on flat maps.

  - Pattern: "Stay in one element and never switch"
    Status: PUNISHED
    Reason: >
      Every element has maintenance cost. Even the cheapest (Light, 40/s) slowly
      drains mana if the player never enters Neutral. The ENCOUNTER demands
      different elements at different times. A player who stays in one element
      either: (a) runs OOM from maintenance, (b) fails encounter mechanics that
      require different elements, or (c) underperforms because the wrong element
      is active. All three are built-in punishments for static play.

# ─────────────────────────────────────────────────────────────────────────────────
# SECTION 9: ITEM BASELINE — WHAT THE CLASS REPLACES
# ─────────────────────────────────────────────────────────────────────────────────

ItemBaseline:
  Philosophy: >
    A party without an Elementalist carries 6-8 elemental consumables per run.
    The Elementalist IS those consumables — available on demand, unlimited uses,
    contextually superior. But items still COMPLEMENT the class (they don't compete).

  ReplacedItems:
    - Item: "Firebomb (area fire damage)"
      ReplacedBy: "Fire saturation ambient DoT (persistent, no charge limit)"
      StillUsefulWhen: "Elementalist in Neutral State — any party member can throw a Firebomb"

    - Item: "Frostweave Net (single-target slow/root)"
      ReplacedBy: "Earth saturation Heavy terrain (-20% movespeed, AoE)"
      StillUsefulWhen: "Need single-target hard root (Earth provides AoE slow, not single root)"

    - Item: "Rejuvenation Flask (20% HP burst heal)"
      ReplacedBy: "Water saturation ambient regen + Tidal Basin zone heal"
      StillUsefulWhen: "Elementalist OOM or in Neutral — allies self-heal with Flask"

    - Item: "Quartzwall Capsule (crystal barrier)"
      ReplacedBy: "Glacier Wall (Earth/Water combo terrain barrier)"
      StillUsefulWhen: "Need instant barrier without 4-6s element transition"

    - Item: "Voidpatch Emitter (terrain removal)"
      ReplacedBy: "Terrain Transmute (converts enemy terrain to ALLIED terrain)"
      StillUsefulWhen: "Want terrain GONE entirely (no lingering allied effect)"

    - Item: "Gold Pine Resin (elemental weapon coating)"
      ReplacedBy: "Fire saturation ambient burn + enhanced Fire skills"
      StillUsefulWhen: "Applies to MELEE weapons — Elementalist doesn't coat others' weapons"

    - Item: "Conductance Gel (+40% lightning vulnerability)"
      NotReplaced: true
      Reason: "Elementalist has NO Lightning element. Gel enables Chain Reaction combos the Elementalist can DETONATE but not PRIME alone."

    - Item: "Stasis Pin (3s total freeze, Stage 3)"
      NotReplaced: true
      Reason: "Elementalist's Petrify is Stage 3 but costs heavy mana. Stasis Pin is free (consumable budget). In mana-starved states, items carry CC."

# ─────────────────────────────────────────────────────────────────────────────────
# SECTION 10: DESIGN NOTES
# ─────────────────────────────────────────────────────────────────────────────────

DesignNotes:
  CoreFantasy: >
    "I am the weather in this room. My presence changes the battlefield itself.
    When I leave Fire behind and bring Water, the world shifts around me.
    I don't cast spells AT things — I transform the space we're all fighting in."

  PlayerExperience: >
    The Elementalist player should feel like a battlefield conductor: reading
    the flow of combat, deciding which environmental condition best serves the
    party RIGHT NOW, and accepting the transition cost when the situation changes.
    Mastery is NOT about execution speed or rotation memory. Mastery is about:
    1. Reading encounter demand before it becomes critical
    2. Timing element switches to minimize transition vulnerability
    3. Planning mana budget across an entire encounter (not per-cast)
    4. Knowing when to accept suboptimal element to avoid worse transitions

  VsOtherElementalists: >
    The Tryll Elementalist (this spec) has ALL 5 elements through academic study.
    Other racial Elementalists (Landwin with 3 elements) have FEWER elements but
    stronger per-element effects. The Tryll pays for flexibility with:
    - Lower per-element potency (spread across 5 instead of 3)
    - Higher cognitive load (5 elements to track vs 3)
    - More transition decisions (more options = more chances for wrong choice)
    The Landwin Elementalist can "master" their 3 elements; the Tryll is always
    juggling and can always be caught in the wrong element.

  ProcgenImplications: >
    In procedurally generated content, map geometry varies per run:
    - Water corridors → Water saturation bonuses (ice combos)
    - Open plains → Fire more viable but mana cap still limits
    - Tight corridors → Earth terrain denial becomes premium
    - Vertical spaces → Wind repositioning becomes essential
    - Dark zones → Light vision bonus becomes mandatory
    The Elementalist's VALUE scales with environment variety. In monotone maps,
    fewer elements are needed (class weakens). In diverse maps, all 5 engage
    (class at full potential). This IS the Saturation fix for "Fire dominant
    on flat maps" — diverse maps naturally demand diverse elements.

  SystemRuleCompliance:
    GCD: "2.0s base, 1.4s cap — all skills comply"
    oGCD: "Single-weave only, 0.6s animation lock standard"
    CritNotRNG: "Light saturation crit is positional/conditional (post-dodge only)"
    OverFiftyHP: "Enemy bonus damage above 50% HP — Fire prioritized for that window"
    ItemBaseline: "Class replaces items permanently, items still complement"
    NoBurstCycle: "No 2-minute CD, no fixed cadence, encounter-driven switching"
    ZeroFreecure: "No RNG procs, all decisions deterministic"
    HealerCantReplaceFrontline: "STR 6/STAM 6, Water heals allies not self"
    NoWeaponKitJuggling: "Wand/Staff only, anti-GW2"

# ─────────────────────────────────────────────────────────────────────────────────
# SECTION 11: VULNERABILITY BUDGET SUMMARY
# ─────────────────────────────────────────────────────────────────────────────────

VulnerabilityBudget:
  Description: >
    The Elementalist is NOT overpowered because of these five vulnerability axes.
    Each creates a clear window where the class underperforms or fails.

  Axes:
    TransitionGap:
      Duration: "4-6s per element switch"
      Impact: "Reduced/zero effectiveness during transition"
      Frequency: "Every time encounter demands change (3-8 times per boss fight)"
      Exploit: "SR3+ enemies may deliberately create situations requiring rapid switching"

    ManaDepletion:
      Duration: "10-15s forced Neutral State when OOM"
      Impact: "ZERO output — no passives, no damage, no healing"
      Frequency: "1-3 times per encounter at Rank 3+ difficulty"
      Exploit: "Extended high-pressure phases (sustained AoE) force expensive Water → OOM"

    PhysicalFragility:
      Duration: "Permanent (STR 6 / STAM 6)"
      Impact: "2-3 hits in melee = death. Cannot self-heal effectively."
      Frequency: "Constant threat if positioning fails"
      Exploit: "SR2+ enemies path around frontline to squishies"

    ElementLockout:
      Duration: "Duration of current element's maintenance"
      Impact: "Using Water means NO fire damage, NO earth CC, NO wind mobility"
      Frequency: "Every second of combat (always locked into one element)"
      Exploit: "Multi-vector threats that demand two elements simultaneously"

    StrategicDepletion:
      Duration: "Cumulative across entire run"
      Impact: "Early mana waste → fewer Neutral recovery windows later → forced suboptimal play"
      Frequency: "Progressive — gets worse as dungeon continues"
      Exploit: "Long dungeons with no safe rest points between encounters"

