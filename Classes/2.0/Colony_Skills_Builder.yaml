# ▲ CONTINUES FROM: Colony_Design.yaml | PHENOTYPE: Builder
# ═══════════════════════════════════════════════════════════════════════════════
# COLONY — BUILDER PHENOTYPE
# Construction / Denial / Fortification / Area Shaping
# ═══════════════════════════════════════════════════════════════════════════════
#
# Resource Gating Compliance (§25):
#   - Collapse Structure: Biomass-free (costs the structure itself) — short 15s tactical CD
#   - Architect's Domain: APEX SKILL — 100 Biomass + 3 Pheromone Charges + 5 active structures
#   - NO 90s/120s/180s cooldowns anywhere in this file
#   - Setup IS the resource: walls placed → interactions happen → charges earned → Apex available
#   - Terrain construction as gauge building: structures built = resource toward bigger constructions
# ═══════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# BUILDER SECTION 1: PHENOTYPE IDENTITY
# ─────────────────────────────────────────────────────────────────────────────

BuilderPhenotype:
  Identity:
    Name: "Colony — Builder"
    PhenotypeRole: "Terrain Engineer / Barrier Specialist / Chokepoint Creator"
    GameFeel: >
      Orcs Must Die meets Fortnite construction. Place physical structures
      that persist, have HP pools, block movement, redirect pathing, and can
      be repaired/upgraded mid-fight. Builder doesn't fight enemies — Builder
      makes the ROOM fight for them.

    CoreLoop: >
      1. Read enemy pathing (Antennae Sweep)
      2. Deploy barriers to DENY optimal enemy paths
      3. Create funnels that force enemies through chokepoints
      4. Reinforce/repair structures under attack
      5. Adapt as enemy AI repath (SR2+ enemies repath around walls)
      6. Leverage elevation (fly up, construct elevated platforms)
      7. Earn Pheromone Charges as enemies slam into your walls
      8. Deploy Apex construction when infrastructure density reached

    PowerBudget:
      DirectDPS: "25% of DPS reference (lowest phenotype)"
      InfrastructureValue: "40% through funnel + chokepoint party DPS amplification"
      TotalContribution: "65% of DPS reference"

    FlightIntegration: >
      Builder uses flight for ELEVATED CONSTRUCTION. Fly up, build platforms,
      drop barriers from above. Heavy-lift wings (80% flight speed) carry
      material to elevation. Builder airborne = crane mode.

    ResourceGatingIdentity: >
      Builder's Apex gate is INFRASTRUCTURE DENSITY. The more walls you've placed,
      the more enemies interact with them (bumping, attacking, pathing around),
      the faster your Pheromone Charges build. A Builder who has been actively
      constructing for 30-40s has EARNED their Architect's Domain through the
      exact actions that define the Builder identity. Construction IS the gate.

# ─────────────────────────────────────────────────────────────────────────────
# BUILDER SECTION 2: PHENOTYPE MECHANICS
# ─────────────────────────────────────────────────────────────────────────────

  Mechanics:
    ConstructionSystem:
      MaxActiveStructures: 8
      StructureHP: "Small: 500 / Medium: 1200 / Large: 2500 / Pheromone-enhanced: 2×"
      StructureCollision: "Blocks ALL movement by default. Pheromone-enhanced = selective (allies pass)."
      StructureDecay: "60s base. Maintenance (3 Biomass/5s) extends +5s. Without maintenance: decays over 15s."

    RepairSystem:
      Rate: "200 HP per GCD (1.5s cast)"
      Cost: "10 Biomass per repair GCD"
      Range: 15y

    UpgradeSystem:
      Base: "Raw structure. Blocks. Has HP. Decays."
      Reinforced: "+50% HP. +5s decay per maintenance tick. 15 Biomass."
      Fortified: "+100% HP. 10% damage reflect. 25 Biomass."
      Pheromone: "Selective permeability. 1 Pheromone Charge (not Biomass)."

    StructureInteractionCharging: >
      Every enemy that attacks, bumps against, or paths around a Builder structure
      generates Pheromone Charge progress. In a fight with 4+ enemies repeatedly
      hitting your walls, charges generate every 10-12s. The walls you build ARE
      the engine that earns your Apex skill. More walls = more interactions = faster access.

# ─────────────────────────────────────────────────────────────────────────────
# BUILDER SECTION 3: SKILL ROSTER
# ─────────────────────────────────────────────────────────────────────────────

  Skills:
    Construction:
      - Name: "Secrete Wall"
        ID: builder_secrete_wall
        ActionType: GCD
        CastTime: 1.5s
        Range: 15y
        BiomassCost: 25
        Effect: "4m-wide, 3m-tall resin wall. 1200 HP. Blocks movement + projectiles. 60s duration."
        ElevationBonus: "Airborne cast: wall drops from above, 80p to enemies in landing zone."
        CritCondition: "Drop-damage crits from 4y+"
        ChargeGeneration: "Each enemy that bumps/attacks this wall: +0.33 Pheromone Charge progress"
        RankRequired: 1

      - Name: "Resin Pillar"
        ID: builder_resin_pillar
        ActionType: GCD
        CastTime: 2.0s
        Range: 15y
        BiomassCost: 40
        Effect: "2m-wide, 6m-tall pillar. 2500 HP. Elevated platform on top. Line-of-sight block."
        ElevationBonus: "Standing ON pillar: next Secrete Wall costs -10 Biomass."
        ChargeGeneration: "Each enemy that paths around pillar: +0.25 Pheromone Charge progress"
        RankRequired: 1

      - Name: "Bridge Span"
        ID: builder_bridge_span
        ActionType: GCD
        CastTime: 2.0s
        Range: 15y
        BiomassCost: 35
        Effect: "Horizontal platform connecting two points (max 6m span). 800 HP. Creates NEW traversable path."
        RankRequired: 2

      - Name: "Seal Path"
        ID: builder_seal_path
        ActionType: GCD
        CastTime: 1.0s
        Range: 15y
        BiomassCost: 20
        Effect: "Fill doorway/corridor (max 3m wide) with resin. 800 HP. Faster + cheaper than wall for existing geometry."
        ChargeGeneration: "Sealed path forces repath → +0.5 Pheromone Charge progress per enemy that reroutes"
        RankRequired: 1

      - Name: "Excavate"
        ID: builder_excavate
        ActionType: GCD
        CastTime: 2.0s
        Cooldown: 15s  # Short tactical CD — acceptable per §25
        Range: 10y
        BiomassCost: 30
        Effect: >
          Dissolve existing terrain (3m radius). Creates pit (2m deep, 100p + 2s root on fall)
          or hole in walls (2m diameter). Destructible terrain only. Removed terrain regenerates after 45s.
        CritCondition: "Pit damage crits if enemy was running (momentum)"
        RankRequired: 2

      - Name: "Fortify Structure"
        ID: builder_fortify_structure
        ActionType: GCD
        CastTime: 1.5s
        Range: 15y
        BiomassCost: 15
        Effect: "Repair 300 HP + apply Fortified upgrade. If already Fortified: 500 HP repair instead."
        RankRequired: 1

    Offense:
      - Name: "Resin Spike"
        ID: builder_resin_spike
        ActionType: GCD
        CastTime: 1.2s
        Range: 15y
        Potency: 130
        BiomassCost: 10
        Effect: "Projectile. Adjacent to Colony structure: 180p. BETWEEN two structures: 220p."
        CritCondition: "Elevation (4y+). Also crits if target touching 2+ structures."
        RankRequired: 1

      - Name: "Collapse Structure"
        ID: builder_collapse_structure
        ActionType: GCD
        CastTime: 0s
        Cooldown: 15s  # Short tactical CD — prevents instant-chain-collapse spam
        Range: 20y
        BiomassCost: 0  # Costs the structure itself
        Effect: >
          Destroy own structure. 4m AoE damage = structure remaining HP × 0.5.
          Enemies hit slowed 30% for 4s. Fortified wall (2400 HP) = 1200p AoE.
          RESOURCE GATED: the structure you spent Biomass building IS the cost.
          Front-loading walls specifically for collapse = valid strategy but
          expensive (25+ Biomass per wall = per collapse burst).
        CritCondition: "Crits if target touching another Colony structure (sandwich)"
        ChargeGeneration: "+1 full Pheromone Charge per Collapse (decisive infrastructure sacrifice)"
        RankRequired: 2

      - Name: "Resin Snare"
        ID: builder_resin_snare
        ActionType: GCD
        CastTime: 1.0s
        Cooldown: 12s  # Short tactical CD
        Range: 15y
        Potency: 60
        BiomassCost: 15
        Effect: "3m sticky resin, 15s. -40% speed. If enemy stays 3s: root 2s (hardens). Stage 1→root."
        RankRequired: 1

    ApexSkill:
      - Name: "Architect's Domain"
        ID: builder_architects_domain
        ActionType: GCD
        CastTime: 3.0s
        Cooldown: null  # NO COOLDOWN — resource-gated only
        Range: 20y
        BiomassCost: 100
        PheromoneChargeCost: 3
        FieldStateRequirement: "5+ active Builder structures on field"
        Effect: >
          Instantly construct FORTRESS: 4 walls + 2 pillars + bridges (12m × 12m).
          All Fortified tier + selective permeability. 8000 total HP. 45s duration.
          Does NOT count toward 8-cap. After 45s: degrades to individual structures
          (Builder keeps 4 within cap).
        ResourceGatingNote: >
          Available every 30-40s in intense fights (many enemies hitting your walls
          = fast charge generation). Available every 60-90s in light fights (fewer
          interactions = slower charges). The Builder who has been ACTIVELY BUILDING
          earns this through their identity actions. No dead windows — you are always
          either deploying Architect's Domain or building toward the next one.
          If you miss timing or the fortress expires, you rebuild charges through
          the same construction that makes you useful ANYWAY. Setup IS the identity.
        ApexFrequency:
          IntenseFight_8enemies: "~35s between casts (rapid charge generation from wall interactions)"
          ModerateFight_4enemies: "~50s between casts"
          LightFight_2enemies: "~80s between casts"
        AntiPattern_Eliminated: >
          OLD: 180s cooldown. Colony builds for 3 min, presses Architect's Domain,
          waits 3 min. Identity exists 45s per 3 min = 25% uptime.
          NEW: Resource-gated. Colony builds → charges earned → Domain deployed →
          Colony keeps building → charges re-earned → Domain again. Identity is
          CONSTANT. The building that earns it IS the gameplay.
        RankRequired: 3

# ─────────────────────────────────────────────────────────────────────────────
# BUILDER SECTION 4: ROTATION PHILOSOPHY
# ─────────────────────────────────────────────────────────────────────────────

  RotationPhilosophy:
    Overview: >
      Builder has NO rotation. Builder has a CONSTRUCTION PLAN adapting to
      geometry and enemy behavior. Priority: Deploy (early) → Reinforce (mid) →
      Damage with Resin Spike (ongoing) → Collapse for burst (opportunistic) →
      Rebuild as enemies repath (reactive) → Architect's Domain when earned (payoff).

    NO_Fixed_Cadence: >
      No "deploy wall every 12s." Read the field. Open corridor = Seal it NOW.
      Wall at 30% HP = Fortify or let break and rebuild behind? 4 enemies
      clustered on wall = Collapse for AoE. Every GCD is a decision.
      Architect's Domain available? Is the current infrastructure worth maintaining,
      or do you consume charges to create a fresh fortress?

    CoreTensions:
      BuildOrFight: "GCD on infrastructure (future value) vs. attack (immediate value)"
      RepairOrReplace: "10 Biomass repair vs. 25 Biomass fresh wall"
      CollapseOrMaintain: "Collapse for burst (lose structure + gain charge) vs. maintain for sustained value"
      ApexTimingOrHold: "Deploy Apex now (burst infrastructure) vs. hold charges for emergency (reactive fortress)"

    ResourceCycleFlow: >
      SETUP: Deploy 4-5 structures (0-20s) → spending faster than regen.
      SUSTAIN: Maintain + repair + Resin Spike (20-40s) → regen exceeds spending.
      PAYOFF: Field state met + 3 charges earned → Architect's Domain (30-40s).
      RESET: New fortress exists, old structures decay, begin next cycle from elevated position.
      CONTINUOUS: Unlike 180s CD, the next Apex is always 30-50s away. Always building toward.

# ─────────────────────────────────────────────────────────────────────────────
# BUILDER SECTION 5: FAILURE STATES
# ─────────────────────────────────────────────────────────────────────────────

  FailureStates:
    WallsInWrongPlace:
      Cause: "Structures placed without reading enemy pathing"
      Cost: "25-40 Biomass per misplaced structure + wasted charge generation opportunity"
      Severity: "HIGH — Builder's value IS placement accuracy."
    BlockingAllies:
      Cause: "Non-Pheromone wall between allies and enemies"
      Cost: "Party DPS stops"
      Severity: "HIGH — Builder's biggest noob mistake."
    StructureCascadeCollapse:
      Cause: "All structures expire simultaneously (left maintenance range)"
      Cost: "Entire encounter geometry reverts. 6-8 GCDs to rebuild. Field state lost → Apex delayed."
      Severity: "EXTREME"
    PrematureApex:
      Cause: "Deploying Architect's Domain before establishing infrastructure density"
      Cost: "100 Biomass + 3 charges spent on a fortress in a bad position or without context"
      Severity: "MODERATE — expensive mistake but charges rebuild through continued play"
    CollapseSpam:
      Cause: "Collapsing all structures for burst damage instead of maintaining field state"
      Cost: "Lose all structures → field state drops below Apex threshold → must rebuild from scratch"
      Severity: "HIGH — tempting but self-defeating for sustained fights"

# ─────────────────────────────────────────────────────────────────────────────
# BUILDER SECTION 6: RANK PROGRESSION
# ─────────────────────────────────────────────────────────────────────────────

  RankProgression:
    Rank1:
      Name: "Worker"
      BiomassMax: 100
      StructureCap: 6
      Unlocks: ["Secrete Wall", "Resin Pillar", "Seal Path", "Fortify Structure", "Resin Spike", "Resin Snare"]
      PheromoneChargeMax: 3
      Note: "Core construction loop. Can build, reinforce, attack through structures. Learns placement fundamentals."

    Rank2:
      Name: "Specialist"
      BiomassMax: 120
      StructureCap: 8
      Unlocks: ["Bridge Span", "Excavate", "Collapse Structure"]
      BonusPassive: "Deployment cast times -0.3s"
      PheromoneChargeMax: 4
      Note: "Terrain MODIFICATION added. Can destroy terrain, create elevation, sacrifice structures for burst."

    Rank3:
      Name: "Architect"
      BiomassMax: 150
      StructureCap: 10
      Unlocks: ["Architect's Domain"]
      BonusPassive: "Pheromone Charge generation +50%. Structure-enemy interactions generate double charge progress."
      PheromoneChargeMax: 5
      Note: >
        Full Builder mastery. Apex skill available. With +50% charge gen and dense infrastructure,
        Architect's Domain available every 25-35s in intense content. Builder IS the dungeon architect.

# ─────────────────────────────────────────────────────────────────────────────
# BUILDER SECTION 7: BALANCE VALIDATION
# ─────────────────────────────────────────────────────────────────────────────

  BalanceValidation:
    - "First deployment within 2 GCDs (starts at 100 Biomass): PASS"
    - "Sustained 1 medium per 10s (7/s airborne = 70/10s, medium = 30-45): PASS"
    - "Recovery from empty ≤ 15s (30 threshold ÷ 7/s = ~4s airborne): PASS"
    - "Apex available within 40s of engagement start (moderate fight): PASS"
    - "Apex NEVER locked behind 180s timer: PASS (§25 compliant)"
    - "Field state requirement prevents Apex without active construction: PASS"
    - "Collapse generates charge (sacrifice = reward): PASS"
    - "No 2-min burst alignment: PASS (resource-driven, not timer-driven)"
    - "Zero RNG: PASS (deterministic crit, deterministic regen, deterministic charges)"
    - "Single-weave model: PASS (all GCDs respect 2.0s base)"
