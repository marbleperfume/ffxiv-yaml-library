# ═══════════════════════════════════════════════════════════════════════════════
# SHAMAN — Validation & Balance Specification
# juice-yaml-library | Soue CulturalLock | Experienced Tier | DPS/Secondary Healer
# ═══════════════════════════════════════════════════════════════════════════════

header:
  class_name: "Shaman"
  race_lock: "Soue"
  cultural_lock: "spiritual_tradition"
  role: "DPS (Curse) / Secondary Healer (Triage via Harvest)"
  tier: "Experienced"
  design_authority: "Shaman_Design.yaml"
  skills_authority: "Shaman_Skills.yaml"
  balance_authority: "BalanceTargets.yaml"
  last_updated: "2026-07-14"
  validation_status: "Qualitative Complete — Awaiting Layer 1 Numerical Pass"

# ═══════════════════════════════════════════════════════════════════════════════
# §1 BALANCE TARGETS
# ═══════════════════════════════════════════════════════════════════════════════

balance_targets:
  reference: "Generic Experienced-tier DPS = 100%"
  gcd: {base: 2.0s, haste_cap: 1.4s, weave: single_only, anim_lock: 0.6s}
  soue_stats: {MAG: 12, SPD: 12, note: "Offensive spread. No MED investment."}

  dps_by_state:
    no_summons_no_hex:       [50, 60]   # Catastrophic
    floating_bone_passive:   [65, 75]   # Idle Shaman
    invested_1_2:            [80, 90]   # Building
    invested_3_4:            [95, 105]  # Crits unlocking
    invested_5:              [110, 120] # Full amp +25%
    invested_5_ascension:    [130, 145] # +20% layered
    harvesting:              [40, 55]   # Zero offense
    rebuild_after_harvest:   [60, 75]   # 10-25s degraded

  encounter_averaged:
    perfect: [100, 110]  # Minimal Harvests, 5-stack maint, optimal Mastema
    average: [88, 98]    # 2-3 Harvests/fight, some drops
    poor:    [65, 78]    # Panic Harvests, Bone depletion

  healing_output:
    hex_drain_5: "750 HP + 300 overshield + cleanse (12s CD)"
    bone_salve: "350 HP instant (1 Bone)"
    ancestral_rite: "500 HP AoE / 4s channel"
    max_burst: "Drain+Salve = 1100 HP in 2.6s"
    vs_primary_healer: "40-55% throughput"
    constraint: "Cannot heal without prior offense (no stacks = no Drain)"

  monsterbone_budget:
    capacity: 8
    generation: "Bone Harvest 2/60s + Scavenge 30% on kills"
    sinks: {spirit: 1, bone_pointing: 1, salve: 1, ascension: 2, invocation: 1}
    budget_notes:
      - "8-encounter run completable with discipline (end ≥1 Bone)"
      - "Undisciplined play depletes by encounter 5-6"
      - "Ascension (2) = 25% cap — premium, not routine"

  potency_bands:
    effigy: {p: 100, band: "BaseFiller", status: "MATCH"}
    mastema_invested: {p: 450, band: "GaugeSpender_Large", status: "MATCH"}
    dark_theurgy: {p: 310, band: "GaugeSpender_Small+DoT", status: "MATCH"}
    curse_explosion_5: {p: 300, band: "GaugeSpender_Small (TRAP)", status: "MATCH"}
    spirit_channel_5: {p: 1000, band: "Above ClassUltimate", status: "JUSTIFIED — destroys asset+Bone+lockout"}

# ═══════════════════════════════════════════════════════════════════════════════
# §2 MATCHUP SCENARIOS
# ═══════════════════════════════════════════════════════════════════════════════

matchup_scenarios:

  sr1_invested_dominance:
    name: "SR1 — Invested State Dominates (enemies too weak)"
    sr: 1
    party: "Frontliner+Shaman+DPS+Healer"
    state_dist: {invested: "90%+", harvested: "0-5%"}
    bone_economy: "Massively positive. Deploy once, persist all floor."
    summon_status: "Never threatened. Free forever."
    shaman_dps: "≥100% (sustained +25% amp, constant crit conditions)"
    design_point: >
      SR1 teaches that Investment = power. Harvest is never forced.
      This IS the tutorial for the Invest/Harvest tension.
    checks:
      - "5-stack uptime >80%"
      - "Bone economy capped (8/8) by encounter 3"
      - "Zero healing contribution needed"

  sr2_tank_pressure:
    name: "SR2 — Invest/Harvest Decision Becomes Load-Bearing"
    sr: 2
    party: "Frontliner+Shaman+DPS+Healer"
    state_dist: {invested: "60-70%", harvested: "15-25%", rebuild: "15-20%"}
    bone_economy: "Slightly positive. 1-2 re-summons per floor."
    key_decisions:
      - trigger: "Frontliner 40% HP, enemy at 5 stacks"
        correct_invest: "Healer handling it. Trust."
        correct_harvest: "Healer busy with backline AoE. Tank dies without Drain."
        wrong_cost: "Harvest when healer has it = lose 25s DPS amp for nothing"
      - trigger: "Pack of 4 — Dark Theurgy available"
        correct: "AoE Hex → mass debuff field"
        wrong: "Single-target Effigy each → too slow → kills before neutered"
    checks:
      - "Harvest frequency 2-3 per elite"
      - "DPS drops 15-20% during Harvest windows"
      - "Wrong-choice consequence = ally death OR wasted DPS"
      - "Floating Bone repositioned ≥3 times per floor"

  sr3_intelligent_enemies:
    name: "SR3 — Enemies Destroy Summons, Force Bone Redeployment"
    sr: 3
    party: "Frontliner+Shaman+DPS+Healer"
    state_dist: {invested: "45-55%", harvested: "20-30%", rebuild: "20-25%"}
    bone_economy: "NEGATIVE. 2-3 re-deploys per encounter."
    installation_targeting:
      floating_bone: "50% target chance if melee range → dies every 60-90s"
      bone_spirit: "30% target chance → dies every 90-120s"
    spatial_puzzle: >
      Place summons where enemies won't path — behind party, on ledges,
      corners requiring diversion from primary targets.
    invocation_value: "Greater Bone (25% HP) survives 2-3 hits vs base (15%) dying in 1-2"
    checks:
      - "Bone economy negative but Bone Harvest keeps pace barely"
      - "Good placement = 90s uptime vs careless = 20s"
      - "Shaman DPS 85-95% (maintenance taxes GCDs)"
      - "Party feels summon absence (no Hex passive = slower kills)"

  long_dungeon_bone_budget:
    name: "8-Encounter Dungeon — MonsterBone Budget Management"
    sr: 3
    total_encounters: 8
    run_time: "25-35 min"
    timeline:
      enc_1_2: "Net positive. Starting 8 → still capped."
      enc_3_4: "Neutral to slightly negative. Ascension + destructions drain."
      enc_5_midpoint: "Decision point: 6-8 Bones if disciplined."
      enc_6_7: "Triage begins. Must choose which summon to maintain."
      enc_8_final: "All remaining committed. End with 1-4 Bones."
    failure_mode: "Liberal Ascension every fight → depleted by encounter 5-6 → Effigy-only 65-75%"
    checks:
      - "Disciplined play ends with ≥1 Bone"
      - "Undisciplined hits zero by encounter 5-6"
      - "Spirit Ascension affordable 2-3 times total"
      - "Invocation affordable 3-5 times total"
      - "Player feels run-length pressure by encounter 5+"

# ═══════════════════════════════════════════════════════════════════════════════
# §3 PASS/FAIL CRITERIA
# ═══════════════════════════════════════════════════════════════════════════════

pass_fail:

  hex_application:
    HX-01: {check: "Passive 0→5 stacks", target: "25s", fail: ">30s", sev: CRITICAL}
    HX-02: {check: "Active (Bone+Effigy) 0→5", target: "10-14s", fail: ">18s", sev: HIGH}
    HX-03: {check: "Greater Bone (Invocation) 0→5", target: "12.5s", fail: ">15s", sev: MEDIUM}
    HX-04: {check: "Stacks never expire during active play", target: "30s refresh", fail: "Stacks timeout", sev: CRITICAL}

  invested_damage:
    INV-01: {check: "+25% amp at 5 stacks", target: "+25%", fail: "<+20%", sev: CRITICAL}
    INV-02: {check: "Mastema non-consuming", target: "450p keeps stacks", fail: "Consumes", sev: CRITICAL}
    INV-03: {check: "Invested vs un-Invested gap", target: "≥30% higher", fail: "<25%", sev: HIGH}
    INV-04: {check: "Crit = conditional (stacks+HP)", target: "Zero RNG", fail: "Any RNG crit", sev: CRITICAL}

  harvested_healing:
    HV-01: {check: "5-stack Drain output", target: "750HP+300shield+cleanse", fail: "<600HP", sev: HIGH}
    HV-02: {check: "Hex Drain CD", target: "12s", fail: "<8s or >20s", sev: CRITICAL}
    HV-03: {check: "Rebuild time (passive)", target: "25s", fail: "<15s or >35s", sev: HIGH}
    HV-04: {check: "Rebuild time (Invocation)", target: "12.5s", fail: ">18s", sev: MEDIUM}
    HV-05: {check: "No heal without prior Investment", target: "0 stacks = no Drain", fail: "Any heal without cursing", sev: CRITICAL}

  bone_spirit_interrupt:
    BS-01: {check: "Interrupt CD", target: "10s", fail: "<6s or >15s", sev: HIGH}
    BS-02: {check: "Interrupt range", target: "8y", fail: "<5y or >12y", sev: MEDIUM}
    BS-03: {check: "Greater Spirit interrupt CD", target: "6s", fail: "<4s", sev: MEDIUM}
    BS-04: {check: "Holds position indefinitely", target: "No timer", fail: "Any expiry", sev: CRITICAL}

  floating_bone:
    FB-01: {check: "NO TIMER on Floating Bone", target: "HP-based only", fail: "Any duration", sev: CRITICAL}
    FB-02: {check: "Base HP", target: "15% Shaman max", fail: "<10% or >20%", sev: HIGH}
    FB-03: {check: "Greater HP", target: "25%", fail: "<20%", sev: MEDIUM}
    FB-04: {check: "Reposition = free GCD", target: "No Bone cost", fail: "Bone cost on reposition", sev: CRITICAL}

  bone_economy:
    BE-01: {check: "Generation rate", target: "2/60s + Scavenge", fail: ">3/min or <1.5/min", sev: CRITICAL}
    BE-02: {check: "8-enc completable", target: "End ≥1 Bone", fail: "Zero by enc 6 even disciplined", sev: HIGH}
    BE-03: {check: "Careless play punished", target: "Depleted enc 5-6", fail: "Never runs out", sev: HIGH}
    BE-04: {check: "Ascension budgetable 2-3×", target: "4-6 Bones across 8 enc", fail: "Every fight or only once", sev: MEDIUM}

  invocation:
    IK-01: {check: "Duration", target: "25s", fail: "<15s or >35s", sev: MEDIUM}
    IK-02: {check: "Requires active summon", target: "≥1 deployed", fail: "Castable with none", sev: HIGH}
    IK-03: {check: "No cooldown (MonsterBone gated)", target: "0 CD, 1 Bone gate", fail: "Any fixed CD", sev: CRITICAL}
    IK-04: {check: "Practical frequency", target: "30-60s (budget limited)", fail: "Spammable every 25s", sev: MEDIUM}

# ═══════════════════════════════════════════════════════════════════════════════
# §4 §25 COMPLIANCE
# ═══════════════════════════════════════════════════════════════════════════════

section_25_compliance:
  rule: "No identity skills ≥90s CD. Resource gates replace timers."
  status: "FULL COMPLIANCE"

  spirit_ascension:
    pre_fix: "120s CD + MonsterBone 2"
    post_fix: "NO CD. MonsterBone 2 only."
    verification: "Bone economy (2/min) naturally limits to ~1/60s in practice."
    status: "PASS"

  invocation:
    pre_fix: "120s CD + summon alive"
    post_fix: "NO CD. MonsterBone 1 + summon alive."
    verification: "Summon survival gates frequency — if dies, must redeploy first."
    status: "PASS"

  full_kit_audit:
    longest_cd: "Bone Harvest 60s (below 90s threshold)"
    identity_skills_no_cd: ["Spirit Ascension", "Invocation"]
    other_cds: {mastema: 30, dark_theurgy: 15, spirit_channel: 30, vine_barrier: 30, hex_drain: 12, nerve_curse: 20, spirit_cleanse: 30}
    above_90s_count: 0
    status: "PASS — zero violations"

# ═══════════════════════════════════════════════════════════════════════════════
# §5 INVESTED vs HARVESTED VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════

invested_harvested:

  mutual_exclusivity:
    MX-01: {check: "Cannot coexist on same target", mech: "Drain consumes ALL stacks. Zero partial.", status: "PASS"}
    MX-02: {check: "No simultaneous benefit", mech: "Invested = stacks present. Harvested = stacks gone. Binary.", status: "PASS"}
    MX-03: {check: "No partial consumers exist", mech: "Hex Drain = total. Curse Explosion = total.", status: "PASS"}

  switching_cost:
    SC-01:
      check: "Invest→Harvest costs ALL accumulated value"
      cost: "Lose -25% accuracy, -25% speed, -20% atk spd, 10% skip, +25% amp"
      status: "PASS — 25s of Investment destroyed instantly"
    SC-02:
      check: "Harvest→Invest costs TIME (10-25s rebuild)"
      asymmetry: "Destroy = instant (oGCD). Rebuild = slow (25s passive, 10s active)."
      status: "PASS — easy to lose, hard to rebuild"
    SC-03:
      check: "Switching is player-initiated, never forced by timer"
      status: "PASS — no decay, no internal timer"

  encounter_drives_decision:
    EP-01: {check: "No internal timer forces switch", mech: "30s refresh via Floating Bone = indefinite", status: "PASS"}
    EP-02: {check: "Only external pressure justifies Harvest", mech: "Harvest is ALWAYS sacrifice, never self-buff", status: "PASS"}
    EP-03: {check: "Optimal in vacuum = never Harvest", mech: "5 stacks forever = maximum DPS", status: "PASS"}
    EP-04:
      check: "Difficulty modulates Harvest frequency"
      values: {sr1: "0-1", sr2: "2-3", sr3: "4-6", sr4: "continuous cycling"}
      status: "PASS"

# ═══════════════════════════════════════════════════════════════════════════════
# §6 WEAKNESS BUDGET
# ═══════════════════════════════════════════════════════════════════════════════

weakness_budget:

  bone_depletion:
    trigger: "Extended SR3+ with liberal Ascension + frequent summon deaths"
    consequence: "No summons, no Ascension, no Bone Salve — drops to 50-60%"
    severity: HIGH
    counterplay: "Budget across run. Save Ascension. Place summons safely."

  summon_destruction:
    trigger: "SR3 (50% Floating Bone / 30% Spirit targeting)"
    consequence: "Hex halts, interrupt lost, 1-2 Bones spent per replacement"
    severity: MEDIUM-HIGH
    counterplay: "Smart placement, Invocation for survival, Frontliner intercepts."
    sr4_escalation: "PRIORITIZE destruction — will path to kill."

  no_burst_healing:
    trigger: "Sudden damage with 0 Hex stacks (new pull, post-Explosion)"
    consequence: "Only Bone Salve (350HP, 1 Bone). No Drain for 10-25s."
    severity: HIGH
    counterplay: "Pre-deploy Floating Bone. Never Explode unless killing."
    design_note: "'A Shaman who hasn't been offensive CANNOT heal.'"

  isolation_from_enemies:
    trigger: "Party splits, Shaman separated from enemies"
    consequence: "No Hex application → no Harvest fuel → healing = Bone Salve only"
    severity: MEDIUM
    counterplay: "Stay within 20y. Pre-deploy Floating Bone in enemy path."

  ascension_commitment:
    trigger: "Using Ascension below 4 Bones → resource crisis"
    consequence: "Post-Ascension lacks Bones for redeploy or emergency Salve"
    severity: MEDIUM
    counterplay: "Only Ascend with ≥4 Bones. Plan around Bone Harvest CD."

  curse_explosion_trap:
    trigger: "Build→spend mentality (5 stacks → Explode)"
    consequence: "300p burst but loses +25% amp + all debuffs. Enemy recovers."
    severity: LOW (self-inflicted)
    counterplay: "Maintaining 5 stacks is ALWAYS better except at execute (<15%)."

# ═══════════════════════════════════════════════════════════════════════════════
# §7 SUMMON DURABILITY VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════

summon_durability:

  bone_spirit:
    base_hp: "25% Shaman max HP"
    greater_hp: "40% (Invocation, 25s)"
    persistence: "PERMANENT — no timer"
    interrupt: {cd: 10s, greater_cd: 6s, range: 8y}
    re_summon: {lockout: 10s, cost: "1 Bone"}
    lifespan_by_sr:
      sr1: "Entire floor"
      sr2: "5-10 min"
      sr3: "90-120s (30% targeting)"
      sr4: "45-60s (priority destruction)"
    redeploy_total_cost: "1 Bone + 2.0s GCD + 10s interrupt gap"
    checks:
      SD-01: {check: "25% HP survives 3-4 SR2 hits", status: "PASS"}
      SD-02: {check: "25% HP dies 1-2 SR4 focused hits", status: "PASS (intended)"}
      SD-03: {check: "40% Greater survives SR3 AoE", status: "PASS"}
      SD-04: {check: "10s lockout = felt absence", status: "PASS"}

  floating_bone:
    base_hp: "15% Shaman max HP"
    greater_hp: "25% (Invocation, 25s)"
    persistence: "PERMANENT — NO TIMER (HP-based ONLY)"
    aura: {hex_rate: "1/5s", greater_hex: "1/2.5s", range: 10y, dmg: "30p/3s"}
    re_summon: {lockout: "NONE", cost: "1 Bone"}
    reposition: "FREE (1 GCD, no Bone cost)"
    lifespan_by_sr:
      sr1: "Entire floor"
      sr2: "3-5 min"
      sr3: "60-90s (50% targeting)"
      sr4: "20-30s (active hunting)"
    redeploy_total_cost: "1 Bone + 2.0s GCD + 5-25s lost passive Hex"
    checks:
      SD-05: {check: "15% HP dies 1-2 dedicated hits", status: "PASS (fragile by design)"}
      SD-06: {check: "NO TIMER exists", status: "CRITICAL PASS"}
      SD-07: {check: "25% Greater survives incidental AoE", status: "PASS"}
      SD-08: {check: "Free reposition adequate for moderate threats", status: "PASS"}
      SD-09: {check: "Fragility drives placement skill", status: "PASS"}

  sr3_hunting_validation:
    behavior: "SR3 allocates attacks to installations when in range"
    floating_bone_chance: "50% if melee range"
    bone_spirit_chance: "30% if within 8y"
    design_intent: >
      Installation targeting CREATES the Bone economy weakness. Without it,
      summons are free forever. Destruction→redeploy IS the resource drain.
    checks:
      SD-10: {check: "SR3 destroys ≥1 summon/encounter", status: "PASS"}
      SD-11: {check: "SR4 creates 3-5 destructions/encounter", status: "PASS"}
      SD-12: {check: "Smart placement reduces destructions 40-60%", status: "PASS"}
      SD-13: {check: "Invocation saves 1-2 destructions per use", status: "PASS"}

