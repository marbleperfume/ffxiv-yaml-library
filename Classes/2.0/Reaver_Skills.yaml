  frenzy_in_water: "All accumulation rates DOUBLED. Stage 4 in ~10s vs ~20s on land."
  ability_bonuses:
    Rend: "Hemorrhage → 6s duration in water"
    Thrash: "Knockback → 4m; AoE radius → 4m"
    Hamstring_Snap: "Slow → -50% in water"
    Deathroll: "Channel -0.3s in water; +50 potency"
    Apex_Pursuit: "Range +4m; water emergence = 1.5s stealth"
    Lock_Jaw: "Gap-close speed +50% from water; first-bite +20% potency"

# ═══════════════════════════════════════════════════════════════════════════════
# RANK PROGRESSION
# ═══════════════════════════════════════════════════════════════════════════════

rank_progression:
  philosophy: "Ranks unlock DEPTH (new conditions, tools) not RAW POWER (flat +damage)."

  rank_1:
    name: "Pup"
    unlock: "Class selection"
    abilities: ["Scent the Weak", "Test Bite", "Circling Patience", "Sense Vulnerability", "Lock Jaw", "Rend", "Feeding Frenzy", "Apex Pursuit", "Adrenal Recovery", "Adrenal Crash"]
    identity: "Core loop: observe → commit → ramp → kill → recover. No finisher, no AoE, no utility."

  rank_2:
    name: "Blooded"
    unlock: "First successful pursuit kill in real combat"
    new: ["Hamstring Snap", "Thrash", "Taste for Blood"]
    identity: "Anti-kite and crowd management. Viable against runners and multi-enemy situations."

  rank_3:
    name: "Apex"
    unlock: "Achieve Stage 4 and kill target during it"
    new: ["Deathroll", "Refuse to Die", "Tunnel Instinct", "Kill Momentum"]
    identity: "Full execution suite. Finisher, death-defiance, target DR, post-kill momentum."

  rank_4:
    name: "Deephunter"
    unlock: "3 pursuit kills in water terrain"
    new: ["Crimson Wake", "Wade In", "Shed Scent", "Blood Rush"]
    identity: "Aquatic specialization + survival tools + aggressive re-engagement."

  rank_5:
    name: "Tidebreaker"
    unlock: "Kill a target during Refuse to Die window"
    new: ["Pack Signal", "Adrenal Dump"]
    identity: "Complete mastery. Team utility + emergency burst. All abilities at final rank."

# ═══════════════════════════════════════════════════════════════════════════════
# ABILITY INTERACTION PATTERNS
# ═══════════════════════════════════════════════════════════════════════════════

interaction_patterns:
  standard_kill: "Lock Jaw → Rend spam (stack) → Deathroll at 25% → clean exit"
  chase_pattern: "Apex Pursuit (close) → Hamstring (slow) → Rend stack while slowed"
  crowd_clear: "Thrash (knockback adds) → Rend (isolated target)"
  burst_finish: "Adrenal Dump (stage sacrifice) when target is close to death but above 25%"
  desperate_finish: "Refuse to Die triggers → Frenzy maxes → Deathroll OR chain Dump (4→3→2) for all-in"
  water_ambush: "Wade In → Submerged → Lock Jaw (stealth commit, +speed, +damage)"

# ═══════════════════════════════════════════════════════════════════════════════
# COMPLIANCE SUMMARY
# ═══════════════════════════════════════════════════════════════════════════════

compliance:
  section_25: "FULLY COMPLIANT — longest CD is 15s. Zero abilities >15s."
  anti_rotation: "COMPLIANT — ability selection driven by target behavior, not internal sequence."
  feedback_system: "COMPLIANT — no gauges, no bars. State + HP + hit-count + behavior = all gates."
  gate_types:
    state_requirement: 14
    frenzy_stage: 5
    target_behavior: 2
    hit_count: 1
    hp_proximity: 1
    positional: 2
    short_cooldown_leq_15s: 4
    long_cooldown_gt_15s: 0
  total_abilities: 18
  hp_cost_per_pursuit: "~12% gross, ~3-6% net after Feeding Frenzy lifesteal"

