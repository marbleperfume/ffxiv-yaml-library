# CONSTRAINTS & TUNING
# ═══════════════════════════════════════════════════════════════════════════════

constraints:
  hard_invariants:
    INV-01: "No healing without Charm targets. ZERO fallback."
    INV-02: "Merryin vocal organ lock. No exceptions."
    INV-03: "Adaptive rotation. NO fixed sequence."
    INV-04: "Stage 3 = enemy in melee with Siren. Cannot make safe."
    INV-05: "Ally Charm passive (proximity). No active cost."
    INV-06: "1 Devotion target max."
    INV-07: "Per-target independent decay timers."
    INV-08: "Drain healing weighted by ally stacks."

  soft_constraints:
    # ID  | Param              | Current  | Flex       | Rationale
    CON-01: ["Decay SR1",       "4s/stack","3-5s",     "Tight R1, generous R3 (8s)"]
    CON-02: ["Max Resonance",   "120",     "100-140",  "Allows 2 major spends"]
    CON-03: ["Gen/bond/GCD",    "8",       "6-10",     "Reward bonds, don't trivialize"]
    CON-04: ["Ally range",      "15y",     "12-18y",   "Tighter than enemy. Position pressure."]
    CON-05: ["Enemy range",     "20y",     "18-22y",   "Cover arena, not infinite"]
    CON-06: ["S3 resist SR3",   "50%/tick","40-60%",   "Limit not eliminate Devotion"]
    CON-07: ["Jilted fury",     "+30%",    "+20-40%",  "Drops must hurt, not instakill"]

  boundary_conditions:
    - {if: "0 enemies in range", then: "ZERO toolkit"}
    - {if: "5+ enemies in 20y", then: "Party unkillable"}
    - {if: "All bonds drop simultaneously", then: "8-12s healing blackout"}
    - {if: "Stage 3 drops at SR3", then: "Siren likely dies (jilted + melee)"}
    - {if: "Boss no adds SR4", then: "Siren at minimum. Stage 3 required."}
    - {if: "Crescendo detonates 4 bonds", then: "700-800p + rebuild + 15s 100% amp"}

tuning_levers:
  if_too_strong: ["Reduce drain-heal % (80→60)", "Faster decay", "Lower ally DR", "Higher Res costs", "Shorter Devotion SR3+"]
  if_too_weak: ["Increase drain-heal %", "Slower decay", "More Res/bond", "Minor passive regen at 3+", "Extend range"]

open_questions:
  - "MED → healing conversion at benchmark gear"
  - "Stage 3 + boss cleave: Siren survivable?"
  - "5-stack ally DR vs >50% HP rule interaction"
  - "Resonance gen during Irresistible Cadence (doubled?)"
  - "Ally 5-stack achievable in boss fight timing?"

integration_tests:
  - "Siren + Adafold: Stage 2 pull resolves vs Force Targeting"
  - "Siren + Madolt: Unfocus + Charm priority math"
  - "Siren + Shaman: both squishy, no frontliner for 10s"
  - "Siren vs Reaver target: Stage 3 overrides pursuit tunnel"
  - "2× healer (Siren+Elem): confirm not OP together"

