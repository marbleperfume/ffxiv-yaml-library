# ▲ CONTINUES FROM: Adabold_Design.yaml, Adabold_Skills.yaml
# ═══════════════════════════════════════════════════════════════════════════════
# ADABOLD (Rawrotin) — Bodyguard / Interception Frontliner [VALIDATION]
# ═══════════════════════════════════════════════════════════════════════════════
#
# Proof file: does this class actually WORK against the system?
# Tests: frontliner contract fulfillment, SR scaling, matchups, edge cases.
#
# References:
#   - Adabold_Design.yaml (identity, MBAS, Shield Projection, contract)
#   - Adabold_Skills.yaml (abilities, potencies, gauge economy)
#   - Combat/BalanceTargets.yaml (role baselines)
#   - DESIGN_OVERRIDE.md §9, §12, §25
# ═══════════════════════════════════════════════════════════════════════════════

Key: Classes.Frontliner.Adabold.Validation

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 1: FRONTLINER CONTRACT VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════

ContractValidation:

  Question: "Does Adabold redirect traffic so DPS/healers are unbothered?"

  Test_MBAS_Coverage:
    Scenario: "SR2 dungeon, 4-player party. Flanker targets healer at 12y from Adabold."
    Input: "Sentinel warns 2.0s before hit. MBAS range 15y. Dash time ~0.3s."
    Result: "Adabold arrives 1.7s early. Intercepts hit (30% DR). Healer takes 0."
    Verdict: "PASS — contract fulfilled. Healer unbothered."

  Test_ShieldProjection_Corridor:
    Scenario: "Corridor fight. 3 ranged enemies firing at party behind Adabold."
    Input: "Projection active (6y width covers corridor). Projectiles blocked."
    Result: "All projectile damage absorbed by barrier HP. Party takes 0 ranged damage."
    Verdict: "PASS — corridor blocked. Party unbothered."

  Test_MultiAngle_Failure:
    Scenario: "Open arena. Enemies attack from 3 directions simultaneously."
    Input: "Projection covers 120 degrees (one direction). MBAS covers 1 ally."
    Result: "1 direction blocked OR 1 ally covered. 2 threats get through."
    Verdict: "PASS (intended failure) — single-direction limitation is the designed weakness."

  Test_NoAdabold_Comparison:
    Scenario: "Same SR2 dungeon without Adabold."
    Result: "Healer must dodge flanker themselves (loses 2 GCDs). DPS interrupted by projectiles."
    Delta: "With Adabold: healer casts uninterrupted. DPS maintains rotation. ~15-20% party DPS gain from uninterrupted uptime."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 2: MBAS REACTION WINDOW VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════

MBASValidation:

  ReactionMath:
    SentinelWarning_R1: 1.5s
    SentinelWarning_R2: 2.0s
    SentinelWarning_R3: 2.5s
    MBAS_AnimLock: 0.4s
    NetWindow_R1: "1.1s to press button"
    NetWindow_R2: "1.6s to press button"
    NetWindow_R3: "2.1s to press button"
    HumanReactionTime: "~0.3-0.5s (average gamer)"
    Verdict: "R1 tight but doable. R2+ comfortable. PASS."

  GaugeEconomy:
    MBAS_Cost: 20
    GaugeFromIntercept: "+8 per hit intercepted + 4 from being hit = 12 net refund"
    NetCostPerSave: "20 - 12 = 8 gauge"
    SavesPerFullGauge: "100 / 8 = 12.5 saves (theoretical max from full)"
    RealisticSaves: "4-6 per full gauge (also spending on other abilities)"
    Verdict: "PASS — sustainable bodyguard loop. Not free, but affordable."

  RangeCheck:
    MBAS_Range_R1: 15y
    TypicalArenaSize: "20-30y diameter"
    CoveragePercent: "~50-75% of arena from center position"
    EdgeCase: "Ally at 18y (R1) = out of range. Must pre-position closer."
    Verdict: "PASS — range forces positional awareness. Not unlimited coverage."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 3: SR SCALING VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════

SRScaling:

  SR1_Trivial:
    EnemyBehavior: "Attack closest target (usually Adabold already)."
    AdaboldValue: "Minimal — enemies already targeting him. Pure DPS mode."
    MBAS_Usage: "Rare. Maybe 1-2 per encounter if stray targets healer."
    Projection_Usage: "Optional. Overkill for trash."
    Identity: "Dormant. Bodyguard skills exist but rarely needed."
    Verdict: "PASS — SR1 is correctly boring for Adabold (same as MK at SR1)."

  SR2_CoreIdentity:
    EnemyBehavior: "Flankers path around frontline. Some target healers/DPS."
    AdaboldValue: "HIGH — Sentinel warns of flankers. MBAS intercepts. Lob interrupts casters."
    MBAS_Usage: "3-5 per encounter. Core gameplay loop activates."
    Projection_Usage: "Situational — corridor phases, boss cone attacks."
    Redirection_Usage: "Moderate — redirect flankers away from backline."
    Identity: "ACTIVE. Bodyguard contract fully engaged."
    Verdict: "PASS — SR2 is where Adabold becomes Adabold."

  SR3_FullKit:
    EnemyBehavior: "Coordinated flanks. Multi-angle attacks. Caster focus-fire on healer."
    AdaboldValue: "CRITICAL — multiple Sentinel warnings simultaneously. Must triage."
    MBAS_Usage: "Constant. Every 8-12s. Gauge management becomes tight."
    Projection_Usage: "Mandatory during boss phases. Corridor blocking essential."
    SkillExpression: "PRIORITIZATION — who gets saved? Cannot cover everyone."
    Failure_Mode: "Wrong priority = ally dies. Correct priority = flawless run."
    Verdict: "PASS — SR3 creates meaningful decisions without requiring mechanical speed."

  SR4_Maximum:
    EnemyBehavior: "Enemies bait MBAS, then attack other ally. Coordinated multi-angle."
    AdaboldValue: "Cannot solo-protect party. Team must self-manage some threats."
    Challenge: "Sentinel overload — 4+ warnings simultaneously. True triage."
    TeamRequired: "DPS must handle some threats independently. Healer must self-manage occasionally."
    Verdict: "PASS — SR4 correctly overwhelms solo bodyguarding without invalidating the class."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 4: GAUGE BUDGET VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════

GaugeBudget:

  StandardLoop_16s:
    Generated:
      Passive: "+32 (2/s x 16s)"
      BasicCombo: "+36 (6 hits x 6 gauge)"
      HitsReceived: "+16 (4 hits x 4 gauge)"
      Intercepts: "+16 (2 MBAS intercepts x 8 gauge)"
      Total: "~100"
    Spent:
      MBAS_x2: "-40"
      ShootingStar: "-25"
      ShieldLob: "-15"
      Redirection: "-10"
      Total: "-90"
    Balance: "+10 (barely sustainable under pressure — intended)"
    Verdict: "PASS — tight economy forces decisions. Cannot spam everything."

  BurstPhase_6s:
    Scenario: "Boss targets 3 allies in sequence. All-out bodyguarding."
    Spent: "MBAS x3 (60) + Star (25) = 85 gauge"
    Generated: "Passive 12 + intercepts 24 + hits 12 = 48"
    Deficit: "-37 gauge. Must rebuild after burst."
    Verdict: "PASS — burst protection is expensive. Recovery window = vulnerability window."

  Starvation_Recovery:
    FromZero: "~4-6s to reach Shield Lob threshold (15 gauge)"
    FromZero_toMBAS: "~8-10s to reach MBAS threshold (20 gauge)"
    DuringStarvation: "Basic combo still works (heal + generate). Not helpless, just limited."
    Verdict: "PASS — starvation hurts but doesn't kill the class."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 5: MATCHUP VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════

MatchupValidation:

  VsSingleBoss:
    Scenario: "Boss + Adabold + party. Boss targets random party members."
    Adabold_Strength: "MBAS intercepts every targeted attack. Sentinel reads all abilities."
    Adabold_Weakness: "Boss AoE ignores MBAS (not targetable). Must Projection for cones."
    Rating: "STRONG — single-target boss is Adabold's ideal scenario."

  VsMobPack:
    Scenario: "8 enemies, mixed melee/ranged. SR2."
    Adabold_Strength: "Shield Bomb disrupts pack. Projection blocks corridor. MBAS peels flankers."
    Adabold_Weakness: "Cannot intercept for all allies simultaneously. Triage required."
    Rating: "GOOD — multiple tools cover mob scenarios, but not infinitely."

  VsRangedKiters:
    Scenario: "3 ranged enemies at 15y+, spreading apart."
    Adabold_Strength: "Shield Lob interrupts from 20y. MBAS covers ally if one slips through."
    Adabold_Weakness: "Cannot close distance to all simultaneously. Projection only covers one direction."
    Rating: "ADEQUATE — struggles without team help against spread ranged. Intended weakness."

  VsMultiAngle:
    Scenario: "4 enemies from 4 cardinal directions. SR4."
    Adabold_Strength: "Sentinel warns all. Can cover 1 ally at a time."
    Adabold_Weakness: "3 threats get through. Single-direction limitation exposed."
    Rating: "WEAK (intended) — this is the designed failure state. Team must contribute."

  VsMetaknight_Comparison:
    SameScenario: "SR2, corridor + open room phases."
    InCorridor: "Adabold dominates (Projection blocks all). MetaKnight adequate (field covers)."
    InOpenRoom: "MetaKnight dominates (CC field locks area). Adabold adequate (MBAS reactive)."
    Together: "Complementary — MK locks enemies in place, Adabold covers anyone who escapes."
    Verdict: "Correct diversity. Neither obsoletes the other."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 6: EXPLOIT SYSTEM VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════

ExploitValidation:

  ZeroRNG: true
  AllConditionsPositional: true

  CritRate_Optimal:
    PackFang: "Every 3rd GCD on marked target = ~33% of GCDs crit"
    ShieldLob: "Only on casting enemies = situational (~40% of uses)"
    ShieldBash_Pin: "Only on wall-splat = requires setup (~30% of uses)"
    ShootingStar: "Near ally = common in bodyguard scenarios (~60% of uses)"
    ShieldBomb: "3+ ricochets = common in mob packs (~50% in AoE)"
    OverallCritRate: "~35-40% of damage-dealing hits in optimal play"
    Verdict: "PASS — crits reward positioning and bodyguarding. Lazy play = 0 crits."

  DesignCheck:
    Proximity_Crit: "Shooting Star crits near allies = REWARDS being near team (bodyguard)."
    Interrupt_Crit: "Shield Lob crits on casters = REWARDS disrupting threats."
    Wall_Crit: "Shield Bash crits on Pin = REWARDS environmental awareness."
    Pack_Crit: "Shield Bomb crits on 3+ = REWARDS using in correct scenario."
    All_Serve_Identity: "Every crit condition reinforces the bodyguard/disruption role."
    Verdict: "PASS — exploit conditions align with class fantasy."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 7: §25 VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════

Section25Validation:

  LongestCooldown: "GCD recast (2.0s base)"
  AnyAbilityOver90s: "NO"
  AllIdentityGaugeGated: "YES"
  DeadWindowAtEmpty: "4-6s (basic combo still functional)"
  CanStillPlay: "YES — combo generates gauge, heals, deals damage"
  Verdict: "FULL §25 COMPLIANCE. No ability needs CD fix."

  RecoveryFromEmpty:
    To_Redirection_10: "~4s"
    To_ShieldLob_15: "~5s"
    To_MBAS_20: "~8s"
    To_ShootingStar_25: "~10s"
    Observation: "Cheapest abilities recover fastest. Expensive ones require patience."
    Verdict: "PASS — gauge costs correctly gate power level. Cheap = available, expensive = earned."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 8: POTENCY VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════

PotencyValidation:

  Target: "80-85% of DPS reference (~82-85 PPS)"

  BasicLoop_10GCDs:
    Sequence: "Combo x3 + Lob + Combo x3 + Star + Bash + Redirect"
    BasePotency: "100+120+160+120+100+120+160+180+200+100 = 1360p"
    WithExploits: "Fang crit +64, Star crit +72, Bash crit +80 = +216"
    Total: "~1576p / 10 GCDs"
    PerGCD: "~158p optimal"
    AtGCD_1.85s: "~85 PPS (optimal, all crits)"

  RealisticDeductions:
    Repositioning: "-12% (MBAS dashes, movement between allies)"
    MissedCrits: "-10% (no wall available, target not casting, ally not near)"
    GaugeStarvation: "-5% (rebuild windows)"
    Realistic_PPS: "85 x 0.88 x 0.90 x 0.95 = ~64 PPS"

  Observation: >
    64 PPS is below 80-85% target. However, Adabold's VALUE is not purely
    PPS — it is PARTY DPS PRESERVATION. Healer casting uninterrupted +
    DPS maintaining rotation = ~15-20% party DPS gain. Adabold's effective
    contribution = personal 64 PPS + 15-20% of (2 DPS output) = well above target.
  Verdict: "CONDITIONAL PASS — personal DPS low, party DPS contribution high. Bodyguard tax."

  DesignNote: >
    If personal PPS needs buffing, increase Shooting Star (180 -> 200) or
    add gauge generation to Redirection (+5 on hit). Do NOT increase MBAS
    damage (it should remain 0p — utility, not damage).

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 9: EDGE CASES
# ═══════════════════════════════════════════════════════════════════════════════

EdgeCases:

  MBAS_WhileProjecting:
    Scenario: "Projection active. Ally targeted. Player presses MBAS."
    Result: "BLOCKED. Cannot MBAS during Projection (documented limitation)."
    Counterplay: "Toggle Projection off (0.3s) -> MBAS. 0.7s total delay."
    Verdict: "Intended trade-off. Barrier position OR reactive save. Not both."

  ShieldAbsent_Stacking:
    Scenario: "Shield Lob (1.2s absent) immediately followed by Shield Bomb."
    Result: "Cannot Bomb while shield absent from Lob. Must wait 1.2s return."
    Counterplay: "Queue: Lob -> wait 1.2s -> Bomb. Or: Bomb first (longer absent), Lob later."
    Verdict: "Intended sequencing constraint. Cannot dump all shield throws instantly."

  SentinelOverload_SR4:
    Scenario: "4 simultaneous warnings. All allies threatened."
    Result: "Player MUST choose. Cannot MBAS to all. 1 save per 2s + GCD."
    Counterplay: "Projection covers 1 angle. MBAS covers 1 ally. Accept 2 get through."
    Verdict: "Intended. SR4 overwhelms solo bodyguarding — team must contribute."

  EmptyGauge_BossPhase:
    Scenario: "Gauge at 0. Boss winds up lethal attack on healer."
    Result: "Cannot MBAS (20 cost). Cannot Projection (4/s). Basic combo only."
    Counterplay: "Should never reach 0 during boss (combo generates 6/hit + passive 2/s)."
    TimeToMBAS: "~8s from 0 with active combat."
    Verdict: "Punishing but recoverable. Gauge management IS the skill expression."

  AllyDead_MBAS:
    Scenario: "Ally dies. MBAS targeted on dead ally."
    Result: "MBAS fails (no valid target). Gauge not spent."
    Verdict: "Correct — no wasted resource. Retarget to living ally."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 10: COMPARISON TO OLD KIT
# ═══════════════════════════════════════════════════════════════════════════════

OldKitComparison:

  Removed_IronBody:
    OldRole: "Personal DR stance. Become impassable terrain."
    WhyRemoved: "Selfish. Bodyguard protects OTHERS, not self. Personal DR from gear is sufficient."
    ReplacedBy: "Shield Projection — directional barrier for the TEAM."
    NetGain: "Party-wide protection vs self-only mitigation."

  Removed_TetherDash:
    OldRole: "Dash to tethered ENEMY."
    WhyRemoved: "Bodyguards dash to ALLIES, not enemies. Enemy-targeted dash is aggro-tank behavior."
    ReplacedBy: "MBAS — dash to ALLY, intercept hit."
    NetGain: "Role-accurate movement. Ally-centric, not enemy-centric."

  Removed_TetherPull:
    OldRole: "Pull tethered enemy toward self."
    WhyRemoved: "'Come to me' is tank aggro. Adabold goes to THEM."
    ReplacedBy: "Shield Lob interrupt + Shooting Star punt covers displacement needs."
    NetGain: "Disruption tools that don't require setup (no tether prerequisite)."

  Removed_Consecrate:
    OldRole: "Ground zone with slow. Area denial."
    WhyRemoved: "Zone control is MetaKnight's domain. Adabold is mobile interception, not planted denial."
    ReplacedBy: "Shield Bomb (multi-target disruption without zone placement)."
    NetGain: "Clear role separation between frontliners. No overlap."

  Added_Redirection:
    NewRole: "360 degree facing control. Soft interrupt via misdirection."
    WhyNeeded: "Bodyguard needs more tools than just 'hit it away.' Rotating facing redirects ACTIONS, not just positions."
    UniqueValue: "No other class can rotate enemy facing. Fighting game back-turned state."

  Added_MBAS:
    NewRole: "Ally-targeted dash + interception. THE identity skill."
    WhyNeeded: "Without ally-dash, Adabold is just a DPS with knockbacks. MBAS makes him a BODYGUARD."
    UniqueValue: "Only frontliner with ally-targeted mobility. Others go to enemies."

  Verdict: "New kit is MORE FOCUSED. Every ability serves bodyguard identity. Old kit had zone control overlap with MK and aggro-tank legacy."

