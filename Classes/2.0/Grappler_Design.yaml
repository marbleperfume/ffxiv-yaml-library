# ═══════════════════════════════════════════════════════════════════════════════
# GRAPPLER (Iblis Grabbers) — Crane Frontliner / Displacement Predator
# juice-yaml-library | Classes/2.0/Grappler_Design.yaml
# ═══════════════════════════════════════════════════════════════════════════════
#
# Design lineage:
#   Biology: Octopus (multi-arm independent control, chromatophore camouflage,
#            ink production, boneless extension, chemoreceptor sensing)
#   Crane archetype: Claw machine (select specific target, grab, relocate to
#            chosen destination). Multiple arms = multiple simultaneous grabs.
#   MH Khezu/Lagiacrus: tentacle-style attacks, whip lashing, constriction
#   Fighting games: grappler archetype (read → commit → punish), command grabs
#   Sekiro Grapple: positional tool that creates openings, not damage itself
#   Splatoon Ink: area denial as combo setup (not the kill, the SETUP)
#
# Core identity: "The invisible crane operator."
#   Disappear. Reach out with multiple arms. Grab 2-4 targets simultaneously.
#   Deposit them where they DON'T want to be — ink clouds, party AoE, hazards,
#   each other. Then close distance and whip-lock the priority target.
#   No traditional gameplay loop. A unique construct that defies standard
#   class patterns.
#
# Fantasy: "I am the octopus in the reef. You don't see me until arms are
#   already around you. By then you're being carried somewhere terrible."
#
# Critical distinction from other frontliners:
#   Adabold: "I rush TO allies and intercept hits." (Pinpoint Defense)
#   MetaKnight: "I make THIS POSITION deadly." (Zone Control)
#   Siegebreaker: "I walk THROUGH everything in my path." (Battering Ram)
#   Grappler: "I GRAB you and PUT you somewhere worse." (Crane)
#
# References:
#   - Guidebooks/DESIGN_OVERRIDE_FRONTLINE.md (Crane subcategory definition)
#   - Combat/BalanceTargets.yaml
#   - Combat/AggroSystem.yaml
#   - Attributes/Base_Attributes.yaml (Exploit system, GCD 1.2s floor)
# ═══════════════════════════════════════════════════════════════════════════════

Key: Classes.Frontliner.Grappler.Design

# ▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀
# ██  SECTION 1: CLASS IDENTITY                                               ██
# ▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀

Identity:
  Name: Grappler
  Role: Frontliner
  SubRole: "Crane Frontliner (Displacement / Multi-Grab / Forced Repositioning)"
  Race: Iblis Grabbers
  DamageType: physical
  ExecutionArchetype: "Read → Commit → Relocate"
  ExecutionTier: Special
  # Special tier justified by:
  # - No traditional gameplay loop (unique construct)
  # - Multi-grab coordination (controlling 2-4 independent tentacle targets simultaneously)
  # - Tension Gauge mastery under pressure (active pin management with enemy scaling)
  # - Reading enemy AI for mode-swap timing (Fisher ↔ Holder)
  # - Stealth → multi-grab → relocation combos require high game sense
  # - NOT a knowledge-gate-before-entry anymore — knowledge expressed MID-COMBAT

  Description: >
    An octopus-humanoid frontliner who disappears into terrain, extends multiple
    arms to grab 2-4 enemies simultaneously, and deposits them into disadvantaged
    positions — ink clouds, party AoE, environmental hazards, or clustered together
    for cleave. Operates in two fluid modes: The Fisher (ranged displacement at
    8-15m) and The Holder (close-range whip strikes escalating to single-target
    pin). Stealth is a universal tool available in either mode, not a dedicated
    stance. Ink is a skill utility for area denial combos, not a gameplay state.

  CoreFantasy: >
    You are the invisible crane operator. Your arms reach from nowhere, seize
    multiple targets at once, and carry them to where YOUR team wants them.
    The battlefield rearranges itself according to your grabs. When one target
    demands personal attention, you close distance and lock it down with whip
    strikes that escalate into a full-body pin — maintaining tension through
    active effort, not passive waiting. You don't fight enemies where they
    stand. You move them to where they die.

  InputModality:
    PrimaryFocus: target_selection_and_destination_planning
    SecondaryFocus: mode_swap_timing_and_tension_management
    TertiaryFocus: stealth_positioning_for_multi_grab_setup
    DecisionType: opportunistic_commitment
    # Cognitive load is distributed: WHAT to grab (target selection),
    # WHERE to put it (destination), WHEN to swap modes (AI reading),
    # and HOW LONG to hold (tension gauge management).

  StatPriority:
    Primary: STR    # Grip force, displacement distance, whip strike damage
    Secondary: NTU  # Reads enemy AI patterns for mode-swap timing, threat assessment
    Tertiary: SPD   # Retraction speed, whip strike tempo, stealth repositioning
    DumpStat: MAG   # Zero magic. Purely biological/physical.
    DumpStat2: MED  # No healing output. Predator endures, not regenerates.
    # Iblis Grabbers base: STR 14, NTU 12, SPD 10, STA 10, DEX 8, MAG 4, MED 4

  DesignStatement: >
    Grappler is the class that MOVES the problem. Other frontliners solve
    enemy positioning by blocking paths (Adabold), making positions lethal
    (MetaKnight), or advancing through formations (Siegebreaker). Grappler
    solves it by picking enemies up and putting them somewhere else. The
    multi-grab from stealth is the signature moment: invisible, then suddenly
    2-4 enemies are airborne and landing in your party's kill zone. Special
    tier because coordinating multiple independent grab targets while managing
    mode swaps and tension gauge has no parallel in any other class.

  FailureStates:
    BadDestination:
      Cause: "Grabbed targets deposited in neutral/safe positions"
      Cost: "Grip Gauge spent, grab cooldown used, zero positional value created"
      Severity: "HIGH — the Grappler's ENTIRE value is destination quality"
    ModeSwapMistiming:
      Cause: "Switched to Holder when Fisher displacement was still needed, or stayed Fisher when pin opportunity expired"
      Cost: "Lost pin window OR team takes uncontrolled damage from unmanaged threats"
      Severity: "MODERATE — recoverable but wastes 4-6s"
    TensionFailure:
      Cause: "Failed tension gauge management during pin"
      Cost: "Full 3s fatigue — cannot grab, mode-swap, or stealth. Vulnerable."
      Severity: "HIGH — full punishment window, enemies free + Grappler debuffed"
    StealthBroken:
      Cause: "Detected before multi-grab setup completes"
      Cost: "Multi-grab opportunity lost. Must wait for stealth cooldown."
      Severity: "MODERATE — falls back to single-tentacle Fisher grabs"

