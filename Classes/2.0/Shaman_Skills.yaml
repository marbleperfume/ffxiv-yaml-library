# SECTION 8: CONSTRAINTS
# ─────────────────────────────────────────────────────────────────────────────

Constraints:
  SystemRuleCompliance:
    GCD_Base: "2.0s ✓"
    GCD_Cap: "1.4s ✓"
    WeaveModel: "single_weave_only ✓ (2.5s casts deliberately prevent weaving)"
    CritSystem: "Positional/conditional only ✓ (no RNG crits anywhere)"
    HP50Rule: ">50% enemy HP = +25% damage ✓ (integrated into strategy)"
    ItemBaseline: "Class replaces item catalog permanently ✓"
    NoBurstCadence: "No 2-minute or fixed-timer burst windows ✓"
    ZeroFreecure: "No RNG procs, no random healing triggers ✓"
    NoFrontlineReplacement: "Shaman cannot solo-frontline sustainably ✓"
    MonsterBoneScope: "Run-length budget, not per-fight timer ✓"
    CurseExplosion: "SACRIFICE mechanic, rarely optimal ✓"
    CCCap: "Zero Stage 3 CC (max Stage 2: Silence + Interrupt) ✓"
    SR3Targeting: "Rank 3+ enemies target and destroy installations ✓"
  
  DesignConstraints:
    MaxSimultaneousSummons: 2  # One Bone Spirit + One Floating Bone
    MaxHexStacksPerTarget: 5
    HexDrainCooldown: 12s  # Prevents spam Harvesting
    BoneSalveBoneCost: 1   # Economic consequence for emergency heal
    SpiritAscensionBoneCost: 2  # Premium cost prevents on-CD usage
    InvocationRequiresSummon: true  # Can't Invoke with nothing deployed
    SpiritChannelRequiresBoneSpirit: true  # Must have Spirit to consume
    HarvestRemovesALLStacks: true  # Cannot partial-Harvest
    PostHarvestRebuildTime: "15-25s baseline, 10-12.5s with Invocation"
    NoSelfHealing_HexDrain: true  # Heals lowest-HP ALLY, not Shaman
    CannotHealWithoutCursedEnemy: true  # No enemies = no Harvest possible

  PerformanceConstraints:
    MaxSummonCount: 2  # Cap for performance
    AuraTickRate: "3.0s minimum (no sub-second ticks)"
    GroundEffectDuration: "6s max for Dark Theurgy zone"
    MaxHexTargetsFromBone: "All enemies in 10y (no target cap on debuff)"
    SpiritVineBarrierDuration: "20s or destroyed"

