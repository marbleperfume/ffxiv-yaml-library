# Classes/Frontliner/Adabold_Design.yaml
# ═══════════════════════════════════════════════════════════════════════════════
# ADABOLD (Rawrotin) — Force Targeting Frontliner [DESIGN HALF]
# ═══════════════════════════════════════════════════════════════════════════════
#
# Lineage: Wolf-pack bodyguards, DS Greatshield, MH Lance, OW Reinhardt,
#   FFXIV Paladin Cover, For Honor Conqueror wall-splat
#
# Core identity: "The shield between your party and everything else."
#   Adabold:       "I physically block the path." (corridor king / DEFENSE)
#   Madolt:        "I keep enemies stupid." (arena king / suppression)
#   Siegebreaker:  "I walk THROUGH enemies." (siege king / offense)
#
# References:
#   - Combat/BalanceTargets.yaml (potency bands, GCD, role baselines)
#   - DESIGN_OVERRIDE.md (§3b, §5, §9, §12, §25)
# Authority: DESIGN_OVERRIDE.md > BalanceTargets.yaml > this file > LLM.md
# ═══════════════════════════════════════════════════════════════════════════════

Key: Classes.Frontliner.Adabold.Design

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 1: CLASS IDENTITY
# ═══════════════════════════════════════════════════════════════════════════════

Identity:
  Name: Adabold
  PreviousName: Adafold  # Renamed — "atta boy" energy, pack hype
  Role: Frontliner
  SubRole: Defensive Frontliner (Force Targeting / Escort)
  DamageType: physical
  Weapon: shield_plus_onehanded  # Shield IS the class identity
  ExecutionArchetype: Reactive Positioning
  ExecutionTier: Experienced
  # 10-12 abilities, reactive repositioning, enemy-path-reading, moderate APM.

  Description: >
    Wolf-like frontliner who physically compels enemies to deal with them
    through body-blocking, tethering, and zone denial. "Force Targeting" =
    the enemy CANNOT reach your backline because you are physically in the way.
    Works regardless of Strategy Rank — physics, not psychology.

  CoreFantasy: >
    You are the pack's shield-bearer. Where you stand, nothing passes. Your
    shield connects you to threats via thrown tethers. Your body blocks
    corridors. Your consecrated ground burns anyone who tries to slip past.
    You're not clever. You're just ALWAYS in the way.

  InputModality:
    PrimaryFocus: enemy_pathing_prediction
    SecondaryFocus: shield_gauge_management
    TertiaryFocus: ally_proximity_awareness
    DecisionType: reactive_positional

  StatPriority:
    Primary: SPD    # 14 — fast repositioning, intercept, dodge frames
    Secondary: STR  # 11 — shield bash force, pins
    Tertiary: VIT   # HP pool for facetanking
    DumpStat: MAG   # No magical abilities

  DesignStatement: >
    The ESCORT frontliner. "Where is the enemy TRYING to go, and how do I
    get there first?" Success = backline never touched. Failure = enemy slips
    past because you misread the pathing.

  SkillExpressionAxis: >
    Rewards ANTICIPATION and REACTION (during combat, not pre-planned):
    - Where is the enemy pathing?
    - Tether or body-block? (distance-dependent)
    - Zone deny or direct intercept? (geometry read)
    - When to spend Shield Gauge aggressively?

  FailureStates:
    MisreadPath: {Cost: "Enemy reaches backline. Burn Shooting Star to recover.", Severity: HIGH}
    OverextendFromProtectee: {Cost: "Too far to intercept. Warning but no arrival.", Severity: HIGH}
    ShieldGaugeEmpty: {Cost: "No identity skills 4-6s. Basic attacks to rebuild.", Severity: MODERATE}
    TetherBroken: {Cost: "Must re-establish (1 GCD).", Severity: MODERATE}

  SingleLimitation: >
    PROXIMITY TO PROTECTEE. Must stay within 6-8y interception range.
    Multiple simultaneous attack angles = nightmare. Can only block ONE
    vector without burning major resources.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 2: RACIAL LOCK — RAWROTIN
# ═══════════════════════════════════════════════════════════════════════════════

RacialLock:
  Race: Rawrotin
  ParentCategory: Linfree  # Wolf-like creatures
  Enforcement: cultural_lock
  Tradition: bodyguard_tradition

  LockJustification: >
    Rawrotin bodyguard discipline — pack instinct channeled into formalized
    escort combat. NOT biological (any bipedal race COULD learn). Culturally
    exclusive: training passes pup-to-pup. Pack instinct makes Rawrotin
    BETTER (naturally read packmate positioning, feel threats) but core
    technique is learned shield-work.

  TeachableInTheory: >
    Non-Rawrotin COULD learn if a master agreed to teach. Culturally taboo
    (outsiders lack pack instinct). Potential future quest content.

  RacialSynergy:
    - "Pack loyalty = WHY bodyguard tradition developed"
    - "SPD 14 = fast intercept repositioning"
    - "Territorial behavior = zone denial is NATURAL (marking ground)"
    - "Mark enemies (racial trait) + benefit from repeated strikes to mark"
    - "Pack-bond awareness = Sentinel Instinct passive"
    - "Pursuit instinct = tether pull feels natural"

  RacialStats:
    SPD: 14
    STR: 11

  SizeModel:
    CharacterSize: Medium
    ShieldAsWall: >
      Cannot body-block by mass alone (unlike Siegebreaker). Uses SHIELD
      positioning + Iron Body stance to create wall-equivalent obstacle.
      Technique over biology.
    WeaponIdentity: >
      Shield IS the class. All identity abilities use shield: throw, slam,
      plant, lob. Gear progression = shield quality. One-handed weapon
      provides damage GCDs only.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 3: ROLE OBJECTIVE FUNCTION
# ═══════════════════════════════════════════════════════════════════════════════

RoleObjective:
  Type: minimize_damage_to_protected_allies
  PrimaryMetric: backline_damage_prevented
  SecondaryMetric: force_targeting_uptime
  TertiaryMetric: potency_per_second

  DPSTarget:
    Baseline: "82-85% of DPS reference"
    # Per BalanceTargets: Frontliner 80-87%. Adabold-specific: "82-85% (consistent floor)"

  SurvivalModel:
    Philosophy: >
      Shield DR (50% frontal) + HP pool + mark-strike self-sustain.
      Self-sustaining without healer at SR1-2. Survives by CHOOSING which
      hits to block. Frontal protection only — flanked = full damage.
    TankbusterResponse: "Raise shield. Blocked = reduced. Unblocked = full."
    InvulnBudget: "0. Shield DR is 40-60%, not immunity."
    SelfSustain: "~2% HP/s via mark-strikes + block recovery. SR1-2 viable solo."

  HealerCannotReplace: >
    Healing fixes damage AFTER. Adabold PREVENTS damage reaching ally entirely.
    Prevention means caster never interrupts their cast — non-overlapping value.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 4: CLASS MECHANIC — FORCE TARGETING SYSTEM
# ═══════════════════════════════════════════════════════════════════════════════

ClassMechanic:
  Name: "Force Targeting"
  Type: active_positional_control_system

  CorePrinciple: >
    Physically compelling enemies to deal with Adabold. NOT aggro (no enmity
    table). NOT AI suppression (that's Madolt). Works at ALL Strategy Ranks
    because it's GEOMETRY — a Rank 4 genius still can't walk through a wall.

  WhyItWorks:
    SR1: "Attack closest. Adabold = closest. Trivial."
    SR2: "Path to casters. Adabold blocks the route."
    SR3: "Flank and coordinate. Adabold denies gaps with zone + tether."
    SR4: "Exploit splits, ambush. Sentinel Instinct warns, full toolkit needed."

  VsMadolt: "Madolt makes enemies FORGET to flank. Adabold makes flanking PHYSICALLY IMPOSSIBLE."
  VsSiegebreaker: "Siegebreaker kills before arrival (offense). Adabold contains (defense)."

# ─────────────────────────────────────────────────────────────────────────────
# FORCE TARGETING ABILITIES
# ─────────────────────────────────────────────────────────────────────────────

  Abilities:
    IronBody:
      Type: stance_toggle
      GaugeCost: "3/s sustained"
      Effect:
        - "Adabold becomes impassable terrain for enemy pathing"
        - "Frontal arc (120°): 50% physical DR"
        - "Movement speed 50%"
        - "Contact damage: 60p per enemy collision"
      CritCondition: "Contact crits if enemy was sprinting"
      TradeOff: "Half speed = cannot chase. Hold, not pursue. Toggle rhythm: intercept → plant → release → reposition."

    ShieldLob:
      Type: GCD (15y range)
      GaugeCost: 20
      Potency: 120
      Effect: "Establishes Force Tether. Shield absent 1.5s (no frontal DR)."
      CritCondition: "Crits on >50% HP targets (§9 synergy)"

    ForceTether:
      Type: passive_state (persists until broken)
      MaxRange: "20y (breaks if exceeded)"
      Limit: "1 active tether"
      Effects:
        - "Can Pull target toward self (oGCD, 4y, 10 gauge)"
        - "Can Dash toward target (oGCD, 6y, 15 gauge, 80p arrival)"
        - "Sentinel Instinct +0.5s warning on tethered target"
        - "Tethered enemy takes 10% more damage from Adabold (mark synergy)"

    ShieldBash:
      Type: GCD (melee)
      GaugeCost: 15
      Potency: "150 (200 on Pin)"
      Effect: "Slam into target. If wall behind: 1.5s immobilize (Pin). No wall: 3y knockback toward nearest wall."
      CritCondition: "Always crits on Pin (positional — wall required)"
      DesignNote: "Corridors = near-guaranteed Pin. Open arenas = use Shooting Star to create setup."

    Consecrate:
      Type: GCD (ground-targeted, 5y radius at cast position)
      GaugeCost: 30
      Potency_PerTick: "80 (3s tick interval)"
      Duration: "12s"
      SlowEffect: "30% movement reduction on enemies in zone"
      CritCondition: "Ticks crit vs >50% HP enemies"
      DesignNote: "Zone denial. Enemies choose: path through (damage+slow) or around (longer = intercept time)."

    ShootingStar:
      Type: GCD (melee, targeted)
      GaugeCost: 25
      Potency: 180
      KnockbackDistance: "6y in PLAYER-CHOSEN direction"
      CritCondition: "Crits if target within 4y of protected ally"
      ComboSetup: "Knock into wall → Shield Bash Pin = 180p + 200p crit. Bread-and-butter."

# ─────────────────────────────────────────────────────────────────────────────
# RESOURCE SYSTEM — SHIELD GAUGE
# ─────────────────────────────────────────────────────────────────────────────

ResourceSystem:
  ShieldGauge:
    Type: gauge (0-100)
    Description: >
      Shield's charged state. ALL identity abilities gauge-gated, NOT CD-gated.
      §25 compliant: no long CDs. Want to Consecrate ×3? Pay 90 gauge.
    Generation:
      - "Blocking in Iron Body: +5/hit"
      - "Strike Marked enemy (racial): +8/GCD"
      - "Basic weapon GCD: +6/hit"
      - "Hit received from tethered enemy: +4/hit"
      - "Passive (in combat): +2/s"
    Decay: "Out of combat 8s: reset. No in-combat decay."
    OvercapWarning: "Visual glow at 80+. Stops at 100, generation wasted."
    FirstSpend: "~8-10s (Shield Lob costs 20, generation ~9/cycle)"
    FullGauge: "~30-35s realistic"

  Section25Compliance:
    MaxCooldown: "GCD recast (2.0s). No ability CD exceeds this."
    AllCosts: "Iron Body 3/s | Shield Lob 20 | Pull 10 | Dash 15 | Bash 15 | Consecrate 30 | Star 25"
    FullSequenceCost: "~115 (exceeds cap = MUST prioritize, cannot spam all)"
    EmptyGauge: "Still has: basic combo (free), Iron Body (phys presence), Sentinel Instinct (passive). Weakened, not helpless. 4-6s to recover enough for Shield Lob."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 5: SENTINEL INSTINCT
# ═══════════════════════════════════════════════════════════════════════════════

SentinelInstinct:
  Type: passive (always on, no cost)
  Source: "Rawrotin pack-bond awareness"
  Warning: "1.5s before enemy reaches ally engagement range"
  TetherBonus: "2.0s if triggering enemy is tethered"
  Indicator:
    Visual: "Directional pulse (compass-style) + which ally + which enemy"
    Audio: "Low growl cue"

  SRScaling:
    SR1: "Rarely triggers (enemies attack closest anyway)"
    SR2: "Primary use case — warns when enemies find open path to casters"
    SR3: "Frequent — multiple simultaneous warnings"
    SR4: "AMBUSH notation — coordinated multi-angle assault incoming"

  Limitation: >
    WARNING ONLY. No auto-intercept, no slow, no prevention. Adabold must
    physically respond. 1.5s sufficient IF within 8-10y of ally (SPD 14 covers).
    Beyond 12y = warning arrives but Adabold doesn't.

  RacialAdvantage: >
    THIS is what non-Rawrotin would lack. They could learn the shield-work
    but never gain the instinctive pack-bond warning. WHY Rawrotin are better.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 6: ROTATION PHILOSOPHY
# ═══════════════════════════════════════════════════════════════════════════════

RotationDesign:
  Philosophy: >
    NO fixed rotation. ADAPTIVE to enemy behavior. Enemies rush → Iron Body.
    Enemies flank → Tether + Shooting Star. Corridors → Consecrate + hold.
    Each pull is different because AI behavior varies.

  DecisionFramework:
    Priority1: "Enemy reaching backline NOW? → Shooting Star / Tether Pull"
    Priority2: "No active tether? → Shield Lob to establish"
    Priority3: "Predictable approach? → Consecrate"
    Priority4: "Engaged directly? → Iron Body + basics (generate gauge)"
    Priority5: "Near wall? → Shield Bash for Pin crit"
    Priority6: "Low gauge, no threat? → Basic combo to rebuild"

  ExampleSequence_SR2:
    Context: "3 enemies: 1 flanking caster, 2 on Adabold"
    GCDs: "Lob flanker → Pull (oGCD) → Basic → Iron Body ON → Bash Pin → [Sentinel warning] → Iron Body OFF → Star flanker → Bash Pin"
    GaugeSpent: 85
    Note: "High-intensity = gauge drains. Must pause to rebuild after."

  NoRotationStatement: >
    No opener. No burst phase. No 2-min cycle. No memorization.
    Fight dictates rotation. Lazy fight = boring Iron Body. Active fight = frantic tethering.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 7: ANTI-PATTERNS
# ═══════════════════════════════════════════════════════════════════════════════

AntiPatterns:
  - Pattern: "Enmity table / threat generation"
    Fix: "NO enmity table. Force Targeting is PHYSICAL geometry."
    Severity: CRITICAL

  - Pattern: "2-minute burst alignment"
    Fix: "Shield Gauge spends when needed. No timer dependency."
    Severity: CRITICAL

  - Pattern: "Taunt-and-forget"
    Fix: "No taunt. Must PHYSICALLY maintain containment every second."
    Severity: CRITICAL

  - Pattern: "Long CDs (90s+) on identity skills"
    Fix: "All gauge-gated. §25 compliant."
    Severity: CRITICAL

  - Pattern: "Crit as RNG"
    Fix: "Positional/conditional: Pin=wall, Star=proximity, Lob=>50%HP"
    Severity: CRITICAL

  - Pattern: "AI manipulation / aggro tricks"
    Fix: "Geometry, not psychology. Madolt does AI tricks."
    Severity: HIGH

  - Pattern: "Invulnerability button"
    Fix: "Shield DR 50%, never 100%. Always takes damage."
    Severity: HIGH

  - Pattern: "SPD = movement speed"
    Fix: "SPD 14 = reaction/dodge/recovery speed. All classes run at same base."
    Severity: HIGH

  - Pattern: "Passive bodyguard (just exists)"
    Fix: "ACTIVE containment at SR2+. Iron Body alone fails vs pathfinding."
    Severity: MEDIUM

  - Pattern: "Unbreakable Force Tether"
    Fix: "Breaks at 20y. Enemies CAN break by sprinting. Must maintain or re-establish."
    Severity: MEDIUM

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 8: ITEM BASELINE
# ═══════════════════════════════════════════════════════════════════════════════

ItemBaseline:
  Philosophy: >
    Without Adabold: party uses consumables for temporary barriers and panic
    repositioning. NO item creates sustained Force Targeting.

  Replaces:
    - Item: "Quartzwall Capsule"
      Function: "Static crystal wall, blocks both teams, destructible, 30s CD"
      WhyClassBetter: "Iron Body is mobile, one-directional, indestructible, toggleable."

    - Item: "Aggro Flare"
      Function: "Force enemies to attack user 4s"
      WhyClassBetter: "4s only, breaks at SR3+ (AI trick). Force Targeting is permanent physics."

    - Item: "Barricade Foam"
      Function: "Shaped barrier, 2s harden, destructible, 15s, blocks both teams"
      WhyClassBetter: "Consecrate + Iron Body = indefinite, damages crossers, allies pass through."

    - Item: "Repositioning Hook"
      Function: "Grapple to surface, 45s CD"
      WhyClassBetter: "Tether Dash targets ENEMIES, 15 gauge cost (every ~3 GCDs), deals damage."

    - Item: "Guardian Totem"
      Function: "Enemies prefer totem, 3 hits destroy, 60s CD, fails SR3+"
      WhyClassBetter: "Adabold IS the totem — mobile, unkillable, active tools, works SR1-4."

    - Item: "Concussion Charge"
      Function: "4m knockback, 2s delay, fixed direction"
      WhyClassBetter: "Shooting Star = 6y, player-chosen direction, gauge-spammable, crits, combos into Pin."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 9: §25 COMPLIANCE
# ═══════════════════════════════════════════════════════════════════════════════

Section25:
  Rule: "No CDs 90s+ on identity skills. Gate via Shield Gauge resource."
  Implementation:
    GaugeGated: "Every identity ability costs gauge. No CD beyond GCD recast."
    Costs: {IronBody: "3/s", ShieldLob: 20, TetherPull: 10, TetherDash: 15, ShieldBash: 15, Consecrate: 30, ShootingStar: 25}
    SpamPermitted: "If you have gauge, use any ability back-to-back. Gauge IS the limiter."
    NoCD_Exceptions: "Sentinel Instinct (passive, always on). Basic combo (free, generates)."

  DesignIntent: >
    Gauge = PERMISSION. Stockpile = stockpile options. Spend = spend options.
    Tension: "medium threat now or save for big threat?" = interesting decision
    every few seconds, not once per 2 minutes.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 10: STRATEGY RANK SCALING
# ═══════════════════════════════════════════════════════════════════════════════

StrategyRankScaling:
  CoreStatement: "Force Targeting works at ALL ranks. Complexity scales, effectiveness doesn't diminish."

  Ranks:
    SR1:
      Requirement: "Stand in front. Exist."
      Tools: "Basic attacks, maybe Iron Body for DR"
      Difficulty: TRIVIAL
    SR2:
      Requirement: "Block shortest path. Tether flankers. Zone-deny alternatives."
      Tools: "Iron Body, Shield Lob, Tether Pull, Consecrate"
      Difficulty: MODERATE
      Note: "Design target — where Adabold identity STARTS."
    SR3:
      Requirement: "Full toolkit. Multiple simultaneous threats. Prioritize."
      Tools: "Everything cycling"
      Difficulty: HIGH
      Note: "Separates Adabold from other frontliners. Only class that CONTAINS flankers while holding front."
    SR4:
      Requirement: "Perfect tether management. Predict ambush vectors. Pre-Consecrate."
      Tools: "Everything simultaneously. Gauge management critical."
      Difficulty: VERY_HIGH
      Note: "Limitation revealed: 1 tether, 1 position. Multi-angle = needs party support for remaining angles."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 11: PROCGEN DUNGEON INTERACTION
# ═══════════════════════════════════════════════════════════════════════════════

ProcgenInteraction:
  CoreNiche: "ESCORT TANK — frontliner for party SPLITS"

  Corridors:
    Effectiveness: HIGHEST
    Why: "Iron Body fills corridor. Consecrate covers width. Bash always has Pin walls. Dungeon king."

  OpenArenas:
    Effectiveness: MODERATE
    Why: "No Pin walls (must Shooting Star to create). Multiple angles. Must be mobile."

  BranchingPaths:
    Effectiveness: HIGH
    Why: >
      Party splits → Adabold escorts caster. Sub-corridor: self-sustaining,
      no healer needed at SR2. Adabold + 1 caster clears branch.

  PartyComp:
    Ideal: "Adabold + ranged DPS (escort pair)"
    Nightmare: "Adabold alone (no protectee = hollow identity)"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 12: CRIT SYSTEM
# ═══════════════════════════════════════════════════════════════════════════════

CritSystem:
  ZeroRNG: true
  Reference: "DESIGN_OVERRIDE.md §12"

  Conditions:
    ShieldBash_Pin: "Wall-splat achieved (positional)"
    ShieldLob: "Target >50% HP (§9)"
    ShootingStar: "Target within 4y of protected ally (proximity)"
    Consecrate_Ticks: "Enemy >50% HP in zone (§9)"
    IronBody_Contact: "Enemy was sprinting on collision (momentum)"
    BasicCombo_3rd: "Third hit on Marked enemy (racial synergy)"

  DesignNote: "Crits reward correct positioning and active containment. Lazy play = 0 crits."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 13: SPD CLARIFICATION
# ═══════════════════════════════════════════════════════════════════════════════

SPDClarification:
  CriticalRule: "SPD ≠ movement speed"
  SPD14_Does:
    - "Reaction time / dodge frames (CAN dodge unlike Siegebreaker)"
    - "Fast animation recovery (quick Iron Body toggling)"
    - "GCD haste: base ~1.85s, geared ~1.65s, cap 1.4s (never reached alone)"
    - "Interception RESPONSE time (decides→begins moving quickly)"
  SPD14_DoesNOT:
    - "Run speed (all classes equal)"
    - "Tether Dash speed (fixed animation)"
  VsSiegebreaker: "SPD 5 = zero reactive. SPD 14 = CAN dodge, react, toggle quickly."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 14: SURVIVAL & >50% HP RULE
# ═══════════════════════════════════════════════════════════════════════════════

SurvivalDesign:
  OverFiftyRule:
    Statement: "Enemies >50% HP take +25% damage from players (§9 CORRECTED)"
    Synergy: "Adabold's opening (Shield Lob crit + Consecrate crit on >50%) front-loads damage when enemies most vulnerable."

  SelfSustain:
    MarkStrike: "3% max HP every 3rd GCD on marked target (~0.5% HP/s)"
    BlockRecovery: "1% max HP per blocked hit in Iron Body"
    Total: "~2% HP/s sustained"
    SR1: "Exceeds incoming → no healer needed"
    SR2: "Matches incoming with good play → solo-viable"
    SR3: "Below incoming from multiple sources → healer helps"
    SR4: "Insufficient vs coordinated → healer required"

  DeathPrevention: >
    No invulnerability. Shield DR 50% frontal only. Flanked = full damage.
    Survival = maintain frontal facing toward biggest threat. Zone-deny behind.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 15: RANK PROGRESSION
# ═══════════════════════════════════════════════════════════════════════════════

RankProgression:
  Philosophy: "Enhances quality/scope, not complexity. Full kit from Rank 1."

  Rank1_Experienced:
    AbilityCount: "Full kit"
    GaugeCap: 80
    TetherRange: "15y"
    ConsecrateRadius: "4y"

  Rank2:
    Upgrades:
      - "Gauge cap → 100"
      - "Tether range → 20y"
      - "Consecrate radius → 5y"
      - "Iron Body contact +20%"
      - "Sentinel Instinct → 1.75s warning"

  Rank3:
    Upgrades:
      - "Pack Resonance: +5% damage if ally within 12y"
      - "Territorial Consecrate: slow 40% (from 30%)"
      - "Reinforced Tether: break distance → 25y"
      - "Pin duration → 2.0s"
      - "Pin grants +10 gauge bonus"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 16: DESIGN NOTES + OPEN QUESTIONS
# ═══════════════════════════════════════════════════════════════════════════════

DesignNotes:
  Naming: >
    "Adabold" — "atta boy" energy. Pack hypes each other. Bodyguard tradition
    built on ENCOURAGEMENT: "GO GO GO I'VE GOT THIS." Energetic, loyal,
    slightly reckless in commitment to protecting others. Not stoic — enthusiastic.

  PotencyValidation:
    BasicCombo: "100p (BaseFiller band)"
    ShieldBash: "150-200p (ComboFinisher)"
    ShootingStar: "180p (ComboFinisher)"
    Consecrate: "80p/tick × 4 = 320p total (GaugeSpender_Small)"
    ShieldLob: "120p (below filler due to utility)"
    TetherDash: "80p (oGCD, mobility bundled)"
    # Total PPS: 82-85% of DPS reference per BalanceTargets.

  SimTargets:
    GaugeFirstSpend: "8-10s (pass: target 12-16s)"
    GaugeFull: "30-35s (pass: target 30-40s)"
    DPS: "82-85% (pass: within ±12%)"
    Solo_SR2: "PASS — sustain matches incoming"
    Overcap: "<10% wasted in optimal play"

OpenQuestions:
  - Q: "Force Tether visible to enemy?"
    Lean: "YES — SR4 enemies try to break it. Creates tension of maintaining distance."

  - Q: "Consecrate stacks?"
    Lean: "YES — 60 gauge double-stack is self-limiting (no other tools for 6s)."

  - Q: "Iron Body: complete path block or discourage?"
    Lean: "Complete for standard enemies. Bosses can push through with 2s telegraphed channel."

  - Q: "1 or 2 simultaneous tethers?"
    Lean: "1 at Rank 1-2. Rank 3 trait could unlock second."

  - Q: "Mark-strike 3% sufficient for SR2 solo?"
    Lean: "Yes — 0.5%/s marks + 1.5%/s blocks = ~2%/s total. Needs testing vs SR2 damage numbers."

  - Q: "GCD haste: base 1.85s → geared 1.65s?"
    Lean: "Correct. Within 1.4s cap. Never reaches without extreme investment."

  - Q: "Pack Resonance 8y or 12y radius?"
