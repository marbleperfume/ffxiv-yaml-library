# SECTION 14: DESIGN NOTES
# ═══════════════════════════════════════════════════════════════════════════════

DesignNotes:

  IdentitySummary: >
    Adabold is the REACTIVE BODYGUARD. MetaKnight proactively locks areas
    down. Adabold reactively responds to threats as they emerge. His kit
    reads threat → dash to ally → intercept → redirect/punt the threat away.
    The shield is not armor — it is a tool (throw it, project it, bash with it).

  DesignPillars:
    Pillar1: "Bodyguard fantasy — I protect others by being there first"
    Pillar2: "Shield as tool — thrown, projected, bashed, bombed, never passive"
    Pillar3: "Reactive prioritization — Sentinel warns, player chooses who to save"
    Pillar4: "Directional commitment — barrier covers one angle, must choose correctly"
    Pillar5: "Sustain supports role — can afford to take intercepted hits repeatedly"

  BalanceKnobs:
    - "MBAS range (15-18y)"
    - "MBAS intercept window (2s)"
    - "Shield Projection width (6y) and HP pool (40-50%)"
    - "Projection gauge drain (4/s)"
    - "Sentinel warning time (1.5-2.5s)"
    - "Shield absent windows (Lob 0.8-1.2s, Bomb 1.5-2s)"
    - "Gauge generation from hits received (+4) and intercepts (+8)"

  ContrastTable:
    Adabold: {Method: "Interception + redirection", Strength: "Ally protection, reactive saves, any terrain", Weakness: "Multi-angle (single direction), SR4 triage overload", Identity: "Nothing gets past me."}
    MadoltMetaknight: {Method: "Escalating CC + pull", Strength: "Area lockdown, scales with SR, arenas", Weakness: "SR1 wasted, ranged enemies outside field", Identity: "Nothing near me can move."}
    Siegebreaker: {Method: "Offensive pressure", Strength: "Highest DPS, breakthrough", Weakness: "Cannot protect if bypassed", Identity: "Nothing in front of me survives."}

  MovementPhilosophy: >
    Adabold is FAST toward allies. MBAS is a 15-18y instant dash. SPD 14
    gives high base movement. He does not need a special gap-closer to ENEMIES
    because his job is not to reach enemies — it is to reach FRIENDS. He
    reaches enemies incidentally (they are near his friends when he arrives).

  ExploitSystem:
    ZeroRNG: true
    Reference: "DESIGN_OVERRIDE.md §12"
    Conditions:
      PackFang: "Marked target (racial combo)"
      ShieldBash_Pin: "Wall-splat achieved (positional)"
      ShootingStar: "Target within 4y of protected ally (proximity)"
      ShieldLob: "Target actively casting (interrupt bonus)"
      ShieldBomb_Primary: "3+ targets hit by ricochet chain"

  SimulationTargets:
    gauge_first_spend: "8-10s"
    gauge_full: "30-35s"
    dps_output: "80-85% (positioning-dependent)"
    solo_SR2: "Indefinite (high sustain + self-heal combo)"
    mbas_coverage: "85%+ of Sentinel warnings answered (optimal)"
    projection_uptime: "15-20% of fight (corridor phases, cover phases)"

