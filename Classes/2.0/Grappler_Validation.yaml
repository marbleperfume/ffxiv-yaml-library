# SECTION 6: §25 COMPLIANCE CHECK
# ═══════════════════════════════════════════════════════════════════════════════

Section25_Compliance:

  Rule: "No identity skills gated by 90s+ cooldowns. Resource/state gates only."

  Audit:
    Shared:
      Anchor_Point: {Gate: "12s CD", Identity: false, Verdict: "PASS (utility, not identity)"}
    Stealth:
      Silent_Approach: {Gate: "8s out-of-combat timer (state)", Identity: true, Verdict: PASS}
      Ambush_Crush: {Gate: "First Blood trigger + 30 Grip", Identity: true, Verdict: PASS}
      Drag_Under: {Gate: "Isolation trigger + 25 Grip", Identity: true, Verdict: PASS}
      Vanish_Retreat: {Gate: "25 Grip + Blown Cover trigger", Previous: "30s CD (REMOVED)", Verdict: "PASS — §25 fix applied"}
    Long_Range:
      Tentacle_Extend: {Gate: "15 Grip + LoE + range", Identity: true, Verdict: PASS}
      Reel_In: {Gate: "Attachment state", Identity: true, Verdict: PASS}
      Sling_Launch: {Gate: "Attachment state", Identity: true, Verdict: PASS}
      Tether_Drag: {Gate: "Immovable attachment state", Identity: false, Verdict: PASS}
    Ink:
      Ink_Spray: {Gate: "1 Ink Charge", Identity: true, Verdict: PASS}
      Murk_Bomb: {Gate: "1 Ink Charge + 8m range", Identity: true, Verdict: PASS}
      Ink_Slick: {Gate: "1 Ink Charge + ground area", Identity: true, Verdict: PASS}
      Ink_Eruption: {Gate: "2 Ink Charges + Saturation trigger", Previous: "20s CD (REMOVED)", Verdict: "PASS — §25 fix applied"}
    Melee_Grapple:
      Seize: {Gate: "20 Grip + 2m range", Identity: true, Verdict: PASS}
      Full_Pin: {Gate: "Escalation Complete trigger (4s hold)", Identity: true, Verdict: PASS}
      Crush: {Gate: "Pin active state", Identity: false, Verdict: PASS}
      Suplex_Release: {Gate: "Pin/Seize active state", Identity: true, Verdict: PASS}
      Submission_Hold: {Gate: "15 Grip + Seize active", Identity: true, Verdict: PASS}

  Summary:
    Audited: 17
    With_Cooldowns: "1 (Anchor Point, 12s, non-identity)"
    With_90s_Plus_CD: 0
    Section_25_Fixes: "2 (Vanish Retreat 30s→resource, Ink Eruption 20s→resource)"
    Result: "FULL COMPLIANCE"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 7: WEAKNESS BUDGET
# ═══════════════════════════════════════════════════════════════════════════════

WeaknessBudget:

  Primary_Weaknesses:

    Multi_Target_During_Pin:
      Affects: "Melee Grapple (primary)"
      Mechanism: "Pin locks Grappler in place. Adds attack freely. Breaks at 30% HP damage."
      Numeric: "3 SR3 × 50dmg/2s = 75 DPS × 15s = 1125 vs ~3000 HP = 37.5% → BREAK"
      Severity: HIGH
      Player_Counter: "Party peels. Short pins. Target selection."
      Design_Hook: "Add spawns during pin windows."

    Ranged_Enemies_vs_Melee_Commitment:
      Affects: "Melee Grapple, Stealth (approach)"
      Mechanism: "Must close to 2m. No gap closer in Melee stance. Ranged enemies free-fire."
      Numeric: "12m approach at 5m/s = 2.4s exposed + 4s escalation = 3 free ranged attacks"
      Severity: HIGH
      Player_Counter: "Choose Long-Range stance (correct pre-read)."
      Design_Hook: "Mixed ranged/melee compositions."

    Stance_Lock_No_Adaptation:
      Affects: "ALL stances (meta-weakness)"
      Mechanism: "Locked PRE-INSTANCE. Wrong read = 70-85% effectiveness entire run."
      Severity: CRITICAL
      Player_Counter: "Game knowledge. Community info. Prior runs on other classes."
      Bad_Matchups:
        - "Stealth vs long instance (opener diluted)"
        - "Long-Range vs tight corridors (no room to extend)"
        - "Ink vs fire enemies (zones cleaned)"
        - "Melee Grapple vs many weak enemies (pin wasted)"

    Retraction_Vulnerability:
      Affects: "Long-Range"
      Mechanism: "2.0s retraction — no tentacle abilities, exposed to closers"
      Severity: MEDIUM
      Player_Counter: "Anchor Point during retraction. Party peel."

    Ink_Depletion_Window:
      Affects: "Ink"
      Mechanism: "All charges spent → 32s refill. No zones, no Murk, no Eruption."
      Severity: MEDIUM
      Player_Counter: "Reserve 1 charge. Never fully deplete."

    Post_Pin_Fatigue:
      Affects: "Melee Grapple"
      Mechanism: "3s Fatigue (-30% attack speed, no grab) + 6s target Immunity = 9s dead"
      Severity: MEDIUM
      Player_Counter: "Allies cover. Pre-select next target."

  Secondary_Weaknesses:
    No_Self_Healing: "Zero sustain. Fully healer-dependent."
    Single_Target_Lock: "Can only pin ONE target. Multi-grab impossible."
    Friendly_Fire_Ink: "Allies suffer 60% vision penalty in ink (40% at Rank 3)."
    Tentacle_Dependency: "Future design space: tentacle-disable debuffs remove offhand entirely."

  Counter_Summary:
    Melee_Grapple: "Multi-target, ranged, fast adds during pin, Fatigue windows"
    Long_Range: "Tight rooms, fast closers, large displacement-immune enemies"
    Ink: "Fire/wind elements, SR4 destruction, depletion pressure"
    Stealth: "Long instances, AoE detection sweeps, SR4 detection"
    Universal: "Wrong stance choice, no sustain, single-target CC only"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 8: >50% HP RULE INTERACTION
# ═══════════════════════════════════════════════════════════════════════════════

Over50Rule:
  Rule: "Enemies above 50% HP take +25% incoming damage"

  Per_Stance:
    Stealth: "Ambush Crush 280 × 1.25 = 350p effective on fresh targets. Confirms first-blood fantasy."
    Long_Range: "Prioritize displacing healthy enemies into kill zones for +25% window."
    Ink: "Eruption early (enemies >50%) > Eruption late. Opener-phase tool confirmed."
    Melee_Grapple: "Pin + >50% = 1.25 × 1.25 = 1.5625× ally damage on fresh targets. Pin healthiest threat first."

  Grappler_HP_Management: |
    Grappler has no sustain. Above 50% = +25% incoming damage from un-CCed enemies.
    Optimal: enter pin at 40-50% HP. Healer should NOT top Grappler pre-pin.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 9: OPEN BALANCE QUESTIONS
# ═══════════════════════════════════════════════════════════════════════════════

OpenQuestions:

  - Id: Q1
    Question: "Is 15s Full Pin too long? 2 Grapplers alternating = 60% perma-lock."
    Proposed: "Grapple Immunity is TARGET-SIDE (6s immune from ALL grabs, not just source)."

  - Id: Q2
    Question: "Are ink zones destroyable by SR4 enemies?"
    Proposed: "Ink = terrain modification, not installation. Only countered by element (fire/wind/water)."

  - Id: Q3
    Question: "Stealth stance viability beyond opener?"
    Proposed: "Post-opener = 110 PPS Frontliner DPS. Re-stealth between combats = scout + target selection."

  - Id: Q4
    Question: "Grip Gauge feels too fast for Special tier?"
    Proposed: "Intentional. Knowledge gate = stance selection, not resource starvation. Gauge prevents spam, doesn't gate identity."

  - Id: Q5
    Question: "Long-Range vs large/boss enemies (can't throw)?"
    Proposed: "Reel-In pulls half. Tether Drag self-pull works. Value shifts to add management + repositioning."
