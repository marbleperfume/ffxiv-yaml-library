# SECTION 11: DESIGN NOTES

# ═══════════════════════════════════════════════════════════════════════════════



DesignNotes:

  IdentitySummary: >

    Metaknight is the PROACTIVE CC frontliner. Adabold responds to

    enemy decisions (reactive geometry). Metaknight locks enemies down

    before they can ACT (proactive CC). Vortex + tase stacks = enemies

    never GET the chance to flank because they cannot move.



  WhyRename: >

    "Madolt Warrior" generic. "Metaknight" = meta (transcendent) + knight.

    Engineer who transcended swordsmanship through technology. Electrical knight.



  DesignPillars:

    Pillar1: "Vortex fantasy — pull in, make stupid, kill"

    Pillar2: "Skill expression via parry — timing, not rotation"

    Pillar3: "Gauge tension — spend for damage vs hold for enhanced CC rate"

    Pillar4: "Engineering identity — equipment IS the class"

    Pillar5: "Proactive — set field BEFORE danger arrives"



  BalanceKnobs:

    - "Pull speed (1.5y/s)"

    - "Static Discharge radius (8y)"

    - "Stance drain (4/s)"

    - "Parry window (0.75s)"

    - "Enhanced stack rate threshold (50 gauge)"

    - "Field Overload cost (50)"

    - "Stack application rate (1 per 2s base, 1 per 1s enhanced)"

    - "Stun duration (1.5s) and DR window (8s)"

    - "Paralysis duration (2.5s) and damage amp (+15%)"

    - "Overcharge AoE radius (3y) and duration (8s)"

    - "CC threat weight in AI threat formula"



  ExploitSystem:

    ZeroRNG: true

    Reference: "DESIGN_OVERRIDE.md §12"

    Conditions:

      VoltaicCounter: "Always crits (requires parry success)"

      ECWeaponDischarge: "Fresh target opening (first engagement)"

      ECShieldDischarge: "3+ enemies hit"

      FieldOverload: "5+ seconds stance uptime"

      BasicCombo_3rd: "Weakened target (execute — visible damage state)"



  StrategyRankScaling:

    SR1: {Difficulty: TRIVIAL, CCValue: ZERO, Note: "Pure DPS mode."}

    SR2: {Difficulty: MODERATE, CCValue: HIGH, Note: "Identity starts."}

    SR3: {Difficulty: HIGH, CCValue: CRITICAL, Note: "Parry mandatory."}

    SR4: {Difficulty: VERY_HIGH, CCValue: CRITICAL, Note: "Enemies avoid field. Must chase."}



  ProcgenInteraction:

    BestIn: "Open arenas (8y field covers space, no walls needed)"

    GoodIn: "Intersections (captures from multiple vectors)"

    AdequateIn: "Corridors (enemies funnel anyway, less differentiated from Adabold)"

    IdealComp: "Metaknight + melee DPS (both benefit from clustered suppressed enemies)"

    Nightmare: "Solo vs mobile ranged that kite beyond 20y (outside even discharge range)"

  MovementPhilosophy: >
    Metaknight is INTENTIONALLY SLOWER than Adabold. He cannot sustain walking
    into hits on approach the way Adabold can. His solution: RANGED EC Discharges
    engage targets at distance (20y), then Capacitor Dash (see Section 13) closes
    remaining gap with 40% DR + contact detonation. Once in melee, discharges swap
    to instant blade-channeled variants (Samira model — no cast time in melee).
    This creates commitment: you SHOOT to engage, DASH to commit, then STAY.
    Dash charges are limited (2x 12s) — you cannot dash to every target, so
    ranged discharge is your PRIMARY way to touch things outside vortex range.



  NTUClarification:

    Rule: "NTU ≠ movement speed. NTU = reaction/processing. NTU = INFORMATION (see Section 12)."

    NTU16_Does: ["Parry feels generous", "Fast animation recovery", "GCD haste (base ~1.82s)", "All 4 Circuit Sense tiers active"]

    NTU16_DoesNOT: ["Run speed", "Pull speed", "Discharge animation speed", "Damage", "Evasion"]



  ContrastTable:

    Adabold: {Method: "Geometry", Strength: "All ranks, corridors", Weakness: "Open arenas, multi-angle", Identity: "I block the path."}

    MadoltMetaknight: {Method: "Escalating CC + pull", Strength: "Scales with rank, arenas, parry ceiling", Weakness: "SR1 wasted, ranged enemies", Identity: "Nothing on the path can move."}

    Siegebreaker: {Method: "Offensive pressure", Strength: "Highest DPS, breakthrough", Weakness: "Can't protect if bypassed", Identity: "I remove the problem."}



  SimulationTargets:

    gauge_first_spend: "12-14s"

    gauge_full: "32-38s"

    dps_output: "82-87% (parry-dependent)"

    survival_solo_SR2: "Indefinite with competent parry"

    cc_stack_uptime_SR3: "60-75%"

    overcap_rate: "<10% optimal"



# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 12: NTU EXPRESSION — CIRCUIT SENSE
# ═══════════════════════════════════════════════════════════════════════════════

CircuitSense:
  Type: passive_information_system
  Reference: "Attributes/Base_Attributes.yaml (NTU)"
  Availability: ALL_RANKS  # Fundamental to the class from character creation

  DesignPhilosophy: >
    NTU is INFORMATION ONLY — grants no damage, evasion, healing, or stats.
    MetaKnight's NTU reads warn about threats that specifically counter his
    melee engagement loop: things that waste his GCDs, turn his investment
    against him, interrupt his burst windows, or lock him out of acting.
    Madolt racial NTU 16 means he reads FAST — tells are generous, windows
    are clear. This is WHY the class developed among Madolt engineers:
    their processing speed makes melee commitment survivable.

  # ─── THRESHOLD TABLE ─────────────────────────────────────────────────────────
  #
  # Thresholds STACK — NTU 16 grants all tiers at 5/8/12/15.
  # "Unpredictable" boss tag suppresses one tier per stack.
  # NTU reads matter MORE as enemy complexity increases (scales with SR).

  ThresholdTable:

    Tier1_BlockDetection:
      NTU_Required: 5
      Name: "Shield Pulse"
      UIElement: "Blue flash on enemy guard arm/shield/barrier"
      Reads: >
        Enemy will BLOCK next incoming melee hit. Attacking into block =
        wasted GCD + no gauge generated + possible block-counter.
      TacticalUse: >
        Wait for block drop, use ranged (Electron Lance) to bait block
        then dash in after, or parry THEIR block-counter for gauge.
      WhyItMatters: "MetaKnight is melee-committed. A wasted GCD at 1.82s base = significant DPS loss."

    Tier2_ReflectDetection:
      NTU_Required: 8
      Name: "Ricochet Warning"
      UIElement: "Orange crackling outline on enemy (mirror-charge visual)"
      Reads: >
        Enemy will REFLECT next projectile or charged attack. Specifically
        dangerous for EC Weapon Discharge (25 gauge WASTED) and Electron
        Lance. The stronger the shot, the worse the reflect damage.
      TacticalUse: >
        Withhold discharges. Use basic melee (low cost if reflected).
        Or bait reflect with weak attack, then discharge during recovery.
      WhyItMatters: "Gauge is the class resource. Losing 25-50 gauge to a reflect cripples the next 15-20s."

    Tier3_CounterDetection:
      NTU_Required: 12
      Name: "Retaliation Spark"
      UIElement: "Red pulse radiating from enemy core (coiling animation)"
      Reads: >
        Enemy will COUNTER-ATTACK when struck. Since MetaKnight is in
        melee range, the counter hits immediately — no reaction window
        unless pre-read. Shows counter TYPE: strike, grab, or AoE.
      TacticalUse: >
        Voltaic Parry the counter (guaranteed gauge + Voltaic Counter),
        or delay attack until counter window expires. Turning enemy
        counters into parry fuel is PEAK MetaKnight skill expression.
      WhyItMatters: "Counters at melee range are instant. Without NTU read, you eat them blind."

    Tier4_CCDetection:
      NTU_Required: 15
      Name: "Lockdown Alert"
      UIElement: "Yellow chain-links flickering around MetaKnight's limbs"
      Reads: >
        Incoming CC (stun, root, silence, disable) targeting MetaKnight.
        Shows CC TYPE and approximate TIMING (imminent/winding/queued).
        Critically: shows CC during BURST WINDOWS when gauge is being
        spent — losing a discharge to a stun wastes the gauge.
      TacticalUse: >
        Pre-parry the CC source, dash out of range, or front-load
        discharge BEFORE CC lands. Knowing CC is coming lets you
        choose: eat it after spending gauge, or abort and save gauge.
      WhyItMatters: "A 2s stun during Field Overload (50 gauge) = total waste. Prevention > recovery."

  # ─── SCALING ─────────────────────────────────────────────────────────────────

  ContentScaling:
    SR1: "Enemies rarely block/reflect/counter. NTU reads exist but are informational only."
    SR2: "Enemies use 1-2 defensive behaviors. Block detection becomes valuable."
    SR3: "Enemies actively counter, reflect charged attacks, and CC during burst. All 4 tiers critical."
    SR4: "Enemies chain defenses. Block → Counter → CC sequences require reading ALL tiers in sequence."

  Suppression:
    Rule: "'Unpredictable' boss tag suppresses highest available tier per stack"
    Example: "Unpredictable×1 on NTU 16 MetaKnight = loses Tier4 (CC), keeps Block/Reflect/Counter"
    CounterplayToSuppression: "Voltaic Parry still works blind — skill ceiling remains even when reads are denied"

  InteractionWithStaticDischarge:
    Rule: >
      Enemies with Static Discharge stacks use FEWER defensive behaviors.
      Paralyzed enemies (3 stacks) cannot act at all. At 1-2 stacks, slowed/stunned enemies
      at -3. NTU reads become LESS necessary inside active field — the vortex
      itself is the 'safety net.' NTU matters most for enemies OUTSIDE field
      radius or freshly pulled enemies not yet fully suppressed.
    DesignNote: >
      This creates a deliberate loop: NTU reads help you APPROACH and SURVIVE
      until CC stacks accumulate. Once stacks build, enemies are locked down for damage.
      NTU is your onramp; Static Discharge lockdown is your destination.


# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 13: CAPACITOR DASH — DR + CONTACT DETONATION
# ═══════════════════════════════════════════════════════════════════════════════

CapacitorDash:
  Type: mobility_ability
  GCD: oGCD (weaves between attacks)
  Charges: 2
  RechargeTime: 12s per charge
  Range: "8y dash (matches field radius — dash INTO your own vortex)"
  GaugeCost: 0  # Movement is not gated by gauge. Gauge gates DAMAGE.
  Animation: "Jetpack burst — short electrical thrust, sparking trail"

  DesignPhilosophy: >
    MetaKnight is a MELEE FRONTLINER. He must enter and remain in danger.
    Strix gets PUNISHED for reckless dives because Strix has escape tools
    and operates hit-and-run. MetaKnight has NO ESCAPE — once he dashes in,
    he STAYS. Therefore dashing in is REWARDED with DR, and getting hit
    mid-dash is DOUBLY REWARDED with contact detonation. The class should
    NEVER feel punished for closing distance — that IS the job.

  # ─── DASH DAMAGE REDUCTION ──────────────────────────────────────────────────

  DashDR:
    Window: "0.4s (dash animation duration)"
    Amount: "40% DR during dash frames"
    Stacks: false  # Cannot double-dash for 80%. One dash = one DR window.
    AppliesTo: "ALL incoming damage during dash animation"
    DesignNote: >
      40% is substantial but not invulnerability. A big hit still hurts.
      This prevents the feel-bad of 'I dashed into a tankbuster and died
      instantly' while preserving risk for staying in melee AFTER the dash.
      Voltaic Parry covers the 'after' — Dash DR covers the 'approach.'

  # ─── CONTACT DETONATION ─────────────────────────────────────────────────────

  ContactDetonation:
    Trigger: "Taking ANY hit during Capacitor Dash (0.4s window)"
    Damage: "80p electrical AoE (3y radius from MetaKnight)"
    Scaling: "DEX + STR (weapon)"
    ExploitCondition: "Detonation on 3+ enemies hit (clustered pull)"
    GaugeGenerated: "+5 per detonation"
    Cooldown: "None (triggers every time dash DR absorbs a hit)"

    DesignNote: >
      This is 'artificial damage inflation' by design. Getting hit during
      a dash REWARDS you — the explosion is bonus DPS that only exists
      because you committed to entering danger. It creates a feedback loop:
        1. Dash toward enemies → DR protects you
        2. Enemies attack you mid-dash → BOOM, free AoE damage
        3. Detonation generates gauge → enables faster discharge
        4. Enemies pulled into vortex → more targets for next detonation
      The player who dashes INTO attacks is rewarded. The player who dashes
      away or hesitates gains nothing. This is the frontliner contract.

    FeelTarget: >
      "I dashed through their attack and it EXPLODED off me."
      The visual/audio should feel like deflecting a punch in an action movie —
      the incoming damage converts into YOUR outgoing damage. Power fantasy
      of unstoppable forward momentum.

  # ─── INTERACTION WITH OTHER SYSTEMS ─────────────────────────────────────────

  Interactions:

    WithVoltaicParry: >
      Dash DR and Parry serve DIFFERENT windows:
        - Dash DR = APPROACH (0.4s, while closing gap)
        - Voltaic Parry = ENGAGEMENT (0.75s, while fighting in melee)
      You cannot parry during a dash. You cannot dash during parry recovery.
      Sequential, not simultaneous: Dash in → land → parry chain begins.

    WithElectronGuardStance: >
      Dash does NOT cancel Electron Guard Stance. You can dash while field
      is active — the vortex moves WITH you briefly (0.4s reanchor on landing).
      This means dash-repositioning your field is valid (costly: burns a charge
      for field adjustment, but enables dynamic vortex placement mid-fight).

    WithCapacitorGauge: >
      Dash costs 0 gauge but GENERATES on detonation (+5). Aggressive dashers
      who eat hits build gauge faster — direct reward for frontliner commitment.
      Passive dashers (dodging away) generate nothing.

    WithNTU_CircuitSense: >
      NTU Tier3 (Counter Detection) shows enemies winding a counter-attack.
      Informed play: see counter → Dash INTO it (40% DR absorbs, detonation
      triggers, counter is 'eaten'). This is the NTU payoff for MetaKnight:
      not avoidance, but INFORMED AGGRESSION. You see the danger and charge
      through it profitably.

  # ─── RANK SCALING ───────────────────────────────────────────────────────────

  RankScaling:
    Rank1:
      Charges: 2
      DR: "40%"
      Detonation: "80p"
      Note: "Basic gap-close with safety net. Detonation is bonus, not primary damage."
    Rank2:
      Charges: 2
      DR: "40%"
      Detonation: "80p + applies 1 Static Discharge stack on detonated targets"
      Note: "Dashing into groups now applies CC stacks directly. Accelerates lockdown."
    Rank3:
      Charges: 2
      DR: "40%"
      Detonation: "80p + 1 stack + detonation chains (if 2+ targets hit, secondary 40p pulse 0.5s later)"
      Note: "Dash-bombing clusters becomes a real DPS contribution. Still not primary damage source."

  # ─── BALANCE CONSTRAINTS ────────────────────────────────────────────────────

  BalanceConstraints:
    DPSContribution: "Detonations should be ~5-8% of total DPS in multi-target. Filler, not primary."
    ChargeEconomy: "2 charges × 12s = one charge available per ~12s. Cannot spam dash for DR uptime."
    DRUptime: "0.4s / 12s = 3.3% uptime. This is NOT a permanent defensive buff — it's a commit tool."
    NotAnEscape: >
      Dash can be used backward but gains NOTHING (no detonation from fleeing,
      DR is wasted if not getting hit). Mechanical design discourages retreat.
      Contrast with Strix who HAS escape dives — MetaKnight has APPROACH dashes.


