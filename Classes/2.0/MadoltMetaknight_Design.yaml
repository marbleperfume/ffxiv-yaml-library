# Classes/Frontliner/MadoltMetaknight_Design.yaml

# ═══════════════════════════════════════════════════════════════════════════════

# MADOLT METAKNIGHT (Madolt) — Electrical Discharge / CC Frontliner

# ═══════════════════════════════════════════════════════════════════════════════

#

# Lineage: Armored Core energy shields, MH Charge Blade, Sekiro deflect,

#   LoL Skarner pull, Titanfall electric smoke, For Honor parry

#

# Core identity: "The vortex that swallows enemies and lobotomizes them."

#   Adabold:       "I physically block the path." (corridor king / DEFENSE)

#   Metaknight:    "I lock enemies down." (arena king / CC)

#   Siegebreaker:  "I walk THROUGH enemies." (siege king / offense)

#

# References:

#   - Combat/BalanceTargets.yaml (potency bands, GCD, role baselines)

#   - DESIGN_OVERRIDE.md (§3b, §3c, §3d, §5, §6, §9, §12, §25)

# Authority: DESIGN_OVERRIDE.md > BalanceTargets.yaml > this file > LLM.md

# ═══════════════════════════════════════════════════════════════════════════════



Key: Classes.Frontliner.MadoltMetaknight.Design



# ═══════════════════════════════════════════════════════════════════════════════

# SECTION 1: CLASS IDENTITY

# ═══════════════════════════════════════════════════════════════════════════════



Identity:

  Name: Madolt Metaknight

  PreviousName: Madolt Warrior

  Role: Frontliner

  SubRole: Offensive Frontliner (Electrical CC / Discharge)

  DamageType: electrical

  Weapon: engineered_blade_plus_electron_guard

  ExecutionArchetype: Field Management + Reaction-Based

  ExecutionTier: Experienced

  # 10-12 abilities, field upkeep, parry timing, gauge economy.



  Description: >

    Madolt engineer-knight who harnesses electrical discharge through crafted

    equipment. Creates an electromagnetic vortex that PULLS enemies inward

    while SUPPRESSING their AI. Engages at range with powerful electrical

    bursts, swaps to melee variants when targets are close (Samira model).

    "Frontliner" NOT "Tank" — damage-first, melee-POSITIONED but not

    melee-only. Survives by killing enemies inside the field and parrying

    everything else.



  CoreFantasy: >

    Your Electron Guard hums with stored charge. Enemies drift toward you

    against their will, muscles seizing as electricity floods their systems.

    Inside your vortex, they slow, stutter, lock up — then stop moving entirely.

    You don't block the path — you tase everything on it until nothing moves.



  InputModality:

    PrimaryFocus: parry_timing_reaction

    SecondaryFocus: charge_gauge_economy

    TertiaryFocus: field_radius_positioning

    DecisionType: reactive_timing_plus_field_management



  StatPriority:

    Primary: NTU    # 16 — highest reaction speed, parry window generous

    Secondary: DEX  # 14 — precision, discharge accuracy

    Tertiary: CRAFT # 12 — equipment construction/maintenance

    DumpStat: MAG   # No magical abilities — this is ENGINEERING



  DesignStatement: >

    The CC frontliner. "How do I lock down every enemy near me until they

    cannot act?" Success = enemies cluster around Metaknight, CC-locked

    and stunned. Failure = field drops, stacks decay, enemies move freely, backline

    gets flanked.



  SkillExpressionAxis: >

    Rewards TIMING and FIELD AWARENESS:

    - When to parry? (reaction to attack tells)

    - When to discharge vs hold gauge for enhanced CC stack rate?

    - Where to position the vortex for maximum capture?

    - When to cycle stance for gauge conservation?



  FailureStates:

    MissedParry: {Cost: "0.6s lockout, eat full damage, no gauge reward.", Severity: HIGH}

    GaugeStarved: {Cost: "No discharge, no field pulse. Basic attacks only.", Severity: HIGH}

    FieldMisposition: {Cost: "Enemies outside 8y. No CC stacks. They path freely to backline.", Severity: HIGH}

    OverDischarge: {Cost: "Gauge emptied. Stack rate halved (below 50). Vulnerable.", Severity: MODERATE}



  SingleLimitation: >

    FIELD RADIUS. Everything operates within 8y. Enemies OUTSIDE 8y are

    unaffected — full intelligence, free to path. Ranged enemies at 10y+

    ignore the vortex entirely.



# ═══════════════════════════════════════════════════════════════════════════════

# SECTION 2: RACIAL LOCK — MADOLT

# ═══════════════════════════════════════════════════════════════════════════════



RacialLock:

  Race: Madolt

  ParentCategory: Landwin

  Enforcement: cultural_lock

  Tradition: engineering_tradition



  LockJustification: >

    Madolt electrical engineering discipline — the Electron Guard is a

    MANUFACTURED device requiring Madolt fabrication knowledge. Culturally

    exclusive: schematics are guild secrets, passed apprentice-to-journeyman.

    NTU 16 makes them BETTER at Voltaic Parry, but the core lock is

    construction/maintenance knowledge.



  TeachableInTheory: >

    Non-Madolt COULD use a stolen Electron Guard but couldn't REPAIR, TUNE,

    or BUILD a replacement. Class degrades without engineering knowledge.



  RacialSynergy:

    - "NTU 16 = fastest reaction speed → Voltaic Parry window is GENEROUS"

    - "DEX 14 = precision → EC Weapon Discharge accuracy, blade finesse"

    - "CRAFT 12 = they BUILT the Electron Guard. Their engineering."

    - "Tech culture = class IS craftsmanship made combat-ready"

    - "Engineering mindset = field management is INTUITIVE (managing systems)"

    - "Guild tradition = schematics don't leak to other races"



  RacialStats:

    NTU: 16

    DEX: 14

    CRAFT: 12



  SizeModel:

    CharacterSize: Medium

    ElectronGuard: >

      Shield/generator hybrid on off-arm. Circular electromagnetic emitter

      with capacitor banks, discharge vents, charge indicators. Doubles as

      parry surface AND field projector.

    WeaponIdentity: >

      Engineered Blade = damage. Electron Guard = class identity. ALL

      identity abilities channel through the Guard. Gear progression =

      Guard quality (capacitor efficiency, field stability, charge rate).



# ═══════════════════════════════════════════════════════════════════════════════

# SECTION 3: ROLE OBJECTIVE FUNCTION

# ═══════════════════════════════════════════════════════════════════════════════



RoleObjective:

  Type: maximize_kill_speed_while_suppressing_enemy_AI

  PrimaryMetric: potency_per_second

  SecondaryMetric: static_discharge_cc_uptime_on_SR2_plus_enemies

  TertiaryMetric: enemy_capture_rate_within_field



  DPSTarget:

    Baseline: "80-87% of DPS reference"

    # Per BalanceTargets: Frontliner 80-87%.

    ParryPerfect: "87% (every parry → free Voltaic Counter GCDs)"

    ParryAverage: "82-83% (missed parries, lockouts, less Counter output)"



  SurvivalModel:

    Philosophy: >

      Voltaic Parry (100% negation on success) + field sustain (enemies too

      stupid to focus burst). Self-sustaining at SR1-2 without healer.

    TankbusterResponse: "Voltaic Parry. Success = negated + HP back. Failure = full damage + lockout."

    InvulnBudget: "0. Parry is frame-window mitigation, not invulnerability."

    SelfSustain: "~2.5% HP/s via parry (5% restore, avg 1 parry/4s active combat)"



  HealerCannotReplace: >

    Healer cannot CC enemies at scale. Without Static Discharge field, SR2+ enemies path to

    casters. Value is PREVENTION OF FLANKING, not HP management.



# ═══════════════════════════════════════════════════════════════════════════════

# SECTION 4: CLASS MECHANIC — ELECTRON GUARD / CAPACITOR SYSTEM

# ═══════════════════════════════════════════════════════════════════════════════



CapacitorSystem:

  Name: "Electron Guard / Charge Gauge"

  Type: active_gauge_resource_system



  CorePrinciple: >

    Electron Guard stores electrical energy as Charge. ALL identity abilities

    cost Charge — no long CDs. Charge builds through combat engagement.

    Discharges fire as RANGED electrical bursts at distance, swap to instant

    melee variants when targets are close (4y threshold). This gives MK

    reliable ranged engagement without requiring a dash for every target.

    The system rewards ACTIVE fighting: passive play = no Charge = no identity.



  ChargeGauge:

    Type: gauge (0-100)

    Generation:

      - "Melee GCD landed: +7/hit"

      - "Hit received (any): +5/hit"

      - "Successful Voltaic Parry: +15"

      - "Enemy enters field (first time per engagement): +3"

      - "Passive (in combat): +2/s"

    Decay: "Out of combat 8s: reset. No in-combat decay."

    OvercapWarning: "Coils glow blue-white at 80+. Stops at 100, generation wasted."

    FirstSpend: "~12-14s (EC Weapon Discharge costs 25)"

    FullGauge: "~32-38s realistic"



  # ─────────────────────────────────────────────────────────────────────────

  # ELECTRON GUARD STANCE (CAPACITOR PULL)

  # ─────────────────────────────────────────────────────────────────────────



  ElectronGuardStance:

    Type: stance_toggle

    GaugeCost: "4/s sustained"

    Effect:

      - "Electromagnetic field within 8y radius"

      - "Enemies within radius pulled toward Metaknight at 1.5y/s"

      - "Affected enemies cannot sprint while inside field"

      - "Boss enemies: 0.5y/s (drift, not lock)"

    SRScaling:

      SR1: "Pull redundant (enemies attack closest anyway). Accelerates contact."

      SR2: "Core use case — enemies trying to path around are dragged back."

      SR3: "Enemies CAN dash/teleport to escape (costs them a CD)."

      SR4: "Enemies recognize field, RETREAT before entering. Must close distance."

    TradeOff: >

      4/s is expensive. 25s max from full gauge. Must toggle: activate when

      enemies are in range, deactivate to rebuild. Decision: field uptime vs

      gauge for discharges.



  # ─────────────────────────────────────────────────────────────────────────
  # DISCHARGE ABILITIES
  # ─────────────────────────────────────────────────────────────────────────

  # DESIGN NOTE: MetaKnight is melee-POSITIONED but NOT melee-only.
  # He lacks Adabold's sustain to walk into hits on approach. He cannot
  # dash to every target. Discharges are his PRIMARY ranged engagement
  # tool — powerful electrical bursts that let him damage at distance.
  # When targets are already in melee range, discharges swap to faster
  # melee variants (Samira/Wyvern model) to prevent cast-time redundancy.

  Abilities:

    ECWeaponDischarge:
      Type: GCD (adaptive range — see DualMode)
      GaugeCost: 25
      Potency: 280
      ExploitCondition: "First discharge on fresh target (opening salvo)"

      DualMode:
        RangedMode:
          Trigger: "Target beyond 4y"
          Range: "20y"
          Animation: "Guard arm extends, capacitor fires focused electrical bolt"
          CastBehavior: "0.8s cast (interruptible by incoming hit — NOT by movement)"
          Feel: "Railgun shot. Visible charge-up, devastating single bolt."
          DesignNote: >
            This is how MetaKnight ENGAGES. He sees a target at 15y, fires
            EC Discharge to soften/tag it, then Capacitor Dashes to close
            remaining distance. Or he shoots targets his vortex cannot reach.
            Ranged mode has a cast time to prevent him from being a ranged
            DPS class — he WANTS to be in melee, ranged is his bridge tool.

        MeleeMode:
          Trigger: "Target within 4y"
          Range: "Melee"
          Animation: "Blade channels stored charge, electrical burst on strike"
          CastBehavior: "Instant (standard GCD, no cast time)"
          Feel: "Empowered melee hit. Blade crackles, target jolts."
          DesignNote: >
            When the target is already in your face, you do not need to AIM
            a ranged shot — you channel through the blade instantly. Faster,
            no cast time vulnerability. Prevents the feel-bad of casting at
            something you could just hit (Samira melee/ranged swap).

      WhyDualMode: >
        MetaKnight movement is limited (2 dash charges, 12s recharge).
        Without ranged discharges he would be helpless against anything
        outside 8y — his field cannot pull what he cannot reach, and he
        cannot sustain walking into damage the way Adabold can. Ranged EC
        Discharge is his SOLUTION to the gap between vortex pull range and
        actual combat reach. Melee mode exists so the ranged cast does not
        feel clunky when enemies are already in melee.

    ECShieldDischarge:
      Type: GCD (PBAoE, 6y radius)
      GaugeCost: 35
      Potency: 180 (per target)
      Effect: "Pulse electrical energy from Guard. Damages all in 6y."
      ExploitCondition: "Crits if 3+ enemies hit simultaneously"
      DesignNote: "The PAYOFF for Capacitor Pull — cluster them, then pulse. Always PBAoE (centered on self)."

    VoltaicCounter:
      Type: GCD (melee, CONDITIONAL — requires successful parry)
      GaugeCost: 0  # FREE
      Potency: 220
      Window: "3.0s after successful Voltaic Parry"
      Effect: "Lightning-charged riposte. Free GCD."
      ExploitCondition: "Always crits (parry success = conditional crit, section 12)"

    FieldOverload:
      Type: GCD (PBAoE, 8y radius)
      GaugeCost: 50
      Potency: 350 (per target)
      Effect: "Massive field pulse. All in 8y take damage + 2s slow (40%)."
      ExploitCondition: "Crits if Electron Guard Stance active 5+ continuous seconds"
      DesignNote: "Big spend. 50 gauge = half bar. Use at peak vortex capture."

    BasicCombo:
      Type: "GCD chain (3 hits: 100p > 120p > 150p)"
      GaugeCost: 0
      GaugeGenerated: "+7/hit (21 total chain)"
      ExploitCondition: "Third hit on weakened target (execute pressure — triggered by visible damage state)"
      DualMode:
        RangedMode:
          Trigger: "Target beyond 4y"
          Animation: "Quick electrical jabs from Guard (1-2-3 bolts, increasing intensity)"
          Range: "15y"
          CastBehavior: "Instant (no cast time — these are weak filler shots)"
          Note: "Lower gauge gen at range: +5/hit (15 total) vs +7/hit melee. Incentivizes closing."
        MeleeMode:
          Trigger: "Target within 4y"
          Animation: "Blade combo (standard melee chain)"
          CastBehavior: "Instant (standard GCD chain)"
          Note: "Full gauge gen +7/hit. This is where you WANT to be."

    ECBallistic:
      Type: GCD (single target / small AoE on impact)
      GaugeCost: 20
      Potency: 160 (direct hit) + 120 (AoE splash on landing)
      Range: "Melee (must be in striking range to launch)"
      KnockbackDistance: "12y (thrown in aimed direction)"

      Effect: >
        Electromagnetically LAUNCHES a single target as a projectile. Enemy is
        thrown 12y in the direction MetaKnight aims. On landing, deals AoE splash
        damage (120p, 4y radius) to anything near the impact point. The launched
        enemy takes 160p from the initial hit.

      CoreUse: >
        PROJECTILE CARRIER. Tase a target to Stage 4 (Overcharge — persistent 3y
        AoE sticking to them), then LAUNCH them into a cluster. The carrier lands
        inside the group, their Overcharge AoE immediately begins applying stacks
        to everything nearby. One fully-tased enemy becomes a CC grenade you throw
        into formations.

      TacticalApplications:
        - "Stage 4 carrier → launch into backline pack = instant chain-CC"
        - "Peel tool: launch an enemy AWAY from healer (12y buys 4-6s of safety)"
        - "Interrupt: launched enemies cannot act during flight (0.6s travel time)"
        - "Terrain: launch into walls for bonus stagger (0.5s additional stun)"
        - "Pull combo: launch target OUT, Capacitor Pull drags them back in for re-stacking"

      DualMode:
        SingleTarget:
          Trigger: "One target selected"
          Animation: "Guard arm charges, electromagnetic repulsor blast, enemy ragdolls"
          Feel: "Taser shotgun. One target FLIES backward."
        SmallAoE:
          Trigger: "3+ enemies within 3y of target (clustered)"
          Animation: "Wider repulsor wave — primary target launched, nearby staggered 3y"
          Effect: "Primary target: full 12y launch. Adjacent (3y): 3y knockback + 80p"
          Note: "Cannot launch multiple targets full distance. One projectile, others scattered."

      Synergies:
        WithOvercharge: >
          THE combo. 4-stack target = persistent AoE carrier. Launch them 12y into
          a fresh group. Carrier's AoE applies stacks on landing. Group goes from
          0 → 1 stack in 2s, 2 stacks in 4s. MetaKnight created a CC delivery
          system from a single fully-tased enemy.
        WithCapacitorPull: >
          Launch OUT → Pull back IN. Target takes launch damage, lands outside field,
          then gets dragged back. Covers 24y of forced movement. Or: pull enemies in,
          tase one to 4, launch the carrier into a SECOND group while pull handles first.
        WithCapacitorDash: >
          Dash to a cluster (detonation + stack application), tase one fast, launch
          the tased target away as you stay to work the rest. OR launch first, then
          dash to where the carrier landed to continue pressure.

      Limitations:
        - "Melee range required — cannot launch from distance"
        - "20 gauge cost — not free, competes with EC Discharge"
        - "Launched enemy is CC-immune for 2s after landing (anti-juggle)"
        - "Boss enemies: stagger 2y only (cannot be fully launched)"
        - "Allies in landing zone take 0 damage (friendly fire off)"

      RankScaling:
        Rank1:
          Distance: "8y"
          LandingAoE: "3y radius, 100p"
          Note: "Shorter launch. Still useful as peel and interrupt."
        Rank2:
          Distance: "12y"
          LandingAoE: "4y radius, 120p"
          Note: "Full distance. Carrier combo becomes practical."
        Rank3:
          Distance: "12y"
          LandingAoE: "4y radius, 120p + targets hit by landing AoE receive 1 Static Discharge stack immediately"
          Note: "Landing itself applies a stack. Carrier AoE + landing stack = 2 stacks in first tick. Brutal opener."



# ═══════════════════════════════════════════════════════════════════════════════

# SECTION 5: CLASS MECHANIC — STATIC DISCHARGE (CC STACKS)

# ═══════════════════════════════════════════════════════════════════════════════



StaticDischarge:

  Name: "Static Discharge (Tase Stacks)"

  Type: escalating_cc_field



  CorePrinciple: >

    MetaKnight electrocutes enemies with escalating CC. Stacks accumulate

    on targets inside his field, progressing from slow → stun → paralysis →

    persistent AoE re-application. This is the FRONTLINER CONTRACT: enemies

    physically CANNOT reach the backline because they are being tased.

    Not "confused" — LOCKED DOWN. Electrical CC with real mechanical teeth.



  FrontlinerContract: >

    Frontliners redirect traffic. DPS and healers need to be unbothered —

    frontliners force enemy MOVEMENT or answer enemy INTERACTIONS directly.

    MetaKnight's expression: he creates escalating CC conditions that enemies

    must respond to. They flee his field, or they get stunned inside it.

    Either outcome = backline is safe.



  # ─── STACK THRESHOLDS ────────────────────────────────────────────────────────

  StackSystem:

    ApplicationRate: "1 stack per 2s inside Electron Guard field (8y radius)"

    EnhancedRate: "1 stack per 1s while Charge Gauge above 50"

    StackDecay: "Lose 1 stack per 3s OUTSIDE field. Re-entering resets decay timer."

    MaxStacks: 4



    Thresholds:

      1_Stack_Slow:

        Name: "Tase — Slow"

        Effect: "Cast times +40%, movement speed -30%"

        Duration: "Persists while stacks remain"

        FrontlinerValue: >

          Enemies cannot rush past to casters. Big attacks take longer to

          wind up — easier to parry, easier to interrupt. Slowed enemies

          stay inside pull radius longer, accelerating stack 2.

        Visual: "Faint electrical arcs across enemy limbs. Stuttering movement."



      2_Stacks_Stun:

        Name: "Tase — Stun"

        Effect: "1.5s hard stun on reaching 2 stacks (one-time trigger per cycle)"

        Duration: "1.5s (cannot re-stun same target for 8s — diminishing returns)"

        FrontlinerValue: >

          Hard interrupt. Answers enemy interactions DIRECTLY — charging a

          big attack? Stunned. Trying to cast on healer? Stunned. This is

          MetaKnight's primary traffic control tool. Enemy commits to action,

          MK's field punishes the commitment.

        Visual: "Full-body electrical seizure. Sparks burst. Locked in place."

        DR_Note: "Stun DR 8s prevents perma-stun. Target must leave field or die."



      3_Stacks_Paralysis:

        Name: "Tase — Paralysis"

        Effect: "2.5s paralysis (cannot act, cannot move, takes +15% damage)"

        Duration: "2.5s (one-time trigger per cycle, shares DR with stun — 8s total)"

        FrontlinerValue: >

          Extended lockdown on priority targets. Kill window for team —

          paralyzed enemy inside vortex takes bonus damage from everyone.

          This is the REWARD for keeping a target inside field long enough.

        Visual: "Enemy locked rigid. Electrical cage visible around body. Crackling."

        DesignNote: >

          Paralysis is strictly better than stun (longer + damage amp).

          Reaching 3 stacks requires 4-6s of field time — enemies SHOULD

          be trying to escape before this. If they fail, they deserve the

          lockdown. SR3+ enemies actively flee at 1 stack.



      4_Stacks_PersistentAoE:

        Name: "Tase — Overcharge"

        Effect: >

          Enemy becomes a CARRIER. Persistent electrical AoE (3y radius)

          sticks to the enemy, dealing 40p/tick (2s interval) and applying

          1 stack per tick to OTHER enemies within 3y of the carrier.

          Carrier themselves are paralyzed for initial 2.5s then released

          but AoE persists for 8s total regardless of field proximity.

        Duration: "8s persistent AoE attached to enemy (not field-dependent)"

        FrontlinerValue: >

          The enemy IS the hazard now. Other enemies near the carrier get

          stacked rapidly. Creates chain-CC in clustered groups — one

          fully-tased target spreads stacks to neighbors. Rewards

          Capacitor Pull clustering: pull 5 enemies, fully tase one,

          watch stacks cascade to all 5.

        Visual: "Lightning corona around enemy. Arcs jump to nearby targets. They ARE the field."

        DesignNote: >

          This is MetaKnight's equivalent of Strix's Featherbomb — a tool

          that enables party followup. But where Featherbomb is consumable

          and thrown, Overcharge is EARNED through sustained field pressure.



  # ─── ENEMY AI THREAT RECOGNITION ────────────────────────────────────────────

  CCThreatScoring:

    Rule: >

      Enemy AI must recognize CC SCORE as a threat vector. Entities that

      apply CC (frontliners, some healers with CC tools) register as HIGH

      THREAT regardless of damage output. This naturally makes healers

      and frontliners targets — which is WHAT frontliners want.

    Implementation: >

      AI threat = (damage_dealt × weight) + (CC_score × weight) + (healing_done × weight).

      CC_score = stun_seconds_applied + slow_uptime + paralysis_seconds.

      MetaKnight's CC output = HIGH threat score → enemies target HIM →

      backline unbothered → frontliner contract fulfilled.

    DesignNote: >

      This closes the loop. MetaKnight WANTS to be attacked — Voltaic Parry

      rewards him for being targeted (gauge, HP restore, free counter). CC

      threat draws attacks TO him. Getting attacked fills gauge. Gauge

      enables more field uptime. More field = more stacks = more CC = more

      threat. Self-reinforcing loop.

    AntiPattern: >

      If AI only tracks damage-dealt for threat, pure DPS classes draw all

      aggro and frontliners are ignored. CC threat scoring prevents this.

      Frontliners MUST be threatening to AI or they cannot fulfill role.



  # ─── INTERACTION WITH CAPACITOR PULL ─────────────────────────────────────────

  VortexCombo: >

    Capacitor Pull + Static Discharge = the VORTEX. Pull enemies in (they

    accumulate stacks), slow them (can't escape easily), stun them (interrupt

    attempts to flee), paralyze them (kill window), overcharge them (cascade

    to neighbors). The pull KEEPS enemies in range for stacking. Without pull,

    enemies walk out before reaching stun threshold.



  # ─── VS ADABOLD ──────────────────────────────────────────────────────────────

  VsAdabold: >

    Adabold: Forces traffic via BODY. Physically blocks paths, intercepts

    charges, body-blocks projectiles. Enemies must go THROUGH him or AROUND

    him — both cost them time/positioning. (Siren-adjacent: forces attention

    by being an obstacle they cannot ignore.)

    MetaKnight: Forces traffic via CC. Enemies inside his field get tased —

    they must LEAVE or get locked down. Creates no-go zones that are actively

    punishing rather than passively blocking.

    Both redirect traffic. Different tools, same contract.



  # ─── SCALING ─────────────────────────────────────────────────────────────────

  ContentScaling:

    SR1: "Enemies stand in field. Stacks hit 4 easily. Trivial CC uptime."

    SR2: "Enemies try to leave at 1 stack. Pull keeps them — core gameplay begins."

    SR3: "Enemies FLEE at first slow sign. Must dash/pull to maintain contact. Active work."

    SR4: "Enemies kite, bait dashes, coordinate escapes. Full toolkit + team needed."



  # ─── LIMITATIONS ─────────────────────────────────────────────────────────────

  Limitations:

    - "Only 8y radius — outside = stacks decay, no new application"

    - "Requires Electron Guard Stance active (4/s gauge) for stack application"

    - "Enhanced rate (2x) requires 50+ gauge (competes with spending)"

    - "Stun/Paralysis DR: 8s between hard CC on same target (no perma-lock)"

    - "Boss enemies: max 2 stacks (slow + stun). Never paralysis or overcharge."

    - "Ranged enemies at 10y+ never enter field — must be pulled or shot"

    - "Does NOT reduce Strategy Rank — enemies keep intelligence, lose FREEDOM"



# ═══════════════════════════════════════════════════════════════════════════════

# SECTION 6: VOLTAIC PARRY — SKILL EXPRESSION TOOL

# ═══════════════════════════════════════════════════════════════════════════════



VoltaicParry:

  Type: oGCD (reactive, 0.3s animation lock)

  GaugeCost: 0

  Window: 0.75s  # LoL reaction standard (tentative, per BalanceTargets)



  CorePrinciple: >

    THE skill expression for Metaknight. Timing-based, not rotation-based.

    Where player mastery separates good from great.



  OnSuccess:

    DamageNegated: "100%"

    HPRestored: "5% max HP"

    GaugeGenerated: 15

    EnablesVoltaicCounter: "3.0s window for free 220p crit GCD"

    CCBoost: "+1 Static Discharge stack to all enemies in 8y (rewards parry with field pressure)"



  OnFailure:

    RecoveryLock: "0.6s (cannot act)"

    DamageTaken: "Normal (no mitigation)"

    GaugeGenerated: 0



  ScalingWithContent:

    SR1: "Not needed. Optional optimization for gauge/counter."

    SR2: "Primary survival when solo. Must parry heavy hits."

    SR3: "Mandatory. Miss = rapid HP loss → death."

    SR4: "Enemies vary timing to bait failures. Pattern-reading required."



  RacialAdvantage: >

    NTU 16 makes 0.75s feel like ~0.9s subjectively. Other races would

    find the same window punishing. WHY the class developed among Madolt.



  ComparisonToAdaboldBlock: >

    Adabold block: passive 50% DR, always on in stance, low ceiling.

    Metaknight parry: active 100% negation, 0.75s window, high ceiling.

    Safe vs skilled — the frontliner archetype split.



# ═══════════════════════════════════════════════════════════════════════════════

# SECTION 7: ROTATION PHILOSOPHY

# ═══════════════════════════════════════════════════════════════════════════════



RotationDesign:

  Philosophy: >

    NO fixed rotation. FIELD MANAGEMENT + REACTION. The "rotation" emerges

    from combat state, not memorization.



  DecisionFramework:

    Priority1: "Heavy hit incoming? → Voltaic Parry"

    Priority2: "Parry success? → Voltaic Counter (don't waste 3s window)"

    Priority3: "3+ enemies in field? → EC Shield Discharge / Field Overload"

    Priority4: "Priority fresh target? → EC Weapon Discharge (opening salvo)"

    Priority5: "Gauge above 80? → Spend to avoid overcap"

    Priority6: "Gauge below 30? → Drop stance, combo to rebuild"

    Priority7: "Enemies approaching outside field? → Reposition"



  GaugeTension: >

    Core loop: Gauge above 50 = enhanced stack rate (2x). Spending below

    50 = base stack rate. Oscillate: spend to ~50, rebuild to 80 for 2x stacking, repeat.

    Exception: Field Overload at 100 = accept temporary base-rate stacking for burst.



  ExampleSequence_SR2:

    Context: "4 enemies: 2 melee on Metaknight, 2 pathing past"

    Sequence: >

      Stance ON → drift inward → Basic 1-2 → [tell] → Parry (success) →

      Counter → Basic 3 (crit) → [4 in 6y] → Shield Discharge (180p×4) →

      Basic 1 → [heavy] → Parry → Counter → repeat

    GaugeFlow: "60 → +15 parry → +21 combo → -35 discharge → +15 parry = 76"

    Note: "Gauge-positive when parrying well. Gauge-negative when missing."



  NoRotationStatement: >

    No opener. No burst window. No 2-min alignment. Fight attack patterns

    dictate parry timing. Enemy count dictates AoE. Gauge state dictates

    hold vs spend. Two identical fights play differently.



# ═══════════════════════════════════════════════════════════════════════════════

# SECTION 8: ANTI-PATTERNS

# ═══════════════════════════════════════════════════════════════════════════════



AntiPatterns:

  - Pattern: "Enmity table / threat generation"

    Fix: "NO enmity table. CC threat scoring handles targeting (see Section 5). Pull is a field effect."

    Severity: CRITICAL



  - Pattern: "2-minute burst alignment"

    Fix: "Charge Gauge spends when optimal. No timer."

    Severity: CRITICAL



  - Pattern: "Long CDs (90s+) on identity skills"

    Fix: "All gauge-gated. §25 compliant."

    Severity: CRITICAL



  - Pattern: "Crit as RNG"

    Fix: "Conditional: Counter=parry, Weapon=>50%HP, Shield=3+targets, Overload=5s stance"

    Severity: CRITICAL



  - Pattern: "Traditional tank (absorb for party)"

    Fix: "Damage-first. Survive by killing + parrying."

    Severity: CRITICAL



  - Pattern: "Static Discharge stacks as permanent debuff on enemies"

    Fix: "Area CC field. Zone property. Leave = stacks decay (1 per 3s). SR unchanged."

    Severity: CRITICAL



  - Pattern: "Invulnerability button"

    Fix: "Parry is 0.75s window. Miss = eat hit."

    Severity: HIGH



  - Pattern: "SPD = movement speed"

    Fix: "NTU = reaction/processing. All classes run same base speed."

    Severity: HIGH



  - Pattern: "AI manipulation via taunt"

    Fix: "Static Discharge is CC, not SR reduction. Stacks decay outside field (1 per 3s). Enemies keep full intelligence — they are physically LOCKED, not made dumb."

    Severity: HIGH



  - Pattern: "Passive CC (exist = lock everything)"

    Fix: "Requires Stance active (4/s cost). Drop stance = instant end."

    Severity: MEDIUM



  - Pattern: "Unlimited vortex uptime"

    Fix: "4/s gauge. 25s max from full. Must cycle."

    Severity: MEDIUM



# ═══════════════════════════════════════════════════════════════════════════════

# SECTION 9: ITEM BASELINE

# ═══════════════════════════════════════════════════════════════════════════════



ItemBaseline:

  Philosophy: >

    Without Metaknight: party uses consumables for temporary CC and burst AoE.

    NO item creates sustained escalating CC or persistent pull.



  Replaces:

    - Item: "Stasis Grenade"

      Function: "3y radius, 3s slow, 45s CD"

      WhyClassBetter: "Capacitor Pull is continuous 1.5y/s, 8y, gauge-sustained."



    - Item: "Confuser Beacon"

      Function: "5y, 4s random targeting, 90s CD, SR2+ resists"

      WhyClassBetter: "Static Discharge stacks continuously while stance active, escalating CC, 8y, no resist."



    - Item: "EMP Capsule"

      Function: "4y burst, 200p, 60s CD"

      WhyClassBetter: "EC Shield Discharge = 180p/target, 35 gauge (spammable), 6y."



    - Item: "Focus Disruptor"

      Function: "Single target, -1 SR, 8s, 120s CD"

      WhyClassBetter: "Static Discharge = escalating CC (slow→stun→paralysis→AoE carrier), 8y, no CD."



    - Item: "Stimpack (Reaction Booster)"

      Function: "+0.2s parry window, 30s, 180s CD"

      WhyClassBetter: "NTU 16 = permanent reaction advantage."



# ═══════════════════════════════════════════════════════════════════════════════

# SECTION 10: §25 COMPLIANCE

# ═══════════════════════════════════════════════════════════════════════════════



Section25:

  Rule: "No CDs 90s+ on identity skills. Gate via Charge Gauge."

  Implementation:

    GaugeGated: "Every identity ability costs gauge. No CD beyond GCD recast."

    Costs:

      ElectronGuardStance: "4/s"

      ECWeaponDischarge: 25

      ECShieldDischarge: 35

      VoltaicCounter: "0 (free, parry-conditional)"

      FieldOverload: 50

      VoltaicParry: "0 (free oGCD, risk-gated)"

      BasicCombo: "0 (free, generates +7/hit)"

    SpamPermitted: "If gauge exists, discharge back-to-back. Gauge IS the limiter."

    NoCD_Exceptions: "Voltaic Parry (free, risk/timing gated). Basic combo (free, generates)."



  GaugeEconomy:

    MaxGauge: 100

    FieldDrain: "4/s (25s from full)"

    GenerationRate: "~7-9/GCD + 15/parry + 2/s passive"

    NetFlow_StanceActive: "+3/s if landing combos+parries. -2/s if only drain+passive."

    DesignIntent: >

      Active fighting sustains field indefinitely. Passive holding bleeds

      gauge. MUST fight to maintain vortex.



  TensionDesign: >

    Gauge = PERMISSION + TENSION. High (50+) = 2x CC stack rate, overcap risk.

    Low (<30) = must drop stance. Mid (30-50) = discharge ok, base stack rate.

    Decision frequency: every 2-4 seconds.



