ItemBaseline:

  Damage:
    Item: "Heavy Weapon ~80 PPS"
    Committed: "95-101 PPS = 119-126% of item → HIT"
    Uncommitted: "56 PPS = 70% of item → MISS"
    Implication: "Power concentrated in Momentum. Without it, below auto-attack."

  Survivability:
    Item: "Heavy Armor ~10% DR"
    Exoskeleton: "15% DR (always, undispellable) = 150% of item → HIT"
    With_Brace: "35% DR burst = 350% of item"
    CC_Immunity: "No item equivalent. Class-exclusive. INFINITE value vs CC-chains."

  CC:
    Item: "Stunning Mace — 2s stun, 10% proc"
    Siegebreaker: "Guaranteed displacement on Steamroll/Advance"
    Comparison: "More reliable, less powerful. DIFFERENT CATEGORY."

  Replaces: ["Armor slot (body IS armor)", "Weapon slot (body IS weapon)", "CC immunity items (biology)"]
  Complements: ["STR items (amplify carapace)", "VIT items (amplify HP)", "END items (amplify pool)"]

