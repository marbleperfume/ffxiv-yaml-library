# SECTION 3: MATCHUP ANALYSIS
# ═══════════════════════════════════════════════════════════════════════════════

MatchupAnalysis:

  Vs_Adafold:
    #              | Siegebreaker         | Adafold
    Verb:          ["BREACH",             "HOLD"]
    Best_In:       ["Fortifications",     "Corridors"]
    Weak_In:       ["Multi-angle alone",  "Open arenas"]
    Execution:     ["Commitment",         "Reactive intercept"]
    Survival:      ["HP + CC immunity",   "Self-heal + shields + invuln"]
    DPS:           ["83-87%",             "82-85%"]
    Ceiling:       [Low,                   Medium]
    Self_Heal:     [None,                  Yes]
    Comp_Synergy: "Hammer-and-anvil. Siegebreaker advances, Adafold holds rear."

  Vs_MadoltWarrior:
    #              | Siegebreaker         | Madolt
    Verb:          ["BREACH",             "SUPPRESS"]
    Best_In:       ["Fortifications",     "Open arenas"]
    Weak_In:       ["Multi-angle alone",  "Rank 4 resistance"]
    Execution:     ["Commitment",         "Guard-points + stances"]
    Survival:      ["HP + CC immunity",   "Kill fast"]
    DPS:           ["83-87%",             "80-87%"]
    Variance:      ["7%",                 "12%"]
    Rank4_Edge: "Siegebreaker — CC immunity guarantees reaching target. Reliability over ceiling."

  Vs_Kiting_Enemies:
    Answer: ["Momentum acceleration (+10-40%)", "CC immunity (roots/slows ignored)", "GA gap-closer (3-4y/GCD)"]
    Catch_Time: "6-10s from 15y"
    Result: "NOT a hard counter. Siegebreaker arrives."
    Chip_Damage: "Acceptable — HP pool absorbs."

  Vs_Ranged_Stationary:
    Answer: ["Take shots (15% DR + HP)", "Close via acceleration", "Crush on arrival (>50% crit)"]
    HP_Lost_During_Approach: "~8-15%"
    Result: "Soft disadvantage, not hard counter."

  Vs_CC_Heavy:
    Answer: "CC immune. Stun→Burst chain never starts."
    Effective_HP_Bonus: "+30-40% vs CC-chain enemies"
    Result: "STRONGEST matchup."

  Vs_Sustained_Chip:
    Answer: "Take all. Zero self-heal. Healer-dependent."
    Result: "WEAKEST matchup."
    Mitigation: "Kill threats quickly before accumulated damage matters."

