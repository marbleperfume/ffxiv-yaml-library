# SECTION 1: BALANCE TARGETS
# ═══════════════════════════════════════════════════════════════════════════════

BalanceTargets:

  DPS_Percentage_Of_Reference:
    Reference_PPS: 110
    Role_Baseline: "85% (frontliner standard)"
    Siegebreaker_Band: "83-87%"
    By_Momentum_State:
      Zero_Momentum: "~78%"
      Full_Momentum: "~87%"
      Fight_Average: "83-85%"
    By_Rank:
      Rank1: {PPS: 74.9, Percent: "68%", Note: "Below target — intentional. Cap 70. Learning rank."}
      Rank2: {PPS: 100.8, Percent: "91.6%", Note: "Above target. Simple execution → consistent."}
      Rank3_Dummy: {PPS: 128.9, Percent: "117%", Note: "Raw. Savage reduces to 85-91%."}
      Rank3_Savage: {PPS: "95-100", Percent: "85-91%", Note: "After resets + downtime."}
    Player_Variance:
      Siegebreaker: {Floor: "80%", Ceiling: "87%", Gap: "7%"}
      Adafold:      {Floor: "78%", Ceiling: "85%", Gap: "7%"}
      Madolt:       {Floor: "75%", Ceiling: "87%", Gap: "12%"}

  TTK_Expectations:
    Solo_Rank2_vs_Elite:
      Effective_PPS: "~86 (101 × 0.85)"
      Elite_HP: "~2000p"
      TTK: "~23s (target: 20-30s) ✓"
    Time_To_First_Damage: "2s"
    Time_To_Peak_Momentum: "12-16s"

  Endurance_Sustainability:
    Regen: {Passive: "+5/s", Not_Attacking: "+10/s", Kill: "+15 instant"}
    Rank1_10s_Cycle:
      Spend: "Slam(8)+Slam(8)+GA(12)+Crush(15)+Commit(5)+Flare(10) = 58"
      Recover: "50 passive + 20 Entrench = 70"
      Surplus: "+12 ✓"
    With_Brace:
      Rank1: "Surplus → -18. Requires extra Entrench."
      Rank2: "Brace(25) + Entrench(30): manageable."
    Entrench_Cadence: "~1 per 20-25s"
    Depletion: "RARE — extreme sustained fights only"

  PPS_Breakdown_ST:
    Rank1:
      Loop: "GA→Slam→Slam→Crush→Slam→Slam→Crush→Entrench (8 GCDs, 16s)"
      GCD_Total: "1080p"
      GCD_PPS: "67.5"
      Flare: "+12.5 PPS"
      Mom_Bonus: "+10%"
      Total: "~80 PPS"
    Rank2:
      GCD_PPS: "65"
      Mom_Bonus: "+15%"
      Flare: "26 PPS (390p/15s)"
      Total: "~101 PPS"
    Rank3:
      Base: "100.8"
      Resonance: "+18 (30 PPS × 60% uptime)"
      Rending: "+10.1 (self-amp)"
      Total: "~129 PPS (dummy)"

  PPS_Breakdown_AoE_5T:
    Cycle: "Steamroll×3 + GA + Entrench + Flare (12s)"
    Steamroll: "80×5×3 = 1200p"
    Flare: "350p"
    Total_PPS: "~154"
    Per_Target: "~31 (< ST per-target ✓)"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 2: SYSTEM INTERACTIONS
# ═══════════════════════════════════════════════════════════════════════════════

SystemInteractions:

  Aggro_StrategyRank:
    Rank1: {Behavior: "Attack closest", Answer: "Always closest (large hitbox + advance)", Difficulty: Trivial}
    Rank2: {Behavior: "Seek path to casters", Answer: "Advance INTO flanking paths", Difficulty: Easy}
    Rank3: {Behavior: "Coordinate flanks, target squishies", Answer: "Commit most-dangerous angle. Party handles rest.", Difficulty: Moderate}
    Rank4: {Behavior: "Bait wrong commitments, ambush", Answer: "Commit only CONFIRMED threats. Initial read must be correct.", Difficulty: High}
    CC_Immunity_Scaling: "Value increases with enemy intelligence. Best at Rank 3-4."

  HP_Above_50_Rule:
    Trigger: "Thorax Crush crits enemies >50% HP"
    Multiplier: "1.4×"
    Alignment: "Built Momentum during approach → arrive → Crush → crit on fresh target"
    Anti_Synergy: "Weak if party already damaged target below 50%"

  Crit_Conditions:
    CarapaceSlam: {Condition: "Rear positional", Mult: "1.4×"}
    ThoraxCrush: {Condition: ">50% HP target", Mult: "1.4×"}
    Others: "Fixed potency. No crit."
    RNG: "ZERO."

  Procgen_Map:
    Corridors: {Rating: "HIGH clearing / LOW holding", Note: "Hitbox fills space. Rank 3 destroys walls."}
    Open_Arenas: {Rating: MODERATE, Note: "Must choose ONE angle."}
    Siege: {Rating: "HIGHEST of all classes", Note: "Breaks barriers. Creates breaches."}
    Destructible: "BONUS path only. Never REQUIRED."

  Momentum_Speed:
    Base: "NORMAL (same as all classes)"
    Tiers: {T1: "+10%", T2: "+20%", T3: "+30%", T4: "+40%"}
    Direction: "Toward committed target ONLY"
    SPD_Effect: "ZERO on movement speed"

