# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 8: CONSTRAINTS
# ═══════════════════════════════════════════════════════════════════════════════

Constraints:

  Hard:
    - "MUST be Wyrpincers race (bio-lock)"
    - "Super Armor ALWAYS active while END > 0"
    - "SPD 5 → NO dodge, NO parry, NO reactive defense"
    - "SPD ≠ movement speed"
    - "Normal walk/run speed (same as all classes)"
    - "Momentum speed ONLY during committed advance"
    - "8 abilities MAX"
    - "ZERO self-healing"
    - "CC immunity undispellable (biology)"
    - "NO burst cadence / cycle / alignment"
    - "ONE limitation: directional commitment"
    - "CC Stage 1 ONLY (physical displacement)"
    - "ZERO random crit / ZERO RNG"
    - "GCD fixed 2.0s"
    - "NO Freecure / random procs"
    - "Rank progression = passive upgrades only"
    - ">50% HP crit rule on Thorax Crush"
    - "Large hitbox SYMMETRIC"

  Soft:
    - "END depletion RARE in normal play"
    - "Tier 4 accessible Rank 2+ only"
    - "Vet/newbie gap <12%"
    - "Decision tree <5 min comprehension"
    - "Entrench ~1/20-25s"
    - "Flare ~3-4/min"

  Overrides:
    - "IF CC penetration system added → Siegebreaker retains immunity (physical)"
    - "IF 'all dodge' boss → Brace substitutes (never forced to dodge)"
    - "IF SPD reworked → this doc MUST update"
    - "IF new frontliner → contrast table MUST expand"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 9: ANTI-PATTERNS
# ═══════════════════════════════════════════════════════════════════════════════

AntiPatterns:
  CRITICAL:
    - {Pattern: "SPD → movement speed", Fix: "Momentum adds speed DURING ADVANCE ONLY."}
    - {Pattern: "Multiple weaknesses", Fix: "ONE: directional commitment."}
    - {Pattern: "Dodge or parry added", Fix: "Take every hit. DR + HP."}
  HIGH:
    - {Pattern: "Ranged = hard counter", Fix: "Momentum catches. CC immunity → arrival."}
    - {Pattern: "Complex rotation", Fix: "8 abilities. Decision tree."}
    - {Pattern: "CC immunity as window", Fix: "ALWAYS ON (END>0). Biology."}
    - {Pattern: "2-min burst cycle", Fix: "Flare = Momentum-gated."}
  MEDIUM:
    - {Pattern: "Unbreakable commitment", Fix: "CAN re-commit. Cost = Mom reset."}
    - {Pattern: "No party value", Fix: "Body-block + Rending Plates + breach."}

