# Classes/Support/Colony_Complete.yaml
# ═══════════════════════════════════════════════════════════════════════════════
# COLONY (Harvesters) — Map-Shaping Support / Phenotype Specialist
# ═══════════════════════════════════════════════════════════════════════════════
#
# Design lineage:
#   Biology: Eusocial insects (ants, bees, termites) — caste specialization,
#            superorganism identity, biological construction, pheromone communication
#   Builder: Starcraft Zerg (creep/structure), Orcs Must Die (trap/barrier placement),
#            Fortnite (real-time construction under pressure), DFO Creator (terrain gen)
#   Flutter: Pharah/Mercy (aerial dominance), Singed (trail CC), Teemo (area denial),
#            Monster Hunter Palamute (mobile support), aerial bombers
#   Nightfly: Anglerfish (bioluminescent lure), Evelynn (darkness predator),
#             DFO Shadow Dancer (vision manipulation), Shaco (trap + darkness)
#
# Core identity: "The class that CHANGES THE MAP"
#   Colony doesn't fight in the space — Colony RESHAPES the space.
#   Barriers appear where open paths were. Routes open where walls stood.
#   Pollen clouds deny areas. Lures redirect enemy pathing.
#   Self-sufficient through INFRASTRUCTURE, not raw combat power.
#   Every Colony player permanently alters the encounter geometry.
#
# Fantasy: You are one specialized organ of a greater organism.
#   A Builder IS the skeleton — providing structure and protection.
#   A Flutter IS the circulatory system — fast, distributed, carrying payload.
#   A Nightfly IS the nervous system — sensing, signaling, luring.
#   Solo: you are a complete (if small) organism.
#   Together: multiple Harvesters become something greater than any individual.
#
# SPECIAL tier justification:
#   Three phenotypes = three completely different games within one class.
#   Each phenotype has its own mastery path, unique decision framework,
#   and distinct moment-to-moment gameplay. A Builder main learning Flutter
#   is learning a NEW CLASS, not switching specs. The knowledge gate is
#   understanding your phenotype DEEPLY — not surface complexity, but
#   the deep interactions between your biology and the encounter geometry.
#   Deceptively complex: each phenotype LOOKS simple but rewards mastery
#   with exponentially better encounter control.
#
# References:
#   - Combat/BalanceTargets.yaml (all numeric targets)
#   - Combat/AggroSystem.yaml (Colony installation interaction with SR targeting)
#   - Combat/ClassMechanicModuleDesign.md (mechanic type taxonomy)
#   - Class–Item Baselines.md (Colony consumable replacement table)
#   - New Locked Classes (Qual Specs).md (Colony qualitative context)
# ═══════════════════════════════════════════════════════════════════════════════

Key: Classes.Support.Colony

# ▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀
# ██  PART A: SHARED CORE (All Phenotypes)                                    ██
# ▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 1: CLASS IDENTITY
# ─────────────────────────────────────────────────────────────────────────────

Identity:
  Name: Colony
  AlternateName: null
  Role: Support
  SubRole: "Map-Shaping Specialist (Terrain Manipulation / Area Denial / Vision Control)"
  DamageType: physical  # Biological — secretion acid, seed projectiles, bioluminescent burns
  ExecutionArchetype: "Phenotype-Divergent Infrastructure"
  ExecutionTier: Special
  # Special tier justified by:
  # - THREE completely different gameplay loops within one class frame
  # - Each phenotype is its own mastery path (Builder ≠ Flutter ≠ Nightfly)
  # - Knowledge gate: understanding phenotype-specific map interactions deeply
  # - Deceptive complexity: each LOOKS straightforward but optimizes infinitely
  # - Multi-Harvester party synergy creates emergent strategies no single player can execute

  Phenotypes:
    Builder:
      Shorthand: "Construction / Denial / Fortification"
      GameFeel: "Orcs Must Die meets Fortnite — real-time construction that reshapes encounter geometry"
    Flutter:
      Shorthand: "Aerial Mobility / Pollen CC / Seed Bombardment"
      GameFeel: "Singed meets Pharah — trail denial from above, impossible to pin down"
    Nightfly:
      Shorthand: "Bioluminescent Lures / Darkness / Trap Chains"
      GameFeel: "Evelynn meets Shaco — information asymmetry predator"

  Description: >
    Colony is three classes wearing one name. Each Harvester phenotype
    produces a fundamentally different gameplay experience united by one
    principle: you change the MAP, not just the enemies on it. Builders
    add walls, platforms, and barriers that physically restructure encounters.
    Flutters blanket areas with pollen clouds and seed-drops from above.
    Nightflies manipulate vision — creating darkness for enemies while seeing
    perfectly, deploying bioluminescent lures that redirect pathing. Colony
    doesn't out-DPS the problem. Colony makes the problem walk into a kill
    box it built, blinded it, and trapped it inside.

  CoreFantasy: >
    You are one organ of a superorganism. Your body IS your toolkit —
    secretion glands, pollen sacs, bioluminescent organs, wings. You never
    run out because your body regenerates what it deploys. Other classes
    bring weapons. You bring ARCHITECTURE.

  InputModality:
    PrimaryFocus: encounter_geometry_and_enemy_pathing
    SecondaryFocus: deployment_positioning_and_timing
    TertiaryFocus: resource_regeneration_pacing
    DecisionType: strategic_preparation_and_reactive_adaptation

  StatPriority:
    Primary: NTU  # Environmental awareness — reads terrain + enemy pathing
    Secondary: DEX  # Precision — placement accuracy for deployments
    Tertiary: SPD  # Deployment speed — faster GCD = more infrastructure per window
    DumpStat: MAG  # No magic. Purely biological/physical effects.
    # Harvesters have: STR 8, STA 10, DEX 12, SPD 10, NTU 14, MAG 4, MAGICCAP 6

  DesignStatement: >
    Colony justifies Special tier through BREADTH. Each phenotype is a
    complete mastery path. The knowledge gate isn't mechanical difficulty —
    it's "you need to deeply understand ONE phenotype's interaction with
    procedurally generated encounter geometry." The deception: each phenotype
    LOOKS simple but optimizes infinitely when you start reading enemy AI
    pathing and manipulating it through terrain. Colony is the only class
    where understanding ENEMY BEHAVIOR matters more than your own rotation.

  FailureStates:
    InfrastructureIgnored:
      Cause: "Deployments placed where enemies don't path"
      Cost: "GCDs + Biomass spent on zero-value construction"
      Recovery: "Read enemy pathing, redeploy. But deployments on cooldown = dead time."
      Severity: "HIGH — Colony's power IS deployment. Wasted deployment = wasted class."
    OvercommitConstruction:
      Cause: "All GCDs on infrastructure, zero on personal safety"
      Cost: "Colony dies. Deployments persist briefly then decay without maintenance."
      Severity: "MODERATE — deployments persist, but unmaintained they expire."
    ResourceOverdraw:
      Cause: "Deploying faster than biological regeneration rate"
      Cost: "Forced 12-15s recovery with no deployment available"
      Severity: "MODERATE — predictable downtime, punishes spam."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 1b: RACIAL LOCK — HARVESTERS
# ─────────────────────────────────────────────────────────────────────────────

RacialLock:
  Race: Harvesters
  ParentCategory: Linfree
  Enforcement: hard_lock
  BiologicalLock: eusocial_insect_phenotype
  LockJustification: >
    Colony IS Harvester biology. Each phenotype = different body plan.
    Builder: reinforced chitin + secretion glands. Flutter: full wings +
    pollen sacs. Nightfly: bioluminescent organs + dark-adapted compound eyes.
    Phenotype is determined at maturation (character creation). Permanent.
    A Builder cannot grow wings. A Flutter cannot produce construction resin.

  RacialFlight:
    Description: >
      ALL Harvesters can fly. Racial trait, not class-granted. Wing morphology
      differs by caste: Builder (short, powerful, heavy-lift, 80% ground speed),
      Flutter (long, agile, aerial combat, 120% ground speed), Nightfly (broad,
      silent, stealth flight, 100% ground speed).
    Mechanics:
      FlightCeiling: "12y above ground plane"
      FlightStamina: "Unlimited — biological, not magical"
      CombatFlight: "All phenotypes act while airborne. GCDs cast from any elevation."
    Gameplay: >
      Flight provides vertical axis to ALL Colony gameplay. Builders construct
      from elevation. Flutters fight from the air. Nightflies approach from above
      in darkness. The vertical dimension is Colony's home field.

  RacialSynergy:
    - "Eusocial biology — phenotype IS body plan. Lock is absolute."
    - "Wings provide flight to ALL phenotypes — vertical axis is racial"
    - "Biological regeneration — glands/sacs/organs all regrow. Colony never runs out."
    - "Compound eyes — 270° vision. Harder to flank. (NTU 14 racial)"
    - "Pheromone communication — Colony-to-Colony coordination is passive"
    - "Chitin exoskeleton — moderate natural armor (STA 10)"
    - "GATHER racial role — all Harvesters gather materials regardless of combat phenotype"

  PhenotypeSelection:
    Timing: character_creation
    Permanence: permanent
    Justification: "Body type. Anatomical reality, not spec choice. Players wanting another phenotype create a new Harvester character."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 2: ROLE OBJECTIVE FUNCTION
# ─────────────────────────────────────────────────────────────────────────────

RoleObjective:
  Type: map_shaping_and_area_denial
  PrimaryMetric: encounter_geometry_manipulation_value
  SecondaryMetric: enemy_pathing_disruption
  TertiaryMetric: damage_dealt_through_infrastructure

  DamageModel:
    DirectDamageBudget: "35% of DPS reference"
    InfrastructureDamage: "25% additional through traps/constructions/deployments"
    TotalCombatContribution: "60% of DPS reference (support class)"
    ContributionType: >
      Colony's value is NOT personal DPS. It's PARTY DPS ENABLED through
      geometry control. Builder funnels 8 enemies into a chokepoint for
      Elementalist AoE. Colony enables multiplicative party value.

  SupportModel:
    HealingProvided: "Minimal — Chitin Mend (emergency self-heal only)"
    CCProvided: "Stage 1-2 via terrain/pollen/darkness. Stage 3 via trap chains (Nightfly)."
    TankingProvided: "Indirect — barriers absorb hits (structures have HP pools)"
    UtilityProvided: "EXTREME — scouting, pathing control, vision denial, escape routes, fortification"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 3: CLASS MECHANIC — BIOMASS SYSTEM
# ─────────────────────────────────────────────────────────────────────────────

ClassMechanic:
  Type: biological_resource_regeneration
  Name: "Biomass"
  Description: >
    Shared resource across all phenotypes. Represents biological material
    the body produces (resin/pollen/enzyme). Regenerates passively. Cannot
    be externally refilled. Gates deployment FREQUENCY, not capability.

  BiomassPool:
    Maximum: 100
    RegenRate: "5/s base. 7/s airborne (+40%). 6/s stationary (+20%)."
    RegenBonus_MultiHarvester: "+10% per additional Colony in party"
    DepletionState: "At 0: cannot deploy new infrastructure. Recovery: 12-15s to 30 (minimum threshold)."

  BiomassSpending:
    SmallDeployment: "15-25 Biomass"
    MediumDeployment: "30-45 Biomass"
    LargeDeployment: "50-70 Biomass"
    Maintenance: "3 Biomass per 5s per active deployment"

  SecondaryResource_Pheromone:
    Name: "Pheromone Charge"
    Maximum: 3
    Generation: "1 per 20s passive. +1 when deployment interacts with enemy."
    PhenotypeUse:
      Builder: "Structures gain 2× HP + selective permeability (allies pass through)"
      Flutter: "Pollen gains Stage 2 CC upgrade (confusion added to slow)"
      Nightfly: "Lures become irresistible — forced pathing for 4s"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 4: SHARED SKILLS (All Phenotypes)
# ─────────────────────────────────────────────────────────────────────────────

SharedSkills:
  Movement:
    - Name: "Lift Off"
      ID: colony_lift_off
      ActionType: oGCD
      Recast: 1.0s
      Effect: "Toggle flight. Airborne: +40% Biomass regen, immune to ground AoE. Grounded: faster base movement."
      BiomassCost: 0

    - Name: "Dart"
      ID: colony_dart
      ActionType: oGCD
      Recast: 8s
      Effect: "10y dash (15y if airborne + 2s reduced aggro). Ignores own constructions."
      BiomassCost: 5

    - Name: "Hover"
      ID: colony_hover
      Type: passive
      Effect: "Airborne + stationary = +60% total Biomass regen. Movement cancels."

  Survival:
    - Name: "Chitin Mend"
      ID: colony_chitin_mend
      ActionType: GCD
      CastTime: 1.5s
      Cooldown: 30s
      Potency: 400  # Self-heal only
      BiomassCost: 20
      Effect: "Emergency self-heal. Long CD + Biomass cost = real sacrifice."

    - Name: "Chitin Harden"
      ID: colony_chitin_harden
      ActionType: oGCD
      Recast: 45s
      Effect: "15% damage reduction, 8s. Cannot fly during (wings retracted)."
      BiomassCost: 10

    - Name: "Shed Chitin"
      ID: colony_shed_chitin
      ActionType: oGCD
      Recast: 90s
      Effect: "Drop decoy shell (30% max HP, 10s). 50% chance enemies attack shell for 3s. +30% speed 4s."
      BiomassCost: 15
      RankRequired: 2

  Utility:
    - Name: "Pheromone Mark"
      ID: colony_pheromone_mark
      ActionType: oGCD
      Recast: 15s
      Range: 25y
      Effect: "Mark enemy 20s. Visible in darkness. +5% deployment damage. +50% Pheromone gen from interactions."
      BiomassCost: 5

    - Name: "Colony Signal"
      ID: colony_signal
      ActionType: oGCD
      Recast: 60s
      Range: 30y
      Effect: "Invisible pheromone waypoint (45s). Colony members see it. Deployments within 5y gain +10% duration. Max 2."
      BiomassCost: 0

    - Name: "Antennae Sweep"
      ID: colony_antennae_sweep
      ActionType: oGCD
      Recast: 20s
      Effect: "Detect all enemies in 30y. Shows movement direction + pathing target for 6s. Silhouettes through walls."
      BiomassCost: 0

  SharedPassives:
    - Name: "Biological Regeneration"
      Effect: "Deployments within 15y regen 5% max HP per 10s. Leaving range pauses regen."
    - Name: "Compound Vision"
      Effect: "270° vision arc. Immune to side-angle backstab crits (only true-rear <30° counts)."
    - Name: "Pheromone Network"
      Effect: "Colony party members share deployment vision. +10% Biomass regen per Colony member."
    - Name: "Infrastructure Instinct"
      Effect: "Visual/audio alert 2s before enemy reaches your deployment (SR-dependent targeting awareness)."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 5: SHARED BALANCE TARGETS
# ─────────────────────────────────────────────────────────────────────────────

BalanceTargets:
  DPSRole: "35% direct + 25% infrastructure = 60% total"
  GlobalCooldown:
    Base: 2.0s
    HasteCap: 1.4s
  oGCDAnimationLock: 0.6s
  WeaveModel: single_weave_only

  EnemyHP50Rule:
    Effect: "Enemies above 50% HP take +25% damage from ALL sources (system-wide, applies to ENEMIES)."
    ColonyImplication: "Infrastructure damage benefits. Front-load deployments while enemies are healthy."

  CritSystem:
    Rule: "Crit is NOT RNG. Positional/conditional."
    ColonyCritConditions:
      ElevationCrit: "4y+ above target — all direct attacks. Flight = consistent crit access."
      InfrastructureCrit: "Enemy touching 2+ Colony deployments — deployment damage crits."
      CCStateCrit: "Enemy affected by Colony CC — direct attacks crit."
    CritMultiplier: 1.4

  ResourceTiming:
    TimeToFirstDeployment: "0s (start at 100 Biomass)"
    TimeToMaxInfrastructure: "30-40s"
    BiomassRecoveryFromEmpty: "12-15s to minimum threshold"
    SustainableDeployRate: "1 medium per 8-10s"

  Survivability:
    EffectiveHP: "85% of frontliner baseline"
    DesignNote: "Survives through flight + positioning + deployments-as-shields, not raw tankiness."


# ▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀
# ██  PART B: BUILDER PHENOTYPE                                               ██
# ██  Construction / Denial / Fortification / Area Shaping                    ██
# ▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀

# ─────────────────────────────────────────────────────────────────────────────
# BUILDER SECTION 1: PHENOTYPE IDENTITY
# ─────────────────────────────────────────────────────────────────────────────

BuilderPhenotype:
  Identity:
    Name: "Colony — Builder"
    PhenotypeRole: "Terrain Engineer / Barrier Specialist / Chokepoint Creator"
    GameFeel: >
      Orcs Must Die meets Fortnite construction. Place physical structures
      that persist, have HP pools, block movement, redirect pathing, and can
      be repaired/upgraded mid-fight. Builder doesn't fight enemies — Builder
      makes the ROOM fight for them.

    CoreLoop: >
      1. Read enemy pathing (Antennae Sweep)
      2. Deploy barriers to DENY optimal enemy paths
      3. Create funnels that force enemies through chokepoints
      4. Reinforce/repair structures under attack
      5. Adapt as enemy AI repath (SR2+ enemies repath around walls)
      6. Leverage elevation (fly up, construct elevated platforms)

    PowerBudget:
      DirectDPS: "25% of DPS reference (lowest phenotype)"
      InfrastructureValue: "40% through funnel + chokepoint party DPS amplification"
      TotalContribution: "65% of DPS reference"

    FlightIntegration: >
      Builder uses flight for ELEVATED CONSTRUCTION. Fly up, build platforms,
      drop barriers from above. Heavy-lift wings (80% flight speed) carry
      material to elevation. Builder airborne = crane mode.

  # ───────────────────────────────────────────────────────────────────────────
  # BUILDER SECTION 2: PHENOTYPE MECHANICS
  # ───────────────────────────────────────────────────────────────────────────

  Mechanics:
    ConstructionSystem:
      MaxActiveStructures: 8
      StructureHP: "Small: 500 / Medium: 1200 / Large: 2500 / Pheromone-enhanced: 2×"
      StructureCollision: "Blocks ALL movement by default. Pheromone-enhanced = selective (allies pass)."
      StructureDecay: "60s base. Maintenance (3 Biomass/5s) extends +5s. Without maintenance: decays over 15s."

    RepairSystem:
      Rate: "200 HP per GCD (1.5s cast)"
      Cost: "10 Biomass per repair GCD"
      Range: 15y

    UpgradeSystem:
      Base: "Raw structure. Blocks. Has HP. Decays."
      Reinforced: "+50% HP. +5s decay per maintenance tick. 15 Biomass."
      Fortified: "+100% HP. 10% damage reflect. 25 Biomass."
      Pheromone: "Selective permeability. 1 Pheromone Charge (not Biomass)."

  # ───────────────────────────────────────────────────────────────────────────
  # BUILDER SECTION 3: SKILL ROSTER
  # ───────────────────────────────────────────────────────────────────────────

  Skills:
    Construction:
      - Name: "Secrete Wall"
        ID: builder_secrete_wall
        ActionType: GCD
        CastTime: 1.5s
        Range: 15y
        BiomassCost: 25
        Effect: "4m-wide, 3m-tall resin wall. 1200 HP. Blocks movement + projectiles. 60s duration."
        ElevationBonus: "Airborne cast: wall drops from above, 80p to enemies in landing zone."
        CritCondition: "Drop-damage crits from 4y+"
        RankRequired: 1

      - Name: "Resin Pillar"
        ID: builder_resin_pillar
        ActionType: GCD
        CastTime: 2.0s
        Range: 15y
        BiomassCost: 40
        Effect: "2m-wide, 6m-tall pillar. 2500 HP. Elevated platform on top. Line-of-sight block."
        ElevationBonus: "Standing ON pillar: next Secrete Wall costs -10 Biomass."
        RankRequired: 1

      - Name: "Bridge Span"
        ID: builder_bridge_span
        ActionType: GCD
        CastTime: 2.0s
        Range: 15y
        BiomassCost: 35
        Effect: "Horizontal platform connecting two points (max 6m span). 800 HP. Creates NEW traversable path."
        RankRequired: 2

      - Name: "Seal Path"
        ID: builder_seal_path
        ActionType: GCD
        CastTime: 1.0s
        Range: 15y
        BiomassCost: 20
        Effect: "Fill doorway/corridor (max 3m wide) with resin. 800 HP. Faster + cheaper than wall for existing geometry."
        RankRequired: 1

      - Name: "Excavate"
        ID: builder_excavate
        ActionType: GCD
        CastTime: 2.0s
        Cooldown: 25s
        Range: 10y
        BiomassCost: 30
        Effect: >
          Dissolve existing terrain (3m radius). Creates pit (2m deep, 100p + 2s root on fall)
          or hole in walls (2m diameter). Destructible terrain only. Removed terrain regenerates after 45s.
        CritCondition: "Pit damage crits if enemy was running (momentum)"
        RankRequired: 2

      - Name: "Fortify Structure"
        ID: builder_fortify_structure
        ActionType: GCD
        CastTime: 1.5s
        Range: 15y
        BiomassCost: 15
        Effect: "Repair 300 HP + apply Fortified upgrade. If already Fortified: 500 HP repair instead."
        RankRequired: 1

    Offense:
      - Name: "Resin Spike"
        ID: builder_resin_spike
        ActionType: GCD
        CastTime: 1.2s
        Range: 15y
        Potency: 130
        BiomassCost: 10
        Effect: "Projectile. Adjacent to Colony structure: 180p. BETWEEN two structures: 220p."
        CritCondition: "Elevation (4y+). Also crits if target touching 2+ structures."
        RankRequired: 1

      - Name: "Collapse Structure"
        ID: builder_collapse_structure
        ActionType: GCD
        CastTime: 0s
        Cooldown: 15s
        Range: 20y
        BiomassCost: 0  # Costs the structure
        Effect: >
          Destroy own structure. 4m AoE damage = structure remaining HP × 0.5.
          Enemies hit slowed 30% for 4s. Fortified wall (2400 HP) = 1200p AoE.
        CritCondition: "Crits if target touching another Colony structure (sandwich)"
        RankRequired: 2

      - Name: "Resin Snare"
        ID: builder_resin_snare
        ActionType: GCD
        CastTime: 1.0s
        Cooldown: 12s
        Range: 15y
        Potency: 60
        BiomassCost: 15
        Effect: "3m sticky resin, 15s. -40% speed. If enemy stays 3s: root 2s (hardens). Stage 1→root."
        RankRequired: 1

    Ultimate:
      - Name: "Architect's Domain"
        ID: builder_architects_domain
        ActionType: GCD
        CastTime: 3.0s
        Cooldown: 180s  # NOT 2 minutes
        Range: 20y
        BiomassCost: 80
        Effect: >
          Instantly construct FORTRESS: 4 walls + 2 pillars + bridges (12m × 12m).
          All Fortified tier + selective permeability. 8000 total HP. 45s duration.
          Does NOT count toward 8-cap. After 45s: degrades to individual structures
          (Builder keeps 4 within cap).
        RankRequired: 3

  # ───────────────────────────────────────────────────────────────────────────
  # BUILDER SECTION 4: ROTATION PHILOSOPHY
  # ───────────────────────────────────────────────────────────────────────────

  RotationPhilosophy:
    Overview: >
      Builder has NO rotation. Builder has a CONSTRUCTION PLAN adapting to
      geometry and enemy behavior. Priority: Deploy (early) → Reinforce (mid) →
      Damage with Resin Spike (ongoing) → Collapse for burst (opportunistic) →
      Rebuild as enemies repath (reactive).

    NO_Fixed_Cadence: >
      No "deploy wall every 12s." Read the field. Open corridor = Seal it NOW.
      Wall at 30% HP = Fortify or let break and rebuild behind? 4 enemies
      clustered on wall = Collapse for AoE. Every GCD is a decision.

    CoreTensions:
      BuildOrFight: "GCD on infrastructure (future value) vs. attack (immediate value)"
      RepairOrReplace: "10 Biomass repair vs. 25 Biomass fresh wall"

  FailureStates:
    WallsInWrongPlace:
      Cause: "Structures placed without reading enemy pathing"
      Cost: "25-40 Biomass per misplaced structure"
      Severity: "HIGH — Builder's value IS placement accuracy."
    BlockingAllies:
      Cause: "Non-Pheromone wall between allies and enemies"
      Cost: "Party DPS stops"
      Severity: "HIGH — Builder's biggest noob mistake."
    StructureCascadeCollapse:
      Cause: "All structures expire simultaneously (left maintenance range)"
      Cost: "Entire encounter geometry reverts. 6-8 GCDs to rebuild."
      Severity: "EXTREME"


# ▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀
# ██  PART C: FLUTTER PHENOTYPE                                               ██
# ██  Aerial Scouting / Pollen CC / Seed Bombardment / Mobility               ██
# ▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀

# ─────────────────────────────────────────────────────────────────────────────
# FLUTTER SECTION 1: PHENOTYPE IDENTITY
# ─────────────────────────────────────────────────────────────────────────────

FlutterPhenotype:
  Identity:
    Name: "Colony — Flutter"
    PhenotypeRole: "Aerial Skirmisher / Pollen Deployer / Area Denial Bomber"
    GameFeel: >
      Singed meets Pharah meets crop duster. ALWAYS in the air, ALWAYS moving,
      ALWAYS dropping CC clouds and seed bombs on enemies below. Untouchable
      through mobility. The ground is lava — Flutter only lands when forced.

    CoreLoop: >
      1. Take flight immediately (Flutter starts and stays airborne)
      2. Identify enemy clusters or high-value paths
      3. Deploy pollen clouds along enemy movement vectors
      4. Seed-bomb enemies entering pollen zones (combo damage)
      5. Kite — enemies below cannot reach you easily
      6. Leverage 120% flight speed for hit-and-run

    PowerBudget:
      DirectDPS: "40% of DPS reference (seed bombs = real damage)"
      InfrastructureValue: "25% through pollen CC enabling party DPS"
      TotalContribution: "65% of DPS reference"

    FlightIntegration: >
      Flutter IS flight. 120% flight speed (fastest phenotype), superior
      maneuverability, multiple skills REQUIRE airborne. Flutter grounded = 40%
      effectiveness. Flutter airborne = 100%. Designed to NEVER LAND.

  # ───────────────────────────────────────────────────────────────────────────
  # FLUTTER SECTION 2: PHENOTYPE MECHANICS
  # ───────────────────────────────────────────────────────────────────────────

  Mechanics:
    PollenSystem:
      PollenTypes:
        Slow: "Yellow. -40% movement, 5s. Stage 1. Default/cheapest."
        Confuse: "Purple. 25% action failure, 4s. Stage 2. +5 Biomass vs. Slow."
        Paralyze: "Red. 2s full paralysis, then 15s immunity. Stage 3. +15 Biomass."
      TypeSwitch: "Instant toggle, 3s internal CD."
      CloudDuration: "12s (drifts downward at 0.5m/s)"
      CloudRadius: "3m per puff (4m if deployed from 6y+)"
      MaxActiveClouds: 6
      Drift: "Deploy at 4-6y above targets for optimal ground coverage in 1-2s."

    SeedSystem:
      SeedTypes:
        Impact: "150p single-target. Standard damage."
        Scatter: "80p in 3m AoE. Cluster punish."
        Root: "60p + 2s root (vine erupts). Utility."
      Ammo: "4 seeds max. Regen 1 per 8s (Biomass-fueled passively, not directly spent)."
      ComboBonus: "+30% damage to enemies in ANY Flutter pollen. (150p → 195p)"

    AerialCombatAdvantage:
      - "+10% potency vs. grounded targets from above (gravity assist)"
      - "Immune to ground-targeted AoE"
      - "Melee enemies cannot reach without gap-closers"
      - "Pollen from altitude covers wider area (expands during drift)"
      - "Seed trajectory from altitude = faster travel time"

  # ───────────────────────────────────────────────────────────────────────────
  # FLUTTER SECTION 3: SKILL ROSTER
  # ───────────────────────────────────────────────────────────────────────────

  Skills:
    PollenDeployment:
      - Name: "Pollen Puff"
        ID: flutter_pollen_puff
        ActionType: GCD
        CastTime: 0s  # Instant — never stops moving
        BiomassCost: 15
        Effect: "Drop pollen cloud at current position. Drifts down. Current type. 12s, 3m radius."
        ElevationBonus: "From 6y+: expands to 4m"
        RankRequired: 1

      - Name: "Pollen Trail"
        ID: flutter_pollen_trail
        ActionType: GCD
        CastTime: 0s
        Cooldown: 8s
        BiomassCost: 25
        Effect: "4s continuous pollen trail behind flight path. 2m wide, 10s persist. Up to 12m coverage."
        RankRequired: 1

      - Name: "Pollen Storm"
        ID: flutter_pollen_storm
        ActionType: GCD
        CastTime: 1.5s
        Cooldown: 25s
        Range: 20y
        BiomassCost: 45
        Effect: "6m radius cloud. +50% CC effectiveness (Slow: -60%, Confuse: 40%, Para: 3s). 15s. Counts as 2 clouds."
        RankRequired: 2

      - Name: "Concentrated Burst"
        ID: flutter_concentrated_burst
        ActionType: GCD
        CastTime: 0s
        Cooldown: 15s
        Range: 15y
        BiomassCost: 20
        Potency: 50
        Effect: "Single-target pollen pellet. Guaranteed application, can't miss. No cloud, just direct CC."
        CritCondition: "Crits if target already has different pollen type (cross-reaction)"
        RankRequired: 1

    SeedAttacks:
      - Name: "Seed Drop"
        ID: flutter_seed_drop
        ActionType: GCD
        CastTime: 0s
        AmmoCost: 1
        Potency: 150
        Effect: "Drop bomb below. Travel time by height. 80p AoE splash. In pollen: 195p primary."
        CritCondition: "From 4y+. Also crits if target in 2+ pollen zones."
        RankRequired: 1

      - Name: "Scatter Seed"
        ID: flutter_scatter_seed
        ActionType: GCD
        CastTime: 0s
        AmmoCost: 1
        Range: 15y
        Potency: 80  # Per target
        Effect: "Mid-air burst, 4m AoE. Max 8 targets. In pollen: 104p each."
        CritCondition: "Crits if 4+ enemies hit"
        RankRequired: 1

      - Name: "Root Seed"
        ID: flutter_root_seed
        ActionType: GCD
        CastTime: 0s
        Cooldown: 18s
        AmmoCost: 1
        Range: 15y
        Potency: 60
        Effect: "Vine erupts: 2s root. In pollen slow: extends to 3s. Stage 1 CC."
        CritCondition: "Crits if enemy was moving when rooted"
        RankRequired: 2

      - Name: "Seed Barrage"
        ID: flutter_seed_barrage
        ActionType: GCD
        CastTime: 0s
        Cooldown: 35s
        AmmoCost: 3
        Range: 15y
        Potency: "120p × 3 seeds (360p total, 468p in pollen)"
        Effect: "Rapid-fire 3 seeds at area (0.5s apart). 3m AoE each. Dumps magazine."
        CritCondition: "Each seed checks individually"
        RankRequired: 3

    Mobility:
      - Name: "Tailwind"
        ID: flutter_tailwind
        ActionType: oGCD
        Recast: 20s
        BiomassCost: 10
        Effect: "+50% flight speed, 6s. Pollen Trail becomes free. Seed travel time halved."

      - Name: "Updraft"
        ID: flutter_updraft
        ActionType: oGCD
        Recast: 30s
        BiomassCost: 5
        Effect: "Instant rise to ceiling (12y). 3s Thermal buff: pollen duration doubled (24s)."

      - Name: "Divebomb"
        ID: flutter_divebomb
        ActionType: GCD
        CastTime: 0s
        Cooldown: 20s
        Potency: 200
        BiomassCost: 15
        Effect: "Vertical dive to ground target. 3m AoE + 3m knockback. From 8y+: 280p. Grounds Flutter (must Lift Off again)."
        CritCondition: "Always crits from ceiling (12y)"
        RankRequired: 2

    Ultimate:
      - Name: "Swarm Cloud"
        ID: flutter_swarm_cloud
        ActionType: GCD
        CastTime: 2.0s
        Cooldown: 180s
        Range: 25y
        BiomassCost: 70
        Effect: >
          10m radius cloud cycling ALL pollen types over 20s: Slow (0-7s) →
          Confuse (7-14s) → Paralyze (14-20s). Escalating, unavoidable CC.
          Seed damage in cloud: +50% (vs normal +30%). Cannot be resisted —
          only leaving the area avoids it.
        RankRequired: 3

  # ───────────────────────────────────────────────────────────────────────────
  # FLUTTER SECTION 4: ROTATION PHILOSOPHY
  # ───────────────────────────────────────────────────────────────────────────

  RotationPhilosophy:
    Overview: >
      Flutter's "rotation" is an AERIAL PATROL PATTERN. Fly over, drop pollen,
      seed-bomb targets in pollen, reposition. Priority: Maintain flight → Deploy
      pollen on vectors → Seed into pollen zones → Manage altitude → Reload patience.

    NO_Fixed_Cadence: >
      Pollen production is continuous, seeds regen on timer. No "save for burst."
      Optimal play is CONSTANT DEPLOYMENT: pollen every 2-4s, seeds every
      opportunity a target is in pollen. DPS is a STREAM, not bursts.

    CoreDecisions:
      HeightManagement: "Higher = safer + wider pollen + crit. Lower = faster seeds + risky."
      PollenTypeSelection: "Many weak → Slow. Few dangerous → Confuse. One priority → Paralyze."
      AmmoManagement: "Constant dropping (sustain) vs. save for Barrage (burst on priority target)."

  FailureStates:
    Grounded:
      Cause: "Knockdown or forgetting flight"
      Cost: "40% effectiveness. All aerial bonuses lost. Vulnerable."
      Severity: "HIGH — Flutter is designed airborne."
    SeedDumping:
      Cause: "All 4 seeds fired without pollen setup"
      Cost: "23% less damage (no combo). 24-32s with 0-1 seeds."
      Severity: "MODERATE"
    PollenMisplacement:
      Cause: "Pollen where enemies don't path"
      Cost: "15-45 Biomass wasted, no CC/combo value"
      Severity: "HIGH"


# ▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀
# ██  PART D: NIGHTFLY PHENOTYPE                                              ██
# ██  Bioluminescent Lures / Darkness Control / Trap Chains / Vision Manip    ██
# ▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀

# ─────────────────────────────────────────────────────────────────────────────
# NIGHTFLY SECTION 1: PHENOTYPE IDENTITY
# ─────────────────────────────────────────────────────────────────────────────

NightflyPhenotype:
  Identity:
    Name: "Colony — Nightfly"
    PhenotypeRole: "Vision Manipulator / Lure Predator / Trap Architect"
    GameFeel: >
      Anglerfish meets Evelynn meets Shaco. Controls WHAT ENEMIES CAN SEE.
      Deploys darkness to blind them. Deploys bioluminescent lures to redirect.
      Sets traps along forced paths. Fights by controlling INFORMATION —
      enemies act on false data, walking into prepared kill zones.

    CoreLoop: >
      1. Deploy darkness zones (enemy detection → 2m)
      2. Place bioluminescent lures (attract enemies to specific points)
      3. Set traps along lure-path
      4. Watch enemies stumble through darkness toward light, through traps
      5. Detonate trap chains on trigger
      6. Remain invisible within own darkness (Nightfly sees through it)

    MomentToMoment: >
      PREDATORY PATIENCE. Set up kill zone BEFORE enemies arrive. Watch them
      walk into it. Every kill is premeditated. Nothing reactive. Everything
      planned 15 seconds ago.

    PowerBudget:
      DirectDPS: "30% of DPS reference (lowest direct damage)"
      InfrastructureValue: "35% through trap damage + lure-forced positioning"
      TotalContribution: "65% of DPS reference"

    FlightIntegration: >
      SILENT APPROACH + ELEVATED TRAP PLACEMENT. Broad, silent wings (no
      turbulence). 100% flight speed. Flies ABOVE darkness zones looking
      down — sees everything while enemies below see nothing. Elevated
      traps harder to detect (enemies don't look up).

  # ───────────────────────────────────────────────────────────────────────────
  # NIGHTFLY SECTION 2: PHENOTYPE MECHANICS
  # ───────────────────────────────────────────────────────────────────────────

  Mechanics:
    DarknessSystem:
      DarknessZone:
        Radius: "5m base"
        Duration: 20s
        EnemyEffect: "Detection range → 2m (functionally blind)"
        AllyEffect: "Normal vision if Pheromone-marked. Otherwise also blinded."
        NightflyEffect: "Full vision always (dark-adapted compound eyes)"
        MaxZones: 4
      StrategyRankInteraction:
        SR1: "Completely fooled. Random pathing. Attack only within 2m."
        SR2: "Attempt to leave darkness (path toward light). Blinded while inside."
        SR3: "Target darkness zones for destruction."
        SR4: "May use non-visual detection. Darkness partially effective."

    LureSystem:
      AttractRange: "8m (enemies in darkness path toward nearest light)"
      Duration: 15s
      BiomassCost: 20
      MaxLures: 3
      SREffectiveness:
        SR1_2: "Forced pathing (irresistible)"
        SR3: "4s attraction before recognition"
        SR4: "2s attraction"
      PheromoneEnhanced: "Irresistible to SR3 for 4s, SR4 for 2s"
      Placement: >
        Lure placement IS Nightfly's primary skill expression. Lure at end
        of corridor = enemies path down corridor. Lure behind trap = enemies
        walk THROUGH trap. Lure on ledge = enemies cluster below.

    TrapSystem:
      SetupTime: "1 GCD (2.0s)"
      Duration: 45s
      MaxTraps: 5
      TriggerRadius: "1m (2m if chain-triggered)"
      Rearm: "Single-use. Must redeploy."
      Visibility: "Invisible in darkness. Lit areas: 50% detect (SR2), 80% (SR3), 100% (SR4)."
      Chaining: >
        Traps within 3m of triggered trap gain expanded 2m radius for 3s.
        Place 2.5m apart in line → guaranteed sequential chain detonation.
        5-trap chain in corridor = DEVASTATING.
      TrapTypes:
        Snare: "Root 3s + 80p. Containment."
        Burst: "200p AoE (3m) + 6s acid puddle (40p/s). Total potential: 440p. Damage."
        Flash: "Blind 4s (Stage 3 — worse than darkness, 0m detection). Disable."
        Alarm: "Reveals 10m for 8s + Pheromone Mark triggering enemy + 1 Pheromone Charge. Intel."

  # ───────────────────────────────────────────────────────────────────────────
  # NIGHTFLY SECTION 3: SKILL ROSTER
  # ───────────────────────────────────────────────────────────────────────────

  Skills:
    Darkness:
      - Name: "Devour Light"
        ID: nightfly_devour_light
        ActionType: GCD
        CastTime: 1.5s
        Range: 20y
        BiomassCost: 30
        Effect: "5m darkness zone, 20s. Enemies: 2m detection. Traps inside: invisible at any SR."
        ElevationBonus: "From altitude: 6m radius"
        RankRequired: 1

      - Name: "Eclipse"
        ID: nightfly_eclipse
        ActionType: GCD
        CastTime: 2.0s
        Cooldown: 30s
        Range: 20y
        BiomassCost: 50
        Effect: "10m darkness, 25s. Enemies inside: +5% damage taken (disoriented). Counts as 2 zones."
        RankRequired: 2

      - Name: "Creeping Dark"
        ID: nightfly_creeping_dark
        ActionType: GCD
        CastTime: 0s
        Cooldown: 15s
        BiomassCost: 20
        Effect: "Darkness expands from point, 1m/s for 8s (final: 8m radius). No visual warning. 15s after full size."
        RankRequired: 2

    Lures:
      - Name: "Anglerlight"
        ID: nightfly_anglerlight
        ActionType: GCD
        CastTime: 1.0s
        Range: 20y
        BiomassCost: 20
        Effect: "Lure at location, 8m attract range, 15s. SR1-2: forced pathing. SR3: 4s. SR4: 2s."
        ElevationBonus: "On elevated surface: enemies cluster below, unable to reach"
        RankRequired: 1

      - Name: "Dancing Lights"
        ID: nightfly_dancing_lights
        ActionType: GCD
        CastTime: 0s
        Cooldown: 20s
        Range: 20y
        BiomassCost: 35
        Effect: "3 lures in LINE (5m apart). Enemies follow breadcrumb trail. 10m guided path over ~8s."
        RankRequired: 2

      - Name: "Abyssal Beacon"
        ID: nightfly_abyssal_beacon
        ActionType: GCD
        CastTime: 1.5s
        Cooldown: 40s
        Range: 25y
        BiomassCost: 40
        PheromoneChargeCost: 1
        Effect: >
          Supreme lure. IRRESISTIBLE to SR1-3 for 6s, SR4 for 3s. 12m attract.
          Enemies reaching beacon: 2s stun (Stage 3). Flash on expire: 150p in 3m.
        CritCondition: "Flash crits against enemies that were in darkness (light shock)"
        RankRequired: 3

    Traps:
      - Name: "Snare Web"
        ID: nightfly_snare_web
        ActionType: GCD
        CastTime: 1.5s
        Range: 15y
        BiomassCost: 15
        Potency: 80
        Effect: "Root 3s on trigger. Invisible in darkness. 45s persist."
        CritCondition: "Crits if enemy was running"
        RankRequired: 1

      - Name: "Blight Pod"
        ID: nightfly_blight_pod
        ActionType: GCD
        CastTime: 1.5s
        Range: 15y
        BiomassCost: 20
        Potency: 200
        Effect: "200p burst (3m AoE) + 6s acid puddle (40p/s). Total: 440p per enemy in puddle."
        CritCondition: "Burst crits if enemy is in darkness"
        RankRequired: 1

      - Name: "Flashbang Cocoon"
        ID: nightfly_flashbang_cocoon
        ActionType: GCD
        CastTime: 1.5s
        Cooldown: 20s
        Range: 15y
        BiomassCost: 25
        Potency: 60
        Effect: "4s blind (Stage 3, 0m detection, worse than darkness) in 4m radius."
        CritCondition: "Crits against enemies already in darkness"
        RankRequired: 2

      - Name: "Alarm Thread"
        ID: nightfly_alarm_thread
        ActionType: GCD
        CastTime: 1.0s
        Range: 20y
        BiomassCost: 10
        Effect: "Intel trap. Trigger: reveals 10m for 8s + Pheromone Marks triggerer + generates 1 Pheromone Charge."
        RankRequired: 1

    DirectCombat:
      - Name: "Luminous Strike"
        ID: nightfly_luminous_strike
        ActionType: GCD
        CastTime: 1.2s
        Range: 15y
        Potency: 140
        BiomassCost: 10
        Effect: "Bioluminescent bolt. In darkness: 196p (+40%). Pheromone Marked: +20%. Both: 235p."
        CritCondition: "From 4y+ OR in darkness + marked"
        RankRequired: 1

      - Name: "Bioflash"
        ID: nightfly_bioflash
        ActionType: GCD
        CastTime: 0s
        Cooldown: 12s
        Range: "5m PBAoE"
        Potency: 100
        BiomassCost: 15
        Effect: "Flash: 100p + 2s vision impair (-50%). In darkness: 2s full blind instead."
        CritCondition: "Guaranteed crit against enemies in darkness"
        RankRequired: 1

    Ultimate:
      - Name: "Predator's Maze"
        ID: nightfly_predators_maze
        ActionType: GCD
        CastTime: 3.0s
        Cooldown: 180s
        Range: 25y
        BiomassCost: 80
        Effect: >
          12m darkness + 5 Blight Pods (auto-placed) + 3 Anglerlight lures
          (zone edges, draw inward) + 2 Snare Webs (midpoints). Complete
          kill corridor. Total potential per enemy (full path): ~800p.
          25s duration. Doesn't count toward individual caps.
        RankRequired: 3

  # ───────────────────────────────────────────────────────────────────────────
  # NIGHTFLY SECTION 4: ROTATION PHILOSOPHY
  # ───────────────────────────────────────────────────────────────────────────

  RotationPhilosophy:
    Overview: >
      SETUP SEQUENCE then MAINTENANCE: Darkness → Lures in darkness → Traps
      along lure paths → Observe → Luminous Strike survivors → Refresh expiring.

    NO_Fixed_Cadence: >
      Traps trigger on ENEMY TIMING, not player timing. Nightfly sets up,
      enemy decides when. No "press this at 30s" — "I set traps 30s ago
      and they just triggered."

    CoreDecisions:
      DarknessFirst_vs_TrapsFirst: "Enemies watching? → Blind first. Enemies not here yet? → Trap first."
      LurePlacement: "End of trap chain (gauntlet) vs. cluster point (AoE detonation). Corridors = end. Open areas = cluster."
      TrapEconomy: "Full field (75-125 Biomass, huge burst) vs. mixed deployment (darkness + lure priority for sustained control)."

  FailureStates:
    TrapsMissed:
      Cause: "Traps where enemies don't path / lure not drawing through traps"
      Cost: "15-25 Biomass per missed trap. 45s wasted."
      Severity: "HIGH — Nightfly damage IS traps."
    DarknessOnAllies:
      Cause: "Darkness without Pheromone Marking allies"
      Cost: "PARTY BLINDED. DPS drops. Communication breaks."
      Severity: "EXTREME — actively harms party more than enemies."
    SR4Counterplay:
      Cause: "SR4 enemies detect traps, resist lures, destroy darkness"
      Cost: "Entire toolkit at 50%+ reduced effectiveness"
      Severity: "MODERATE — still contributes via Pheromone Marks and detection utility."


# ▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀
# ██  PART E: COMBINED — Anti-Patterns / Item Baselines / System Rules        ██
# ▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀

# ─────────────────────────────────────────────────────────────────────────────
# SECTION E1: ANTI-PATTERNS
# ─────────────────────────────────────────────────────────────────────────────

AntiPatterns:
  Explicit:
    - Pattern: "Treating Colony as a DPS class"
      Problem: "Colony is 60% contribution support. Party DPS ENABLED is the metric, not personal DPS."
      Fix: "Measure by geometry reshaped, not damage dealt."

    - Pattern: "Free deployment expectation"
      Problem: "Biomass gates frequency. Spam-all-at-once → 12-15s empty."
      Fix: "Pace to regen rate. Deploy-wait-deploy rhythm. Keep 30+ reserve."

    - Pattern: "Ignoring enemy pathing"
      Problem: "Infrastructure only works WHERE ENEMIES GO."
      Fix: "Antennae Sweep BEFORE deploying. Deploy on vectors, not wishes."

    - Pattern: "2-minute burst alignment"
      Problem: "NO 2-minute cycle. Ultimates are 180s. No 120s party buff window."
      Fix: "Deploy continuously. Ultimates at phase transitions, not arbitrary timers."

    - Pattern: "Fixed rotation"
      Problem: "Colony has no rotation. It has a DEPLOYMENT PLAN responding to geometry."
      Fix: "Every deployment is a spatial decision. If it feels on-rails, you're ignoring the map."

    - Pattern: "RNG crit fishing"
      Problem: "Crit is NOT RNG. Elevation + overlap + CC state = deterministic."
      Fix: "Maintain flight. Layer deployments. Attack CC'd targets. Position check, not roll."

    - Pattern: "Neglecting flight"
      Problem: "Grounded Colony = 60-70% potential. Missing regen bonus, crit, ground AoE immunity."
      Fix: "Default state is AIRBORNE. Land only for specific reasons."

    - Pattern: "Flutter on the ground voluntarily"
      Problem: "Flutter at 40% effectiveness grounded. Entire phenotype assumes permanent flight."
      Fix: "If Flutter and grounded voluntarily: something is wrong. Get airborne."

    - Pattern: "Nightfly skipping darkness setup"
      Problem: "Without darkness: traps 50-100% detected by SR2+, lures ignored by SR3+."
      Fix: "ALWAYS darkness first. It's foundation, not optional."

    - Pattern: "Solo phenotype in multi-Harvester party"
      Problem: "Uncoordinated Colony players deploy conflicting infrastructure."
      Fix: "Communicate via Colony Signal. Builder→Flutter→Nightfly chain."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION E2: ITEM BASELINE COMPARISON
# ─────────────────────────────────────────────────────────────────────────────

ItemBaseline:
  Philosophy: "Items define baseline. Class REPLACES permanently. Colony's body IS the inventory."

  BuilderReplaces:
    - Item: "Quartzwall Capsule"
      Advantage: "Unlimited, selective permeability, repairable, variable shapes, upgradeable."
    - Item: "Barricade Foam"
      Advantage: "60s+ duration (maintenance extended), instant hardening, unlimited."
    - Item: "Thornveil Seed"
      Advantage: "Instant deployment, non-combustible, variable size."

  FlutterReplaces:
    - Item: "Springboard Disc"
      Advantage: "HAS WINGS. Permanent unlimited flight > 45s fixed installation."
    - Item: "Lockjaw Spore"
      Advantage: "Mobile delivery, unlimited regen, 3 pollen types, aerial deployment."
    - Item: "Flashstep Cartridge"
      Advantage: "Tailwind/Dart/120% flight speed. Constant mobility > single-use dash."

  NightflyReplaces:
    - Item: "Hexcage Lantern"
      Advantage: "Anglerlight ATTRACTS + reveals. Alarm Thread reveals + marks. Active manipulation > passive detection."
    - Item: "Blindveil Powder"
      Advantage: "20s zones at 20y range. Nightfly sees through own darkness. Superior every axis."
    - Item: "Rattletrap Mine"
      Advantage: "Invisible in darkness, chain-triggerable, 4 types, organs regenerate."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION E3: AGGRO SYSTEM INTERACTION
# ─────────────────────────────────────────────────────────────────────────────

AggroInteraction:
  ColonyThreatProfile: "Low personal threat. Infrastructure generates separate threat."
  StructureThreat:
    SR1: "Ignore deployments, attack nearest player."
    SR2: "Path around, don't target."
    SR3: "May target for destruction if blocking pathing."
    SR4: "Prioritize deployment destruction."
  FlightThreat: "Airborne = reduced threat from melee-only. Ranged + SR3+ still target airborne."
  DesignNote: "SR3-4 destroying infrastructure is Colony's PRIMARY high-content challenge."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION E4: >50% HP RULE
# ─────────────────────────────────────────────────────────────────────────────

EnemyHP50Rule:
  Rule: "Enemies above 50% HP take +25% damage from ALL sources."
  ColonyInteractions:
    Builder: "Collapse Structure vs. >50% HP: e.g., Fortified wall 2400 HP × 0.5 × 1.25 = 1500p. Front-load collapses."
    Flutter: "Seeds in pollen vs. >50%: 150 × 1.3 × 1.25 = 244p per seed. Opening burst significantly stronger."
    Nightfly: "Blight Pod vs. >50%: 250p burst + 300p puddle = 550p total. Traps set pre-fight benefit most."
  Implication: "Colony's front-loaded infrastructure strategy REWARDED by this rule. Deploy early, deploy aggressively."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION E5: RANK PROGRESSION
# ─────────────────────────────────────────────────────────────────────────────

RankProgression:
  Rank1:
    Name: "Worker"
    BiomassMax: 100
    StructureCap: 6
    SharedUnlocks: ["Lift Off", "Dart", "Hover", "Chitin Mend", "Chitin Harden", "Pheromone Mark", "Colony Signal", "Antennae Sweep"]
    BuilderUnlocks: ["Secrete Wall", "Resin Pillar", "Seal Path", "Fortify Structure", "Resin Spike", "Resin Snare"]
    FlutterUnlocks: ["Pollen Puff", "Pollen Trail", "Concentrated Burst", "Seed Drop", "Scatter Seed", "Tailwind"]
    NightflyUnlocks: ["Devour Light", "Anglerlight", "Snare Web", "Blight Pod", "Alarm Thread", "Luminous Strike", "Bioflash"]

  Rank2:
    Name: "Specialist"
    BiomassMax: 120
    StructureCap: 8
    BonusPassive: "Deployment cast times -0.3s"
    SharedUnlocks: ["Shed Chitin"]
    BuilderUnlocks: ["Bridge Span", "Excavate", "Collapse Structure"]
    FlutterUnlocks: ["Pollen Storm", "Root Seed", "Updraft", "Divebomb"]
    NightflyUnlocks: ["Eclipse", "Creeping Dark", "Dancing Lights", "Flashbang Cocoon"]

  Rank3:
    Name: "Architect / Stormcaller / Abyssweaver"
    BiomassMax: 150
    StructureCap: 10
    BonusPassive: "Pheromone Charge generation +50%"
    BuilderUnlocks: ["Architect's Domain"]
    FlutterUnlocks: ["Seed Barrage", "Swarm Cloud"]
    NightflyUnlocks: ["Abyssal Beacon", "Predator's Maze"]

# ─────────────────────────────────────────────────────────────────────────────
# SECTION E6: COLONY SYNERGY (Multi-Harvester Party)
# ─────────────────────────────────────────────────────────────────────────────

ColonySynergy:
  CrossPhenotypeCombos:
    BuilderPlusFlutter:
      Name: "Funnel and Gas"
      Effect: "Builder walls force chokepoints → Flutter pollen at exits → GUARANTEED exposure, no escape."
    BuilderPlusNightfly:
      Name: "Sealed Darkness"
      Effect: "Builder seals exits → Nightfly fills with darkness/traps/lures → 100% trap trigger rate."
    FlutterPlusNightfly:
      Name: "Blind Sky"
      Effect: "Nightfly darkens ground → Flutter bombs from above → enemies can't see incoming seeds."
    AllThree:
      Name: "Colony Protocol"
      Effect: >
        Builder maze + Nightfly darkness + Flutter bombardment = party IS the
        dungeon enemies are trapped in. Complete superorganism expression.

  PheromoneNetworkScaling:
    OneColony: "Base regen. No synergy."
    TwoColony: "+10% regen each. Shared vision. Cross-mark benefits."
    ThreeColony: "+20% regen each. All combos. Colony Protocol achievable."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION E7: PROCGEN MAP INTERACTION
# ─────────────────────────────────────────────────────────────────────────────

ProcgenInteraction:
  PhenotypePreferences:
    Builder: "EXCELS: corridors, multi-room, elevation. STRUGGLES: massive open arenas."
    Flutter: "EXCELS: open-air, tall ceilings, vertical elements. STRUGGLES: low ceilings, cramped indoors."
    Nightfly: "EXCELS: indoor/rooms, corridors, many doors. STRUGGLES: open outdoor, ambient lighting."
  Adaptation: >
    Colony MUST read procgen map before deciding strategy. First 5-10s =
    Antennae Sweep + map assessment. No other class benefits as much from
    understanding the MAP before engaging ENEMIES.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION E8: BALANCE VALIDATION
# ─────────────────────────────────────────────────────────────────────────────

BalanceValidation:
  - "First deployment within 2 GCDs: PASS (starts at 100 Biomass)"
  - "Sustained 1 medium per 10s: PASS (5/s = 50/10s, medium = 30-45)"
  - "Recovery from empty ≤ 15s: PASS (30 Biomass ÷ 5/s = 6s base)"
  - "60% total contribution: REQUIRES SIMULATION (encounter-dependent)"
  - "Each phenotype solo-viable Rank 1: PASS (damage + heal + CC)"
  - "Airborne = 15-20% more than grounded: PASS (crit + regen + safety)"
  - "No 120s burst alignment: PASS (180s ultimates, odd-timer CDs)"
  - "Zero RNG: PASS (deterministic crit, deterministic regen, timer seeds)"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION E9: CONSTRAINTS (SYSTEM COMPLIANCE)
# ─────────────────────────────────────────────────────────────────────────────

Constraints:
  GCD: "2.0s base, 1.4s cap — COMPLIANT"
  Crit: "NOT RNG (elevation + overlap + CC state) — COMPLIANT"
  HP50Rule: "Applies to ENEMIES (+25% above 50%) — COMPLIANT"
  ItemBaseline: "Items define baseline, class REPLACES permanently — COMPLIANT"
  NoBurstCycle: "NO 2-minute burst, NO fixed cadence — COMPLIANT"
  ZeroFreecure: "Zero RNG procs — COMPLIANT"
  WeaveModel: "Single-weave only — COMPLIANT"
  SpecialTier: "Knowledge gate via phenotype depth — CONFIRMED"
  BiologicalLock: "Hard lock to Harvesters (Linfree) — CONFIRMED"
  RacialFlight: "Harvesters fly, leveraged by class — CONFIRMED"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION E10: OPEN QUESTIONS
# ─────────────────────────────────────────────────────────────────────────────

OpenQuestions:
  - "Structure collision + procgen: snap-to-grid? Free placement? Overlap rules?"
  - "SR4 destruction rate: if immediate, Colony is unplayable at high content. Needs tuning."
  - "Nightfly darkness + allies without Pheromone Mark: must allies stay out of zones?"
  - "Flutter minimum ceiling for functional flight: map gen must guarantee minimum."
  - "3 Colony party: balanced or crowd other classes for slots?"
  - "Builder walls vs. SR2 AI: infinite path calc if all paths blocked? Need fallback behavior."
  - "GATHER role: background gathering during combat? Separate system? Economic party value?"
  - "Phenotype permanence: 3 characters per Colony main = feature (commitment) or burden (alt mgmt)?"

