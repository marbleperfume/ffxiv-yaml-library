# ─────────────────────────────────────────────────────────────────────────────
# SECTION 19: DESIGN NOTES & OPEN QUESTIONS
# ─────────────────────────────────────────────────────────────────────────────

DesignNotes:
  ConvergeUI:
    Question: "How does the player select which element to consume in real-time?"
    Options:
      - "Radial menu (5 elements) — opens on Converge press, select with mouse/stick"
      - "Modifier keys: Converge+1=Fire, Converge+2=Water, etc."
      - "Context-sensitive: auto-selects based on next queued skill element"
    Recommendation: "Modifier keys for KB/M, radial for controller. Context-sensitive as option."

  StackVisibility:
    Question: "How are 5 simultaneous stack counters displayed without UI clutter?"
    Options:
      - "Pentagonal gauge (5 sides, each fills with element color)"
      - "Stacked bars (horizontal, 5 thin bars above/below HP)"
      - "Orbiting particles (1-4 orbs per element orbit the character)"
    Recommendation: "Pentagonal gauge (compact, reads at a glance, thematic)."

  TuningKnobs:
    MaxStacks: "Currently 4. Range 3-5 for balance tuning. 3 = faster cycles, less burst. 5 = slower buildup, bigger burst."
    ManaRefundPerStack: "Currently 5%. Range 3-7%. Lower = tighter mana, higher = more forgiving."
    ConvergeBonusDamage: "Currently +50p/stack for Fire. Range 40-60p. Affects DPS ceiling directly."
    TriageThreshold: "Currently 40% HP triggers triage. Range 30-50%. Lower = less reactive healing needed."

  FutureDesignSpace:
    - "Rank 4 (if added): Dual-element skills that build 2 stack types simultaneously"
    - "Trait system: specialize in 2-3 elements, gaining bonus stacks in those at cost of others"
    - "PvP adjustments: reduce CC duration from Earth consumption, cap Wind AoE in PvP"
    - "Elemental weather system: certain zones/encounters buff specific elements"

