Key: Dialogue.Goldwyn.PathOfTravelers.Seq0.Introduction
Scene: Goldwyn challenges the player to a sparring demonstration in the Plaza
Participants:
  - NPC.Friendly.MalachiteCity.GoldwynExcelsior
  - Player
Lines:
  - Speaker: NPC.Friendly.MalachiteCity.GoldwynExcelsior
    Text: >
      Stand back and admire, if you would -- gem-dusted Waste Metal, every
      piece of it. Do you know what it takes to smash a gem in half without
      ruining the other half? Fourteen anvils. I own the fifteenth.
    ExpressionTag: Expression.Proud.Beaming
    VOPath: ""
  - Speaker: NPC.Friendly.MalachiteCity.GoldwynExcelsior
    Text: >
      One day I'll be a Traveler -- a real one, military-grade, the kind
      cities name streets after. Care to see a demonstration first?
    ExpressionTag: Expression.Proud.Determined
    VOPath: ""
  - Speaker: Narration
    Text: >
      [Goldwyn squares up against a training dummy. His Spine Sword swing is
      wide, badly timed, and would have missed entirely if the Recall
      Sphere hadn't yanked him back onto balance mid-stumble. The dummy is
      untouched. He is, somehow, thrilled.]
    ExpressionTag: ""
    VOPath: ""
  - Speaker: NPC.Friendly.MalachiteCity.GoldwynExcelsior
    Text: >
      Did you see that recovery? Textbook. ...The dummy lives to fight
      another day, but only because I allowed it.
    ExpressionTag: Expression.Proud.Determined
    VOPath: ""
NarrativeIntent: >
  Establishes Goldwyn's comedic-weakness-vs-good-equipment premise up front,
  in his own voice, before any of the Kaeloth/Nekrath stakes exist.
