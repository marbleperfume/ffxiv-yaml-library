Key: Dialogue.Goldwyn.PathOfTravelers.Seq2.ContestOfStrength
Scene: Nekrath arrives at the cliffside to challenge Kaeloth
Participants:
  - NPC.Friendly.MalachiteCity.KaelothWindpaw
  - NPC.Boss.Nekrath
  - NPC.Friendly.MalachiteCity.GoldwynExcelsior
  - Player
LevelSequenceRef: ""
Lines:
  - Speaker: NPC.Boss.Nekrath
    Text: >
      A Landwin, wearing my people's style like a borrowed coat. You didn't
      earn it. You didn't even have to ask -- you just took what was
      already dead and buried, because no one was left to say no.
    ExpressionTag: Expression.Cocky.Dismissive
    VOPath: ""
  - Speaker: NPC.Friendly.MalachiteCity.KaelothWindpaw
    Text: >
      Nobody taught me to stop learning just because the teachers were gone.
      If that's an insult to your dead, take it up with me. Not the style.
    ExpressionTag: Expression.Grim.Determined
    VOPath: ""
  - Speaker: Narration
    Text: >
      [Goldwyn moves to step in; Kaeloth raises one hand, not looking back,
      and Goldwyn stops. This is not a fight either of them is meant to be
      part of.]
    ExpressionTag: ""
    VOPath: ""
  - Speaker: NPC.Friendly.MalachiteCity.GoldwynExcelsior
    Text: "Kaeloth--"
    ExpressionTag: Expression.Warm.Reverent
    VOPath: ""
  - Speaker: NPC.Friendly.MalachiteCity.KaelothWindpaw
    Text: "Watch. That's the lesson today."
    ExpressionTag: Expression.Grim.Determined
    VOPath: ""
  - Speaker: Narration
    Text: >
      [The contest is short and one-sided in a way neither the player nor
      Goldwyn is prepared for. Kaeloth condenses and expels everything he
      has in a single exchange -- and it is not enough. Nekrath's channeled
      strike lands clean. Kaeloth goes down without a second exchange, the
      way a legend is never supposed to.]
    ExpressionTag: ""
    VOPath: ""
  - Speaker: NPC.Boss.Nekrath
    Text: >
      Can't keep a winner down, is that what they say about you? Someone
      should have told you strength doesn't care about slogans.
    ExpressionTag: Expression.Cocky.Dismissive
    VOPath: ""
  - Speaker: Narration
    Text: >
      [Nekrath leaves without finishing either bystander -- not out of
      mercy, but because neither of them registers as a threat worth the
      effort. Goldwyn doesn't move for a long moment.]
    ExpressionTag: ""
    VOPath: ""
NarrativeIntent: >
  Kaeloth's death, deliberately staged like Toji's upset in Jujutsu Kaisen --
  a legendary figure loses fast and clean against a foe operating on a
  different axis of power (internally-held Ancient feline energy vs a
  Landwin borrowing its shape). Nekrath's motive is explicitly the borrowed
  style, not generic villainy. Sets up Goldwyn's grief and the Seq3 plan.
