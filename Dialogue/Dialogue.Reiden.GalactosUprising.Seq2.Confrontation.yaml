Key: Dialogue.Reiden.GalactosUprising.Seq2.Confrontation
Scene: Galactos is cornered at his outskirts workshop and deploys Colossus Prime
Participants:
  - NPC.Boss.Galactos
  - NPC.Friendly.MalachiteCity.ReidenKurogane
  - Player
Lines:
  - Speaker: NPC.Boss.Galactos
    Text: "Kurogane. Predictable as ever -- and you've brought a new toy along."
    ExpressionTag: Expression.Cocky.Dismissive
    VOPath: ""
  - Speaker: NPC.Friendly.MalachiteCity.ReidenKurogane
    Text: "Stand down, Galactos. This ends here or it ends worse for the city."
    ExpressionTag: Expression.Flat.Unimpressed
    VOPath: ""
  - Speaker: NPC.Boss.Galactos
    Text: >
      Charmingly optimistic. I didn't build Colossus Prime to sit in a
      hangar.
    ExpressionTag: Expression.Cocky.Dismissive
    VOPath: ""
  - Speaker: Narration
    Text: >
      [The workshop wall collapses outward as Colossus Prime rises behind
      Galactos, building-scale and already drawing its blade. Galactos
      retreats behind it, laughing, and teleports out the moment it's fully
      upright.]
    ExpressionTag: ""
    VOPath: ""
  - Speaker: NPC.Boss.Galactos
    Text: "Try not to scratch the paint on your way out!"
    ExpressionTag: Expression.Cocky.Dismissive
    VOPath: ""
  - Speaker: NPC.Friendly.MalachiteCity.ReidenKurogane
    Text: "He'll be back. He always is. Right now, that's not the problem in front of us."
    ExpressionTag: Expression.Grim.Determined
    VOPath: ""
NarrativeIntent: >
  Galactos escapes by design (recurring villain, see
  NPC.Boss.Galactos.yaml PhaseLogic) rather than being defeated here,
  leaving Colossus Prime as the actual Chapter 1 finale encounter in Seq3.
