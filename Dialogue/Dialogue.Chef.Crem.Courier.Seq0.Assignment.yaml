Lines:
  - Speaker: NPC.Friendly.MalachiteCity.Crem
    Text: >
      Ah, perfect timing! Boss hasn't hired us a courier, so until she does,
      you're my rolling pin with legs. One delivery -- a birthday cake, still
      warm. Try not to let it fall, eh? A dropped cake is a tragedy with
      frosting.
