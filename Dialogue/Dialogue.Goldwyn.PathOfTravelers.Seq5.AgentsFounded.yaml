Key: Dialogue.Goldwyn.PathOfTravelers.Seq5.AgentsFounded
Scene: Goldwyn lays the Spine Sword's handle at Kaeloth's makeshift grave
Participants:
  - NPC.Friendly.MalachiteCity.GoldwynExcelsior
  - Player
Lines:
  - Speaker: Narration
    Text: >
      [Goldwyn kneels at a plain marker on the cliffside and sets down the
      one surviving piece of his gear -- the Spine Sword's handle, all
      that's left of it.]
    ExpressionTag: ""
    VOPath: ""
  - Speaker: NPC.Friendly.MalachiteCity.GoldwynExcelsior
    Text: >
      Everything else got used up doing exactly what it was supposed to.
      Seems right that this is the part that's left. It's the part that
      was always mine to hold, anyway.
    ExpressionTag: Expression.Weary.Resolute
    VOPath: ""
  - Speaker: NPC.Friendly.MalachiteCity.GoldwynExcelsior
    Text: >
      I've been thinking about what comes next. Eorzea's got the Scions,
      or so the stories go -- people who step in before things get to the
      point Kaeloth's fight got to. I want to build something like that
      here. I'm calling it the Agents.
    ExpressionTag: Expression.Grim.Determined
    VOPath: ""
  - Speaker: NPC.Friendly.MalachiteCity.GoldwynExcelsior
    Text: >
      Not to win every fight. To stop as many of them from needing to
      happen at all. I'd like you to be the first one I ask.
    ExpressionTag: Expression.Grim.Determined
    VOPath: ""
  - Speaker: Player
    Text: "You're sure about this? After everything that just happened?"
    ExpressionTag: ""
    VOPath: ""
  - Speaker: NPC.Friendly.MalachiteCity.GoldwynExcelsior
    Text: "Can't keep a winner down."
    ExpressionTag: Expression.Proud.Determined
    VOPath: ""
NarrativeIntent: >
  Closes the chain -- grief processed into founding purpose rather than
  vengeance-as-endpoint, establishes the Agents (Reputation/Reputation.Agents.yaml)
  as this world's Scions-equivalent, and recruits the player as founding
  member. Goldwyn's answer to being asked "are you sure" is the same
  Landwin slogan throughout the chain, now fully his own rather than
  borrowed from Kaeloth.
